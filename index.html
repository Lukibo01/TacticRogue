.scout-section h5{font-size:9.5px;text-transform:uppercase;letter-spacing:1.6px;color:var(--text-faint);font-weight:800;margin-bottom:6px;margin-top:4px}
.scout-bullet{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)}
.scout-bullet:last-child{border:none}
.scout-bullet .icon{flex-shrink:0;width:16px;text-align:center;font-size:13px}
.scout-bullet .text{flex:1;color:var(--text);line-height:1.4;font-size:11.5px}
.scout-bullet .text b{color:var(--accent)}
.scout-bullet.danger .text b{color:var(--danger)}
.scout-bullet.warn .text b{color:var(--warn)}

/* Opponent analysis 3-tab panel */
.opp-tab-panel{display:flex;flex-direction:column;gap:8px;margin-top:6px;flex:1;min-height:0;overflow-y:auto}
.opp-tab-panel .mini-pitch{flex:0 1 auto;height:calc((100vh - 220px) / 2);max-height:calc((100vh - 220px) / 2);min-height:80px;width:100%;aspect-ratio:unset;align-self:stretch}
/* Saved tactics compact strip */
.saved-tac-strip{display:flex;flex-wrap:wrap;gap:6px;padding:6px 0;margin-top:2px}
.saved-tac-chip{display:flex;align-items:center;gap:5px;background:var(--bg-2);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;transition:border-color .13s,background .13s}
.saved-tac-chip:hover{border-color:var(--accent);background:var(--bg-3)}
.saved-tac-chip .chip-name{color:var(--text);font-weight:600;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.saved-tac-chip .chip-form{color:var(--text-faint);font-size:10px}
.saved-tac-chip .chip-del{color:var(--text-faint);font-size:11px;line-height:1;padding:0 2px;border-radius:3px}
.saved-tac-chip .chip-del:hover{color:var(--danger)}

/* Role editor when slot selected */
/* Role modal — modern card design */
.role-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:50}
.role-modal.show{display:flex}
.rmod-box{background:#0D1419;border:1px solid #232D3A;border-radius:14px;width:90%;max-width:360px;overflow:hidden;box-shadow:0 28px 72px rgba(0,0,0,.85)}
.rmod-head{padding:16px 18px 14px;border-bottom:1px solid rgba(255,255,255,.055)}
.rmod-pos-badge{display:inline-flex;align-items:center;padding:2px 9px;background:rgba(94,194,106,.1);border:1px solid rgba(94,194,106,.28);border-radius:5px;font-size:9.5px;font-weight:800;color:#5EC26A;letter-spacing:.9px;text-transform:uppercase;margin-bottom:7px}
.rmod-player{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.rmod-meta{font-size:10.5px;color:#6F7785;margin-top:3px}
.rmod-list{padding:8px 10px;display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto;scrollbar-width:none}
.rmod-list::-webkit-scrollbar{display:none}
.rmod-item{padding:9px 12px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:background .12s,border-color .12s}
.rmod-item:hover{background:rgba(255,255,255,.04)}
.rmod-item.active{background:rgba(94,194,106,.07);border-color:rgba(94,194,106,.32)}
.rmod-item-name{font-size:12.5px;font-weight:700;color:#C9D0D8;margin-bottom:2px}
.rmod-item.active .rmod-item-name{color:#5EC26A}
.rmod-item-desc{font-size:10.5px;color:#46505F;line-height:1.35}
.rmod-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.055);display:flex;gap:8px;justify-content:flex-end}

/* Match phase — full-screen layout */
.match-phase{display:flex;flex-direction:column;height:100%;overflow:hidden;padding:12px 14px}
/* Main row: flex column — scoreboard on top, then the panel+field area */
.match-main-row{display:flex;flex-direction:column;gap:14px;flex:1;min-height:0}
/* Scoreboard — centered, same width as the pitch (full width minus the two 320px panels) */
.match-scoreboard{width:100%;display:flex;align-items:center;justify-content:center;position:relative;background:var(--bg-1);padding:10px 20px;border-radius:12px;border:1px solid var(--border)}
.match-controls{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:6px}
.speed-btn{font-size:11.5px;font-weight:800;padding:6px 14px;border-radius:6px;letter-spacing:.8px;opacity:.8;min-width:46px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:var(--text-dim);cursor:pointer;transition:all .15s}
.speed-btn:hover{opacity:1;border-color:rgba(255,255,255,.3)}
.speed-btn.speed-active{background:var(--accent);color:#071a09;opacity:1;border-color:transparent;box-shadow:0 0 10px rgba(94,194,106,.4)}
.skip-btn{font-size:11.5px;font-weight:700;padding:6px 15px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:var(--text-dim);letter-spacing:.3px;cursor:pointer;opacity:.8;transition:all .15s}
.skip-btn:hover{opacity:1;color:var(--text);border-color:rgba(255,255,255,.3)}
.btn.impossible-btn{background:rgba(127,29,29,.25);border-color:rgba(239,68,68,.45);color:#f87171}
.btn.impossible-btn:hover{background:rgba(127,29,29,.45);border-color:rgba(239,68,68,.75);color:#fca5a5}
/* Bottom area: panels are absolutely positioned so they don't shrink the pitch */
.match-bottom{flex:1;display:flex;flex-direction:row;align-items:flex-start;gap:8px;min-height:0;min-width:0}
.score-main{display:flex;align-items:center;gap:24px}
.score-team-block{text-align:center;min-width:120px}
.score-team-name{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px}
.score-value{font-size:52px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;line-height:1}
.score-value.winning{color:#5EC26A}
.score-avg{font-size:10px;color:var(--text-faint);margin-top:2px;font-weight:600}
.score-center-block{display:flex;flex-direction:column;align-items:center;gap:3px}
.score-colon{font-size:48px;font-weight:900;color:var(--bg-4);line-height:1}
.match-clock{font-size:16px;font-weight:800;color:#5EC26A;letter-spacing:3px;font-variant-numeric:tabular-nums}
/* Left panel — absolutely positioned, floats over left edge of field background */
.match-ticker{width:300px;flex-shrink:0;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:10px 13px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.match-ticker-hdr{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;flex-shrink:0;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* Field wrap — fills full bottom area; padding reserves space for the floating panels */
.match-field-wrap{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* Pitch — 90% of padded area (−10%), centered via flex parent */
.match-field{position:relative;width:90%;aspect-ratio:600/389;background:#161B22;border-radius:8px;overflow:hidden;border:1.5px solid rgba(255,255,255,.07);box-shadow:0 8px 32px rgba(0,0,0,.55)}
.match-field>svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
/* Right panel — absolutely positioned, floats over right edge of field background */
.match-stats-side{width:300px;flex-shrink:0;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:10px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.stats-panel-hdr{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;flex-shrink:0;padding-bottom:6px;border-bottom:1px solid var(--border);text-align:center}
.stat-row{display:flex;flex-direction:column;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);flex:1}
.stat-row:last-child{border-bottom:none}
.stat-nums{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stat-num-my{font-size:18px;font-weight:800;color:var(--text);min-width:36px}
.stat-num-opp{font-size:18px;font-weight:800;color:var(--text);min-width:36px;text-align:right}
.stat-name{font-size:12.5px;font-weight:700;color:var(--text-dim);text-align:center;flex:1;letter-spacing:.3px}
.stat-bar-wrap{height:10px;border-radius:5px;overflow:hidden;display:flex;background:rgba(255,255,255,.07)}
.stat-bar-my{height:100%;background:var(--accent);transition:flex .75s ease;min-width:3px}
.stat-bar-opp{height:100%;background:#6c5fff;transition:flex .75s ease;min-width:3px}
/* Ballbesitz special row */
.stat-row.poss-row .stat-bar-wrap{height:14px;border-radius:7px;margin-top:3px}
.poss-badge-my{background:var(--accent);color:#0d1a10;font-size:14px;font-weight:800;padding:5px 15px;border-radius:20px}
.poss-badge-opp{background:#6c5fff;color:#fff;font-size:14px;font-weight:800;padding:5px 15px;border-radius:20px}
/* Field overlay — single full-field gradient, replaces per-zone coloring */
.field-overlay{position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:7px}
/* ── Arrow: single seamless stream keyframe — dashoffset travels from +len to -len,
      invisible at both ends so the loop reset is undetectable ── */
@keyframes aFlow{
  from{stroke-dashoffset:var(--dl);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  to{stroke-dashoffset:calc(var(--dl)*-1);opacity:0}
}
/* ── Arrow: chevron continuously slides through, fades at edges ── */
@keyframes aChvFlow{
  0%{transform:translateX(-22px);opacity:0}
  14%{opacity:1}
  86%{opacity:1}
  100%{transform:translateX(22px);opacity:0}
}
/* ── Arrow positioning ── */
.field-arrow{position:absolute;top:50%;transform:translate(-50%,-52%);opacity:0;transition:opacity 0.35s ease;pointer-events:none;z-index:8;line-height:0}
.fa-def{left:16.67%}
.fa-mid{left:50%}
.fa-att{left:83.33%}
.field-arrow.visible{opacity:1}
.field-label{position:absolute;top:calc(50% + 42px);transform:translateX(-50%);font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;opacity:0;transition:opacity .3s ease;pointer-events:none;z-index:8;white-space:nowrap}
.field-label.visible{opacity:1}
/* Event flash */
.event-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#fff;font-size:18px;font-weight:900;padding:10px 24px;border-radius:8px;border:2px solid #5EC26A;letter-spacing:2px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
.event-flash.show{opacity:1}
.event-flash.goal{border-color:#5EC26A;background:rgba(20,83,45,.97);box-shadow:0 0 30px rgba(94,194,106,.5)}
.event-flash.opp-goal{border-color:#ef4444;background:rgba(127,29,29,.97)}
/* Ticker rows */
.event-row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05)}
.event-row:last-child{border:none}
.event-time{font-weight:800;color:#5EC26A;width:30px;flex-shrink:0;font-variant-numeric:tabular-nums;font-size:12px;padding-top:2px}
.event-badge{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.6px;padding:3px 6px;border-radius:4px;text-transform:uppercase;flex-shrink:0;margin-top:1px;min-width:30px;text-align:center}
.eb-tor{background:#14532d;color:#86efac}
.eb-geg{background:#7f1d1d;color:#fca5a5}
.eb-pen{background:#14532d;color:#86efac}
.eb-miss{background:#7f1d1d;color:#fca5a5}
/* Alle anderen Badges neutral weiß */
.eb-ch,.eb-gch,.eb-hz,.eb-az,.eb-elf,.eb-ko{background:rgba(255,255,255,.09);color:rgba(200,210,230,.75)}
.event-text{flex:1;color:#c8d2dc;line-height:1.4;font-size:12.5px}
.event-text b{color:#e0e8f0}
/* ev-chance: neutral, no special color */
/* Goal rows — prominent green, much bigger, clearly dominant */
.event-row.ev-goal{padding:9px 6px;margin:3px 0;border-radius:7px;background:rgba(94,194,106,.08);border-bottom:1px solid rgba(94,194,106,.2)}
.event-row.ev-goal .event-time{color:var(--accent);font-size:14px;font-weight:900}
.event-row.ev-goal .event-badge{font-size:11px;padding:4px 8px;letter-spacing:.5px}
.event-row.ev-goal .event-text{color:var(--accent);font-size:16px;font-weight:900;line-height:1.25;text-shadow:0 0 16px rgba(94,194,106,.35)}
.event-row.ev-goal .event-text b{color:#fff}
/* Opponent goal rows */
.event-row.ev-opp-goal{padding:9px 6px;margin:3px 0;border-radius:7px;background:rgba(239,68,68,.08);border-bottom:1px solid rgba(239,68,68,.18)}
.event-row.ev-opp-goal .event-time{color:#f87171;font-size:14px;font-weight:900}
.event-row.ev-opp-goal .event-text{color:#f87171;font-size:16px;font-weight:900;line-height:1.25;text-shadow:0 0 16px rgba(239,68,68,.3)}

/* Result phase */
.result-phase{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;text-align:center}
.result-banner{font-size:40px;font-weight:900;letter-spacing:4px;text-transform:uppercase;padding:14px 44px;border-radius:12px}
.result-banner.win{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0d1a10;box-shadow:0 0 40px rgba(94,194,106,.3)}
.result-banner.lose{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff}
.result-banner.victory{background:linear-gradient(135deg,#facc15,#d97706);color:#0b0f14;box-shadow:0 0 60px rgba(250,204,21,.5)}
.result-score{font-size:54px;font-weight:900;letter-spacing:4px}
.result-details{font-size:12.5px;color:var(--text-dim);max-width:560px;line-height:1.6}
.result-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;width:100%;max-width:560px}
.result-stat{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center}
.result-stat-label{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);font-weight:800;margin-bottom:4px}
.result-stat-value{font-size:18px;font-weight:800;color:var(--text)}
.result-progressions{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:10px 16px;width:100%;flex-shrink:0}
.result-progressions h4{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);margin-bottom:9px;font-weight:800}
.prog-chips{display:flex;flex-wrap:wrap;gap:7px}
.prog-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:13px}
.prog-chip-name{color:var(--text-dim)}
.prog-chip-val{color:var(--text)}
.tactic-feedback{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:left;width:100%;max-width:440px}
.tf-title{font-size:9.5px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}
.tf-row{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.tf-row:last-child{border-bottom:none}
.tf-icon{flex-shrink:0;font-size:13px;line-height:1.5;margin-top:1px}
.tf-text{font-size:12.5px;line-height:1.45;color:var(--text)}
.tf-ok .tf-text{color:#5EC26A}
.tf-warn .tf-text{color:#fcd34d}
.tf-neutral .tf-text{color:var(--text-dim)}
.tf-text-wrap{display:flex;flex-direction:column;gap:2px;flex:1}
.tf-tip{font-size:11px;color:var(--text-faint);font-style:italic;margin-top:1px}
.tf-gamechanger{background:rgba(94,194,106,.07);border:1px solid rgba(94,194,106,.18);border-radius:7px;padding:8px 11px;margin:3px 0 2px}
.tf-gc-label{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.tf-gc-text{font-size:12.5px;line-height:1.45;font-weight:600}
.tf-gc-text.pos{color:#5EC26A}
.tf-gc-text.neg{color:#fcd34d}
.prog-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px dashed var(--border)}
.prog-row:last-child{border:none}
.prog-row b.up{color:var(--accent)}
.prog-row b.down{color:var(--danger)}
/* ── Unified main CTA button (bottom-center, leads to next screen) ── */
.btn-cta-main{padding:16px 52px!important;font-size:16px!important;font-weight:900!important;letter-spacing:.5px!important;border-radius:11px!important}

/* ── Result Phase V2 ─────────────────────────────────────────── */
.result-phase-v2{display:flex;flex-direction:column;gap:10px;padding:20px 24px 16px;height:100%;overflow-y:auto}
.result-hero{display:flex;align-items:center;padding-bottom:16px;border-bottom:1px solid var(--border)}
.result-hero-side{flex:1;display:flex;flex-direction:column;gap:3px}
.result-hero-side.left{align-items:flex-start}
.result-hero-side.right{align-items:flex-end;text-align:right}
.result-hero-team-name{font-size:11px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint)}
.result-hero-avg{font-size:15px;font-weight:700;color:var(--text-dim)}
.result-hero-center{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 20px;flex-shrink:0}
.result-score-row{display:flex;align-items:flex-start;gap:12px}
.result-score-scorers{display:flex;flex-direction:column;gap:2px;max-width:100px}
.result-score-scorers.left{align-items:flex-end;text-align:right}
.result-score-scorers.right{align-items:flex-start}
.result-scorer-line{font-size:12px;color:rgba(220,230,240,.75);line-height:1.4;white-space:nowrap}
.result-badge-label{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:5px}
.result-badge-label.win{background:rgba(94,194,106,.18);color:#5EC26A}
.result-badge-label.lose{background:rgba(220,38,38,.18);color:#ef4444}
.result-badge-label.draw{background:rgba(250,204,21,.18);color:#facc15}
.result-score-v2{font-size:82px;font-weight:900;letter-spacing:6px;line-height:1;margin-top:-2px;text-shadow:0 0 40px currentColor;opacity:.95}
.result-score-v2.win{color:#5EC26A}
.result-score-v2.lose{color:#ef4444}
.result-score-v2.draw{color:#facc15}
.result-pen-label{font-size:12px;color:var(--text-faint)}
.result-stats-strip{display:flex;align-items:stretch;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0}
.rss-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;gap:4px}
.rss-val{font-size:26px;font-weight:900;color:var(--text)}
.rss-val.pos{color:#5EC26A}
.rss-val.neg{color:#ef4444}
.rss-label{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint)}
.rss-sep{width:1px;background:var(--border);flex-shrink:0}
.result-tactic-section{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
.result-gamechanger-v2{display:flex;align-items:center;justify-content:center;background:rgba(94,194,106,.07);border:1px solid rgba(94,194,106,.22);border-radius:8px;padding:10px 16px;flex-shrink:0}
.rgc-content{display:flex;flex-direction:column;gap:3px;align-items:center;text-align:center}
.rgc-label{font-size:9px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent)}
.rgc-text{font-size:13px;font-weight:600;line-height:1.4;text-align:center}
.rgc-text.pos{color:#5EC26A}
.rgc-text.neg{color:#fcd34d}
.rgc-tip{font-size:11.5px;color:var(--text-faint);font-style:italic;margin-top:1px}
.result-tactic-panels{display:flex;gap:8px;flex:0 0 auto}
.rtp-panel{flex:1;background:var(--bg-1);border:1px solid var(--border);border-radius:8px;padding:8px 11px;display:flex;flex-direction:column;overflow-y:auto}
.rtp-head{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;flex-shrink:0}
.rtp-items{display:flex;flex-direction:column}
.rtp-item{font-size:13px;line-height:1.4;padding:4px 0;border-bottom:1px solid var(--border)}
.rtp-item:last-child{border-bottom:none}
.rtp-item-tip{font-size:11.5px;font-style:italic;color:var(--text-faint);margin-top:1px}
.rtp-panel.strengths .rtp-item{color:#5EC26A}
.rtp-panel.weaknesses .rtp-item{color:#fcd34d}
.rtp-empty{font-size:13px;color:var(--text-faint);font-style:italic;padding:3px 0}
.result-actions-v2{display:flex;gap:10px;justify-content:center;flex-shrink:0;padding-top:4px}

/* Replace-pick layout */
.replace-bench-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s}
.replace-pick-main{display:flex;flex-direction:row;flex:1;min-height:0;overflow:hidden}
/* card panel overlaid absolutely so the pitch keeps identical dimensions to the lineup screen */
.replace-card-panel{position:absolute;left:0;top:0;bottom:0;width:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 14px;background:rgba(9,13,17,.88);border-right:1px solid #3A424F;z-index:20}
.replace-card-panel-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1.6px;color:var(--text-faint);font-weight:800}
.replace-card-panel .card{cursor:default;pointer-events:none}
/* Age badges on mini-cards — pinned top-right corner of token */
.stoken-stage-chip{font-size:5.5px;font-weight:800;padding:1px 3px;border-radius:6px;letter-spacing:.3px;line-height:1.4;flex-shrink:0}
.stoken-stage-chip.wk{background:#4ade80;color:#052e16}
.stoken-stage-chip.pot{background:#22d3ee;color:#064e5a}
.stoken-stage-chip.alt{background:#f59e0b;color:#431407}
.stoken-stage-chip.end{background:#ef4444;color:#fff}
/* old grid kept for replace-draft */
.replace-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;width:100%;max-width:1100px}
.team-slot-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:border-color .13s,transform .13s}
.team-slot-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.team-slot-card.common{border-left:3px solid var(--common-1)}
.team-slot-card.uncommon{border-left:3px solid #5EC26A}
.team-slot-card.rare{border-left:3px solid var(--rare-1)}
.team-slot-card.epic{border-left:3px solid var(--epic-1)}
.team-slot-card.star{border-left:3px solid var(--star-1)}
.team-slot-card.legendary{border-left:3px solid var(--legendary-1)}
.team-slot-card .pos-label{font-size:9.5px;color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.team-slot-card .player-line{display:flex;justify-content:space-between;align-items:center}
.team-slot-card .player-name{font-size:12.5px;font-weight:700}
.team-slot-card .player-rating{font-size:17px;font-weight:900;color:var(--accent)}
.team-slot-card .player-meta{font-size:10.5px;color:var(--text-faint)}

/* Trophy Collection */
.trophy-phase{display:flex;flex-direction:column;align-items:center;padding:24px 16px;gap:20px;overflow-y:auto}
.trophy-shelf{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:8px 0}
.trophy-card{width:128px;min-height:168px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border:1.5px solid;position:relative;padding:14px 10px;transition:transform .18s,box-shadow .18s;cursor:default}
.trophy-card.locked{background:rgba(15,22,45,.7);border-color:rgba(55,70,100,.4)}
.trophy-card.l0{background:linear-gradient(145deg,#3f3f46,#27272a);border-color:#78716c}
.trophy-card.l1{background:linear-gradient(145deg,#15803d,#14532d);border-color:#16a34a}
.trophy-card.l2{background:linear-gradient(145deg,#0e7490,#155e75);border-color:#0891b2}
.trophy-card.l3{background:linear-gradient(145deg,#991b1b,#7f1d1d);border-color:#dc2626}
.trophy-card.l4{background:linear-gradient(145deg,#a16207,#854d0e);border-color:#facc15;box-shadow:0 0 22px rgba(250,204,21,.18)}
.trophy-card.l5{background:linear-gradient(145deg,#7e22ce,#4c1d95);border-color:#e879f9;box-shadow:0 0 26px rgba(232,121,249,.25)}
.trophy-card:not(.locked):hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,.5)}
.trophy-icon{font-size:46px;line-height:1;display:block;margin-bottom:2px}
.trophy-card.locked .trophy-icon{filter:grayscale(1) brightness(0.25) sepia(1) hue-rotate(200deg)}
.trophy-card-name{font-size:9px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.92);text-align:center;line-height:1.3}
.trophy-card.locked .trophy-card-name{color:rgba(100,130,180,.3)}
.trophy-count{font-size:22px;font-weight:900;color:#fff;line-height:1;margin-top:2px}
.trophy-card.locked .trophy-count{font-size:13px;color:rgba(100,130,180,.25)}
.trophy-count-sub{font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.78)}
.trophy-card.locked .trophy-count-sub{color:rgba(100,130,180,.2)}
/* CL snapshots below */
.trophy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;width:100%;max-width:860px}

.hint{font-size:11px;color:var(--text-faint);text-align:center}
/* Shared screen action footer — always at bottom, right-aligned */
.screen-footer{flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:10px 0 0;border-top:1px solid var(--border);margin-top:auto}
.screen-footer-center{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 0 0;border-top:1px solid var(--border);margin-top:auto}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-3);color:var(--text);padding:10px 18px;border-radius:9px;font-size:12px;font-weight:600;border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,.5);opacity:0;transition:all .25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3A424F}

/* Pitch header: label row + centered form selector */
.pitch-label-row{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;margin-bottom:3px}
.pitch-form-center{display:flex;justify-content:center;flex-shrink:0;margin-bottom:5px}
.pitch-form-center .pitch-form-sel{max-width:120px;text-align:center}

/* Subcategory titles inside tac-editor */
.tac-subcat{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--subcat-color,var(--accent));font-weight:700;margin:12px 0 5px 1px;display:flex;align-items:center;gap:5px;opacity:.9}
.tac-subcat:first-child{margin-top:2px}
.tac-subcat::after{content:'';flex:1;height:1px;background:var(--subcat-color,rgba(94,194,106,.4));opacity:.3;margin-left:4px}

/* Co-trainer / Analyst report in Spielweise tab */
.ctr-report{display:flex;flex-direction:column;gap:10px}
.ctr-style-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;background:rgba(94,194,106,.1);border:1px solid rgba(94,194,106,.22);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.3px;align-self:flex-start}
.ctr-section{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-faint);font-weight:700;margin:2px 0 7px;display:flex;align-items:center;gap:6px}
.ctr-section::after{content:'';flex:1;height:1px;background:var(--border)}
.ctr-bar-row{display:grid;grid-template-columns:82px 1fr 48px;align-items:center;gap:7px;font-size:11px;margin-bottom:4px}
.ctr-bar-row .bar-label{color:var(--text-dim);font-weight:500}
.ctr-bar-row .bar-val{font-size:11px;font-weight:700;color:var(--text);text-align:right}
.ctr-bar-track{height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden}
.ctr-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
.ctr-bar-fill.high{background:#f87171}
.ctr-bar-fill.mid{background:#fbbf24}
.ctr-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ctr-col-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:700;margin-bottom:5px}
.ctr-kv{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.ctr-kv .ck{color:var(--text-dim)}
.ctr-kv .cv{color:var(--text);font-weight:600;font-size:10.5px;text-align:right;max-width:90px}

/* Spielweise Option C — Stärken & Schwächen */
.sw-list{display:flex;flex-direction:column;gap:5px}
.sw-item{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;padding:7px 10px;border-radius:8px;line-height:1.4}
.sw-item.threat{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.1)}
.sw-item.weak{background:rgba(94,194,106,.06);border:1px solid rgba(94,194,106,.1)}
.sw-dot{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;margin-top:.5px}
.sw-dot.r{background:rgba(239,68,68,.2);color:#fca5a5}
.sw-dot.g{background:rgba(94,194,106,.18);color:#5EC26A}
.sw-bold{font-weight:700;color:var(--text)}
.sw-dim{color:var(--text-dim);font-size:12px}

/* Opponent keyword badges */
.opp-keywords{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 8px}
.opp-kw{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:700;letter-spacing:.2px}
.opp-kw.warn{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.opp-kw.info{background:rgba(94,194,106,.08);color:var(--accent);border:1px solid rgba(94,194,106,.18)}
.opp-kw.green{background:rgba(94,194,106,.09);color:#5EC26A;border:1px solid rgba(94,194,106,.18)}
.opp-kw.neutral{background:var(--bg-2);color:var(--text-dim);border:1px solid var(--border)}
.opp-kw.yellow{background:rgba(251,191,36,.1);color:#fcd34d;border:1px solid rgba(251,191,36,.25)}

/* ── Free-pitch layout ── */
.pitch-section-wrap{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:6px;overflow:hidden;min-height:0;flex:1}
.pitch-section-wrap .mini-pitch{flex:1;min-height:0;max-height:none;aspect-ratio:unset;align-self:stretch;width:100%}
.pitch-header{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-shrink:0}
.pitch-header-title{font-size:13px;font-weight:800;letter-spacing:.6px;white-space:nowrap}
.pitch-header-title.mit{color:var(--accent)}
.pitch-header-title.ohne{color:var(--accent-2)}
.pitch-form-sel{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:3px 6px;border-radius:5px;font-size:11px;font-weight:700;flex:1;max-width:90px;cursor:pointer}
.pitch-hint{font-size:11px;color:var(--text-faint);text-align:center;padding:3px 0;flex-shrink:0}

/* Custom formation dropdown for tactics left panel */
.tac-form-drop-wrap{position:relative;width:100%}
.tac-form-drop-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:8px 13px;cursor:pointer;user-select:none;font-size:14px;font-weight:900;color:var(--text);letter-spacing:.5px;transition:background .13s,border-color .13s}
.tac-form-drop-btn:hover{background:var(--bg-3);border-color:#3A424F}
.tac-form-drop-arrow{color:#5A6472;font-size:12px;transition:transform .18s;display:inline-block;flex-shrink:0}
.tac-form-drop-menu{display:none;position:absolute;top:calc(100% + 5px);left:0;right:0;background:#1D232C;border:1px solid #3A424F;border-radius:9px;overflow:hidden;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.7)}
.tac-form-drop-menu.open{display:block}
.tac-form-drop-item{padding:10px 14px;font-size:13px;font-weight:700;color:var(--text-dim);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.tac-form-drop-item:hover{background:#232A35;color:var(--text)}
.tac-form-drop-item.active{color:var(--accent)}

/* ── Role chips on pitch tokens ── */
.mini-role-badge{font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.18);color:var(--text);letter-spacing:.3px;margin-top:2px;white-space:nowrap;backdrop-filter:blur(2px);cursor:pointer;line-height:1.3}
.mini-empty-badge{font-size:8px;color:var(--text-faint);margin-top:1px}
.mini-role-badge.duty-def{border-color:rgba(94,194,106,.6);color:var(--accent)}
.mini-role-badge.duty-sup{border-color:rgba(251,191,36,.6);color:#fcd34d}
.mini-role-badge.duty-att{border-color:rgba(248,113,113,.6);color:#fca5a5}

/* ── Role chips on lineup slots ── */
.slot-role-chip{font-size:7.5px;font-weight:800;padding:1px 4px;border-radius:3px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);color:var(--text);letter-spacing:.2px;margin-top:1px;white-space:nowrap}
.slot-role-chip.duty-def{border-color:rgba(94,194,106,.6);color:var(--accent)}
.slot-role-chip.duty-sup{border-color:rgba(251,191,36,.6);color:#fcd34d}
.slot-role-chip.duty-att{border-color:rgba(248,113,113,.6);color:#fca5a5}

/* ── Scout card overhaul ── */
.scout-section-title{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--border)}
.scout-row{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.04)}
.scout-row.highlight{background:rgba(239,68,68,.08);border-radius:4px;padding:3px 5px;margin:-1px -2px}
.scout-row-icon{font-size:12px;width:16px;text-align:center;flex-shrink:0}
.scout-row-label{color:var(--text-faint);font-size:10px;min-width:54px;flex-shrink:0}
.scout-row-value{color:var(--text);font-size:11px;font-weight:500}
.scout-quality{font-size:11px;padding:5px 7px;border-radius:5px;font-weight:600}
.scout-quality.danger{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.scout-quality.info{background:rgba(94,194,106,.08);color:var(--accent);border:1px solid rgba(94,194,106,.2)}

/* ── Saved tactics list ── */
.saved-tac-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.saved-tac-name{flex:1;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saved-tac-form{color:var(--text-faint);font-size:10px;min-width:32px}

/* ── Bug Report Button ── */
.btn-hdr.hdr-bug{color:rgba(245,158,11,.65);border-color:rgba(245,158,11,.2)}
.btn-hdr.hdr-bug:hover{color:#fbbf24;border-color:rgba(245,158,11,.45);background:rgba(245,158,11,.06)}

/* ── Bug Report Modal ── */
.bug-modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s ease
}
.bug-modal-backdrop.open{opacity:1;pointer-events:auto}
.bug-modal{
  background:#161B22;border:1px solid rgba(255,255,255,.1);border-radius:16px;
  width:min(480px,92vw);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.7);
  position:relative;transform:translateY(12px);transition:transform .22s ease
}
.bug-modal-backdrop.open .bug-modal{transform:translateY(0)}
.bug-modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07)
}
.bug-modal-title{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:800;color:#fff;letter-spacing:.2px}
.bug-modal-close{
  background:none;border:none;color:rgba(255,255,255,.35);font-size:16px;
  cursor:pointer;padding:2px 6px;border-radius:5px;transition:color .14s,background .14s;
  line-height:1;font-family:inherit
}
.bug-modal-close:hover{color:#fff;background:rgba(255,255,255,.08)}
.bug-modal-body{padding:18px 20px 0}
.bug-type-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.bug-type-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5);font-size:11px;font-weight:700;padding:6px 13px;
  border-radius:8px;cursor:pointer;transition:all .14s;font-family:inherit;letter-spacing:.2px
}
.bug-type-btn.active{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.4);color:#fbbf24}
.bug-type-btn:hover:not(.active){background:rgba(255,255,255,.08);color:rgba(255,255,255,.75)}
.bug-textarea{
  width:100%;min-height:120px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  color:#fff;font-size:13px;font-family:inherit;padding:12px 14px;
  resize:vertical;outline:none;transition:border-color .15s;box-sizing:border-box;line-height:1.55
}
.bug-textarea:focus{border-color:rgba(245,158,11,.4)}
.bug-textarea::placeholder{color:rgba(255,255,255,.22)}
.bug-meta{
  margin-top:10px;font-size:10px;color:rgba(255,255,255,.25);
  letter-spacing:.3px;padding:7px 10px;background:rgba(255,255,255,.03);
  border-radius:7px;line-height:1.7
}
.bug-modal-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 18px;margin-top:14px
}
.bug-footer-hint{font-size:10px;color:rgba(255,255,255,.22);letter-spacing:.2px}
.bug-send-btn{
  background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.4);
  color:#fbbf24;font-size:12px;font-weight:800;padding:9px 22px;
  border-radius:9px;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:.3px
}
.bug-send-btn:hover{background:rgba(245,158,11,.3);border-color:rgba(245,158,11,.7);color:#fde68a}
.bug-send-btn:disabled{opacity:.4;cursor:default}
.bug-success{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;text-align:center;gap:10px
}
.bug-success.show{display:flex}
.bug-success-icon{font-size:40px;color:#4ade80;line-height:1}
.bug-success-text{font-size:17px;font-weight:800;color:#fff}
.bug-success-sub{font-size:12px;color:rgba(255,255,255,.38)}

/* ══════════════════════════════════════════════════════════════
   PERK PICKER — card-style, mirrors draft screen
══════════════════════════════════════════════════════════════ */
/* Perk card face — same outer shape as .card */
.perk-card-face{
  width:168px;height:268px;border-radius:14px;position:relative;overflow:hidden;
  cursor:pointer;user-select:none;
  transition:transform .22s cubic-bezier(.22,.68,0,1.4),box-shadow .22s;
  background:#13161c;
  box-shadow:0 6px 32px rgba(0,0,0,.65);
  display:flex;flex-direction:column;
}
.perk-card-face:hover{transform:translateY(-10px) scale(1.04);}

}

}

.perk-card-choose{

/* ============================================================
   ROLE SYNERGY — Rewards sensible spatial distribution
   Returns bonus points added to combinedAdv in simulateMatch
   ============================================================ */
function calcRoleSynergy(team,formation,roles){
  let bonus=0;
  const slots=FORMATIONS[formation];
  const byPos={};
  for(const slot of slots){if(!byPos[slot.pos])byPos[slot.pos]=[];byPos[slot.pos].push(slot.id)}
  function getRD(sid){
    const slot=slots.find(s=>s.id===sid);if(!slot)return null;
    const player=team[sid];if(!player)return null;
    const r=roles[sid]||{role:ROLES_BY_POS[slot.pos]?.[0]?.[0],duty:defaultDuty(slot.pos)};
    return{slot,player,role:r.role,duty:r.duty};
  }
  // --- Midfield balance: need at least one defensive cover ---
  const mfPoss=['CDM','CM','CAM'];
  let mfDef=0,mfSup=0,mfAtt=0,mfTotal=0;
  for(const pos of mfPoss){for(const sid of (byPos[pos]||[])){const rd=getRD(sid);if(!rd)continue;mfTotal++;if(rd.duty==='def')mfDef++;else if(rd.duty==='sup')mfSup++;else if(rd.duty==='att')mfAtt++;}}
  if(mfTotal>=2){
    if(mfDef===0)bonus-=3;     // no defensive cover in MF = exposed
    if(mfAtt===0)bonus-=1;     // no progression from MF
    if(mfDef>=1&&mfSup>=1)bonus+=1; // balanced MF
  }
  // --- LB + LW synergy ---
  for(const lbId of (byPos['LB']||[])){
    const lb=getRD(lbId);if(!lb)continue;
    for(const lwId of (byPos['LW']||[])){
      const lw=getRD(lwId);if(!lw)continue;
      // IFB/inverted LB + wide/classic LW = LB goes inside, LW keeps width → GREAT
      if((lb.role==='Inverter AV'||lb.role==='IFB')&&(lw.role==='Klassischer Flügel'||lw.role==='Defensiver Flügel'||lw.role==='Wide Playmaker'))bonus+=3;
      // WB/HAV + IF = LB overlaps wide, LW cuts in → GREAT
      else if((lb.role==='Wing-Back'||lb.role==='Hinterlaufender AV'||lb.role==='Compl. Wing-Back')&&(lw.role==='Inverter Flügel'||lw.role==='Inside Forward'))bonus+=3;
      // CWB (att) + FLG (att) = both wide, no coverage behind → BAD
      else if(lb.duty==='att'&&lw.role==='Klassischer Flügel'&&lw.duty==='att')bonus-=2;
      // IFB + IF = both cut inside = no width on left → BAD
      else if((lb.role==='Inverter AV'||lb.role==='IFB')&&(lw.role==='Inverter Flügel'))bonus-=2;
    }
  }
  // --- RB + RW synergy (mirror) ---
  for(const rbId of (byPos['RB']||[])){
    const rb=getRD(rbId);if(!rb)continue;
    for(const rwId of (byPos['RW']||[])){
      const rw=getRD(rwId);if(!rw)continue;
      if((rb.role==='Inverter AV'||rb.role==='IFB')&&(rw.role==='Klassischer Flügel'||rw.role==='Defensiver Flügel'||rw.role==='Wide Playmaker'))bonus+=3;
      else if((rb.role==='Wing-Back'||rb.role==='Hinterlaufender AV'||rb.role==='Compl. Wing-Back')&&(rw.role==='Inverter Flügel'||rw.role==='Inside Forward'))bonus+=3;
      else if(rb.duty==='att'&&rw.role==='Klassischer Flügel'&&rw.duty==='att')bonus-=2;
      else if((rb.role==='Inverter AV'||rb.role==='IFB')&&(rw.role==='Inverter Flügel'))bonus-=2;
    }
  }
  // --- ST + CAM synergy ---
  for(const stId of (byPos['ST']||[])){
    const st=getRD(stId);if(!st)continue;
    for(const camId of (byPos['CAM']||[])){
      const cam=getRD(camId);if(!cam)continue;
      // False 9 + shadow striker = both drop deep, nobody goes in behind
      if(st.role==='Falsche Neun'&&cam.role==='Schattenstürmer')bonus-=2;
      // AF + second striker = good depth combo
      if(st.role==='Advanced Forward'&&cam.role==='Zweiter Stürmer')bonus+=2;
      // Poacher + Trequartista = creative feeder + pure finisher
      if(st.role==='Poacher'&&(cam.role==='Trequartista'||cam.role==='Offensiver 10er'))bonus+=2;
      // Target man + 10er = classic combination
      if(st.role==='Mittelstürmer (Ziel)'&&cam.role==='Offensiver 10er')bonus+=2;
    }
  }
  // --- CDM coverage ---
  for(const cdmId of (byPos['CDM']||[])){
    const cdm=getRD(cdmId);if(!cdm)continue;
    // Regista without any other defensive MF = too exposed
    if(cdm.role==='Regista'&&mfDef<=1)bonus-=2;
    // Anker = excellent base for pressing systems
    if(cdm.role==='Anker')bonus+=1;
    // HB complements high defensive line perfectly
    if(cdm.role==='Half-Back'&&(state.tactics.defensivLinie||2)>=3)bonus+=1;
  }
  // --- CB synergy: at least one IV or Stopper for stability ---
  let cbDef=0;
  for(const cbId of (byPos['CB']||[])){const rd=getRD(cbId);if(rd&&(rd.role==='Innenverteidiger'||rd.role==='Stopper'||rd.duty==='def'))cbDef++;}
  if((byPos['CB']||[]).length>=2&&cbDef===0)bonus-=2; // both CBs going forward = exposed
  return clamp(bonus,-8,8);
}

function migrateCollection(col){
  // Aliases: old name → canonical name in PLAYER_POOL
  const NAME_ALIASES={
    'Vinicius Junior':'Vinicius Jr',
    'Vinícius Jr':'Vinicius Jr',
    'Vinícius Junior':'Vinicius Jr',
  };
  const poolByName={};
  PLAYER_POOL.forEach(p=>{poolByName[p.name]=p;});
  return col.map(c=>{
    const resolved=NAME_ALIASES[c.name]||c.name;

    return{name:canon.name,nat:canon.nat,pos:canon.pos,rating:canon.rating,age:canon.age,rarity:canon.rarity};
  });
}

async function fbLoadRanking(){
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000));
    const resp=await Promise.race([
      fetch(`${_FB_URL}/rankings.json?orderBy="level"&limitToLast=100`),
      timeout
    ]);
    if(!resp.ok)return{ok:false,err:'HTTP '+resp.status,rows:[]};
    const data=await resp.json();
    if(!data)return{ok:true,rows:[]};
    const rows=Object.entries(data).map(([id,v])=>({id,...v}));
    rows.sort((a,b)=>b.level!==a.level?b.level-a.level:b.xp-a.xp);
    return{ok:true,rows};
  }catch(e){
    return{ok:false,err:e.message==='timeout'?'Zeitüberschreitung — prüfe Firebase Rules':'Netzwerkfehler: '+e.message,rows:[]};
  }
}

function xpToNextLevel(level){
  const t=[0,150,290,450,630,830,1060,1310,1590,1900,2240];
  if(level<t.length)return t[level];
  return Math.floor(2240*Math.pow(level/10,1.85));
}

  const packs=[];

function awardRunXP(wonChampionship){
  const xpEarned=XP_PER_LEAGUE[Math.min(state.league,XP_PER_LEAGUE.length-1)]+(wonChampionship?XP_WIN_BONUS:0);
  state.xpGainedThisRun=xpEarned;
  state.levelUpsThisRun=[];
  state.playerXP+=xpEarned;
  let lvl=state.playerLevel;
  while(true){
    const need=xpToNextLevel(lvl);
    if(state.playerXP>=need){
      state.playerXP-=need;lvl++;
      const rewardPacks=getLevelRewardPacks(lvl);
      const cards=[];const taken=new Set();
      rewardPacks.forEach(pack=>{
        let att=0;const start=cards.length;
        while(cards.length<start+pack.size&&att<200){
          att++;const r=rollPackRarity(pack.w);
          const p=generatePlayerForPos(pickRand(MAIN_POSITIONS),r);
          if(p&&!taken.has(p.name)){taken.add(p.name);cards.push(p);}
        }
      });
      const entry={level:lvl,packs:rewardPacks.map(p=>({size:p.size,label:p.label,color:p.color})),cards};
      state.levelUpsThisRun.push(entry);      // for result-screen display only
      state.pendingLevelRewards.push(entry);  // persistent — collected from home screen
    }else break;
  }
  state.playerLevel=lvl;
  savePlayerLevel();
  savePendingRewards();
  fbSubmitScore(); // async fire-and-forget
}

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function randFloat(min,max){return Math.random()*(max-min)+min}
function poissonGoals(lambda){lambda=Math.max(0.1,lambda);const L=Math.exp(-lambda);let k=0,p=1;do{k++;p*=Math.random();}while(p>L&&k<20);return k-1;}
// Gibt Tore für beide Teams zurück. Bei kleinem xG-Unterschied: reines Poisson (volle Streuung).
// Bei großem Unterschied: "Anchored"-Methode (floor+Bernoulli) mit Std.-Abw. ≈0.5 statt sqrt(xg).
// → Klare Überlegenheit (xG-Diff ≥2.5) führt zu ~99% Sieg; knappes Spiel bleibt zufällig.
function simulateGoals(myXG,oppXG){
  const absDiff=Math.abs(myXG-oppXG);
  // det=0: reines Poisson | det=0.9: 90% anchored, 10% Poisson
  // Schwelle: unter 0.4 xG-Diff kein Anchoring; bei 2.5+ maximal
  const det=Math.min(0.9,Math.max(0,(absDiff-0.4)/2.1));
  function sample(xg){
    if(Math.random()<det){
      // Anchored: floor(xg) + Bernoulli(Nachkommastelle) → Erwartungswert=xg, Streuung~0.5
      return Math.floor(xg)+(Math.random()<(xg%1)?1:0);
    }
    return poissonGoals(xg);
  }
  return{myGoals:sample(myXG),oppGoals:sample(oppXG)};
}
function pickRand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function el(tag,p={},c=[]){const e=document.createElement(tag);for(const k in p){if(k==='style')Object.assign(e.style,p[k]);else if(k==='class')e.className=p[k];else if(k.startsWith('on'))e.addEventListener(k.slice(2),p[k]);else if(k==='dataset')Object.assign(e.dataset,p[k]);else e.setAttribute(k,p[k])}for(const ch of c){if(ch==null)continue;if(Array.isArray(ch)){for(const cc of ch){if(cc==null)continue;e.appendChild(typeof cc==='string'?document.createTextNode(cc):cc)}continue}e.appendChild(typeof ch==='string'?document.createTextNode(ch):ch)}return e}

function rollRarityGlueckspilz(){
  const pool=state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE;
  const src=pool[Math.min(state.league,pool.length-1)];
  const BOOST=['epic','legendary','mythic'];
  let total=0;const tbl={};
  for(const k in src){tbl[k]=BOOST.includes(k)?src[k].weight*1.5:src[k].weight;total+=tbl[k];}
  const r=Math.random()*total;let a=0;
  for(const k in tbl){a+=tbl[k];if(r<a)return k;}
  return'rare';
}
function rollRarity(){const pool=state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE;const tbl=pool[Math.min(state.league,pool.length-1)];const r=Math.random()*100;let a=0;for(const k in tbl){a+=tbl[k].weight;if(r<a)return k}return'common'}
function poisson(lambda){lambda=Math.max(0.01,lambda);const L=Math.exp(-lambda);let k=0,p=1;while(p>L){k++;p*=Math.random()}return k-1}

function generatePlayerForPos(pos,forcedRarity=null){
  const rarity=forcedRarity||rollRarity();
  const r=RARITIES[rarity];
  // Natural pos
  let pool=PLAYER_POOL.filter(p=>p.pos===pos&&p.rating>=r.min&&p.rating<=r.max);
  // If sparse, add alt-pos players (they keep their natural position label)
  if(pool.length<3){
    const altPool=PLAYER_POOL.filter(p=>p.pos!==pos&&isNaturalFor(p.pos,pos)&&p.rating>=r.min&&p.rating<=r.max);
    pool=[...pool,...altPool];
  }
  let base;
  if(pool.length){base={...pickRand(pool)}}
  else{
    const fallback=PLAYER_POOL.filter(p=>p.rating>=r.min&&p.rating<=r.max);
    if(fallback.length){base={...pickRand(fallback)}}
    else base={name:'Unbekannt',pos,nat:'GER',age:rand(20,32),rating:rand(r.min,r.max),rarity};
  }
  base.id=nextPlayerId++;
  base.rarity=ratingToRarity(base.rating);
  return base;
}
function generatePlayerByRating(pos,targetRating){
  // Find someone close in rating range
  const min=Math.max(50,targetRating-3),max=Math.min(99,targetRating+3);
  const pool=PLAYER_POOL.filter(p=>p.pos===pos&&p.rating>=min&&p.rating<=max);
  let base;
  if(pool.length)base={...pickRand(pool)};
  else{
    const alt=PLAYER_POOL.filter(p=>p.pos===pos);
    base=alt.length?{...pickRand(alt)}:{name:'X. Spieler',pos,nat:'GER',age:25};
    base.rating=clamp(targetRating+rand(-2,2),50,99);
  }
  base.id=nextPlayerId++;
  base.rarity=ratingToRarity(base.rating);
  return base;
}
function teamAvg(team,formation){
  const slots=formation?FORMATIONS[formation]:null;
  const entries=Object.entries(team).filter(([,p])=>p);
  if(!entries.length)return 0;
  return entries.reduce((s,[slotId,p])=>{
    const slot=slots?slots.find(sl=>sl.id===slotId):null;
    const rel=slot?getPosRelation(p.pos,slot.pos):'main';
    return s+(p.rating-posPenalty(rel));
  },0)/entries.length;
}

function generateOpponent(){
  const lg=LEAGUES[state.league];
  // Target = league range + small win progression (max +3)
  const winsBonus=Math.min(state.winsThisLeague*0.6,3);
  const base=rand(lg.minRating, lg.maxRating);
  const _ebo=state.eventBuff||{};
  const target=clamp(base+winsBonus+randFloat(-1,1)+(_ebo.oppBuff||0)-(_ebo.oppDebuff||0), lg.minRating-2, lg.maxRating+8);
  const formation=pickRand(FORMATION_KEYS);
  const slots=FORMATIONS[formation];
  const team={};
  for(const slot of slots){team[slot.id]=generatePlayerByRating(slot.pos,Math.round(target+rand(-3,3)))}
  return {formation,team,tactics:generateSensibleTactics(),avg:teamAvg(team,formation)};
}

function showRandomEventModal(evt,onContinue){
  if(evt.prepare)evt.prepare();
  const effectiveType=evt.getType?evt.getType():evt.type;
  const desc=evt.getDesc?evt.getDesc():evt.desc;
  const effect=evt.getEffect?evt.getEffect():evt.effect;
  const TYPE_PILL={pos:'Positiv',neg:'Negativ',choice:'Auswahl',risk:'Risiko'};

  const overlay=document.createElement('div');
  overlay.className=`rev-overlay rev-${effectiveType}`;
  overlay.style.cssText='opacity:0;transition:opacity .28s ease';
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{overlay.style.opacity='1';}));

  function close(cb){
    overlay.style.opacity='0';
    setTimeout(()=>{overlay.remove();if(cb)cb();},260);
  }

  // Interactive content
  const interactiveParts=[];
  let confirmBtn=null;

  if(evt.kind==='picker'){
    const items=evt.getItems();
    let selId=null;
    const picker=el('div',{class:'rev-picker'});
    items.forEach(item=>{
      const row=el('div',{class:'rev-row'},[
        el('div',{class:'rev-row-info'},[
          el('div',{class:'rev-row-name'},[item.name]),
          el('div',{class:'rev-row-sub'},[item.sub||'']),
        ]),
        item.badge?el('span',{class:`rev-row-badge rb-${item.badge}`},[item.badge.charAt(0).toUpperCase()+item.badge.slice(1)]):null,
        el('div',{class:'rev-row-check'}),
      ].filter(Boolean));
      row.addEventListener('click',()=>{
        picker.querySelectorAll('.rev-row').forEach(r=>r.classList.remove('rev-sel'));
        row.classList.add('rev-sel');selId=item.id;
        if(confirmBtn)confirmBtn.disabled=false;
      });
      picker.appendChild(row);
    });
    interactiveParts.push(picker);
    confirmBtn=document.createElement('button');
    confirmBtn.className='rev-btn rev-btn-main';
    confirmBtn.textContent='Bestätigen';
    confirmBtn.disabled=true;
    confirmBtn.addEventListener('click',()=>close(()=>evt.apply(onContinue,selId)));
    interactiveParts.push(el('div',{class:'rev-actions'},[confirmBtn]));

  }else if(evt.kind==='binary'){
    let chosen=null;
    const grid=el('div',{class:'rev-binary'});
    evt.choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='rev-bin-opt';
      btn.innerHTML=`<span class="rev-bin-lbl">${c.label}</span><span class="rev-bin-sub">${c.sub}</span>`;
      btn.addEventListener('click',()=>{
        grid.querySelectorAll('.rev-bin-opt').forEach(b=>b.classList.remove('rev-bin-sel'));
        btn.classList.add('rev-bin-sel');chosen=c;
        if(confirmBtn)confirmBtn.disabled=false;
      });
      grid.appendChild(btn);
    });
    interactiveParts.push(grid);
    confirmBtn=document.createElement('button');
    confirmBtn.className='rev-btn rev-btn-main';
    confirmBtn.textContent='Bestätigen';
    confirmBtn.disabled=true;
    confirmBtn.addEventListener('click',()=>close(()=>{chosen.apply();onContinue();}));
    interactiveParts.push(el('div',{class:'rev-actions'},[confirmBtn]));

  }else if(evt.kind==='transfer'){
    const allPlayers=Object.entries(state.team).filter(([,p])=>p);
    if(!allPlayers.length){overlay.remove();onContinue();return;}
    const[sid,tp]=pickRand(allPlayers);
    interactiveParts.push(el('div',{class:'rev-transfer-row'},[
      el('div',{class:'rev-row-info'},[
        el('div',{class:'rev-row-name'},[tp.name]),
        el('div',{class:'rev-row-sub'},[`${tp.pos} · ${tp.rating} — Transferangebot eingegangen`]),
      ]),
      el('span',{class:`rev-row-badge rb-${tp.rarity}`},[tp.rarity.charAt(0).toUpperCase()+tp.rarity.slice(1)]),
    ]));
    const acceptBtn=document.createElement('button');
    acceptBtn.className='rev-btn rev-btn-main';acceptBtn.textContent='Annehmen';
    acceptBtn.addEventListener('click',()=>close(()=>{
      // Auto-replace sold player with a Rare+ player of same position
      const _replRarities=['rare','rare','epic','legendary'];
      const _replRar=_replRarities[Math.floor(Math.random()*_replRarities.length)];
      const _repl=generatePlayerForPos(tp.pos,_replRar);
      if(_repl){state.team[sid]=_repl;showToast(`${_repl.name} (${_repl.pos}) rückt nach`);}
      else{delete state.team[sid];}
      state.eventBuff={...(state.eventBuff||{}),draftGuaranteedRare:true};
      onContinue();
    }));
    const declineBtn=document.createElement('button');
    declineBtn.className='rev-btn rev-btn-sec';declineBtn.textContent='Ablehnen';
    declineBtn.addEventListener('click',()=>close(onContinue));
    interactiveParts.push(el('div',{class:'rev-actions'},[declineBtn,acceptBtn]));

  }else{
    const lbl=effectiveType==='neg'?'Verstanden':effectiveType==='risk'?'Eingehen':'Aktivieren';
    confirmBtn=document.createElement('button');
    confirmBtn.className='rev-btn rev-btn-main';
    confirmBtn.textContent=lbl;
    confirmBtn.addEventListener('click',()=>close(()=>evt.apply(onContinue)));
    interactiveParts.push(el('div',{class:'rev-actions'},[confirmBtn]));
  }

  const modal=el('div',{class:'rev-modal'},[
    el('div',{class:'rev-accent'}),
    // ── Masthead ─────────────────────────────────────────
    el('div',{class:'rev-masthead'},[
      el('span',{class:'rev-masthead-brand'},['TACTIC TIMES']),
      el('div',{class:'rev-masthead-right'},[
        el('span',{class:'rev-masthead-label'},['Zufälliges Ereignis']),
        el('span',{class:'rev-masthead-pill'},[TYPE_PILL[effectiveType]||'Ereignis']),
      ]),
    ]),
    // ── Body ─────────────────────────────────────────────
    el('div',{class:'rev-body'},[
      el('div',{class:'rev-kicker'},[evt.label]),
      el('div',{class:'rev-headline'},[evt.title]),
      el('div',{class:'rev-lead'},[desc]),
      el('hr',{class:'rev-divider'}),
      el('div',{class:'rev-effect-label'},['Auswirkung']),
      el('div',{class:'rev-effect-box'},[
        el('div',{class:'rev-eff-bar'}),
        el('div',{class:'rev-eff-txt'},[effect]),
      ]),
      ...interactiveParts,
    ]),
  ]);
  overlay.appendChild(modal);
}

function maybeShowRandomEvent(onContinue){
  if(Math.random()>=0.33){onContinue();return;}
  // Filter events: medienprofi removes reputation/press events
  const validPool=RANDOM_EVENTS.filter(e=>{
    if(hasPerk('medienprofi')&&(e.id==='presseskandal'||e.type==='neg'&&e.id&&e.id.includes('presse')))return false;
    return true;
  });
  // Glückssträhne: skew towards positive events
  let eventPool=validPool;
  const gBonus=(hasPerk('gluecksstraehne')?state.perkState.glückssträhne:0)/100;
  if(gBonus>0){
    // Build weighted pool: positive events get extra weight
    const posEvts=validPool.filter(e=>e.type==='pos');
    const rest=validPool.filter(e=>e.type!=='pos');
    // Extra copies proportional to bonus (cap at doubling)
    const extraCopies=Math.min(Math.round(gBonus*posEvts.length),posEvts.length*3);
    eventPool=[...validPool,...Array(extraCopies).fill(null).flatMap(()=>posEvts)];
  }
  let evt,attempts=0;
  do{evt=pickRand(eventPool);attempts++;}while(attempts<10&&evt.isValid&&!evt.isValid());
  if(evt.isValid&&!evt.isValid()){onContinue();return;}
  showRandomEventModal(evt,onContinue);
}
