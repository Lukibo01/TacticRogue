<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tactic Roguelike</title>
<style>
:root{
  --bg-0:#0a0e13;--bg-1:#0f141c;--bg-2:#141b24;--bg-3:#1c2530;--bg-4:#28323f;
  --border:#28323f;--text:#e8eef5;--text-dim:#b8c6d6;--text-faint:#8295a8;
  --accent:#4ade80;--accent-2:#22c55e;--danger:#ef4444;--warn:#f59e0b;--info:#71a4f4;
  --pitch-1:#0a1628;--pitch-2:#0d1f3c;
  --common-1:#9ca3af;--common-2:#4b5563;
  --rare-1:#71a4f4;--rare-2:#1e3a8a;
  --epic-1:#c084fc;--epic-2:#6d28d9;
  --star-1:#fb923c;--star-2:#b45309;
  --legendary-1:#fde047;--legendary-2:#a16207;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg-0);color:var(--text);font-size:14px;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}

.game{display:flex;flex-direction:column;height:100vh}
.header{height:58px;background:var(--bg-1);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 18px;gap:14px;z-index:10}
.brand{display:flex;align-items:center;gap:10px;font-weight:700}
.brand-logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-size:15px;color:#0b0f14;font-weight:900}
.brand-name span{color:var(--accent)}

.league-banner{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 28px;background:linear-gradient(135deg,var(--bg-3),var(--bg-2));border:1px solid var(--border);border-radius:10px;min-width:280px}
.league-banner.l0{border-color:#78716c;background:linear-gradient(135deg,#3f3f46,#27272a)}
.league-banner.l1{border-color:#16a34a;background:linear-gradient(135deg,#15803d,#14532d)}
.league-banner.l2{border-color:#0891b2;background:linear-gradient(135deg,#0e7490,#155e75)}
.league-banner.l3{border-color:#dc2626;background:linear-gradient(135deg,#991b1b,#7f1d1d)}
.league-banner.l4{border-color:#facc15;background:linear-gradient(135deg,#a16207,#854d0e);box-shadow:0 0 24px rgba(250,204,21,.25)}
.league-name{font-size:13px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#fff}
.league-progress{font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:8px}
.league-pips{display:flex;gap:3px}
.league-pip{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)}
.league-pip.won{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px rgba(74,222,128,.6)}

.toolbar{display:flex;gap:7px;justify-content:flex-end}
.btn{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:var(--bg-4);border-color:var(--text-faint)}
.btn.primary{background:var(--accent);color:#0b0f14;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-2)}
.btn.danger{color:var(--danger);border-color:rgba(239,68,68,.3)}
.btn.danger:hover{background:rgba(239,68,68,.1)}
.btn.large{padding:11px 22px;font-size:14px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.subtle{background:transparent}

.main{flex:1;position:relative;overflow:hidden}
.phase{position:absolute;inset:0;display:flex;flex-direction:column;padding:14px 18px;overflow:auto}

/* INTRO */
.center-message{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:18px;text-align:center}
.center-message h1{font-size:34px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--legendary-1));-webkit-background-clip:text;background-clip:text;color:transparent}
.center-message p{color:var(--text-dim);max-width:560px;line-height:1.5}

/* LINEUP */
.lineup-phase{display:grid;grid-template-columns:1fr 340px;gap:14px;height:100%}
.pitch-section{display:flex;flex-direction:column;gap:10px;min-height:0}
.pitch-wrap{flex:1;display:grid;place-items:center;min-height:0}
.pitch-frame{position:relative;height:100%;aspect-ratio:7/10;max-height:100%;background:linear-gradient(180deg,var(--pitch-1),var(--pitch-2));border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.6),inset 0 0 80px rgba(0,0,0,.3);border:1px solid rgba(96,165,250,.12)}
.pitch-frame::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 40% at 50% 0%,rgba(148,200,255,.07) 0%,transparent 70%),radial-gradient(ellipse 90% 40% at 50% 100%,rgba(148,200,255,.05) 0%,transparent 70%);pointer-events:none;border-radius:8px;z-index:1}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.players-layer{position:absolute;inset:0}

.slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;user-select:none;z-index:5;touch-action:none}
.slot.dragging{z-index:30;opacity:.85}
/* === SLOT TOKEN: MINI CARD (56×76) === */
.slot-token{width:56px;height:76px;border-radius:8px;background:#0f1623;border:1.5px solid rgba(255,255,255,.2);display:flex;flex-direction:column;overflow:hidden;position:relative;transition:transform .15s,border-color .15s,box-shadow .15s}
.slot.empty .slot-token{width:56px;height:76px;border-radius:8px;border:1.5px solid rgba(74,222,128,.38);background:rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;animation:neonIdlePulse 2.5s ease-in-out infinite}
.slot.empty .slot-token::before{content:'';height:5px;width:100%;flex-shrink:0;background:linear-gradient(90deg,rgba(74,222,128,.15),rgba(74,222,128,.45),rgba(74,222,128,.15));background-size:200% 100%;animation:stripeShimmer 2.5s linear infinite}
.slot.empty .slot-token::after{content:attr(data-pos);display:flex;flex:1;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:rgba(74,222,128,.65);line-height:1}
.slot.empty:hover .slot-token{transform:scale(1.08)}
.slot.locked .slot-token{opacity:1}
.stoken-stripe{height:5px;width:100%;flex-shrink:0}
.stoken-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 2px;gap:1px}
.stoken-flag{font-size:14px;line-height:1.1}
.stoken-rating{font-size:22px;font-weight:900;color:#fff;line-height:1}
.stoken-pos{font-size:9px;font-weight:700;color:rgba(255,255,255,.45);margin-top:1px}
.stoken-pos.pos-main{color:#4ade80}
.stoken-pos.pos-alt{color:#fcd34d}
.stoken-pos.pos-foreign{color:#f87171;font-weight:900}
/* rarity border + stripe colors */
.slot.filled.common .slot-token{border-color:#9ca3af}
.slot.filled.common .stoken-stripe{background:#9ca3af}
.slot.filled.uncommon .slot-token{border-color:#4ade80}
.slot.filled.uncommon .stoken-stripe{background:#4ade80}
.slot.filled.rare .slot-token{border-color:#71a4f4}
.slot.filled.rare .stoken-stripe{background:#71a4f4}
.slot.filled.epic .slot-token{border-color:#c084fc;animation:epicTokenPulse 2s ease-in-out infinite;overflow:hidden}
.slot.filled.epic .stoken-stripe{background:linear-gradient(90deg,#a855f7,#e879f9,#a855f7);background-size:200% 100%;animation:stripeShimmer 2s linear infinite}
.slot.filled.epic .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(232,121,249,.28) 50%,transparent 65%);background-size:250% 100%;animation:tokenShimmer 2.2s linear infinite;pointer-events:none;z-index:2}
.slot.filled.legendary .slot-token{border-color:#fde047;animation:legendaryTokenPulse 1.7s ease-in-out infinite;overflow:hidden}
.slot.filled.legendary .stoken-stripe{background:linear-gradient(90deg,#f59e0b,#fde047,#fbbf24,#fde047,#f59e0b);background-size:300% 100%;animation:stripeShimmer 1.5s linear infinite}
.slot.filled.legendary .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.32) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
@keyframes epicTokenPulse{0%,100%{box-shadow:0 0 8px rgba(192,132,252,.5),0 2px 8px rgba(0,0,0,.5)}50%{box-shadow:0 0 20px rgba(192,132,252,.85),0 0 36px rgba(192,132,252,.3),0 2px 8px rgba(0,0,0,.5)}}
@keyframes legendaryTokenPulse{0%,100%{box-shadow:0 0 10px rgba(253,224,71,.55),0 2px 8px rgba(0,0,0,.5)}50%{box-shadow:0 0 26px rgba(253,224,71,.9),0 0 48px rgba(253,224,71,.35),0 2px 8px rgba(0,0,0,.5)}}
@keyframes tokenShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes stripeShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes neonIdlePulse{0%,100%{box-shadow:0 0 4px rgba(74,222,128,.25)}50%{box-shadow:0 0 12px rgba(74,222,128,.55),0 0 20px rgba(74,222,128,.2)}}
.slot-label{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.slot-pos-mini{position:absolute;top:-5px;left:-7px;background:var(--bg-0);color:var(--text-dim);font-size:8.5px;padding:1px 4px;border-radius:3px;border:1px solid var(--border);font-weight:700}
.slot.drag-over .slot-token{border-color:var(--legendary-1);transform:scale(1.2)}

.side-panel{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.panel-section{display:flex;flex-direction:column;gap:7px}
.panel-title{font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-faint);font-weight:700}
.panel-title.acc{color:var(--accent)}
.bench-list{display:flex;flex-direction:row;gap:8px;justify-content:center}
.bench-token-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;user-select:none;touch-action:none}
.bench-token-wrap.dragging{opacity:.5}
.bench-token-wrap.drag-over .slot-token{border-color:var(--legendary-1);transform:scale(1.12)}
.bench-token-wrap.filled.common .slot-token{border-color:#9ca3af}
.bench-token-wrap.filled.common .stoken-stripe{background:#9ca3af}
.bench-token-wrap.filled.uncommon .slot-token{border-color:#4ade80}
.bench-token-wrap.filled.uncommon .stoken-stripe{background:#4ade80}
.bench-token-wrap.filled.rare .slot-token{border-color:#71a4f4}
.bench-token-wrap.filled.rare .stoken-stripe{background:#71a4f4}
.bench-token-wrap.filled.epic .slot-token{border-color:#c084fc;animation:epicTokenPulse 2s ease-in-out infinite;overflow:hidden}
.bench-token-wrap.filled.epic .stoken-stripe{background:linear-gradient(90deg,#a855f7,#e879f9,#a855f7);background-size:200% 100%;animation:stripeShimmer 2s linear infinite}
.bench-token-wrap.filled.epic .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(232,121,249,.28) 50%,transparent 65%);background-size:250% 100%;animation:tokenShimmer 2.2s linear infinite;pointer-events:none;z-index:2}
.bench-token-wrap.filled.legendary .slot-token{border-color:#fde047;animation:legendaryTokenPulse 1.7s ease-in-out infinite;overflow:hidden}
.bench-token-wrap.filled.legendary .stoken-stripe{background:linear-gradient(90deg,#f59e0b,#fde047,#fbbf24,#fde047,#f59e0b);background-size:300% 100%;animation:stripeShimmer 1.5s linear infinite}
.bench-token-wrap.filled.legendary .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.32) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
.bench-empty-token{width:56px;height:76px;border-radius:8px;border:1.5px solid rgba(74,222,128,.38);background:rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;animation:neonIdlePulse 2.5s ease-in-out infinite}
.bench-empty-token::before{content:'';height:5px;width:100%;flex-shrink:0;background:linear-gradient(90deg,rgba(74,222,128,.15),rgba(74,222,128,.45),rgba(74,222,128,.15));background-size:200% 100%;animation:stripeShimmer 2.5s linear infinite}
.bench-empty-token::after{content:'?';display:flex;flex:1;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:rgba(74,222,128,.65);line-height:1}
.bench-slot-label{font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

.team-stats{background:var(--bg-2);border:1px solid var(--border);border-radius:7px;padding:9px 10px}
.team-stats-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.team-stats-row b{color:var(--text);font-weight:700}

/* DRAFT */
.draft-phase{display:flex;flex-direction:column;align-items:center;gap:18px;justify-content:center;padding:24px 18px}
.draft-title{text-align:center}
.draft-title h2{font-size:22px;font-weight:800;margin-bottom:5px}
.draft-title p{font-size:13px;color:var(--text-dim)}
.draft-title .pos-badge{display:inline-block;padding:3px 10px;border-radius:5px;background:var(--accent);color:#0b0f14;font-weight:800;font-size:11.5px;margin:0 3px}
.draft-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:6px}

.draft-legend{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:4px 0 10px;opacity:.8}
.dl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-faint)}
.dl-sep{color:var(--border);font-size:10px;align-self:center}
.dl-b{font-size:7.5px;font-weight:800;color:#fff;padding:2px 5px;border-radius:3px;letter-spacing:.3px;white-space:nowrap}
.dl-b.wk{background:#dc2626}.dl-b.pot{background:#b45309}.dl-b.old{background:#b45309}.dl-b.end{background:#dc2626}

/* ── DRAFT CARD: DARK BADGE (Option D) ─────────────────────────────────── */
.card{width:175px;height:266px;border-radius:14px;padding:0;cursor:pointer;position:relative;transition:transform .35s cubic-bezier(.34,1.2,.64,1),box-shadow .3s ease;background:#0f1623;overflow:hidden;border:1.5px solid;display:flex;flex-direction:column}
/* Hover-Glow per Rarität — CSS-gesteuert, kein JS-Flash */
.card-hovered.uncommon{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 32px rgba(74,222,128,.5)!important}
.card-hovered.rare{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 48px rgba(113,164,244,.72)!important}
.card-hovered.epic{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 64px rgba(192,132,252,.88)!important}
.card-hovered.legendary{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 82px rgba(253,224,71,1)!important}
@keyframes ratingBreath{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes ghostFadePulse{0%,100%{opacity:.09}50%{opacity:.22}}
.card-hovered .card-ghost-icon{animation:ghostFadePulse 2s ease-in-out infinite}
.card-hovered.rare .card-rating-d,.card-hovered.epic .card-rating-d,.card-hovered.legendary .card-rating-d{animation:ratingBreath 2s ease-in-out infinite}
.card.common{border-color:#9ca3af;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card.uncommon{border-color:#4ade80;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card.rare{border-color:#71a4f4;box-shadow:0 8px 28px rgba(0,0,0,.55)}
.card.epic{border-color:#c084fc;box-shadow:0 8px 28px rgba(0,0,0,.55),0 0 22px rgba(192,132,252,.3)}
.card.legendary{border-color:#fde047;box-shadow:0 8px 28px rgba(0,0,0,.55),0 0 30px rgba(253,224,71,.4)}
/* card head: tinted by rarity */
.card-head{position:relative;height:112px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.card.common .card-head{background:rgba(156,163,175,.1)}
.card.uncommon .card-head{background:rgba(74,222,128,.1)}
.card.rare .card-head{background:rgba(96,165,250,.1)}
.card.epic .card-head{background:rgba(192,132,252,.13)}
.card.legendary .card-head{background:rgba(253,224,71,.13)}
/* ghost position watermark icon */
.card-ghost-icon{position:absolute;font-size:86px;opacity:.09;user-select:none;pointer-events:none;line-height:1}
/* big rating */
.card-rating-d{font-size:54px;font-weight:900;color:#fff;line-height:1;position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,.7)}
/* position pill bottom-right of head */
.card-pos-badge{position:absolute;bottom:8px;right:9px;font-size:9.5px;font-weight:800;color:#fff;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
.card.common .card-pos-badge{background:#64748b}
.card.uncommon .card-pos-badge{background:#16a34a}
.card.rare .card-pos-badge{background:#1d4ed8}
.card.epic .card-pos-badge{background:#7c3aed}
.card.legendary .card-pos-badge{background:#b45309}
/* OOP indicator */
.card-oop-corner{position:absolute;top:7px;left:7px;font-size:8.5px;font-weight:700;color:#fff;padding:2px 6px;border-radius:4px;z-index:5;letter-spacing:.3px}
.card-oop-corner.oop-alt{background:rgba(180,83,9,.9)}
.card-oop-corner.oop-foreign{background:rgba(239,68,68,.9)}
/* Card pos-badge position-relation overrides */
.card-pos-badge.pos-main{background:#16a34a !important}
.card-pos-badge.pos-alt{background:#b45309 !important}
.card-pos-badge.pos-foreign{background:#dc2626 !important}
/* Potential tab (top-left corner of card-head) */
.card-pot-tab{position:absolute;top:0;left:0;font-size:8px;font-weight:800;color:#fff;padding:3px 6px 3px 5px;border-radius:0 0 6px 0;line-height:1;letter-spacing:.4px;z-index:6}
.card-pot-tab.wk{background:#dc2626}
.card-pot-tab.pot{background:#b45309}
/* Age decline tab (top-right corner of card-head, mirror of pot-tab) */
.card-age-tab{position:absolute;top:0;right:0;font-size:8px;font-weight:800;color:#fff;padding:3px 5px 3px 6px;border-radius:0 0 0 6px;line-height:1;letter-spacing:.4px;z-index:6}
.card-age-tab.old{background:#b45309}
.card-age-tab.end{background:#dc2626}
/* card body */
.card-body-d{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 10px 12px;border-top:1px solid rgba(255,255,255,.07);gap:3px}
.card-flag-d{font-size:24px;line-height:1}
.card-age-nat{font-size:10px;color:rgba(255,255,255,.38);margin-top:-1px}
.card-name-d{font-size:13.5px;font-weight:800;color:#e2e8f0;text-align:center;line-height:1.2;padding:0 4px}
.card-stars-d{font-size:13px;letter-spacing:2px;margin-top:3px}
.card.common .card-stars-d{color:#9ca3af}
.card.uncommon .card-stars-d{color:#4ade80}
.card.rare .card-stars-d{color:#71a4f4}
.card.epic .card-stars-d{color:#c084fc}
.card.legendary .card-stars-d{color:#fde047}
.card-rarity-label{font-size:8.5px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:2px}

/* ── CARD REVEAL ANIMATIONS ────────────────────────────────────────────── */
@keyframes cardFlipIn{
  0%  {opacity:0;transform:rotateY(90deg) scale(.85);}
  60% {opacity:1;transform:rotateY(-8deg) scale(1.04);}
  80% {transform:rotateY(4deg) scale(1.01);}
  100%{transform:rotateY(0deg) scale(1);}
}
@keyframes epicPulse{
  0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 0px rgba(168,85,247,.0);}
  50%    {box-shadow:0 8px 32px rgba(0,0,0,.55),0 0 40px rgba(168,85,247,.75),0 0 80px rgba(168,85,247,.35);}
}
@keyframes legendaryPulse{
  0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 30px rgba(253,224,71,.4);}
  40%    {box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 60px rgba(253,224,71,.9),0 0 120px rgba(253,224,71,.4);}
  70%    {box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 80px rgba(255,180,0,.6);}
}
@keyframes sparkleFloat{
  0%  {transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0;}
}
@keyframes legendaryShimmer{
  0%  {background-position:200% center;}
  100%{background-position:-200% center;}
}

.card-hidden{opacity:0;pointer-events:none;transform:rotateY(90deg) scale(.85);}
.card-reveal-common,.card-reveal-uncommon{animation:cardFlipIn .38s cubic-bezier(.34,1.56,.64,1) forwards;}
.card-reveal-rare{animation:cardFlipIn .45s cubic-bezier(.34,1.56,.64,1) forwards;}
.card-reveal-epic{
  animation:cardFlipIn .52s cubic-bezier(.34,1.56,.64,1) forwards,
            epicPulse 1.6s ease-in-out .5s 3;
}
.card-reveal-legendary{
  animation:cardFlipIn .6s cubic-bezier(.22,1.4,.36,1) forwards,
            legendaryPulse 1.4s ease-in-out .55s 4;
}
.card-reveal-legendary .card-head::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.45) 50%,transparent 80%);
  background-size:200% 100%;
  animation:legendaryShimmer 1.5s linear .6s 3;
  pointer-events:none;
}

/* Sparkle particle */
.sparkle-particle{
  position:absolute;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:40;
  animation:sparkleFloat var(--sd) ease-out forwards;
}

/* TACTICS */
.tactics-phase{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:10px;padding:10px 14px;height:100%;overflow:hidden;align-items:start}
.tactics-left{display:flex;flex-direction:column;gap:10px;overflow-y:auto;height:100%;min-height:0}
.tactics-mid{overflow-y:auto;height:100%;min-height:0}
.tactics-right-card{overflow-y:auto;height:100%;min-height:0}
.team-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px;overflow:hidden;min-height:0}
.team-card.opponent{border-color:#7f1d1d}
.team-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:6px;border-bottom:1px solid var(--border)}
.team-name{font-size:13px;font-weight:800;letter-spacing:.5px}
.team-name.opp{color:#fca5a5}
.team-rating{font-size:20px;font-weight:900;color:var(--accent)}
.team-rating.opp{color:#fca5a5}
.team-meta{font-size:11px;color:var(--text-dim)}
.team-meta b{color:var(--text);font-weight:700}

.mini-pitch{position:relative;background:linear-gradient(180deg,var(--pitch-1),var(--pitch-2));border-radius:6px;aspect-ratio:7/10;align-self:center;flex-shrink:0;width:100%;max-height:240px;overflow:hidden}
.mini-pitch svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.mini-slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:auto;cursor:grab;user-select:none;touch-action:none;z-index:2}.mini-slot.free-dragging{cursor:grabbing;z-index:30;opacity:.9}
.mini-slot.dragging{cursor:grabbing;z-index:20;opacity:.85}
.mini-slot.drag-over .mini-token{outline:2px solid var(--legendary-1)}
/* mini-token: mini card style for tactics pitch */
.mini-token{width:28px;height:38px;border-radius:5px;background:#0f1623;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.5);flex-shrink:0}
.mini-token.home{border:1.5px solid #71a4f4}
.mini-token.away{border:1.5px solid #f87171}
.mtoken-stripe{height:4px;width:100%;flex-shrink:0}
.mini-token.home .mtoken-stripe{background:#71a4f4}
.mini-token.away .mtoken-stripe{background:#f87171}
/* rarity overrides for home tokens */
.mini-token.home.common{border-color:#9ca3af} .mini-token.home.common .mtoken-stripe{background:#9ca3af}
.mini-token.home.uncommon{border-color:#4ade80} .mini-token.home.uncommon .mtoken-stripe{background:#4ade80}
.mini-token.home.rare{border-color:#71a4f4} .mini-token.home.rare .mtoken-stripe{background:#71a4f4}
.mini-token.home.epic{border-color:#c084fc;animation:epicTokenPulse 2s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.epic .mtoken-stripe{background:linear-gradient(90deg,#a855f7,#e879f9,#a855f7);background-size:200% 100%;animation:stripeShimmer 2s linear infinite}
.mini-token.home.epic::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(232,121,249,.25) 50%,transparent 65%);background-size:250% 100%;animation:tokenShimmer 2.2s linear infinite;pointer-events:none;z-index:2}
.mini-token.home.legendary{border-color:#fde047;animation:legendaryTokenPulse 1.7s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.legendary .mtoken-stripe{background:linear-gradient(90deg,#f59e0b,#fde047,#fbbf24,#fde047,#f59e0b);background-size:300% 100%;animation:stripeShimmer 1.5s linear infinite}
.mini-token.home.legendary::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.3) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
.mtoken-rating{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;line-height:1}
.mini-name{font-size:8.5px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.9);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}


/* Tactic tab navigation */
.tac-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg-3);border-radius:7px;padding:3px;margin-bottom:6px;gap:2px}
.tac-tab{background:transparent;color:var(--text-dim);padding:7px;font-size:11px;font-weight:700;border-radius:5px;text-transform:uppercase;letter-spacing:.8px;transition:all .12s;text-align:center}
.tac-tab:hover{color:var(--text)}
.tac-tab.active.ball{background:var(--accent);color:#0b0f14}
.tac-tab.active.noball{background:var(--info);color:#fff}
.tac-tabs3{display:grid;grid-template-columns:repeat(3,1fr);background:var(--bg-3);border-radius:7px;padding:3px;margin-bottom:6px;gap:2px}
.tac-tab3{background:transparent;color:var(--text-dim);padding:6px 2px;font-size:10.5px;font-weight:700;border-radius:5px;text-transform:uppercase;letter-spacing:.4px;transition:all .12s;text-align:center;white-space:nowrap}
.tac-tab3:hover{color:var(--text)}
.tac-tab3.active{background:#71a4f4;color:#0b0f14}
.tac-phase-group{display:flex;flex-direction:column;gap:7px}
.tac-phase.ball-phase{border-left:none}
.tac-phase.noball-phase{border-left:none}
.tac-row{display:grid;grid-template-columns:112px 1fr 92px;align-items:center;gap:5px;font-size:13px;margin-bottom:2px}

/* Intensitätsleiste */
.intens-wrap{padding:5px 0 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.intens-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.intens-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-faint);font-weight:700}
.intens-val{font-size:11.5px;font-weight:800;letter-spacing:.3px}
.intens-track{height:7px;background:var(--bg-3);border-radius:4px;overflow:hidden;margin-bottom:4px}
.intens-fill{height:100%;border-radius:4px;transition:width .3s,background .3s}
.intens-hint{font-size:9.5px;color:var(--text-faint);font-style:italic}

/* Tactic editor */
.tac-editor{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding-right:4px;min-height:0}
.tac-phase{background:transparent;border:none;border-radius:0;padding:4px 0}
.tac-phase-title{font-size:11.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-faint);font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tac-phase-title::before{content:'';width:3px;height:10px;border-radius:1px;background:#71a4f4}
.tac-phase.def .tac-phase-title::before{background:#71a4f4}
.tac-phase.att .tac-phase-title::before{background:#71a4f4}
.tac-row{display:grid;grid-template-columns:112px 1fr 92px;align-items:center;gap:6px;font-size:13px;margin-bottom:5px}
.tac-row .label{color:var(--text);font-weight:500}
.tac-row .value{text-align:right;color:#a0caff;font-weight:700;font-size:13px}
.tac-row input[type=range]{width:100%;height:5px;background:var(--bg-3);border-radius:3px;appearance:none;outline:none}
.tac-row input[type=range]::-webkit-slider-thumb{appearance:none;width:16px;height:16px;background:#71a4f4;border-radius:50%;cursor:pointer}
.tac-display{display:grid;grid-template-columns:100px 1fr;gap:5px;font-size:11.5px;padding:2px 0}
.tac-display .label{color:var(--text-dim);font-weight:500}
.tac-display .value{color:var(--text);font-weight:600}

.mentality-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:var(--bg-3);padding:3px;border-radius:5px}
.mentality-picker button{background:transparent;color:var(--text-dim);padding:7px 2px;font-size:9.5px;font-weight:700;border-radius:3px;text-transform:uppercase;letter-spacing:.2px;white-space:normal;line-height:1.25;text-align:center}
.mentality-picker button:hover{color:var(--text)}
.mentality-picker button.active{background:#71a4f4;color:#0b0f14}

/* Simple pitch dot tokens */
.pitch-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:800;color:rgba(0,0,0,.85);box-shadow:0 2px 6px rgba(0,0,0,.6);flex-shrink:0;cursor:default}
.pitch-dot.common{background:#9ca3af}
.pitch-dot.uncommon{background:#4ade80}
.pitch-dot.rare{background:#71a4f4}
.pitch-dot.epic{background:#c084fc}
.pitch-dot.legendary{background:#fde047;box-shadow:0 0 8px rgba(253,224,71,.45),0 2px 5px rgba(0,0,0,.55)}
.pitch-dot.away{background:#f87171;color:rgba(0,0,0,.75)}
.pitch-dot.empty{background:transparent;border:1.5px dashed rgba(96,165,250,.35);color:rgba(96,165,250,.5);font-size:8px;font-weight:700}

.formation-row{display:flex;align-items:center;gap:6px;font-size:11px}
.formation-row select{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:5px;font-weight:700;font-size:11.5px;flex:1}

/* Scouting Card */
.scout-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-height:0}
.scout-head{display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.scout-icon{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--info),#2563eb);display:grid;place-items:center;font-size:16px}
.scout-head .title{font-size:12.5px;font-weight:800}
.scout-head .subtitle{font-size:10.5px;color:var(--text-dim)}
.scout-section{font-size:11.5px;line-height:1.5}
.scout-section h5{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-faint);font-weight:700;margin-bottom:5px;margin-top:4px}
.scout-bullet{display:flex;gap:7px;padding:5px 0;border-bottom:1px dashed var(--border)}
.scout-bullet:last-child{border:none}
.scout-bullet .icon{flex-shrink:0;width:16px;text-align:center;font-size:13px}
.scout-bullet .text{flex:1;color:var(--text);line-height:1.4}
.scout-bullet .text b{color:var(--accent)}
.scout-bullet.danger .text b{color:var(--danger)}
.scout-bullet.warn .text b{color:var(--warn)}

/* Opponent analysis 3-tab panel */
.opp-tab-panel{display:flex;flex-direction:column;gap:8px;margin-top:6px;flex:1;min-height:0;overflow-y:auto}
.opp-tab-panel .mini-pitch{flex:0 1 auto;height:calc((100vh - 220px) / 2);max-height:calc((100vh - 220px) / 2);min-height:80px;width:100%;aspect-ratio:unset;align-self:stretch}
/* Saved tactics compact strip */
.saved-tac-strip{display:flex;flex-wrap:wrap;gap:5px;padding:6px 0;margin-top:2px}
.saved-tac-chip{display:flex;align-items:center;gap:4px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;transition:border-color .15s}
.saved-tac-chip:hover{border-color:var(--accent)}
.saved-tac-chip .chip-name{color:var(--text);font-weight:600;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.saved-tac-chip .chip-form{color:var(--text-faint);font-size:10px}
.saved-tac-chip .chip-del{color:var(--text-faint);font-size:11px;line-height:1;padding:0 2px;border-radius:3px}
.saved-tac-chip .chip-del:hover{color:var(--loss)}

/* Role editor when slot selected */
.role-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50}
.role-modal.show{display:flex}
.role-modal .box{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:18px;width:90%;max-width:420px}
.role-modal h3{font-size:14px;margin-bottom:10px}
.role-modal .player-line{font-size:12px;color:var(--text-dim);margin-bottom:12px}
.role-modal select{width:100%;background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:6px;margin-bottom:8px;font-size:12.5px}
.role-modal .duty-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;background:var(--bg-3);padding:3px;border-radius:5px;margin-bottom:10px}
.role-modal .duty-picker button{background:transparent;color:var(--text-dim);padding:6px;font-size:10.5px;font-weight:700;border-radius:4px;text-transform:uppercase;letter-spacing:.4px}
.role-modal .duty-picker button.active.def{background:var(--info);color:#fff}
.role-modal .duty-picker button.active.sup{background:var(--accent);color:#0b0f14}
.role-modal .duty-picker button.active.att{background:var(--warn);color:#fff}
.role-modal .actions{display:flex;gap:6px;justify-content:flex-end;margin-top:6px}

/* Match phase */
.match-phase{display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px;height:100%;overflow:hidden}
/* Scoreboard — centered */
.match-scoreboard{display:flex;justify-content:center;background:linear-gradient(135deg,var(--bg-1),var(--bg-2));padding:12px 32px;border-radius:12px;border:1px solid var(--border);width:580px;max-width:90vw}
.score-main{display:flex;align-items:center;gap:20px}
.score-team-block{text-align:center;min-width:110px}
.score-team-name{font-size:11px;font-weight:700;color:#c4c9d4;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px}
.score-value{font-size:46px;font-weight:900;color:#f0f2f5;font-variant-numeric:tabular-nums;line-height:1}
.score-value.winning{color:#4ade80}
.score-avg{font-size:10px;color:#8b92a0;margin-top:2px;font-weight:600}
.score-center-block{display:flex;flex-direction:column;align-items:center;gap:3px}
.score-colon{font-size:42px;font-weight:900;color:#3d4452;line-height:1}
.match-clock{font-size:17px;font-weight:800;color:#4ade80;letter-spacing:3px;font-variant-numeric:tabular-nums}
/* Panoramic match field */
.match-field{position:relative;width:580px;max-width:90vw;aspect-ratio:600/160;background:repeating-linear-gradient(180deg,#0c4b1d 0 16.67%,#0e5420 16.67% 33.34%);border-radius:8px;overflow:hidden;border:1.5px solid rgba(255,255,255,.2);box-shadow:0 6px 28px rgba(0,0,0,.7)}
.match-field>svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
.field-zone{position:absolute;top:0;bottom:0;transition:background 0.55s ease;z-index:1}
.fz-def{left:0;width:33.33%}
.fz-mid{left:33.33%;width:33.34%}
.fz-att{right:0;width:33.33%}
.zone-my{background:rgba(59,130,246,.17)}
.zone-opp{background:rgba(239,68,68,.17)}
.zone-mid-active{background:rgba(255,255,255,.04)}
.field-arrow{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:30px;opacity:0;transition:opacity 0.45s ease;pointer-events:none;z-index:8;line-height:1;letter-spacing:-4px}
.fa-def{left:16.67%}
.fa-mid{left:50%}
.fa-att{left:83.33%}
.field-arrow.visible{opacity:1}
@keyframes arrowBR{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(calc(-50% + 8px),-50%)}}
@keyframes arrowBL{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(calc(-50% - 8px),-50%)}}
.fa-att.visible{animation:arrowBR .9s ease-in-out infinite}
.fa-def.visible{animation:arrowBL .9s ease-in-out infinite}
/* Event flash overlay */
.event-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#fff;font-size:18px;font-weight:900;padding:10px 22px;border-radius:8px;border:2px solid #4ade80;letter-spacing:2px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
.event-flash.show{opacity:1}
.event-flash.goal{border-color:#4ade80;background:rgba(20,83,45,.97);box-shadow:0 0 30px rgba(74,222,128,.45)}
.event-flash.opp-goal{border-color:#ef4444;background:rgba(127,29,29,.97)}
/* Live ticker */
.match-events{width:580px;max-width:90vw;max-height:130px;overflow-y:auto;background:var(--bg-1);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.event-row{display:flex;gap:9px;align-items:baseline;padding:4px 0;font-size:11.5px;border-bottom:1px solid rgba(255,255,255,.05)}
.event-row:last-child{border:none}
.event-time{font-weight:800;color:#4ade80;width:34px;flex-shrink:0;font-variant-numeric:tabular-nums}
.event-icon{width:16px;text-align:center;flex-shrink:0}
.event-text{flex:1;color:#d1d5db;line-height:1.4}
.event-text b{color:#f9fafb}
.event-row.ev-chance .event-time{color:#fbbf24}
.event-row.ev-chance .event-text{color:#fde68a}
.event-row.ev-chance .event-text b{color:#fef3c7}

/* Result phase */
.result-phase{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center}
.result-banner{font-size:42px;font-weight:900;letter-spacing:4px;text-transform:uppercase;padding:14px 44px;border-radius:14px}
.result-banner.win{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;box-shadow:0 0 40px rgba(34,197,94,.4)}
.result-banner.lose{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff}
.result-banner.victory{background:linear-gradient(135deg,#facc15,#d97706);color:#0b0f14;box-shadow:0 0 60px rgba(250,204,21,.5)}
.result-score{font-size:54px;font-weight:900;letter-spacing:4px}
.result-details{font-size:12.5px;color:var(--text-dim);max-width:560px;line-height:1.6}
.result-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;width:100%;max-width:560px}
.result-stat{background:var(--bg-1);border:1px solid var(--border);border-radius:8px;padding:9px 12px;text-align:center}
.result-stat-label{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:3px}
.result-stat-value{font-size:18px;font-weight:800;color:var(--text)}
.result-progressions{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:380px;max-width:560px}
.result-progressions h4{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);margin-bottom:7px;text-align:center}
.tactic-feedback{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:12px 15px;text-align:left;width:100%;max-width:420px}
.tf-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);margin-bottom:9px}
.tf-row{display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tf-row:last-child{border-bottom:none}
.tf-icon{flex-shrink:0;font-size:13px;line-height:1.5;margin-top:1px}
.tf-text{font-size:12.5px;line-height:1.45;color:var(--text)}
.tf-ok .tf-text{color:#4ade80}
.tf-warn .tf-text{color:#fcd34d}
.tf-neutral .tf-text{color:var(--text-dim)}
.tf-text-wrap{display:flex;flex-direction:column;gap:2px;flex:1}
.tf-tip{font-size:11px;color:var(--text-faint);font-style:italic;margin-top:1px}
.tf-gamechanger{background:rgba(113,164,244,.08);border:1px solid rgba(113,164,244,.2);border-radius:7px;padding:8px 11px;margin:3px 0 2px}
.tf-gc-label{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--info);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.tf-gc-text{font-size:12.5px;line-height:1.45;font-weight:600}
.tf-gc-text.pos{color:#4ade80}
.tf-gc-text.neg{color:#fcd34d}
.prog-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px dashed var(--border)}
.prog-row:last-child{border:none}
.prog-row b.up{color:var(--accent)}
.prog-row b.down{color:var(--danger)}

/* Replace */
.replace-phase{display:flex;flex-direction:column;align-items:center;padding:18px;gap:14px;overflow-y:auto}
.replace-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;width:100%;max-width:1100px}
.team-slot-card{background:var(--bg-2);border:2px solid var(--border);border-radius:10px;padding:9px;cursor:pointer;transition:all .15s}
.team-slot-card:hover{border-color:var(--accent);transform:translateY(-2px)}

/* ============================================================
   ROLE SYNERGY — Rewards sensible spatial distribution
   Returns bonus points added to combinedAdv in simulateMatch
   ============================================================ */
function calcRoleSynergy(team,formation,roles){
  let bonus=0;
  const slots=FORMATIONS[formation];
  const byPos={};
  for(const slot of slots){if(!byPos[slot.pos])byPos[slot.pos]=[];byPos[slot.pos].push(slot.id)}
  function getRD(sid){
    const slot=slots.find(s=>s.id===sid);if(!slot)return null;
    const player=team[sid];if(!player)return null;
    const r=roles[sid]||{role:ROLES_BY_POS[slot.pos]?.[0]?.[0],duty:defaultDuty(slot.pos)};
    return{slot,player,role:r.role,duty:r.duty};
  }
  // --- Midfield balance: need at least one defensive cover ---
  const mfPoss=['CDM','CM','CAM'];
  let mfDef=0,mfSup=0,mfAtt=0,mfTotal=0;
  for(const pos of mfPoss){for(const sid of (byPos[pos]||[])){const rd=getRD(sid);if(!rd)continue;mfTotal++;if(rd.duty==='def')mfDef++;else if(rd.duty==='sup')mfSup++;else if(rd.duty==='att')mfAtt++;}}
  if(mfTotal>=2){
    if(mfDef===0)bonus-=3;     // no defensive cover in MF = exposed
    if(mfAtt===0)bonus-=1;     // no progression from MF
    if(mfDef>=1&&mfSup>=1)bonus+=1; // balanced MF
  }
  // --- LB + LW synergy ---
  for(const lbId of (byPos['LB']||[])){
    const lb=getRD(lbId);if(!lb)continue;
    for(const lwId of (byPos['LW']||[])){
      const lw=getRD(lwId);if(!lw)continue;
      // IFB/inverted LB + wide/classic LW = LB goes inside, LW keeps width → GREAT
      if((lb.role==='Inverter AV'||lb.role==='IFB')&&(lw.role==='Klassischer Flügel'||lw.role==='Defensiver Flügel'||lw.role==='Wide Playmaker'))bonus+=3;
      // WB/HAV + IF = LB overlaps wide, LW cuts in → GREAT
      else if((lb.role==='Wing-Back'||lb.role==='Hinterlaufender AV'||lb.role==='Compl. Wing-Back')&&(lw.role==='Inverter Flügel'||lw.role==='Inside Forward'))bonus+=3;
      // CWB (att) + FLG (att) = both wide, no coverage behind → BAD
      else if(lb.duty==='att'&&lw.role==='Klassischer Flügel'&&lw.duty==='att')bonus-=2;
      // IFB + IF = both cut inside = no width on left → BAD
      else if((lb.role==='Inverter AV'||lb.role==='IFB')&&(lw.role==='Inverter Flügel'))bonus-=2;
    }
  }
  // --- RB + RW synergy (mirror) ---
  for(const rbId of (byPos['RB']||[])){
    const rb=getRD(rbId);if(!rb)continue;
    for(const rwId of (byPos['RW']||[])){
      const rw=getRD(rwId);if(!rw)continue;
      if((rb.role==='Inverter AV'||rb.role==='IFB')&&(rw.role==='Klassischer Flügel'||rw.role==='Defensiver Flügel'||rw.role==='Wide Playmaker'))bonus+=3;
      else if((rb.role==='Wing-Back'||rb.role==='Hinterlaufender AV'||rb.role==='Compl. Wing-Back')&&(rw.role==='Inverter Flügel'||rw.role==='Inside Forward'))bonus+=3;
      else if(rb.duty==='att'&&rw.role==='Klassischer Flügel'&&rw.duty==='att')bonus-=2;
      else if((rb.role==='Inverter AV'||rb.role==='IFB')&&(rw.role==='Inverter Flügel'))bonus-=2;
    }
  }
  // --- ST + CAM synergy ---
  for(const stId of (byPos['ST']||[])){
    const st=getRD(stId);if(!st)continue;
    for(const camId of (byPos['CAM']||[])){
      const cam=getRD(camId);if(!cam)continue;
      // False 9 + shadow striker = both drop deep, nobody goes in behind
      if(st.role==='Falsche Neun'&&cam.role==='Schattenstürmer')bonus-=2;
      // AF + second striker = good depth combo
      if(st.role==='Advanced Forward'&&cam.role==='Zweiter Stürmer')bonus+=2;
      // Poacher + Trequartista = creative feeder + pure finisher
      if(st.role==='Poacher'&&(cam.role==='Trequartista'||cam.role==='Offensiver 10er'))bonus+=2;
      // Target man + 10er = classic combination
      if(st.role==='Mittelstürmer (Ziel)'&&cam.role==='Offensiver 10er')bonus+=2;
    }
  }
  // --- CDM coverage ---
  for(const cdmId of (byPos['CDM']||[])){
    const cdm=getRD(cdmId);if(!cdm)continue;
    // Regista without any other defensive MF = too exposed
    if(cdm.role==='Regista'&&mfDef<=1)bonus-=2;
    // Anker = excellent base for pressing systems
    if(cdm.role==='Anker')bonus+=1;
    // HB complements high defensive line perfectly
    if(cdm.role==='Half-Back'&&(state.tactics.defensivLinie||2)>=3)bonus+=1;
  }
  // --- CB synergy: at least one IV or Stopper for stability ---
  let cbDef=0;
  for(const cbId of (byPos['CB']||[])){const rd=getRD(cbId);if(rd&&(rd.role==='Innenverteidiger'||rd.role==='Stopper'||rd.duty==='def'))cbDef++;}
  if((byPos['CB']||[]).length>=2&&cbDef===0)bonus-=2; // both CBs going forward = exposed
  return clamp(bonus,-8,8);
}

/* ============================================================
   AUDIO SYSTEM
   ============================================================ */
let _audioCtx=null,_musicOn=false,_bgLoopId=null;
/* Free-drag state for mini-pitches */
let _fd={active:false,slotId:null,pitchKey:null,nodeEl:null};
function _fdMove(cx,cy){
  if(!_fd.active)return;
  const pitch=document.querySelector(`[data-pitchkey="${_fd.pitchKey}"]`);
  if(!pitch)return;
  const r=pitch.getBoundingClientRect();
  const x=clamp(((cx-r.left)/r.width)*100,3,97);
  const y=clamp(((cy-r.top)/r.height)*100,3,97);
  const posObj=_fd.pitchKey==='mit'?state.customPosMit:state.customPosOhne;
  posObj[_fd.slotId]={x,y};
  _fd.nodeEl.style.left=x+'%';
  _fd.nodeEl.style.top=y+'%';
}
function _fdEnd(){
  if(!_fd.active)return;
  _fd._wasDragged=true;
  _fd.active=false;
  _fd.nodeEl&&_fd.nodeEl.classList.remove('free-dragging');
  const slotId=_fd.slotId;const pitchKey=_fd.pitchKey;
  _fd={active:false,slotId:null,pitchKey:null,nodeEl:null};
  // Snap to nearest slot if within 14% distance
  const formation=pitchKey==='mit'?state.formation:state.defFormation;
  const customPos=pitchKey==='mit'?state.customPosMit:state.customPosOhne;
  const cp=customPos[slotId];
  if(!cp)return;
  const slots=FORMATIONS[formation];
  let nearest=null,nearestDist=14;
  for(const slot of slots){
    if(slot.id===slotId)continue;
    const sp=customPos[slot.id]||{x:slot.x,y:100-slot.y};
    const dist=Math.sqrt((cp.x-sp.x)**2+(cp.y-sp.y)**2);
    if(dist<nearestDist){nearestDist=dist;nearest=slot;}
  }
  if(nearest){
    if(pitchKey==='mit'){
      // Swap players between slots — position naturally updates
      doSwap('slot:'+slotId,'slot:'+nearest.id);
      delete customPos[slotId];delete customPos[nearest.id];
    } else {
      // Swap visual positions on ohne-ball pitch
      const tmpA=customPos[slotId];
      const fromSlot=slots.find(s=>s.id===slotId);
      customPos[slotId]=customPos[nearest.id]||{x:nearest.x,y:100-nearest.y};
      customPos[nearest.id]=tmpA||{x:fromSlot.x,y:100-fromSlot.y};
    }
    render();
  }
}
document.addEventListener('mousemove',e=>_fdMove(e.clientX,e.clientY));
document.addEventListener('mouseup',_fdEnd);
document.addEventListener('touchmove',e=>{e.preventDefault();_fdMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.addEventListener('touchend',_fdEnd);
function getACtx(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(_audioCtx.state==='suspended')_audioCtx.resume();return _audioCtx}
function _note(ctx,freq,t,dur,type='triangle',vol=0.06){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.setValueAtTime(vol,t+dur*0.72);g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur);
}
function startBgMusic(){
  if(!_musicOn)return;
  try{
    const ctx=getACtx();
    const prog=[[220,261.63,329.63],[174.61,220,261.63],[261.63,329.63,392],[196,246.94,293.66]];
    let t=ctx.currentTime+0.15;const cl=1.9,al=0.23;
    for(const ch of prog){for(let i=0;i<ch.length;i++){_note(ctx,ch[i],t+i*al,al*2.5,'triangle',0.045);_note(ctx,ch[i]*2,t+i*al,al*2,'sine',0.018);}t+=cl;}
    _bgLoopId=setTimeout(()=>{if(_musicOn)startBgMusic();},(t-ctx.currentTime+0.2)*1000);
  }catch(e){}
}
function toggleMusic(){
  _musicOn=!_musicOn;
  const b=document.getElementById('btnMusic');if(b)b.textContent=_musicOn?'🔊':'🔇';

function playCardRevealSound(rarity){
  try{
    const ctx=getACtx(),t=ctx.currentTime;
    if(rarity==='legendary'){
      [523.25,659.25,783.99,1046.5].forEach((f,i)=>_note(ctx,f,t+i*.13,.5,'sine',.13));
      const bLen=Math.floor(ctx.sampleRate*.9);const buf=ctx.createBuffer(1,bLen,ctx.sampleRate);const d=buf.getChannelData(0);
      for(let i=0;i<bLen;i++)d[i]=(Math.random()*2-1)*.12*(1-i/bLen);
      const src=ctx.createBufferSource();src.buffer=buf;const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=4500;
      const g=ctx.createGain();g.gain.value=.35;src.connect(f);f.connect(g);g.connect(ctx.destination);src.start(t);
    }else if(rarity==='epic'){
      [392,493.88,587.33].forEach((f,i)=>_note(ctx,f,t+i*.09,.55,'triangle',.09));
    }else{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(750,t+.16);
      g.gain.setValueAtTime(.09,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
      o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.22);
    }
  }catch(e){}
}

function saveCurrentTactics(){
  const name=prompt('Name für diese Taktik:',`Taktik ${state.savedTactics.length+1}`);
  if(!name)return;
  if(state.savedTactics.length>=8)state.savedTactics.shift();
  state.savedTactics.push({name,tactics:{...state.tactics},formation:state.formation,defFormation:state.defFormation});
  writeSavedTactics();showToast(`"${name}" gespeichert!`);render();
}
function loadSavedTactic(idx){
  const s=state.savedTactics[idx];if(!s)return;
  state.tactics={...s.tactics};
  if(s.formation)state.formation=s.formation;
  if(s.defFormation)state.defFormation=s.defFormation;
  rebuildTeamForFormation();
  showToast(`"${s.name}" geladen.`);render();
}
function deleteSavedTactic(idx){
  state.savedTactics.splice(idx,1);writeSavedTactics();render();
}
function resetTactics(){
  state.tactics={...DEFAULT_TACTICS};
  showToast('Taktik zurückgesetzt.');render();
}

const $=s=>document.querySelector(s);

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function randFloat(min,max){return Math.random()*(max-min)+min}
function pickRand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function el(tag,p={},c=[]){const e=document.createElement(tag);for(const k in p){if(k==='style')Object.assign(e.style,p[k]);else if(k==='class')e.className=p[k];else if(k.startsWith('on'))e.addEventListener(k.slice(2),p[k]);else if(k==='dataset')Object.assign(e.dataset,p[k]);else e.setAttribute(k,p[k])}for(const ch of c){if(ch==null)continue;if(Array.isArray(ch)){for(const cc of ch){if(cc==null)continue;e.appendChild(typeof cc==='string'?document.createTextNode(cc):cc)}continue}e.appendChild(typeof ch==='string'?document.createTextNode(ch):ch)}return e}
function showToast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),2200)}
function shortName(n){const p=n.split(' ');return p.length>1?p[p.length-1]:n}
function rollRarity(){const r=Math.random()*100;let a=0;for(const k in RARITIES){a+=RARITIES[k].weight;if(r<a)return k}return'common'}
function poisson(lambda){lambda=Math.max(0.01,lambda);const L=Math.exp(-lambda);let k=0,p=1;while(p>L){k++;p*=Math.random()}return k-1}

function generatePlayerForPos(pos,forcedRarity=null){
  const rarity=forcedRarity||rollRarity();
  const r=RARITIES[rarity];
  // Natural pos
  let pool=PLAYER_POOL.filter(p=>p.pos===pos&&p.rating>=r.min&&p.rating<=r.max);
  // If sparse, add alt-pos players (they keep their natural position label)
  if(pool.length<3){
    const altPool=PLAYER_POOL.filter(p=>p.pos!==pos&&isNaturalFor(p.pos,pos)&&p.rating>=r.min&&p.rating<=r.max);
    pool=[...pool,...altPool];
  }
  let base;
  if(pool.length){base={...pickRand(pool)}}
  else{
    const fallback=PLAYER_POOL.filter(p=>p.rating>=r.min&&p.rating<=r.max);
    if(fallback.length){base={...pickRand(fallback)}}
    else base={name:'Unbekannt',pos,nat:'GER',age:rand(20,32),rating:rand(r.min,r.max),rarity};
  }
  base.id=nextPlayerId++;
  base.rarity=ratingToRarity(base.rating);
  return base;
}
function generatePlayerByRating(pos,targetRating){
  // Find someone close in rating range
  const min=Math.max(50,targetRating-3),max=Math.min(99,targetRating+3);
  const pool=PLAYER_POOL.filter(p=>p.pos===pos&&p.rating>=min&&p.rating<=max);
  let base;
  if(pool.length)base={...pickRand(pool)};
  else{
    const alt=PLAYER_POOL.filter(p=>p.pos===pos);
    base=alt.length?{...pickRand(alt)}:{name:'X. Spieler',pos,nat:'GER',age:25};
    base.rating=clamp(targetRating+rand(-2,2),50,99);
  }
  base.id=nextPlayerId++;
  base.rarity=ratingToRarity(base.rating);
  return base;
}
function teamAvg(team,formation){
  const slots=formation?FORMATIONS[formation]:null;
  const entries=Object.entries(team).filter(([,p])=>p);
  if(!entries.length)return 0;
  return entries.reduce((s,[slotId,p])=>{
    const slot=slots?slots.find(sl=>sl.id===slotId):null;
    const rel=slot?getPosRelation(p.pos,slot.pos):'main';
    return s+(p.rating-posPenalty(rel));
  },0)/entries.length;
}

function generateOpponent(){
  const lg=LEAGUES[state.league];
  // Target = league range + small win progression (max +3)
  const winsBonus=Math.min(state.winsThisLeague*0.6,3);
  const base=rand(lg.minRating, lg.maxRating);
  const target=clamp(base+winsBonus+randFloat(-1,1), lg.minRating-2, lg.maxRating+3);
  const formation=pickRand(FORMATION_KEYS);
  const slots=FORMATIONS[formation];
  const team={};
  for(const slot of slots){team[slot.id]=generatePlayerByRating(slot.pos,Math.round(target+rand(-3,3)))}
  return {formation,team,tactics:generateSensibleTactics(),avg:teamAvg(team,formation)};
}

function generateScoutingReport(opp){

  const g=k=>t[k]??2;

  const routeL   =['Flügel','Halbräume außen','Ausgewogen','Halbräume innen','Zentrum'];
  const breiteL  =['Sehr eng','Eng','Standard','Breit','Sehr breit'];
  const tempoL   =['Sehr langsam','Langsam','Standard','Schnell','Sehr schnell'];
  const direktL  =['Sehr indirekt','Indirekt','Standard','Direkt','Sehr direkt'];
  const kreativL =['Sehr eng','Eingeschränkt','Standard','Frei','Sehr frei'];
  const mentL    =['Sehr defensiv','Defensiv','Ausgewogen','Offensiv','Sehr offensiv'];

  const pressL   =['Sehr selten','Selten','Standard','Häufig','Sehr häufig'];

  // --- MIT BALL: alle relevanten Werte, nicht-Standard hervorgehoben ---
  MIT.push({icon:'🗺️',label:'Route',    value:routeL[g('angriffsroute')],  highlight:g('angriffsroute')!==2});

  if(g('flanken')!==2)           MIT.push({icon:'↗️',label:'Flanken',    value:['Sehr selten','Selten','Standard','Häufig','Sehr häufig'][g('flanken')],highlight:g('flanken')>=3||g('flanken')<=1});
  if(g('nachBallverlust')!==2)   MIT.push({icon:'🔁',label:'Nach Verlust',value:verlustL[g('nachBallverlust')],highlight:g('nachBallverlust')<=1||g('nachBallverlust')>=3});
  MIT.push({icon:'🧠',label:'Mentalität',value:mentL[g('mentality')],       highlight:g('mentality')<=1||g('mentality')>=3});

  // --- OHNE BALL: alle relevanten Werte ---

  OHNE.push({icon:'🏰',label:'Defensivlinie',   value:linienL[g('defensivLinie')],    highlight:g('defensivLinie')<=1||g('defensivLinie')>=3});

  OHNE.push({icon:'🧍',label:'Deckung',         value:deckL[g('deckung')],            highlight:g('deckung')<=1||g('deckung')>=3});

  if(oppAvg>myAvg+5){qualText='Gegner individuell <b>überlegen</b>';qualType='danger'}
  else if(oppAvg<myAvg-5){qualText='Gegner individuell <b>schwächer</b>';qualType='info'}
  else{qualText='Beide Teams auf <b>Augenhöhe</b>';qualType='info'}

  const mentalityL=['Sehr defensiv','Defensiv','Ausgewogen','Offensiv','Sehr offensiv'];
  return{
    mit:MIT,
    ohne:OHNE,
    quality:{text:qualText,type:qualType},
    mentality:mentalityL[g('mentality')],
    formation:opp.formation
  };
}

/* ============================================================
   TACTIC EDGE — Pro Trainer Counter Logic
   ============================================================ */
function calcIntensity(tactics){
  const g=k=>tactics[k]??2;
  // unterstuetzLaeufe: V-Kurve — sowohl Hinterlaufen(0) als auch Vorderlaufen(4) erhöhen Int.
  const laeufeInt=Math.abs(g('unterstuetzLaeufe')-2)*0.7; // max 1.4 bei 0 oder 4
  const raw=
    g('pressingLinie')*1.8+       // größter Treiber
    g('pressingAusloesung')*1.6+  // sehr einflussreich
    g('nachBallverlust')*1.2+     // Gegenpressing sehr kostspielig
    g('tempo')*1.0+
    g('direktheit')*0.6+
    laeufeInt+                    // symmetrisch: Extreme = mehr Int.
    g('dribblings')*0.4+          // leichter Einfluss
    g('defensivLinie')*0.35+      // reduzierter Einfluss (war 0.7)
    g('nachBalleroberung')*0.4;
  // Normalisierung: max = 4*1.8+4*1.6+4*1.2+4*1.0+4*0.6+2*0.7+4*0.4+4*0.35+4*0.4
  const maxRaw=7.2+6.4+4.8+4.0+2.4+1.4+1.6+1.4+1.6; // = 30.8
  return Math.round((raw/maxRaw)*100);
}
function getIntensityLevel(pct){
  if(pct>=80)return{label:'Extrem',color:'#ef4444'};
  if(pct>=65)return{label:'Sehr hoch',color:'#f97316'};
  if(pct>=50)return{label:'Hoch',color:'#f59e0b'};
  if(pct>=35)return{label:'Mittel',color:'#71a4f4'};
  return{label:'Niedrig',color:'#4ade80'};
}
function tacticEdge(my,opp){
  let s=0;
  const t=k=>my[k]??2;
  const o=k=>opp[k]??2;

  // === Gegen hohe Pressinglinie (mit/ohne Hochpressing) — ZUSAMMENGEFÜHRT ===
  // Früher zwei separate Blöcke → Doppelzählung von tempo/nachBall. Jetzt ein Block.
  if(o('pressingLinie')>=3){
    const hochPress=o('pressingAusloesung')>=3;
    // Tiefenläufe + Konter hinter die Linie
    if(t('nachBalleroberung')>=3)s+=hochPress?4:3;
    if(t('tempo')>=3)            s+=hochPress?3:2;
    if(t('direktheit')>=3)       s+=1;  // reduziert (war +2, asymmetrisch zu AI-Stilen)
    if(t('passAufnahme')>=3)     s+=1;  // reduziert (war +3, asymmetrisch zu AI-Stilen)
    // Passstil nur gegen Hochpressing entscheidend
    if(hochPress){
      if(t('passStyle')>=3)s+=3;   // lange Bälle überspielen Pressing
      if(t('passStyle')<=1)s-=4;   // kurz aufbauen vs Hochpressing = fatal
    }
    // Zu passiv gegen hohe Linie
    if(t('tempo')<=1&&t('nachBalleroberung')<=1)s-=3;
  }
  // === Gegen tiefen Block ===
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('breite')>=3)s+=3;
    if(t('kreativFreiheiten')>=3)s+=3;
    if(t('unterstuetzLaeufe')>=3)s+=2;
    if(t('tempo')<=1)s+=1;
    if(t('tempo')>=4&&t('breite')<=1)s-=3;
    if(t('nachBalleroberung')>=3)s-=2;
  }
  // === Gegen kurzes Aufbauspiel ===
  if(o('passStyle')<=1&&o('tempo')<=1){   // fix: <=1 statt <=2 (Standard ausgeschlossen)
    if(t('pressingAusloesung')>=3&&t('pressingLinie')>=3)s+=4;  // war +5
    if(t('pressingAusloesung')<=1)s-=2;
  }
  // === Gegen direktes / langes Spiel ===
  if(o('passStyle')>=3){
    if(t('defensivLinie')<=1)s+=2;  // fix: nur wirklich tief (war <=2 = Standard)
    if(t('defensivLinie')>=3)s-=2;
  }
  // === Kreativität vs Pressing ===
  if(o('kreativFreiheiten')>=3&&t('pressingAusloesung')>=3)s+=2;
  if(o('kreativFreiheiten')<=1&&t('kreativFreiheiten')>=3)s+=1;
  // === Aufbau-Stil Matchup ===
  if(o('spielaufbau')<=1&&t('pressingAusloesung')>=3&&t('pressingLinie')>=3)s+=3;
  if(t('aufbauStrategie')<=1&&o('nachBallverlust')>=3)s-=2;
  // === Gegen breites Spiel ===
  if(o('spielaufbau')>=3){if(t('spielaufbau')<=1)s+=2;}
  if(o('breite')>=3){if(t('breite')<=1)s+=2;}
  // === Gegen Gegenpressing ===
  if(o('nachBallverlust')>=3){
    if(t('passStyle')>=3)s+=3;          // lange Bälle überspielen Gegenpressing
    // kreativFreiheiten hier neutral — entscheidend ist Spielgeschwindigkeit, nicht Stil
  }
  if(o('nachBallverlust')<=1){
    if(t('nachBalleroberung')>=3)s+=3;
    if(t('tempo')>=3)s+=2;
    if(t('unterstuetzLaeufe')>=3)s+=1;  // Nachrückbewegungen effektiv wenn Gegner nicht zurückpresst
  }
  // === Flankenspiel ===
  if(o('flanken')>=3&&t('gegnerFlanken')<=1)s-=2;
  if(o('flanken')>=3&&t('gegnerFlanken')>=3)s+=2;
  if(t('flanken')>=3&&o('gegnerFlanken')<=1)s+=2;
  // === Mentalität ===
  if(o('mentality')>=3&&t('mentality')<=1)s+=3;
  if(o('mentality')<=1&&t('mentality')>=3)s+=2;
  if(o('mentality')===4&&t('nachBalleroberung')>=3)s+=3;
  // === Dribbling vs Deckung ===
  if(t('dribblings')>=3&&o('deckung')>=3)s-=1;
  if(t('dribblings')>=3&&o('deckung')<=1)s+=2;
  // === Kohärenz ===
  if(Math.abs(t('mentality')-t('pressingAusloesung'))>=3)s-=2;
  if(Math.abs(t('passStyle')-t('tempo'))>=3)s-=1;
  // Pep-Stil: kurzer Aufbau + Hochpressing
  if(t('passStyle')<=1&&t('pressingAusloesung')>=3&&t('pressingLinie')>=3)s+=2;
  // Hohe Linie anfällig für Konter
  if(t('pressingLinie')>=3&&o('nachBalleroberung')>=3)s-=2;
  if(t('pressingLinie')>=3&&t('nachBalleroberung')>=3)s+=1;  // fix: >=3 (war >=2 = Standard)
  // Manndeckung vs kreative Angreifer
  if(t('deckung')>=3&&o('kreativFreiheiten')>=3)s-=2;
  if(t('deckung')>=3&&o('kreativFreiheiten')<=1)s+=1;
  // Manndeckung vs strukturiertes, geduldiges Spiel
  if(t('deckung')>=3&&o('tempo')<=1&&o('direktheit')<=1)s+=1; // klare Laufwege → Mann kann zugeordnet werden

  // === NEUE KORRELATIONEN ===

  // Spielbreite OHNE BALL (defensivBreite) ↔ gegnerische Flanken
  if(o('flanken')>=3){
    if(t('defensivBreite')>=3)s+=2;   // breit sichern = Flanken abdecken
    if(t('defensivBreite')<=1)s-=2;   // zu kompakt = Flanken ungedeckt
  }
  if(o('flanken')<=1&&o('angriffsroute')>=3){
    if(t('defensivBreite')<=1)s+=1;   // kompakt optimal gegen Zentrumsangriff
  }
  // eigene Flanken ↔ gegnerische Defensivbreite
  if(o('defensivBreite')<=1){
    if(t('flanken')>=3)s+=2;          // Flanken ideal wenn Gegner kompakt steht
  }
  if(o('defensivBreite')>=3){
    if(t('flanken')<=1)s+=1;          // wenig Flanken wenn Gegner breit steht
  }

  // Aufbaustrategie ↔ gegnerisches Pressing
  if(o('pressingLinie')>=3&&o('pressingAusloesung')>=3){
    if(t('aufbauStrategie')>=3)s+=3;  // Flügel-Aufbau umgeht Hochpressing
    if(t('aufbauStrategie')<=1)s-=2;  // Zentrum-Aufbau vs Hochpressing gefährlich
  }
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('aufbauStrategie')<=1)s+=2;  // Zentrum optimal gegen tiefen Block
    if(t('aufbauStrategie')>=3)s-=1;
  }

  // Abstöße ↔ gegnerisches Pressing
  if(o('pressingAusloesung')>=3&&o('pressingLinie')>=3){
    if(t('abstöße')>=3)s+=2;          // lange Abstöße überspielen Pressing
    if(t('abstöße')<=1)s-=2;          // kurze Abstöße vs Pressing = gefährlich
  }
  if(o('pressingLinie')<=1){
    if(t('abstöße')<=1)s+=1;          // kurze Abstöße gegen tiefen Block sinnvoll
    if(t('abstöße')>=3)s-=1;
  }

  // Spielaufbau ↔ gegnerische Breite
  if(o('defensivBreite')>=3||o('breite')<=1){
    if(t('spielaufbau')<=1)s+=2;      // Zentrum wenn Gegner defensiv breit steht
  }
  if(o('defensivBreite')<=1){
    if(t('spielaufbau')>=3)s+=2;      // Flügel wenn Gegner kompakt/eng steht → Außenbahnen frei
  }

  // Pass-Aufnahme ↔ Spielstil-Kohärenz
  if(t('nachBalleroberung')>=3&&t('direktheit')>=3){
    if(t('passAufnahme')>=3)s+=2;     // Tiefenläufe bei Konterspiel
  }
  if(t('passStyle')<=1&&t('tempo')<=1){
    if(t('passAufnahme')<=1)s+=1;     // in den Fuß bei Ballbesitz
  }

  // Passrisiko ↔ gegnerisches Pressing
  if(o('pressingLinie')>=3&&o('pressingAusloesung')>=3){
    if(t('passRisiko')>=3)s-=3;       // riskante Pässe gegen Pressing fatal
    if(t('passRisiko')<=1)s+=1;       // sicheres Passspiel gegen Pressing
  }
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('passRisiko')>=3)s+=2;       // hohes Passrisiko gegen tiefen Block = Chancen
  }

  // Dribblings ↔ Pressing / Deckung
  if(o('pressingLinie')<=1&&o('deckung')<=1){
    if(t('dribblings')>=3)s+=3;       // viele Dribblings gegen tiefen Block + Zonendeckung
  }
  if(o('pressingAusloesung')>=3||o('deckung')>=3){
    if(t('dribblings')>=3)s-=2;       // Dribblings gegen Pressing/Manndeckung riskant
    if(t('dribblings')<=1)s+=1;
  }

  // Direktheit ↔ Kontertaktik
  if(t('nachBalleroberung')>=3&&t('pressingLinie')<=1){
    if(t('direktheit')>=3)s+=2;       // direktes Spiel bei Kontertaktik ideal
  }
  if(t('passStyle')<=1&&t('tempo')<=1&&t('direktheit')>=3&&o('pressingLinie')<=1){
    s-=1;                              // direkt unnötig bei geduldiger Taktik vs tiefen Block
  }

  // Kreative Freiheiten ↔ Gegner-Defensivtiefe
  if(o('pressingLinie')<=1&&o('defensivLinie')<=1){
    if(t('kreativFreiheiten')>=3)s+=2;
  }
  if(o('pressingLinie')>=3&&o('pressingAusloesung')>=3){
    if(t('kreativFreiheiten')>=3)s-=2; // kreativität kostet Zeit gegen Pressing
    if(t('kreativFreiheiten')<=1)s+=1;
  }

  // Angriffsroute ↔ Gegner-Abwehrbreite
  if(o('defensivBreite')<=1){
    if(t('angriffsroute')<=1)s+=3;    // Flügel optimal wenn Gegner kompakt
    if(t('angriffsroute')>=3)s-=1;
  }
  if(o('defensivBreite')>=3){
    if(t('angriffsroute')>=3)s+=2;    // Zentrum wenn Gegner breit steht
    if(t('angriffsroute')<=1)s-=1;
  }
  if(t('kreativFreiheiten')>=3&&(t('angriffsroute')===1||t('angriffsroute')===3)){
    s+=1;                              // Kreativität + Halbräume = gute Synergie
  }

  // Fernschüsse ↔ Kontext
  if(o('pressingLinie')<=1&&o('defensivLinie')<=1){
    if(t('fernschuesse')>=3)s+=1;     // tiefer Block + tiefer Gegner → Raum vor Strafraum vorhanden
  }
  if(o('defensivBreite')<=1&&o('defensivLinie')<=1){
    if(t('fernschuesse')>=3)s+=1;     // kompakter tiefer Block → kein Durchkommen, Distanzschüsse sinnvoll
  }
  if(t('passStyle')<=1||t('direktheit')<=1){
    if(t('fernschuesse')>=3)s-=2;     // Fernschüsse passen nicht zu geduldiger Taktik
  }
  if(t('flanken')>=3&&t('fernschuesse')>=3)s-=1; // Flanken + Fernschüsse inkohärent

  // Pressinglinie ↔ gegnerischer Aufbaustil (ergänzend)
  if(o('passStyle')>=3&&o('direktheit')>=3){
    if(t('pressingLinie')>=3)s-=2;    // hohe Linie gegen lange Bälle gefährlich
    if(t('pressingLinie')<=1)s+=2;    // tief gegen Konter/direkt optimal
  }
  if(o('abstöße')<=1&&t('pressingLinie')>=3)s+=1; // Gegner kurze Abstöße → früh pressen lohnt

  // Defensivlinien-Kohärenz (eigene Pressinglinie ↔ Defensivlinie)
  const linienGap=Math.abs(t('pressingLinie')-t('defensivLinie'));
  if(linienGap>=3)s-=3;               // zu großer Abstand zwischen den Linien gefährlich
  if(linienGap<=1&&t('pressingLinie')>=3)s+=1; // kompakte hohe Formation

  // Pressingauslösung ↔ Gegner Aufbaustil (ergänzend)
  if(t('pressingAusloesung')>=3&&o('passStyle')<=1)s+=2;
  if(t('pressingAusloesung')>=3&&o('direktheit')>=4)s-=1;

  // Nach Ballverlust ↔ gegnerischer Spielstil
  if(o('passStyle')>=3&&o('direktheit')>=3){
    if(t('nachBallverlust')<=1)s+=2;  // fallen lassen gegen lange Bälle optimal
    if(t('nachBallverlust')>=4)s-=2;  // gegenpressing gegen Konter sehr gefährlich
  }
  if(o('passStyle')<=1&&o('tempo')<=1){
    if(t('nachBallverlust')>=3)s+=2;  // gegenpressing gegen Ballbesitz ideal
    if(t('nachBallverlust')<=1)s-=1;
  }

  // Nach Balleroberung ↔ Gegner-Defensivtiefe
  if(o('pressingLinie')<=1&&o('defensivLinie')<=1){
    if(t('nachBalleroberung')<=1)s+=2; // ruhig aufbauen wenn Gegner tief steht
  }

  // Gegner-Flanken ↔ gegnerischer Angriffsstil
  if(o('flanken')>=3&&o('breite')>=3){
    if(t('gegnerFlanken')>=3)s+=2;    // Verhindern gegen breiten Flügelangreifer → klarer Vorteil
    if(t('gegnerFlanken')<=1)s-=2;    // Zulassen gegen breiten Flügelangreifer → klarer Nachteil
  }
  if(o('flanken')<=1&&o('angriffsroute')>=3){
    if(t('gegnerFlanken')<=1)s+=1;    // Zulassen sinnvoll wenn Gegner Zentrum fokussiert — keine Flanken zu verhindern
  }

  // Deckung ↔ Gegner-Spielstil
  if(o('passStyle')>=3&&o('flanken')>=3){
    if(t('deckung')<=1)s+=1;          // Zonendeckung optimal gegen lange Bälle/Flanken
    if(t('deckung')>=3)s-=1;          // Manndeckung bei Flanken suboptimal
  }

  return clamp(s,-25,25);
}

/* ============================================================
   FORMATION SPREAD HELPERS
   ============================================================ */
function calcFormationSpread(customPos,formation){
  const slots=FORMATIONS[formation];
  if(!slots||!slots.length)return 65;
  const xs=slots.map(s=>(customPos[s.id]?customPos[s.id].x:s.x));
  const ys=slots.map(s=>(customPos[s.id]?customPos[s.id].y:(100-s.y)));
  const xSpread=Math.max(...xs)-Math.min(...xs);
  const ySpread=Math.max(...ys)-Math.min(...ys);
  return {xSpread,ySpread};
}
function calcSpreadBonus(mySpread,defSpread,tac){
  if(!mySpread||typeof mySpread==='number')return 0;
  let b=0;
  // Compact defense (narrow xSpread) + deep defensive line = bonus
  if(defSpread.xSpread<45&&(tac.defensivLinie??2)<=2)b+=1.5;
  // Very wide attack vs normal defense = more space
  if(mySpread.xSpread>75&&(tac.breite??2)>=3)b+=1;
  // Incoherence: attacking very wide but defending very narrow
  if(mySpread.xSpread>70&&defSpread.xSpread<40)b-=1;
  return clamp(b,-3,3);
}

/* ============================================================
   MATCH ENGINE (Poisson xG)
   ============================================================ */
function calcTeamStrength(team,formation,useRoles=true){
  const weights={GK:1.2,CB:1.0,LB:0.9,RB:0.9,CDM:1.1,CM:1.0,CAM:1.0,LW:0.95,RW:0.95,ST:1.05};
  const slots=FORMATIONS[formation];
  let sum=0,wSum=0;
  for(const slot of slots){
    const p=team[slot.id];if(!p)continue;
    const w=weights[slot.pos]||1.0;
    const penalty=posPenalty(getPosRelation(p.pos,slot.pos));
    sum+=(p.rating-penalty)*w;wSum+=w;
  }
  return wSum?sum/wSum:0;
}
function simulateMatch(){
  const myStr=calcTeamStrength(state.team,state.formation);
  const oppStr=calcTeamStrength(state.opponent.team,state.opponent.formation);
  const ratingDiff=myStr-oppStr;
  const myEdge=tacticEdge(state.tactics,state.opponent.tactics);
  const oppEdge=tacticEdge(state.opponent.tactics,state.tactics);
  const tacticNet=myEdge-oppEdge;

  // Prio: Taktik (1.0 pt) > Stärke (0.95 pt) > Spielerrollen > Glück
  // +20 Taktik wird erst durch 21+ Punkte Ratingvorteil ausgeglichen
  const roleSynergy=calcRoleSynergy(state.team,state.formation,state.roles);
  // Formation spread: wenn Spieler manuell enger gestellt = kompaktere Verteidigung
  const mySpread=calcFormationSpread(state.customPosMit,state.formation);
  const defSpread=calcFormationSpread(state.customPosOhne,state.defFormation);
  const spreadBonus=calcSpreadBonus(mySpread,defSpread,state.tactics);
  const combinedAdv=tacticNet+ratingDiff*0.95+roleSynergy+spreadBonus;

  // Luck: nur relevant wenn Spiel sehr ausgeglichen (|adv| < 8)
  const luckScale=Math.max(0,1-Math.abs(combinedAdv)/8);
  const luck=randFloat(-3,3)*luckScale;

  // Intensität & Ermüdungseffekt (nach Minute 60)
  const myIntensity=calcIntensity(state.tactics);
  const benchPlayers=state.bench?state.bench.filter(b=>b.player).map(b=>b.player):[];
  const benchAvg=benchPlayers.length>0?benchPlayers.reduce((s,p)=>s+p.rating,0)/benchPlayers.length:60;
  const benchRelief=clamp((benchAvg-58)/30,0,1);  // 0-1: gute Bank reduziert Intensitätskosten
  // Exponentiell: erst ab ~60% spürbar, bei 90%+ deutlich, nie katastrophal
  // Bei 60%: ~3% xG-Verlust | 75%: ~9% | 85%: ~14% | 95%: ~20% | 100%: ~25%
  const fatigueFactor=myIntensity>=55?Math.pow(Math.max(0,myIntensity-55)/45,1.4)*0.25:0;
  const fatigue=clamp(fatigueFactor*(1-benchRelief*0.4),0,0.25);
  // Opponent fatigue
  const oppIntensity=calcIntensity(state.opponent.tactics);
  const oppFatigue=clamp(oppIntensity>=55?Math.pow(Math.max(0,oppIntensity-55)/45,1.4)*0.25:0,0,0.25);

  // xG — skaliert am kombinierten Vorteil
  const norm=combinedAdv/10;
  let myXG=1.25+norm*0.52+luck*0.1;
  let oppXG=1.25-norm*0.52-luck*0.1;
  // Fatigue: reduziert xG direkt (exponentiell, erst ab ~60% spürbar)
  myXG*=(1-fatigue);
  oppXG*=(1-oppFatigue);
  myXG=clamp(myXG,0.1,3.2);
  oppXG=clamp(oppXG,0.1,3.2);
  const myGoals=Math.min(6,Math.max(Math.floor(myXG/1.55),poisson(myXG)));
  const oppGoals=Math.min(6,Math.max(Math.floor(oppXG/1.55),poisson(oppXG)));
  const draw=myGoals===oppGoals;
  return {won:myGoals>oppGoals,draw,myGoals,oppGoals,myXG,oppXG,ratingDiff,myEdge,oppEdge,tacticNet,luck,myStr,oppStr,combinedAdv,myIntensity,fatigue};
}


/* ============================================================
   PENALTY SHOOTOUT
   ============================================================ */
function simulatePenalties(){
  const myPlayers=Object.values(state.team).filter(Boolean).sort((a,b)=>b.rating-a.rating).slice(0,5);
  const oppPlayers=Object.values(state.opponent.team).filter(Boolean).sort((a,b)=>b.rating-a.rating).slice(0,5);
  const myGK=Object.values(state.team).find(p=>p.pos==='GK');
  const oppGK=Object.values(state.opponent.team).find(p=>p.pos==='GK');
  let myPens=0,oppPens=0;const events=[];
  // My team shoots vs opp GK
  for(const p of myPlayers){
    const gkR=oppGK?oppGK.rating:70;
    const diff=p.rating-gkR;
    const chance=clamp(0.62+diff*0.007+randFloat(-0.1,0.1),0.28,0.93);
    const scored=Math.random()<chance;
    if(scored)myPens++;
    events.push({team:'home',name:shortName(p.name),scored});
  }
  // Opp shoots vs my GK
  for(const p of oppPlayers){
    const gkR=myGK?myGK.rating:70;
    const diff=p.rating-gkR;
    const chance=clamp(0.62+diff*0.007+randFloat(-0.1,0.1),0.28,0.93);
    const scored=Math.random()<chance;
    if(scored)oppPens++;
    events.push({team:'away',name:shortName(p.name),scored});
  }
  // Sudden death if tied
  if(myPens===oppPens){
    const myBest=myPlayers[0]?.rating||70;
    const oppBest=oppPlayers[0]?.rating||70;
    const myWins=Math.random()<clamp(0.5+(myBest-oppBest)*0.02,0.25,0.75);
    return{myPens:myPens+(myWins?1:0),oppPens:oppPens+(myWins?0:1),events,sudden:true};
  }
  return{myPens,oppPens,events,sudden:false};
}
/* ============================================================
   POTENTIAL / AGING
   ============================================================ */
function progressPlayers(){
  const out=[];
  const all=[];
  for(const sid in state.team)all.push({where:'team',sid,player:state.team[sid]});
  state.bench.forEach((b,i)=>{if(b.player)all.push({where:'bench',sid:i,player:b.player})});
  for(const e of all){
    const p=e.player;if(!p)continue;
    const r=Math.random();
    let dir=0;
    // ── Jugend-Entwicklung ────────────────────────────────────────────
    if(p.age<=19){
      if(r<0.15)dir=2;           // 15% → +2
      else if(r<0.90)dir=1;      // 75% → +1  (90% total für +1)
    } else if(p.age<=21){
      if(r<0.05)dir=2;           // 5% → +2
      else if(r<0.70)dir=1;      // 65% → +1  (70% total für +1)
    } else if(p.age<=23){
      if(r<0.30)dir=1;           // 30% → +1
    } else if(p.age<=25){
      if(r<0.10)dir=1;           // 10% → +1
    }
    // ── Alters-Abbau ─────────────────────────────────────────────────
    else if(p.age>35){
      if(r<0.30)dir=-2;          // 30% → -2
      else if(r<0.90)dir=-1;     // 60% → -1  (90% total für -1)
    } else if(p.age>33){
      if(r<0.10)dir=-2;          // 10% → -2
      else if(r<0.70)dir=-1;     // 60% → -1  (70% total für -1)
    } else if(p.age>30){
      if(r<0.20)dir=-1;          // 20% → -1
    }
    if(dir!==0){
      const old=p.rating;
      p.rating=clamp(p.rating+dir,30,99);
      if(p.rating!==old){
        p.rarity=ratingToRarity(p.rating);
        out.push({name:p.name,from:old,to:p.rating,age:p.age,dir});
      }
    }
  }
  return out;
}

function rebuildTeamForFormation(){
  const slots=FORMATIONS[state.formation];
  const oldPlayers=Object.entries(state.team).filter(([,p])=>p).map(([id,p])=>({p,oldId:id}));
  const lockedById=new Set(oldPlayers.filter(({oldId})=>state.lockedSlots.has(oldId)).map(({p})=>p.id));
  const used=new Set();const newTeam={};const newLocked=new Set();
  // Pass 1: exact position match
  for(const slot of slots){
    const m=oldPlayers.find(({p,oldId})=>!used.has(p.id)&&p.pos===slot.pos);
    if(m){newTeam[slot.id]=m.p;used.add(m.p.id);if(lockedById.has(m.p.id))newLocked.add(slot.id)}
  }
  // Pass 2: natural/alt position match
  for(const slot of slots){
    if(newTeam[slot.id])continue;
    const m=oldPlayers.find(({p})=>!used.has(p.id)&&isNaturalFor(p.pos,slot.pos));
    if(m){newTeam[slot.id]=m.p;used.add(m.p.id);if(lockedById.has(m.p.id))newLocked.add(slot.id)}
  }
  // Pass 3: preserve ALL remaining players — put in any empty slot
  for(const slot of slots){
    if(newTeam[slot.id])continue;
    const m=oldPlayers.find(({p})=>!used.has(p.id));
    if(m){newTeam[slot.id]=m.p;used.add(m.p.id);if(lockedById.has(m.p.id))newLocked.add(slot.id)}
  }
  state.team=newTeam;state.lockedSlots=newLocked;
}
function compatPos(a,b){if(a===b)return true;const g={CB:['CB'],LB:['LB','RB'],RB:['RB','LB'],CDM:['CDM','CM'],CM:['CM','CDM','CAM'],CAM:['CAM','CM'],LW:['LW','RW'],RW:['RW','LW'],ST:['ST','CAM'],GK:['GK']};return (g[a]||[a]).includes(b)}
function buildDefTeam(defFormation){
  // Map current state.team players to slots of the defensive formation by position
  const defSlots=FORMATIONS[defFormation];
  const players=Object.values(state.team).filter(Boolean);
  const used=new Set();const result={};
  // Pass 1: exact pos
  for(const slot of defSlots){const m=players.find(p=>!used.has(p.name)&&p.pos===slot.pos);if(m){result[slot.id]=m;used.add(m.name);}}
  // Pass 2: natural alt
  for(const slot of defSlots){if(result[slot.id])continue;const m=players.find(p=>!used.has(p.name)&&isNaturalFor(p.pos,slot.pos));if(m){result[slot.id]=m;used.add(m.name);}}
  // Pass 3: any remaining
  for(const slot of defSlots){if(result[slot.id])continue;const m=players.find(p=>!used.has(p.name));if(m){result[slot.id]=m;used.add(m.name);}}
  return result;
}

function enableSwapDrag(node,key){
  node.draggable=true;
  node.addEventListener('dragstart',e=>{
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',key);
    node.classList.add('dragging');
    node._dragMoved=true;
  });
  node.addEventListener('dragend',()=>{node.classList.remove('dragging');setTimeout(()=>{node._dragMoved=false},50)});
  node.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';node.classList.add('drag-over')});
  node.addEventListener('dragleave',()=>node.classList.remove('drag-over'));
  node.addEventListener('drop',e=>{
    e.preventDefault();node.classList.remove('drag-over');
    const fromKey=e.dataTransfer.getData('text/plain');
    if(fromKey&&fromKey!==key){doSwap(fromKey,key)}
  });
}
function getPlayerAt(key){if(key.startsWith('slot:'))return state.team[key.slice(5)];const i=Number(key.slice(6));return state.bench[i].player}
