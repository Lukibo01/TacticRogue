// ── Lineup: 3D pitch area (right column) ─────────────────────
function buildLineupPitchArea(slots){
  const layer=el('div',{class:'lineup-players-flat'});
  for(const slot of slots){
    const p=state.team[slot.id];
    const locked=state.lockedSlots.has(slot.id);
    const posRel=p?getPosRelation(p.pos,slot.pos):'main';
    const ty=100-slot.y,px=perspX(slot.x,ty);
    const slotEl=el('div',{class:`lineup-slot ${p?p.rarity:'empty'}`,style:{left:`${px.toFixed(1)}%`,top:`${ty}%`,zIndex:String(~~ty)},dataset:{slotId:slot.id}});
    slotEl.appendChild(el('div',{class:'lineup-slot-card-wrap'},[
      el('div',{class:'lineup-slot-shadow'}),
      p?buildSlotToken(p,posRel):buildLineupEmptySlot(slot.pos),
      p?el('span',{class:'lineup-slot-name'},[shortName(p.name)]):null,
      p?el('span',{class:`lineup-slot-pos-chip pos-${posRel}`},[slot.pos]):null,
    ]));
    slotEl.addEventListener('click',e=>{if(slotEl._dragMoved){slotEl._dragMoved=false;return;}if(!p&&!locked)startDraft('slot:'+slot.id);});
    if(p) enableSwapDrag(slotEl,'slot:'+slot.id);
    layer.appendChild(slotEl);
  }
  const perspWrap=el('div',{class:'lineup-persp-wrap'});
  perspWrap.append(el('div',{class:'lineup-pitch-3d'},[lineupPitchSVG()]),layer);
  const pitchArea=el('div',{class:'lup-pitch-area'});
  pitchArea.appendChild(perspWrap);
  return pitchArea;
}

function renderLineup(main){
  // 0 = scroll to top on first entry; saved value on re-entry
  const prevScrollTop=window._savedLupScroll??0;
  const slots=FORMATIONS[state.formation];
  const starterFilled=Object.keys(state.team).length;
  const benchFilled=state.bench.filter(b=>b.player).length;
  const unavailInXI=Object.values(state.team).filter(p=>p&&p._unavailable);
  const canGoToTactics=(starterFilled+benchFilled)===(slots.length+state.bench.length)&&unavailInXI.length===0;

  const phase=el('div',{class:'lup-phase'});
  phase.appendChild(buildLineupTopbar(slots,starterFilled,benchFilled,teamAvg(state.team,state.formation),canGoToTactics));

  const mainRow=el('div',{class:'lup-main-row'});
  if(unavailInXI.length>0){
    mainRow.appendChild(el('div',{class:'unavail-banner',style:{position:'absolute',top:'14px',left:'50%',transform:'translateX(-50%)',zIndex:'35',width:'auto',maxWidth:'480px',whiteSpace:'nowrap',marginBottom:'0'}},[
      el('div',{class:'unavail-banner-icon'},['!']),
      el('div',{class:'unavail-banner-text'},[el('strong',{},[unavailInXI.map(p=>p.name).join(', ')]),el('span',{},['  —  auf die Bank tauschen'])]),
    ]));
  }
  // Pitch wrapped in scroll container (mobile landscape: scroll up to see full pitch)
  const pitchInner=el('div',{class:'lup-pitch-inner'},[buildLineupPitchArea(slots)]);
  const pitchScroll=el('div',{class:'lup-pitch-scroll'},[pitchInner]);
  mainRow.appendChild(pitchScroll);
  // Reference kept for synchronous scroll-position restore below
  phase.appendChild(mainRow);
  // Bench as direct child of phase — stays fixed outside scroll flow
  const benchPanel=buildLineupBenchPanel(benchFilled);
  // Inline style guarantees bench position regardless of CSS cascade
  if(window.matchMedia('(max-width:1024px) and (orientation:landscape) and (pointer:coarse)').matches)
    benchPanel.style.setProperty('top','50px','important');
  phase.appendChild(benchPanel);
  main.appendChild(phase);
  // Set scroll synchronously (forced reflow ensures height is computed → no flash)
  pitchScroll.getBoundingClientRect();
  pitchScroll.scrollTop=prevScrollTop;
  // rAF backup for Safari
  requestAnimationFrame(()=>{if(pitchScroll.scrollTop!==prevScrollTop)pitchScroll.scrollTop=prevScrollTop;});
}

function buildPitch(allowDraft){
  const slots=FORMATIONS[state.formation];
  const frame=el('div',{class:'pitch-frame'},[pitchSVG()]);
  const layer=el('div',{class:'players-layer'});
  for(const slot of slots){
    const p=state.team[slot.id];
    const locked=state.lockedSlots.has(slot.id);
    const cls=`slot ${p?'filled '+p.rarity:'empty'}${locked?' locked':''}`;
    const posRel=p?getPosRelation(p.pos,slot.pos):'main';
    const unavailOverlay=p&&p._unavailable?el('div',{class:'slot-unavail-overlay'},[
      el('div',{class:'slot-unavail-badge'},[p._unavailable==='verletzt'?'VERLETZT':'GESPERRT'])
    ]):null;
    const node=el('div',{class:cls,style:{left:`${slot.x}%`,top:`${100-slot.y}%`},dataset:{slotId:slot.id}},[
      p?buildSlotToken(p,posRel):el('div',{class:'slot-token','data-pos':slot.pos},[]),
      el('div',{class:'slot-label'},[p?shortName(p.name):slot.pos]),
      unavailOverlay,
    ]);
    node.addEventListener('click',e=>{
      if(node._dragMoved){node._dragMoved=false;return}
      // If empty and not locked -> draft
      if(!p&&!locked&&allowDraft){startDraft('slot:'+slot.id);return}
      // If empty and locked -> nothing
    });
    if(!p||!p._unavailable)enableSwapDrag(node,'slot:'+slot.id);
    layer.appendChild(node);
  }
  frame.appendChild(layer);
  return frame;
}
function pitchSVG(){

  const oldLocked=state.lockedSlots;
  const newTeam={};
  const newLocked=new Set();
  const placed=new Set(); // track by object reference

  // Pass 0: locked players — keep slot when ID persists in new formation
  for(const slot of newSlots){
    const p=state.team[slot.id];
    if(p&&oldLocked.has(slot.id)){
      newTeam[slot.id]=p;placed.add(p);newLocked.add(slot.id);
    }
  }

  // Pass 1: same slot ID still exists + position is compatible (stability across back-and-forth)
  for(const slot of newSlots){
    if(newTeam[slot.id])continue;
    const p=state.team[slot.id];
    if(p&&!placed.has(p)&&isNaturalFor(p.pos,slot.pos)){
      newTeam[slot.id]=p;placed.add(p);
    }
  }

  // Remaining unplaced players and empty slots
  const unplaced=Object.values(state.team).filter(p=>p&&!placed.has(p));
  const empty=newSlots.filter(s=>!newTeam[s.id]);

  // Pass 2: exact position match across all empty slots first
  // (ST stays ST, LW stays LW, CB stays CB — never stolen by a different slot)
  for(const slot of empty){
    if(newTeam[slot.id])continue;
    const p=unplaced.find(p=>!placed.has(p)&&p.pos===slot.pos);
    if(p){newTeam[slot.id]=p;placed.add(p);}
  }

  // Pass 3: alt/natural position match (CDM→CM, CM→CDM, LW→CAM, etc.)
  for(const slot of empty){
    if(newTeam[slot.id])continue;
    const p=unplaced.find(p=>!placed.has(p)&&isNaturalFor(p.pos,slot.pos));
    if(p){newTeam[slot.id]=p;placed.add(p);}
  }

  // Pass 4: any remaining player in any remaining slot (foreign — last resort)
  for(const slot of empty){
    if(newTeam[slot.id])continue;
    const p=unplaced.find(p=>!placed.has(p));
    if(p){newTeam[slot.id]=p;placed.add(p);}
  }

  setState({team:newTeam,lockedSlots:newLocked});

}
function compatPos(a,b){if(a===b)return true;const g={CB:['CB'],LB:['LB','RB'],RB:['RB','LB'],CDM:['CDM','CM'],CM:['CM','CDM','CAM'],CAM:['CAM','CM'],LW:['LW','RW'],RW:['RW','LW'],ST:['ST','CAM'],GK:['GK']};return (g[a]||[a]).includes(b)}
function buildDefTeam(defFormation){
  // Map current state.team players to slots of the defensive formation by position
  const defSlots=FORMATIONS[defFormation];
  const players=Object.values(state.team).filter(Boolean);
  const used=new Set();const result={};
  // Pass 1: exact pos
  for(const slot of defSlots){const m=players.find(p=>!used.has(p.name)&&p.pos===slot.pos);if(m){result[slot.id]=m;used.add(m.name);}}
  // Pass 2: natural alt
  for(const slot of defSlots){if(result[slot.id])continue;const m=players.find(p=>!used.has(p.name)&&isNaturalFor(p.pos,slot.pos));if(m){result[slot.id]=m;used.add(m.name);}}
  // Pass 3: any remaining
  for(const slot of defSlots){if(result[slot.id])continue;const m=players.find(p=>!used.has(p.name));if(m){result[slot.id]=m;used.add(m.name);}}
  return result;
}

/* ----- DRAG & DROP SWAP ----- */
function enableSwapDrag(node,key){
  // Store key for Pointer Events drop-target lookup
  node._dragKey=key;

  // ── Desktop: HTML5 Drag & Drop (pointer:fine) ──────────────────────────
  node.draggable=true;
  node.addEventListener('dragstart',e=>{
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',key);
    node.classList.add('dragging');
    node._dragMoved=true;
  });
  node.addEventListener('dragend',()=>{node.classList.remove('dragging');setTimeout(()=>{node._dragMoved=false},50)});
  node.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';node.classList.add('drag-over')});
  node.addEventListener('dragleave',()=>node.classList.remove('drag-over'));
  node.addEventListener('drop',e=>{
    e.preventDefault();node.classList.remove('drag-over');
    const fromKey=e.dataTransfer.getData('text/plain');
    if(fromKey&&fromKey!==key){doSwap(fromKey,key)}
  });

  // ── Touch: Pointer Events (pointer:coarse) ─────────────────────────────
  node.addEventListener('pointerdown',e=>{
    if(!_isCoarse)return;
    e.preventDefault();
    const rect=node.getBoundingClientRect();
    const startX=e.clientX,startY=e.clientY;
    let moved=false,ghost=null,lastDrop=null;

    // Build ghost: a card-sized overlay following the finger
    const token=node.querySelector('.slot-token')||node;
    const tr=token.getBoundingClientRect();
    ghost=document.createElement('div');
    ghost.style.cssText=`position:fixed;z-index:9999;pointer-events:none;
      left:${tr.left}px;top:${tr.top}px;width:${tr.width}px;height:${tr.height}px;
      opacity:.82;transform:scale(1.1);transform-origin:center center;transition:transform .08s;
      border-radius:12px;background:rgba(0,0,0,.18);`;
    const tc=token.cloneNode(true);
    tc.style.cssText='position:absolute;inset:0;transform:none;';
    ghost.appendChild(tc);
    document.body.appendChild(ghost);
    node.style.opacity='.35';

    const clearDrop=()=>{if(lastDrop){lastDrop.classList.remove('drag-over');lastDrop=null;}};

    const onMove=ev=>{
      const dx=ev.clientX-startX,dy=ev.clientY-startY;
      if(!moved&&Math.hypot(dx,dy)>10)moved=true;
      if(!moved)return;
      ghost.style.left=(tr.left+dx)+'px';
      ghost.style.top=(tr.top+dy)+'px';
      // ghost has pointer-events:none → elementFromPoint already skips it; no hide/show needed
      const under=document.elementFromPoint(ev.clientX,ev.clientY);
      let drop=under;
      while(drop&&!drop._dragKey)drop=drop.parentElement;
      clearDrop();
      if(drop&&drop._dragKey&&drop!==node){drop.classList.add('drag-over');lastDrop=drop;}
    };

    const onUp=()=>{
      document.removeEventListener('pointermove',onMove);
      document.removeEventListener('pointerup',onUp);
      ghost.remove();node.style.opacity='';
      if(moved&&lastDrop){const toKey=lastDrop._dragKey;clearDrop();haptic([12,8,18]);doSwap(key,toKey);}
      else clearDrop();
    };

    document.addEventListener('pointermove',onMove,{passive:false});
    document.addEventListener('pointerup',onUp);
  },{passive:false});
}
function getPlayerAt(key){if(key.startsWith('slot:'))return state.team[key.slice(5)];const i=Number(key.slice(6));return state.bench[i].player}
function setPlayerAt(key,player){if(key.startsWith('slot:')){if(player)state.team[key.slice(5)]=player;else delete state.team[key.slice(5)]}else{state.bench[Number(key.slice(6))].player=player}}
function doSwap(fromKey,toKey){
  const a=getPlayerAt(fromKey),b=getPlayerAt(toKey);
  const toIsSlot=toKey.startsWith('slot:');
  const fromIsSlot=fromKey.startsWith('slot:');
  if(toIsSlot&&a&&a._unavailable)return;
  if(fromIsSlot&&b&&b._unavailable)return;
  setPlayerAt(fromKey,b);setPlayerAt(toKey,a);
  // Quick in-place DOM swap avoids full rebuild + scroll jump + flicker
  if(state.phase==='lineup'&&quickLineupSwap(fromKey,toKey))return;
  render();
}
function quickLineupSwap(fromKey,toKey){
  if(!document.querySelector('.lup-phase'))return false;
  const fromOk=fromKey.startsWith('slot:')?refreshPitchSlot(fromKey.slice(5)):refreshBenchSlot(Number(fromKey.slice(6)));
  const toOk=toKey.startsWith('slot:')?refreshPitchSlot(toKey.slice(5)):refreshBenchSlot(Number(toKey.slice(6)));
  if(!fromOk||!toOk)return false;
  // Update avg rating display in topbar
  const avgEl=document.querySelector('.lup-rating');
  if(avgEl)avgEl.textContent=teamAvg(state.team,state.formation).toFixed(1);
  // Update weiter button (disabled state may have changed after swap)
  const slots=FORMATIONS[state.formation];
  const starterFilled=Object.keys(state.team).length;
  const benchFilled=state.bench.filter(b=>b.player).length;
  const unavailInXI=Object.values(state.team).filter(p=>p&&p._unavailable);
  const canNow=(starterFilled+benchFilled)===(slots.length+state.bench.length)&&unavailInXI.length===0;
  const weiterBtn=document.querySelector('.lup-topbar .pill-btn-weiter');
  if(weiterBtn){
    weiterBtn.classList.toggle('disabled',!canNow);
    if(canNow&&!weiterBtn._tacticsListenerAdded){
      weiterBtn.addEventListener('touchend',e=>{e.preventDefault();goToTactics();},{passive:false});
      weiterBtn.addEventListener('click',goToTactics);
      weiterBtn._tacticsListenerAdded=true;
    }
  }
  return true;
}
function refreshPitchSlot(slotId){
  const oldEl=document.querySelector(`[data-slot-id="${slotId}"]`);
  if(!oldEl)return false;
  const slot=FORMATIONS[state.formation].find(s=>s.id===slotId);
  if(!slot)return false;
  const p=state.team[slotId];
  const locked=state.lockedSlots.has(slotId);
  const posRel=p?getPosRelation(p.pos,slot.pos):'main';
  const newEl=el('div',{class:`lineup-slot ${p?p.rarity:'empty'}`,
    style:{left:oldEl.style.left,top:oldEl.style.top,zIndex:oldEl.style.zIndex},
    dataset:{slotId}});
  newEl.appendChild(el('div',{class:'lineup-slot-card-wrap'},[
    el('div',{class:'lineup-slot-shadow'}),
    p?buildSlotToken(p,posRel):buildLineupEmptySlot(slot.pos),
    p?el('span',{class:'lineup-slot-name'},[shortName(p.name)]):null,
    p?el('span',{class:`lineup-slot-pos-chip pos-${posRel}`},[slot.pos]):null,

  if(p)enableSwapDrag(newEl,'slot:'+slotId);
  oldEl.replaceWith(newEl);
  return true;
}
function refreshBenchSlot(i){

// Build a draft pool from the persistent collection (collection mode)
function buildCollectionDraftPool(slotPos,isBench){
  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>resolvePlayerName(p.name)),
    ...state.bench.filter(b=>b.player).map(b=>resolvePlayerName(b.player.name))
  ]);
  // Deduplicate by canonical name, exclude already-placed players
  const seenNames=new Set();
  let pool=state.collection.map(p=>({...p,name:resolvePlayerName(p.name)})).filter(p=>{
    if(taken.has(p.name)||seenNames.has(p.name))return false;
    seenNames.add(p.name);return true;
  });
  if(!isBench){
    // Prefer exact-position players; fill remaining spots with ALT players only if needed
    const exact=pool.filter(p=>p.pos===slotPos);
    const alt=pool.filter(p=>getPosRelation(p.pos,slotPos)==='alt');
    if(exact.length>=5){
      pool=exact; // enough exact matches — no ALT needed
    } else {
      // Fill up to 5: exact first, then ALT, then rest (foreign only if desperate)
      const needed=5-exact.length;
      pool=[...exact,...alt.slice(0,needed)];
      if(pool.length<3){
        // Fall back to any non-foreign if collection too sparse
        pool=pool.concat(pool.filter(p=>getPosRelation(p.pos,slotPos)!=='foreign').slice(0,3-pool.length));
        if(pool.length<3)pool=[...exact,...alt,...pool.filter(p=>!exact.includes(p)&&!alt.includes(p))];
      }
    }
  }
  // Pick cards by first rolling a rarity (same weights as normal mode),
  // then picking a random card of that rarity — 1:1 identical to normal draft.
  const _rlTbl=(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE)[Math.min(state.league,(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE).length-1)];
  const byRar={};
  pool.forEach(p=>{(byRar[p.rarity]=byRar[p.rarity]||[]).push(p);});
  const picked=new Set();const result=[];
  for(let i=0;i<5;i++){
    // Find which rarities still have unpicked cards
    const avail=Object.keys(byRar).filter(r=>byRar[r].some(p=>!picked.has(p.name)));
    if(!avail.length)break;
    // Roll rarity weighted by league table, normalised over available rarities only
    const totalW=avail.reduce((s,r)=>s+((_rlTbl[r]||{}).weight||0),0);
    if(totalW===0)break;
    let rv=Math.random()*totalW;let chosenRar=avail[avail.length-1];
    for(const r of avail){rv-=((_rlTbl[r]||{}).weight||0);if(rv<=0){chosenRar=r;break;}}
    // Pick random card from that rarity bucket
    const bucket=byRar[chosenRar].filter(p=>!picked.has(p.name));
    const chosen=bucket[Math.floor(Math.random()*bucket.length)];
    picked.add(chosen.name);result.push(chosen);
  }
  return result;
}

function startDraft(target){
  const isBench=!target.startsWith('slot:');
  let slotPos=null;
  if(!isBench){const sid=target.slice(5);slotPos=FORMATIONS[state.formation].find(s=>s.id===sid).pos}
  setState({draftCurrent:target});


  // Collection mode: draw from persistent collection
  if(state.collectionMode){
    setState({draftCards:buildCollectionDraftPool(slotPos,isBench)});

    setState({phase:'draft'});render();return;

  }

  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>p.name),
    ...state.bench.filter(b=>b.player).map(b=>b.player.name)
  ]);
  const shown=new Set();
  setState({draftCards:[]});

  let attempts=0;
  while(state.draftCards.length<5&&attempts<120){
    attempts++;
    // Bench: each card gets its own random position; slot: fixed slotPos
    const pos=isBench?pickRand(MAIN_POSITIONS):slotPos;
    const p=generatePlayerForPos(pos);
    if(!p)continue;
    // Lineup slots: exact position match ONLY
    if(!isBench&&p.pos!==slotPos)continue;
    if(!taken.has(p.name)&&!shown.has(p.name)){shown.add(p.name);state.draftCards.push(p)}
  }
  // Safety fill — keep exact position filter, prevent infinite loop
  let sfAttempts=0;
  while(state.draftCards.length<5&&sfAttempts<80){
    sfAttempts++;
    const pos=isBench?pickRand(MAIN_POSITIONS):slotPos;
    const p=generatePlayerForPos(pos);
    if(!p)continue;
    if(!isBench&&p.pos!==slotPos)continue;
    if(!shown.has(p.name)){shown.add(p.name);state.draftCards.push(p);}
  }
  setState({phase:'draft'});render();

}

function spawnSparkles(card,count,colors){
  // Halve particle count on mobile — 64 DOM nodes + Web Animations is measurably slow on mid-range phones
  const n=_isCoarse?Math.ceil(count*0.5):count;
  for(let s=0;s<n;s++){
    const sp=document.createElement('div');
    sp.className='sparkle-particle';
    const angle=Math.random()*2*Math.PI;
    const dist=40+Math.random()*70;
    sp.style.setProperty('--sx',`${Math.cos(angle)*dist}px`);
    sp.style.setProperty('--sy',`${Math.sin(angle)*dist-30}px`);
    sp.style.setProperty('--sd',`${0.5+Math.random()*0.7}s`);
    sp.style.left=`${20+Math.random()*60}%`;
    sp.style.top=`${20+Math.random()*60}%`;
    sp.style.background=colors[Math.floor(Math.random()*colors.length)];
    sp.style.width=sp.style.height=`${4+Math.random()*6}px`;

}

function buildRarityProbBar(tbl,leagueIdx,impossible,boosted){
  const RAR_SHORT={common:'CMN',uncommon:'UNC',rare:'RARE',epic:'EPIC',legendary:'LEG',mythic:'MYTH'};
  // If boosted (Erzrivale event): apply same weight transform as rollRarityBoosted
  let displayTbl=tbl;
  if(boosted){
    const BOOST=['epic','legendary','mythic'];
    let total=0;const boostedWeights={};
    for(const k in tbl){boostedWeights[k]=BOOST.includes(k)?tbl[k].weight*2.5:tbl[k].weight*0.4;total+=boostedWeights[k];}
    displayTbl={};
    for(const k in tbl)displayTbl[k]={weight:Math.round(boostedWeights[k]/total*1000)/10};
  }
  const pills=Object.entries(displayTbl).map(([key,r])=>{
    const pct=r.weight<1?r.weight.toFixed(1)+'%':Math.round(r.weight)+'%';
    return el('div',{class:'draft-prob-item'},[
      el('span',{class:'draft-prob-rar-pct'},[pct]),
      el('span',{class:`draft-prob-pill rp-${key}`},[RAR_SHORT[key]]),
    ]);
  });
  return el('div',{class:'draft-prob-wrap'},[
    boosted?el('span',{class:'draft-prob-lbl boosted'},['Erhöhte Chancen']):null,
    el('div',{class:'draft-prob-pills'},[...pills]),
  ]);
}

// ── Drag-scroll for 6/7 card pick row ────────────────────────────────────────
// Uses pointer events instead of CSS overflow-x:auto so overflow-y stays
// truly visible — no glow clipping at top/bottom.
function setupDraftScroll(track,inner){
  // Add fade overlay divs — separate elements so no compositing isolation on the card row
  track.appendChild(el('div',{class:'draft-scroll-fade-l'}));
  track.appendChild(el('div',{class:'draft-scroll-fade-r'}));

  let scrollX=0,startX=0,velX=0,lastX=0,lastT=0,rafId=null,pDown=false,dragging=false;
  // inner has width:max-content → offsetWidth = natural card-row width
  // visible track area = offsetWidth - 80px (40px padding each side)
  function maxScroll(){return Math.max(0,inner.offsetWidth-(track.offsetWidth-80));}
  function clamp(v){return Math.min(0,Math.max(-maxScroll(),v));}
  function applyScroll(x){scrollX=clamp(x);inner.style.transform=`translateX(${scrollX}px)`;}
  track.addEventListener('pointerdown',e=>{
    cancelAnimationFrame(rafId);
    // Don't setPointerCapture or preventDefault here — that blocks card click events.
    // Capture is set lazily in pointermove once drag threshold is confirmed.
    pDown=true;dragging=false;
    startX=e.clientX-scrollX;lastX=e.clientX;lastT=Date.now();velX=0;
  });
  track.addEventListener('pointermove',e=>{
    if(!pDown)return;
    if(!dragging&&Math.abs(e.clientX-(startX+scrollX))>5){
      // Confirmed drag — capture pointer so pointerup fires on track, not card
      dragging=true;
      track.setPointerCapture(e.pointerId);
    }
    if(!dragging)return;
    const now=Date.now(),dt=now-lastT;
    velX=dt>0?(e.clientX-lastX)/dt*16:0;
    lastX=e.clientX;lastT=now;
    applyScroll(e.clientX-startX);
  });
  const stop=()=>{
    if(!pDown)return;pDown=false;
    if(!dragging)return;dragging=false;
    (function momentum(){
      if(Math.abs(velX)<0.4)return;
      velX*=0.90;applyScroll(scrollX+velX);
      rafId=requestAnimationFrame(momentum);
    })();
  };
  track.addEventListener('pointerup',stop);
  track.addEventListener('pointercancel',stop);
  track.addEventListener('wheel',e=>{
    cancelAnimationFrame(rafId);velX=0;
    // always convert both axes → horizontal scroll (trackpad vertical = horizontal card scroll)
    applyScroll(scrollX-e.deltaX-e.deltaY*0.8);
    e.preventDefault();
  },{passive:false});
}

      ]),

  main.appendChild(phase);
  if(_needsScroll)requestAnimationFrame(()=>setupDraftScroll(_cardsContainer,cardsDiv));

  state.draftCards.forEach((p,idx)=>{

    // Verzögerung zwischen den Karten: legendär am längsten
    const gap=p.rarity==='legendary'?720:p.rarity==='epic'?480:p.rarity==='rare'?300:230;

      playCardRevealSound(p.rarity);
      card.classList.remove('card-hidden');

      if(p.rarity==='epic'){
        setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
      } else if(p.rarity==='legendary'){
        setTimeout(()=>spawnSparkles(card,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
        setTimeout(()=>spawnSparkles(card,14,['#fde047','#fff','#fbbf24']),600);
      } else if(p.rarity==='mythic'){
        setTimeout(()=>spawnSparkles(card,32,['#ef4444','#ff6b6b','#fff','#dc2626','#fca5a5']),80);
        setTimeout(()=>spawnSparkles(card,18,['#ef4444','#fff','#ff6b6b']),500);
        setTimeout(()=>spawnSparkles(card,14,['#dc2626','#fff','#ef4444']),900);
      }
    },cumDelay);
    cumDelay+=gap;

const POS_ICON={GK:'🧤',LV:'🏃',RV:'🏃',IV:'🛡️',CB:'🛡️',LB:'🏃',RB:'🏃',ZDM:'💪',CDM:'💪',ZM:'⚙️',CM:'⚙️',ZOM:'🎯',CAM:'🎯',LM:'⚡',RM:'⚡',LW:'⚡',RW:'⚡',LA:'⚡',RA:'⚡',LF:'🔥',RF:'🔥',ST:'⚽',CF:'⚽'};
const RARITY_STARS={common:'★☆☆☆☆',uncommon:'★★☆☆☆',rare:'★★★☆☆',epic:'★★★★☆',legendary:'★★★★★',mythic:'★★★★★'};
// ── Draft Card Hover — smooth entry lerp, global snap card-to-card ──────────
const CARD_SPARK={common:null,uncommon:'#5ec269',rare:'#6797df',epic:'#b07be5',legendary:'#ffbd58',mythic:'#da4140'};
const CARD_PRATE={common:0,uncommon:0.2,rare:0.5,epic:0.9,legendary:1.5,mythic:2.2};
let _hvrCard=null;
function setupCardHover(card,rarity){
  const sparkC=CARD_SPARK[rarity]||null;
  const pRate=CARD_PRATE[rarity]||0;
  let active=false,leaving=false;
  let mx=0.5,my=0.5,t0=0,enterT=0;
  // Snapshot of exact transform state at the moment the mouse leaves
  let leaveT=0,leaveEaseFrom=1,leaveFloatY=0,leaveRy=0,leaveRx=0;
  let raf=null,spkIv=null;
  // zoom:1.32 is applied via CSS for draft cards — the transform base is always 1
  // (zoom renders at native resolution; no scale() needed in the hover transform)
  function bs(){return 1;}

  function tick(now){
    if(!active&&!leaving)return;
    let ease,floatY,ry,rx;
    if(active){
      const sec=(now-t0)/1000;
      const ep=Math.min(1,(now-enterT)/200);
      ease=ep*ep*(3-2*ep);                    // smoothstep entry
      floatY=Math.cos(sec*1.3*Math.PI)*5;
      ry=(mx-0.5)*2*7;                        // horizontal tilt  ±7°
      rx=(0.5-my)*2*5;                        // vertical tilt    ±5°
    } else {
      // Return: lerp every axis from its captured leave value → 0 over 400ms
      // All axes FROZEN at snapshot — purely uniform decay, no jumping
      const lp=Math.min(1,(now-leaveT)/400);
      const lEase=lp*lp*(3-2*lp);
      ease=leaveEaseFrom*(1-lEase);
      floatY=leaveFloatY;
      ry=leaveRy;
      rx=leaveRx;
      if(lp>=1){
        leaving=false;
        card.style.transform='';
        raf=null;
        return;
      }
    }
    // Include base scale in the transform so draft cards don't visually shrink on hover
    card.style.transform=`perspective(900px) translateY(${((-10+floatY)*ease).toFixed(2)}px) rotateX(${(rx*ease).toFixed(2)}deg) rotateY(${(ry*ease).toFixed(2)}deg) scale(${(bs()*(1+0.04*ease)).toFixed(4)})`;
    raf=requestAnimationFrame(tick);
  }

  function spawnSpark(){
    if(!active||!sparkC)return;
    const s=document.createElement('span');
    const sz=1.5+Math.random()*3;
    s.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;background:${sparkC};pointer-events:none;z-index:10;left:${5+Math.random()*90}%;bottom:${4+Math.random()*18}%`;
    card.appendChild(s);
    s.animate([{opacity:1,transform:'translate(0,0) scale(1)'},{opacity:0,transform:`translate(${(Math.random()*52-26).toFixed(1)}px,${-(25+Math.random()*55).toFixed(1)}px) scale(0)`}],
      {duration:600+Math.random()*400,easing:'ease-out',fill:'forwards'}).finished.then(()=>s.remove());
  }

  card.addEventListener('mouseenter',()=>{
    if(_hvrCard&&_hvrCard!==card){
      // The other card's own leave-RAF handles its smooth return — just clear glow
      _hvrCard.classList.remove('card-hovered');
    }
    _hvrCard=card;
    leaving=false; // cancel in-progress leave so re-entering re-drives entry
    active=true;t0=performance.now();enterT=t0;
    card.style.animation='none'; // freeze card-reveal animation; NEVER reset to ''
    card.style.transition='box-shadow .2s ease';
    card.classList.add('card-hovered');
    if(!raf)raf=requestAnimationFrame(tick);
    if(pRate>0)spkIv=setInterval(spawnSpark,Math.max(70,Math.round(180/pRate)));
  });

  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    mx=(e.clientX-r.left)/r.width;my=(e.clientY-r.top)/r.height;
  });

  card.addEventListener('mouseleave',()=>{
    const now=performance.now();
    const sec=(now-t0)/1000;
    const ep=Math.min(1,(now-enterT)/200);
    // Snapshot the exact transform values right now so the return
    // animation starts from precisely where the card is, not from a reset
    leaveEaseFrom=ep*ep*(3-2*ep);
    leaveFloatY=Math.cos(sec*1.3*Math.PI)*5;  // current float height
    leaveRy=(mx-0.5)*2*7;                      // current horizontal tilt
    leaveRx=(0.5-my)*2*5;                      // current vertical tilt
    active=false;leaving=true;leaveT=now;
    card.classList.remove('card-hovered');
    clearInterval(spkIv);spkIv=null;
    // Leave card.style.animation as 'none' — resetting it to '' would restart
    // the card-reveal animation and cause a brief design flash
    card.style.transition='box-shadow .28s ease';
    if(!raf)raf=requestAnimationFrame(tick);
  });
}
function buildCard(p,onClick,slotPos=null){
  const posRel=slotPos?getPosRelation(p.pos,slotPos):'main';
  const displayRating=p.rating-posPenalty(posRel);
  const stageChip=p.age<=21?el('span',{class:'card-stage-chip wk'},['↑↑ WK']):
                  p.age<=23?el('span',{class:'card-stage-chip pot'},['↑ POT']):
                  p.age>=34?el('span',{class:'card-stage-chip end'},['↓↓ END']):
                  p.age>=31?el('span',{class:'card-stage-chip alt'},['↓ ALT']):null;
  const oopCorner=posRel!=='main'?el('span',{class:`card-oop-corner oop-${posRel}`},[posRel==='alt'?`${p.pos} ALT −2`:`${p.pos} FREMD −7`]):null;
  const card=el('div',{class:`card ${p.rarity}`,onclick:onClick},[
    el('img',{class:'card-svg-bg',src:`assets/playercards/card-${p.rarity}.svg`,alt:''}), // SVG-Hintergrund
    el('span',{class:'card-pos-text'},[p.pos]),                // Pos groß im Band (links)
    el('div',{class:'card-age-nat'},[`${p.age} J. ${p.nat}`]), // Alter·Nat im Band (rechts)
    el('div',{class:'card-name'},[p.name]),                    // Name unter Band
    el('span',{class:'card-flag'},[NAT_FLAG[p.nat]||'🏳️']),   // Flagge Mitte
    el('div',{class:'card-rating'},[String(displayRating)]),   // Rating groß links
    stageChip?el('div',{class:'card-chip-row'},[stageChip]):null, // Stage-Chip unten rechts
    el('div',{class:'card-shim'},[]),                          // Shimmer
    oopCorner,
  ]);
  setupCardHover(card,p.rarity);
  return card;
}
function pickDraftCard(p){
  haptic([8,6,20]);
  if(state.draftCurrent.startsWith('slot:')){const sid=state.draftCurrent.slice(5);state.team[sid]=p;state.lockedSlots.add(sid)}
  else{const i=Number(state.draftCurrent.slice(6));state.bench[i].player=p;state.lockedBench.add(i)}

  setState({draftCurrent:null,draftCards:[],phase:'lineup'});render();

}

function buildTacticLeftPanel(TA,F,TAC_STRUCTURE,TABS,keyMeta,myAvg){
  const leftPanel=el('div',{class:'tac-panel tac-left'});
  const leftInner=el('div',{class:'tac-panel-inner'});

  // ── Header: Intensität (left) + Rating (right) ──────────────
  const pct0=calcIntensity(state.tactics);
  const lvl0=getIntensityLevel(pct0);
  const intensBlock=el('div',{class:'tac-intens-block',style:{marginLeft:'0',flex:'1',marginRight:'14px'}});
  intensBlock.appendChild(el('span',{class:'tac-intens-label'},['Intensität']));
  const intensTrack=el('div',{class:'tac-intens-track'});
  intensTrack.appendChild(el('img',{src:TA+F.intensTrack,alt:''}));
  const intensFill=el('div',{class:'tac-intens-fill',style:{width:`${pct0}%`,background:lvl0.color}});
  intensTrack.appendChild(intensFill);
  intensBlock.appendChild(intensTrack);
  const myRatingBadge=(()=>{const b=el('div',{class:'tac-rating-badge'});b.appendChild(el('span',{class:'tac-rating-badge-val'},[myAvg.toFixed(1)]));return b})();
  const hdr=el('div',{class:'tac-ph'});
  hdr.appendChild(intensBlock);
  hdr.appendChild(el('div',{class:'tac-rating-row'},[el('span',{class:'tac-rating-label'},['Ø Rating']),myRatingBadge]));
  leftInner.appendChild(hdr);

  function updateIntensBlock(){
    const p=calcIntensity(state.tactics);const l=getIntensityLevel(p);
    intensFill.style.width=`${p}%`;intensFill.style.background=l.color;
  }

  // ── Mentalität ───────────────────────────────────────────────
  const mentWrap=el('div',{class:'tac-ment-wrap'});
  const mentBtns=el('div',{class:'tac-ment-btns'});
  TACTIC_LABELS_MENTALITY.forEach((t,i)=>{
    const btn=el('div',{class:`tac-ment-btn${state.tactics.mentality===i?' active':''}`});
    btn.appendChild(el('span',{},[t]));
    btn.addEventListener('click',()=>{
      state.tactics.mentality=i;
      mentBtns.querySelectorAll('.tac-ment-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
      updateIntensBlock();
    });
    mentBtns.appendChild(btn);
  });
  mentWrap.appendChild(mentBtns);
  leftInner.appendChild(mentWrap);

  // ── Tab-Nav: standalone ptab buttons ────────────────────────
  const navWrap=el('div',{class:'tac-nav-ptabs'});
  const tabGroups={};
  TABS.forEach(tab=>{
    const grp=el('div',{class:`tac-tab-content${state._tacTab===tab.id?'':' hidden'}`});
    tabGroups[tab.id]=grp;
    const navBtn=el('button',{class:`tac-ptab${state._tacTab===tab.id?' active':''}`,dataset:{tabid:tab.id}});
    navBtn.textContent=tab.label;
    navBtn.addEventListener('click',()=>{
      setState({_tacTab:tab.id});
      navWrap.querySelectorAll('.tac-ptab').forEach(b=>b.classList.toggle('active',b.dataset.tabid===tab.id));
      Object.entries(tabGroups).forEach(([id,g])=>g.classList.toggle('hidden',id!==tab.id));
    });
    navWrap.appendChild(navBtn);
    for(const sub of (TAC_STRUCTURE[tab.id]||[])){
      const secHead=el('div',{class:'tac-sec-head'});
      secHead.appendChild(el('span',{class:'tac-sec-title'},[sub.label]));
      secHead.appendChild(el('div',{class:'tac-sec-sep'}));
      grp.appendChild(secHead);
      for(const key of sub.keys){
        const meta=keyMeta[key];if(!meta)continue;
        const[label,opts]=meta;
        const val=Number(state.tactics[key]??2);
        const row=el('div',{class:'tac-slide-row'});
        row.appendChild(el('span',{class:'tac-slide-label'},[label]));
        const tw=el('div',{class:'tac-slide-track-wrap'});
        tw.appendChild(el('img',{src:TA+F.sliderTrack,alt:''}));
        const inp=el('input',{type:'range',min:'0',max:String(opts.length-1),step:'0.01',value:String(val)});
        const valEl=el('span',{class:'tac-slide-val'},[opts[val]]);
        const descs=TACTIC_VALUE_DESC[key];
        const descEl=el('div',{class:'tac-slide-desc',style:{fontSize:'10px',color:'rgba(255,255,255,.38)',marginTop:'2px',marginLeft:'2px',lineHeight:'1.3',minHeight:'13px'}},[descs?descs[val]:'']);
        inp.addEventListener('input',()=>{const v=Math.round(Number(inp.value));state.tactics[key]=v;valEl.textContent=opts[v];if(descs)descEl.textContent=descs[v];updateIntensBlock();});
        tw.appendChild(inp);row.appendChild(tw);row.appendChild(valEl);
        grp.appendChild(row);
        if(descs)grp.appendChild(descEl);
      }
    }
    leftInner.appendChild(grp);
  });
  leftInner.appendChild(navWrap);
  // Re-order: nav before tab groups (insert before first grp)
  const firstGrp=leftInner.querySelector('.tac-tab-content');
  if(firstGrp)leftInner.insertBefore(navWrap,firstGrp);

  // ── Save/Load/Reset — pinned to bottom ───────────────────────
  const actRow=el('div',{class:'tac-action-row',style:{marginTop:'16px',paddingTop:'4px'}});
  const saveBtn=el('div',{class:'tac-svg-btn'});
  saveBtn.appendChild(el('img',{src:TA+F.btnSaveLoad,alt:''}));
  saveBtn.appendChild(el('span',{},['Taktik Speichern']));
  saveBtn.addEventListener('click',saveCurrentTactics);
  actRow.appendChild(saveBtn);
  let _loadDrop=null;
  const loadBtn=el('div',{class:'tac-svg-btn'});
  loadBtn.appendChild(el('img',{src:TA+F.btnSaveLoad,alt:''}));
  loadBtn.appendChild(el('span',{},['Taktik Laden']));
  loadBtn.addEventListener('click',e=>{
    e.stopPropagation();
    if(_loadDrop){_loadDrop.remove();_loadDrop=null;return;}
    if(!state.savedTactics||state.savedTactics.length===0)return;
    _loadDrop=el('div',{class:'tac-load-dropdown'});
    state.savedTactics.forEach((s,idx)=>{
      const item=el('div',{class:'tac-load-dropdown-item'});
      item.appendChild(el('span',{class:'item-name'},[s.name]));
      const delBtn=el('span',{class:'tac-load-dropdown-del'},['×']);
      delBtn.addEventListener('click',e=>{e.stopPropagation();deleteSavedTactic(idx);if(_loadDrop){_loadDrop.remove();_loadDrop=null;}});
      item.appendChild(delBtn);
      item.addEventListener('click',()=>{_loadDrop.remove();_loadDrop=null;loadSavedTactic(idx);render();});
      _loadDrop.appendChild(item);
    });
    loadBtn.appendChild(_loadDrop);
    const close=()=>{if(_loadDrop){_loadDrop.remove();_loadDrop=null;}document.removeEventListener('click',close);};
    setTimeout(()=>document.addEventListener('click',close),0);
  });
  actRow.appendChild(loadBtn);
  const rstBtn=el('div',{class:'tac-svg-btn reset'});
  rstBtn.appendChild(el('img',{src:TA+F.btnReset,alt:''}));
  rstBtn.appendChild(el('span',{style:{fontSize:'17px',lineHeight:'1'}},['↺']));
  rstBtn.addEventListener('click',()=>{resetTactics();render();});
  actRow.appendChild(rstBtn);
  leftInner.appendChild(actRow);

  leftPanel.appendChild(leftInner);
  return leftPanel;
}

function buildTacticRightPanel(TA,F,oppAvg){
  const rightPanel=el('div',{class:'tac-panel tac-right'});
  const rightInner=el('div',{class:'tac-panel-inner'});

  // Header: Gegner-Rating

  rightInner.appendChild(oppHdr);

  const t=state.opponent.tactics;
  const g=k=>t[k]??2;

  // Stil-Name
  const STIL_NAMES=[
    {name:'Tiki-Taka',     match:()=>g('aufbau')<=1&&g('tempo')<=1&&g('pressing')>=3},
    {name:'Gegenpressing', match:()=>g('gegenpressing')>=3&&g('pressing')>=4&&g('tempo')>=3},
    {name:'Konter',        match:()=>g('konter')>=3&&g('pressing')<=2&&g('deflinie')<=2},
    {name:'Catenaccio',    match:()=>g('deflinie')<=1&&g('pressing')<=1&&g('konter')>=3},
    {name:'Flügelspiel',   match:()=>g('breite')>=3&&g('aufbau')>=3},
    {name:'Pressingmaschine',match:()=>g('pressing')>=4&&g('deflinie')>=3&&g('gegenpressing')>=3},
    {name:'Direktes Spiel',match:()=>g('aufbau')>=3&&g('tempo')>=3},
    {name:'Tiefer Block',  match:()=>g('pressing')<=1&&g('deflinie')<=1},
  ];
  const stilName=(STIL_NAMES.find(s=>s.match())||{name:'Ausgeglichene Taktik'}).name;
  rightInner.appendChild(el('div',{class:'tac-opp-sec-title',style:{marginTop:'36px',fontSize:'10px'}},[`SPIELSTIL`]));
  rightInner.appendChild(el('div',{style:{fontWeight:'700',fontSize:'14px',color:'#f87171',marginBottom:'6px',letterSpacing:'.3px'}},[stilName]));
  // Style description + counter hint card
  const stilInfo=STYLE_DESCRIPTIONS[stilName]||STYLE_DESCRIPTIONS['Ausgeglichene Taktik'];
  if(stilInfo){
    const stilCard=el('div',{style:{background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.18)',borderRadius:'8px',padding:'8px 10px',marginBottom:'12px',display:'flex',flexDirection:'column',gap:'5px'}});
    stilCard.appendChild(el('div',{style:{fontSize:'10.5px',color:'rgba(255,255,255,.65)',lineHeight:'1.4'}},[stilInfo.desc]));
    stilCard.appendChild(el('div',{style:{fontSize:'10px',color:'#86efac',lineHeight:'1.4',borderTop:'1px solid rgba(255,255,255,.08)',paddingTop:'5px'}},[`💡 ${stilInfo.counter}`]));
    rightInner.appendChild(stilCard);
  }

  // Taktik-Bars: 6 Schlüsselwerte
  const BARS=[
    {key:'pressing',   label:'Anlaufen'},
    {key:'deflinie',   label:'Abwehrlinie'},
    {key:'tempo',      label:'Tempo'},
    {key:'konter',     label:'Konter'},
    {key:'gegenpressing',label:'Gegenpressing'},
    {key:'breite',     label:'Breite'},
  ];
  const barWrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'14px'}});
  BARS.forEach(({key,label})=>{
    const val=g(key); // 0-4
    const pct=val/4*100;
    // Color: red if extreme (0 or 4), orange if committed (1 or 3), dim if neutral
    const col=val===4||val===0?'#f87171':val===3||val===1?'#fb923c':'rgba(255,255,255,.28)';
    const row=el('div',{style:{display:'flex',alignItems:'center',gap:'8px'}});
    row.appendChild(el('div',{style:{width:'86px',fontSize:'10.5px',color:'rgba(255,255,255,.55)',flexShrink:'0',fontWeight:'500'}},[label]));
    const track=el('div',{style:{flex:'1',height:'5px',borderRadius:'3px',background:'rgba(255,255,255,.1)',overflow:'hidden'}});
    const fill=el('div',{style:{height:'100%',width:pct+'%',background:col,borderRadius:'3px',transition:'width .3s'}});
    track.appendChild(fill);
    row.appendChild(track);
    barWrap.appendChild(row);
  });
  rightInner.appendChild(barWrap);

  // Kurze Hinweise — was macht der Gegner?
  const notices=[];
  if(g('pressing')>=4) notices.push({txt:'Presst extrem früh — dein Aufbau steht sofort unter Druck.',col:'#f87171'});
  else if(g('pressing')>=3) notices.push({txt:'Hohes Anlaufen — wenig Zeit und Platz im Aufbau.',col:'#fb923c'});
  if(g('pressing')<=1&&g('deflinie')<=1) notices.push({txt:'Steht tief und kompakt — schwer zu knacken.',col:'#60a5fa'});
  if(g('konter')>=3&&g('tempo')>=3) notices.push({txt:'Schaltet blitzschnell um — Räume in der Tiefe entstehen.',col:'#f87171'});
  if(g('deflinie')>=3) notices.push({txt:'Hohe Abwehrlinie — Raum hinter der Kette vorhanden.',col:'#fb923c'});
  if(g('gegenpressing')>=3) notices.push({txt:'Gewinnt den Ball sofort zurück — Ballverluste sind gefährlich.',col:'#fb923c'});
  if(g('breite')>=3&&g('defform')<=2) notices.push({txt:'Breites Angriffsspiel — deine Defensivformation entscheidet, ob die Flanken offen bleiben.',col:'rgba(255,255,255,.6)'});
  if(g('mentality')>=4) notices.push({txt:'Spielt sehr offensiv — lässt Räume im Rücken.',col:'#fb923c'});
  if(g('aufbau')<=1&&g('tempo')<=1) notices.push({txt:'Kurzes langsames Aufbauspiel — empfindlich gegen frühen Druck.',col:'#60a5fa'});
  const shown=notices.slice(0,3);
  if(shown.length){
    const noticeWrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'5px',marginBottom:'12px'}});
    shown.forEach(n=>{
      const chip=el('div',{style:{
        fontSize:'11px',lineHeight:'1.4',padding:'5px 8px',borderRadius:'6px',

        color:'rgba(255,255,255,.75)',
      }},[n.txt]);
      noticeWrap.appendChild(chip);
    });
    rightInner.appendChild(noticeWrap);
  }

  // Taktische Implikationen — was bedeutet das für MEINE Taktik?
  const impls=[];
  // Pressing-Implikationen
  if(g('pressing')>=4&&g('aufbau')<=1) impls.push('Hochpressing + kurzer Aufbau: Jeder Ballverlust im Aufbau öffnet sofort Lücken — für beide Seiten.');
  if(g('pressing')>=3) impls.push('Hohes Anlaufen lässt Räume hinter der eigenen Kette offen — schnelles Umschalten könnte diese Räume nutzen.');
  if(g('pressing')<=1) impls.push('Tiefes Stehen gibt dir Aufbaufreiheit — aber die Lücken müssen aktiv gesucht werden.');
  // Deflinie-Implikationen
  if(g('deflinie')>=4) impls.push('Extreme Abwehrlinie: viel Raum hinter der Kette — wie du dorthin kommst, ist entscheidend.');
  else if(g('deflinie')>=3) impls.push('Hohe Kette: der Raum hinter der Abwehr ist vorhanden, solange du schnell umschaltest.');
  if(g('deflinie')<=1&&g('konter')>=3) impls.push('Tiefer Block + Konter: Ballgewinne werden sofort gefährlich. Dein Aufbau bestimmt das Risiko.');
  // Defform/Breite-Implikationen
  if(g('defform')>=3&&g('breite')<=1) impls.push('Enge Defensive + kein Flügelspiel: das Zentrum ist dicht — breites Spiel könnte die Flanken öffnen.');
  if(g('defform')<=1&&g('aufbau')>=3) impls.push('Breite Defensive mit langem Aufbau: Flügelzonen können ausgenutzt werden, aber Zentralläufe gehen durch.');
  if(g('breite')>=3&&g('defform')>=3) impls.push('Breiter Angriff gegen breite Defensive — beide Seiten wollen die Außenbahnen. Deckung und Defform werden zum Schlüssel.');
  // Gegenpressing-Implikationen
  if(g('gegenpressing')>=3&&g('aufbau')<=1) impls.push('Sofortiges Gegenpressing + kurzer Aufbau: ein gewonnener Ball wird blitzartig genutzt — Ballverluste sehr kostspielig.');
  if(g('gegenpressing')>=3&&g('aufbau')>=3) impls.push('Gegenpressing trotz langem Aufbau: nach Ballgewinn sofort gefährlich, aber selbst angreifbar beim langen Aufbau.');
  // Konter-Implikationen
  if(g('konter')>=4&&g('deflinie')<=1) impls.push('Extremer Konter aus tiefer Stellung: Ballverluste im Aufbau werden umgehend bestraft.');
  if(g('konter')>=3&&g('deflinie')>=3) impls.push('Konter trotz hoher Linie: riskantes System — verwundbar bei schnellen Gegenzügen, aber gefährlich beim Umschalten.');
  // Mentality
  if(g('mentality')>=4&&g('pressing')<=2) impls.push('Sehr offensiv ohne hohes Pressing: offensive Lücken entstehen — defensive Stabilität deinerseits ist eine Waffe.');
  if(g('mentality')<=0&&g('konter')>=3) impls.push('Rein defensiv mit Konter: geduldig aufbauen ist riskant — das Tempo des Gegners entscheidet.');

  const shownImpl=impls.slice(0,2);
  if(shownImpl.length){
    rightInner.appendChild(el('div',{style:{fontSize:'9.5px',fontWeight:'600',color:'rgba(255,255,255,.35)',letterSpacing:'1px',marginBottom:'5px',textTransform:'uppercase'}},[`Was bedeutet das?`]));
    const implWrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'5px'}});
    shownImpl.forEach(txt=>{
      implWrap.appendChild(el('div',{style:{
        fontSize:'11px',lineHeight:'1.4',padding:'5px 8px',borderRadius:'6px',
        background:'rgba(255,255,255,.03)',borderLeft:'3px solid rgba(255,255,255,.18)',
        color:'rgba(255,255,255,.60)',fontStyle:'italic',
      }},[txt]));
    });
    rightInner.appendChild(implWrap);
  }

  rightPanel.appendChild(rightInner);
  return rightPanel;
}

      // Desktop: beide Panels nebeneinander, keine Tab-Leiste nötig

  phase.appendChild(layout);
  main.appendChild(phase);

const MINI_PITCH_SVG=`<rect x="2" y="2" width="96" height="136" fill="none" stroke="rgba(255,255,255,.52)" stroke-width=".45"/><line x1="2" y1="70" x2="98" y2="70" stroke="rgba(255,255,255,.48)" stroke-width=".4"/><circle cx="50" cy="70" r="10" fill="none" stroke="rgba(255,255,255,.48)" stroke-width=".4"/><rect x="26" y="2" width="48" height="22" fill="none" stroke="rgba(255,255,255,.42)" stroke-width=".38"/><rect x="26" y="116" width="48" height="22" fill="none" stroke="rgba(255,255,255,.42)" stroke-width=".38"/><path d="M40,24 A12.2,12.2 0 0,0 60,24" fill="none" stroke="rgba(255,255,255,.38)" stroke-width=".36"/><path d="M40,116 A12.2,12.2 0 0,1 60,116" fill="none" stroke="rgba(255,255,255,.38)" stroke-width=".36"/>`;
function buildMiniPitch(formation,team,type,interactive,role){
  // Legacy wrapper — used in lineup phase (no free-drag, swap only)
  const slots=FORMATIONS[formation];
  const frame=el('div',{class:'mini-pitch'});
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 140');svg.setAttribute('preserveAspectRatio','none');
  svg.innerHTML=MINI_PITCH_SVG;
  frame.appendChild(svg);
  for(const slot of slots){
    const p=team[slot.id];
    const rawY2=100-slot.y;
    const posShift2=slot.pos==='GK'?-5:['CB','LB','RB'].includes(slot.pos)?-9:-6;
    const clampedY=Math.min(Math.max(rawY2+posShift2,5),92);
    const dot=el('div',{class:'pitch-dot away'},[slot.pos.slice(0,3)]);
    const node=el('div',{class:'mini-slot',style:{left:`${slot.x}%`,top:`${clampedY}%`,cursor:interactive?'pointer':'default'},dataset:{slotId:slot.id}});
    node.appendChild(dot);
    if(interactive){
      enableSwapDrag(node,'slot:'+slot.id);
    }
    frame.appendChild(node);
  }
  return frame;
}
function buildFreePitch(formation,team,type,pitchKey,customPos,onClickPlayer){
  // Simplified tactics pitch — circle dots only, no drag, no names/ratings
  const slots=FORMATIONS[formation];
  const frame=el('div',{class:'mini-pitch',dataset:{pitchkey:pitchKey}});
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 140');svg.setAttribute('preserveAspectRatio','none');
  svg.innerHTML=MINI_PITCH_SVG;
  frame.appendChild(svg);
  for(const slot of slots){
    const p=team[slot.id];
    const code=slot.pos.slice(0,3);
    const rar=p?p.rarity:'empty';
    // Clamp y so dots don't overflow pitch edge
    const rawY=100-slot.y;
    const posShift=slot.pos==='GK'?-5:['CB','LB','RB'].includes(slot.pos)?-9:-6;
    const clampedY=Math.min(Math.max(rawY+posShift,5),92);
    const dot=el('div',{class:`pitch-dot ${rar}`},[code]);
    const clickable=(pitchKey==='mit'||pitchKey==='ohne')&&p&&onClickPlayer;
    const node=el('div',{class:'mini-slot',style:{left:`${slot.x}%`,top:`${clampedY}%`,cursor:clickable?'pointer':'default'}});
    node.appendChild(dot);
    if(clickable){
      node.addEventListener('click',()=>onClickPlayer(slot.id,p));
    }
    frame.appendChild(node);
  }
  return frame;
}
function buildTacticEditor(){
  // Subcategory structure for each tab
  const TAC_STRUCTURE={
    angriff:[
      {label:'Aufbau & Tempo',keys:['aufbau','tempo']},
      {label:'Sturm',keys:['breite','kreativ']},
    ],
    umschalten:[
      {label:'Nach Ballverlust',keys:['gegenpressing']},
      {label:'Nach Ballgewinn',keys:['konter']},
    ],
    abwehr:[
      {label:'Pressing',keys:['pressing','deflinie']},
      {label:'Verteidigung',keys:['deckung','defform']},
    ],
  };
  // Flat map of key → [label, opts] from TACTIC_PHASES
  const keyMeta={};
  for(const ph of TACTIC_PHASES){for(const[k,lbl,opts] of ph.params)keyMeta[k]=[lbl,opts];}

  const TABS=[{id:'angriff',label:'Angriff'},{id:'umschalten',label:'Umschalten'},{id:'abwehr',label:'Abwehr'}];
  if(!state._tacTab||!TABS.find(t=>t.id===state._tacTab))setState({_tacTab:'angriff'});
  const wrap=el('div',{class:'tac-editor'});

  // --- Intensitätsleiste ---
  function buildIntensBar(){
    const pct=calcIntensity(state.tactics);
    const lvl=getIntensityLevel(pct);
    const warn=pct>=65?'⚠ Leistungsabfall nach Minute 60 möglich':'Spieler halten Leistung bis Abpfiff';
    return el('div',{class:'intens-wrap'},[
      el('div',{class:'intens-header'},[
        el('span',{class:'intens-lbl'},['Intensität']),
        el('span',{class:'intens-val',style:{color:lvl.color}},[`${lvl.label} · ${pct}%`])
      ]),
      el('div',{class:'intens-track'},[el('div',{class:'intens-fill',style:{width:`${pct}%`,background:lvl.color}})]),
      el('div',{class:'intens-hint'},[warn])
    ]);
  }
  function updateIntensBar(container){
    const old=container.querySelector('.intens-wrap');
    if(old){const neu=buildIntensBar();container.insertBefore(neu,old);old.remove();}
  }
  const intensEl=buildIntensBar();
  wrap.appendChild(intensEl);

  // --- Mentalität ---
  const mPhase=el('div',{class:'tac-phase'},[
    el('div',{class:'tac-phase-title'},['Mentalität']),
    (()=>{const m=el('div',{class:'mentality-picker'});TACTIC_LABELS_MENTALITY.forEach((t,i)=>{const b=el('button',{class:state.tactics.mentality===i?'active':''},[t]);b.addEventListener('click',()=>{state.tactics.mentality=i;m.querySelectorAll('button').forEach((x,j)=>x.classList.toggle('active',j===i));updateIntensBar(wrap)});m.appendChild(b)});return m})()
  ]);
  wrap.appendChild(mPhase);

  // --- 3-Tab Navigation ---
  const tabNav=el('div',{class:'tac-tabs3'});
  const groups={};
  TABS.forEach(tab=>{
    const btn=el('button',{class:`tac-tab3 ${state._tacTab===tab.id?'active':''}`,dataset:{tabid:tab.id}},[tab.label]);
    const grp=el('div',{class:'tac-phase-group',style:{display:state._tacTab===tab.id?'flex':'none',flexDirection:'column',gap:'0'}});
    groups[tab.id]=grp;
    btn.addEventListener('click',()=>{
      setState({_tacTab:tab.id});

      tabNav.querySelectorAll('.tac-tab3').forEach(b=>b.classList.toggle('active',b.dataset.tabid===tab.id));
      Object.entries(groups).forEach(([id,g])=>{g.style.display=id===tab.id?'flex':'none'});
    });
    tabNav.appendChild(btn);
  });
  wrap.appendChild(tabNav);

  // --- Render sliders with subcategories ---
  for(const tab of TABS){
    const colorCls=tab.id==='defense'?'noball-phase':'ball-phase';
    const grp=groups[tab.id];
    for(const sub of (TAC_STRUCTURE[tab.id]||[])){
      const subcatEl=el('div',{class:'tac-subcat'},[sub.label]);
      grp.appendChild(subcatEl);
      const subDiv=el('div',{class:`tac-phase ${colorCls}`,style:{marginBottom:'4px'}});
      for(const key of sub.keys){
        const meta=keyMeta[key];if(!meta)continue;
        const[label,opts]=meta;
        const row=el('div',{class:'tac-row'});
        row.appendChild(el('div',{class:'label'},[label]));
        const val=Number(state.tactics[key]??2);
        const inp=el('input',{type:'range',min:'0',max:String(opts.length-1),step:'0.01',value:String(val)});
        const valEl=el('div',{class:'value'},[opts[val]]);
        inp.addEventListener('input',()=>{const v=Math.round(Number(inp.value));state.tactics[key]=v;valEl.textContent=opts[v];updateIntensBar(wrap)});
        row.appendChild(inp);row.appendChild(valEl);
        subDiv.appendChild(row);
      }
      grp.appendChild(subDiv);
    }
  }
  Object.values(groups).forEach(g=>wrap.appendChild(g));

  // --- Save / Reset ---
  const actRow=el('div',{class:'tac-actions',style:{display:'flex',gap:'8px',marginTop:'12px',flexWrap:'wrap'}});
  actRow.appendChild(el('button',{class:'btn',style:{flex:'1',fontSize:'13px',padding:'10px 14px',fontWeight:'700'},onclick:saveCurrentTactics},['Taktik speichern']));
  actRow.appendChild(el('button',{class:'btn',style:{flex:'1',fontSize:'13px',padding:'10px 14px',fontWeight:'700'},onclick:resetTactics},['Zurücksetzen']));
  wrap.appendChild(actRow);

  // --- Saved Tactics: minimal chip strip at very bottom ---
  if(state.savedTactics&&state.savedTactics.length>0){
    const savedSec=el('div',{class:'tac-phase',style:{marginTop:'6px'}});
    savedSec.appendChild(el('div',{class:'tac-phase-title',style:{fontSize:'10px',marginBottom:'4px'}},['Gespeichert']));
    const strip=el('div',{class:'saved-tac-strip'});
    for(let idx=0;idx<state.savedTactics.length;idx++){
      const s=state.savedTactics[idx];
      const chip=el('div',{class:'saved-tac-chip'});
      chip.appendChild(el('span',{class:'chip-name'},[s.name]));
      chip.appendChild(el('span',{class:'chip-form'},[s.formation||'']));
      chip.appendChild(el('button',{class:'chip-del',onclick:(e)=>{e.stopPropagation();deleteSavedTactic(idx)}},['✕']));
      chip.addEventListener('click',()=>loadSavedTactic(idx));
      strip.appendChild(chip);
    }
    savedSec.appendChild(strip);
    wrap.appendChild(savedSec);
  }

  return wrap;
}

function getOppKeywords(tactics){

  kws.push({label:mentShort[g('mentality')],type:'neutral'});

  else if(g('pressing')<=1)kws.push({label:'Tiefer Block',type:'warn'});

function classifyPlayingStyle(tactics){
  const g=k=>tactics[k]??2;
  if(g('pressing')>=3&&g('gegenpressing')>=3)return'Intensiv-Pressing';
  if(g('pressing')<=1&&g('konter')>=3)return'Konter-Fußball';
  if(g('aufbau')>=3&&g('tempo')>=3)return'Direktes Vertikalspiel';
  if(g('aufbau')<=1&&g('tempo')<=1)return'Kontroll-Fußball';
  if(g('breite')>=3)return'Flügelbasiertes Spiel';
  if(g('deflinie')<=1&&g('pressing')<=1)return'Tiefer Defensiv-Block';

  if(g('tempo')>=3)return'Dynamisches Pressing';

// 5 stops at 0%,25%,50%,75%,100% — each [r,g,b,a]
const GRAD_STATES={
  att:   [[0,0,0,.58],[0,0,0,.22],[5,85,32,.32],[5,115,42,.44],[3,145,48,.52]],
  mid:   [[0,0,0,.32],[0,0,0,.08],[0,0,0,0],[0,0,0,.08],[0,0,0,.32]],
  def:   [[165,16,16,.52],[110,10,10,.26],[0,0,0,.12],[0,0,0,.34],[0,0,0,.58]]
};
const GRAD_POS=[0,25,50,75,100];
let _gCur=GRAD_STATES.mid.map(c=>[...c]);
let _gTgt=GRAD_STATES.mid.map(c=>[...c]);
let _gRaf=null,_gLast=0;
function setGradTarget(key){
  _gTgt=GRAD_STATES[key].map(c=>[...c]);
  // On touch: apply instantly so gradient is always visible
  if(_isCoarse){_gCur=_gTgt.map(c=>[...c]);_applyGrad();}
  _startGradAnim();
}
function _applyGrad(){
  const ov=document.getElementById('fieldOverlay');if(!ov)return;
  const stops=_gCur.map((c,i)=>`rgba(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])},${c[3].toFixed(3)}) ${GRAD_POS[i]}%`);
  ov.style.background=`linear-gradient(to right, ${stops.join(', ')})`;
}
function _gradTick(now){
  const dt=Math.min((now-_gLast)/1000,.05);_gLast=now;
  const spd=3.0;let running=false;
  for(let i=0;i<5;i++)for(let j=0;j<4;j++){
    const d=_gTgt[i][j]-_gCur[i][j];
    if(Math.abs(d)>0.0008){_gCur[i][j]+=d*Math.min(spd*dt,.15);running=true;}
    else _gCur[i][j]=_gTgt[i][j];
  }
  _applyGrad();
  _gRaf=running?requestAnimationFrame(_gradTick):null;
}
function _startGradAnim(){
  if(_gRaf)return;
  _gLast=performance.now();_gRaf=requestAnimationFrame(_gradTick);
}

function pickMatchZone(minute,mG,oG,tacNet){
  const upMy=mG.find(g=>g.min>minute&&g.min<=minute+4);
  const upOpp=oG.find(g=>g.min>minute&&g.min<=minute+4);
  if(upMy){_zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:2};}
  if(upOpp){_zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:2};}
  // Streak: while in midfield a 22% bonus keeps the ball there a tick longer
  if(_zoneLast==='mid'&&Math.random()<0.22){
    return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.30?2:1};
  }
  const rv=Math.random();
  // Level 3 is reserved exclusively for actual goals (set directly in the goal handlers).
  // Here we only use level 1 (normal action) and level 2 (strong sustained pressure, rare).
  if(tacNet>=4){
    // Clearly dominant: occasional level-2 attack/def pressure (15% of those actions)
    if(rv<0.25){_zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:Math.random()<0.15?2:1};}
    if(rv<0.84){_zoneLast='mid';return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.18?2:1};}
    _zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:1};
  }else if(tacNet<=-4){
    if(rv<0.25){_zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:Math.random()<0.15?2:1};}
    if(rv<0.84){_zoneLast='mid';return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.18?2:1};}
    _zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:1};
  }else{
    // Balanced: level 2 very rarely (8%)
    if(rv<0.18){_zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:Math.random()<0.08?2:1};}
    if(rv<0.82){_zoneLast='mid';return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.10?2:1};}
    _zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:Math.random()<0.08?2:1};
  }
}

function applyHalftimeChoice(choice,myG,oppG,usedMins){
  function newMin(){let m,t=0;do{m=rand(47,89);t++;}while(usedMins.has(m)&&t<40);usedMins.add(m);return m;}

  // All 2nd half goals sorted by minute — "next goal" = earliest
  function get2H(){
    return[...myG.filter(g=>g.min>45).map(g=>({...g,side:'my'})),
           ...oppG.filter(g=>g.min>45).map(g=>({...g,side:'opp'}))]
           .sort((a,b)=>a.min-b.min);
  }
  function convertOppToMy(g){
    const i=oppG.findIndex(o=>o.min===g.min);
    if(i>=0){oppG.splice(i,1);myG.push({min:g.min,scorer:pickScorer(state.team)});myG.sort((a,b)=>a.min-b.min);}
  }
  function convertMyToOpp(g){
    const i=myG.findIndex(m=>m.min===g.min);
    if(i>=0){myG.splice(i,1);oppG.push({min:g.min,scorer:pickScorer(state.opponent.team)});oppG.sort((a,b)=>a.min-b.min);}
  }
  function removeOpp(g){const i=oppG.findIndex(o=>o.min===g.min);if(i>=0)oppG.splice(i,1);}
  function removeMy(g){const i=myG.findIndex(m=>m.min===g.min);if(i>=0)myG.splice(i,1);}

  if(choice==='press'){
    // 22%: next 2H opp goal → team goal (or add one if none); 12%: pressing costs a counter
    const next=get2H()[0];
    if(next&&next.side==='opp'&&Math.random()<0.22){convertOppToMy(next);}
    else if(!next&&Math.random()<0.22){myG.push({min:newMin(),scorer:pickScorer(state.team)});myG.sort((a,b)=>a.min-b.min);}
    if(Math.random()<0.12){oppG.push({min:newMin(),scorer:pickScorer(state.opponent.team)});oppG.sort((a,b)=>a.min-b.min);}

  }else if(choice==='def'){
    // 35%: next 2H opp goal removed; 18%: compactness costs an attack (remove own 2H goal)
    const opp2=get2H().find(g=>g.side==='opp');
    if(opp2&&Math.random()<0.35){removeOpp(opp2);}
    const my2=get2H().find(g=>g.side==='my');
    if(my2&&Math.random()<0.18){removeMy(my2);}

  }else if(choice==='risk'){
    // Next 2 combined 2H goals: 40% flip each to other side, else unchanged
    const next2=get2H().slice(0,2);
    next2.forEach(g=>{
      const r=Math.random();
      if(g.side==='opp'&&r<0.40){convertOppToMy(g);}
      else if(g.side==='my'&&r<0.40){convertMyToOpp(g);}
    });
    // If fewer than 2 goals in 2H, wild-card: 40% chance one extra goal either side
    if(next2.length<2&&Math.random()<0.40){
      if(Math.random()<0.5){myG.push({min:newMin(),scorer:pickScorer(state.team)});myG.sort((a,b)=>a.min-b.min);}
      else{oppG.push({min:newMin(),scorer:pickScorer(state.opponent.team)});oppG.sort((a,b)=>a.min-b.min);}
    }
  }
  // hold: no effect
}
// ── Match: Torschützen-Gewichtung (global) ─────────────────────
const SCORER_WEIGHT={ST:9,LA:6,RA:6,LF:7,RF:7,CF:8,ZOM:5,LM:4,RM:4,ZM:3,ZDM:2,IV:1,LV:1,RV:1,GK:0};
function pickScorer(teamObj){
  const pool=[];
  Object.values(teamObj).filter(Boolean).forEach(p=>{
    const w=SCORER_WEIGHT[p.pos]??1;
    for(let i=0;i<w;i++)pool.push(p.name.split(' ').pop());
  });
  return pool.length?pool[rand(0,pool.length-1)]:'Unbekannt';
}
// ── Match: Torminuten + benutzte Minuten ───────────────────────
function buildMatchGoalTimeline(r){
  const myG=[],oppG=[];
  for(let i=0;i<r.myGoals;i++)myG.push({min:rand(4,89),scorer:pickScorer(state.team)});
  for(let i=0;i<r.oppGoals;i++)oppG.push({min:rand(4,89),scorer:pickScorer(state.opponent.team)});
  myG.sort((a,b)=>a.min-b.min);oppG.sort((a,b)=>a.min-b.min);
  const usedMins=new Set([...[...myG,...oppG].map(g=>g.min),0,45,90]);
  return{myG,oppG,usedMins};
}
// ── Match: Verpasste Großchancen ───────────────────────────────
function buildMatchMissedChances(myG,oppG,usedMins){
  const MY_MISS=['{s} — Lattenschuss!','Torhüter hält gegen {s}!','{s} schießt knapp vorbei!','{s} — Kopfball drüber!'];
  const OPP_MISS=['Gegner-Chance — Keeper hält!','Lattenkreuz — Glück gehabt!','Gegner vergibt Großchance!','Gegner-Kopfball drüber!'];
  const myChances=[],oppChances=[];
  const nMy=rand(0,2),nOpp=rand(0,2);
  for(let i=0;i<nMy;i++){let m;let tries=0;do{m=rand(6,88);tries++;}while(usedMins.has(m)&&tries<20);usedMins.add(m);myChances.push({min:m,scorer:pickScorer(state.team)});}
  for(let i=0;i<nOpp;i++){let m;let tries=0;do{m=rand(6,88);tries++;}while(usedMins.has(m)&&tries<20);usedMins.add(m);oppChances.push({min:m});}
  myChances.sort((a,b)=>a.min-b.min);oppChances.sort((a,b)=>a.min-b.min);
  return{myChances,oppChances,MY_MISS,OPP_MISS};
}
// ── Match: Score-Farben synchronisieren ───────────────────────
function syncScoreColors(myEl,oppEl,my,opp){
  if(my>opp){myEl.classList.add('winning');myEl.classList.remove('losing');oppEl.classList.remove('winning','losing');}
  else if(opp>my){oppEl.classList.add('losing');oppEl.classList.remove('winning');myEl.classList.remove('winning','losing');}
  else{myEl.classList.remove('winning','losing');oppEl.classList.remove('winning','losing');}
}
// ── Match: Elfmeter-Sequenz ────────────────────────────────────
function runPenaltySequence(myScore,oppScore,events,myScoreEl,oppScoreEl,flashIt,onDone){
  setTimeout(()=>{
    flashIt('goal','ELFMETER!');
    addEvent(events,90,'ELF','Elfmeterschießen wird entschieden!');
    clearMatchField();
    setTimeout(()=>{
      const pen=simulatePenalties();
      state.matchResult.penalties=pen;
      state.matchResult.won=pen.myPens>pen.oppPens;
      state.matchResult.draw=false;
      state.matchResult.penMyGoals=pen.myPens;
      state.matchResult.penOppGoals=pen.oppPens;
      let penDelay=0,runMyPen=0,runOppPen=0;
      pen.events.forEach(e=>{
        if(e.scored&&e.team==='home')runMyPen++;
        else if(e.scored&&e.team!=='home')runOppPen++;
        const snapMy=myScore+runMyPen,snapOpp=oppScore+runOppPen;
        const isHome=e.team==='home';
        setTimeout(()=>{
          const icon=isHome?(e.scored?'PEN+':'PEN-'):(e.scored?'GEG':'SAVED');
          addEvent(events,120,icon,`${isHome?'Wir':'Gegner'}: ${e.name} — ${e.scored?'Tor!':'Gehalten!'}`);
          if(e.scored){
            myScoreEl.textContent=String(snapMy);
            oppScoreEl.textContent=String(snapOpp);
            syncScoreColors(myScoreEl,oppScoreEl,snapMy,snapOpp);
            flashIt(isHome?'goal':'opp-goal',`${e.name}!`);
          }else{
            flashIt('','Gehalten!');
          }
        },penDelay);
        penDelay+=3000;
      });
      setTimeout(()=>{
        const penWon=pen.myPens>pen.oppPens;
        flashIt(penWon?'goal':'opp-goal',`${pen.myPens}:${pen.oppPens}`);
        setTimeout(onDone,1400);
      },penDelay);
    },1200);
  },900);
}
function runMatchAnimation(){
  _zoneLastDir='my';
  const r=state.matchResult;
  const total=90;
  const {myG,oppG,usedMins}=buildMatchGoalTimeline(r);
  state.matchResult.myScorers=[...myG];
  state.matchResult.oppScorers=[...oppG];
  const {myChances,oppChances,MY_MISS,OPP_MISS}=buildMatchMissedChances(myG,oppG,usedMins);
  let minute=0,myScore=0,oppScore=0;
  let myPoss=1,oppPoss=1,myXG=0,oppXG=0,myShots=0,oppShots=0;
  let myBigChances=0,oppBigChances=0;
  let mySaves=0,oppSaves=0;
  let myCorners=0,oppCorners=0;
  let myFouls=0,oppFouls=0;
  let myPasses=0,oppPasses=0;
  let myTackles=0,oppTackles=0;
  function updStats(){
    const tp=myPoss+oppPoss||2;
    const mp=Math.round(myPoss/tp*100);
    const e=id=>document.getElementById(id);
    const s=(id,v)=>{const el=e(id);if(el)el.textContent=v;};
    // Sets bar flex proportionally: 0:0 → 50/50, 1:0 → ~100/0, 3:1 → 75/25
    const ratio=(idA,idB,a,b)=>{
      const total=a+b;
      const fa=total===0?1:a/total;
      const fb=total===0?1:b/total;
      const elA=e(idA),elB=e(idB);
      if(elA)elA.style.flex=String(Math.max(fa,0.01));
      if(elB)elB.style.flex=String(Math.max(fb,0.01));
    };
    s('statPossMy',mp+'%');s('statPossOpp',(100-mp)+'%');
    ratio('statPossBar','statPossBarOpp',myPoss,oppPoss);
    s('statXgMy',myXG.toFixed(1));s('statXgOpp',oppXG.toFixed(1));
    ratio('statXgBar','statXgBarOpp',myXG,oppXG);
    s('statShotMy',String(myShots));s('statShotOpp',String(oppShots));
    ratio('statShotBar','statShotBarOpp',myShots,oppShots);
    s('statChanceMy',String(myBigChances));s('statChanceOpp',String(oppBigChances));
    ratio('statChanceBar','statChanceBarOpp',myBigChances,oppBigChances);
    s('statCornerMy',String(myCorners));s('statCornerOpp',String(oppCorners));
    ratio('statCornerBar','statCornerBarOpp',myCorners,oppCorners);
    s('statFoulMy',String(myFouls));s('statFoulOpp',String(oppFouls));
    ratio('statFoulBar','statFoulBarOpp',myFouls,oppFouls);
    s('statPassMy',String(myPasses));s('statPassOpp',String(oppPasses));
    ratio('statPassBar','statPassBarOpp',myPasses,oppPasses);
  }
  const events=$('#matchEvents');
  const myScoreEl=$('#myScore'),oppScoreEl=$('#oppScore'),clockEl=$('#matchClock');
  const flash=$('#eventFlash');
  addEvent(events,0,'KO',`Anpfiff! ${r.finalAdv>=5?'Taktik greift!':r.finalAdv<=-5?'Gegner kontrolliert.':'Ausgeglichener Beginn.'}`);
  setMatchZone('mid','my',1);
  let htShown=false;
  const flashIt=(cls,text)=>{flash.textContent=text;flash.className=`event-flash ${cls} show`;setTimeout(()=>flash.classList.remove('show'),1400)};
  const tick=()=>{
    minute=Math.min(total,minute+2);
    clockEl.textContent=`${minute}'`;
    if(!htShown&&minute>=45){
      htShown=true;
      clearInterval(timer);
      addEvent(events,45,'HZ','Halbzeit!');
      showHalftimeModal(myScore,oppScore,myXG,oppXG,(choice)=>{
        applyHalftimeChoice(choice,myG,oppG,usedMins);
        const HT_LOG={hold:'Kein Wechsel — konzentriert bleiben!',press:'Mehr Pressing & Raumgewinn!',def:'Defensiv stabil bleiben!',risk:'Vollgas — alles riskieren!'};
        addEvent(events,46,'KO',HT_LOG[choice]);
        timer=setInterval(tick,MATCH_SPEEDS[speedIdx].ms);
        window._matchTimer=()=>timer;
      });
      return;
    }
    // Zone update + possession tracking
    const zv=pickMatchZone(minute,myG,oppG,r.finalAdv);
    setMatchZone(zv.zone,zv.team,zv.level||1);
    if(zv.zone==='att'){
      myPoss+=2;
      myPasses+=rand(4,9);oppPasses+=rand(1,3);
      if(Math.random()<0.28){myShots++;myXG+=randFloat(0.06,0.16);if(Math.random()<0.55)oppSaves++;}
      if(Math.random()<0.12)myCorners++;
      if(Math.random()<0.10){oppFouls++;if(Math.random()<0.25)myCorners++;}
      if(Math.random()<0.15)myTackles+=rand(0,1);oppTackles+=rand(0,1);
    } else if(zv.zone==='def'){
      oppPoss+=2;
      oppPasses+=rand(4,9);myPasses+=rand(1,3);
      if(Math.random()<0.24){oppShots++;oppXG+=randFloat(0.06,0.16);if(Math.random()<0.55)mySaves++;}
      if(Math.random()<0.12)oppCorners++;
      if(Math.random()<0.10){myFouls++;if(Math.random()<0.25)oppCorners++;}
      if(Math.random()<0.15)oppTackles+=rand(0,1);myTackles+=rand(0,1);
    } else {
      myPoss++;oppPoss++;
      myPasses+=rand(2,5);oppPasses+=rand(2,5);
      myTackles+=rand(0,1);oppTackles+=rand(0,1);
      if(Math.random()<0.06)myFouls++;
      if(Math.random()<0.06)oppFouls++;
    }
    // Goals
    while(myG.length&&myG[0].min<=minute){
      myScore++;const sc=myG.shift().scorer;myScoreEl.textContent=String(myScore);
      myShots++;myXG+=1.0;
      playGoalSound();flashIt('goal',`${sc}!`);
      setMatchZone('att','my',3);
      addEvent(events,minute,'TOR',`<b>${sc}</b> — ${myScore}:${oppScore}`,'ev-goal');
    }
    while(oppG.length&&oppG[0].min<=minute){
      oppScore++;const sc=oppG.shift().scorer;oppScoreEl.textContent=String(oppScore);
      oppShots++;oppXG+=1.0;
      playGoalSound();flashIt('opp-goal',sc);
      setMatchZone('def','opp',3);
      addEvent(events,minute,'GEG',`${sc} — ${myScore}:${oppScore}`,'ev-opp-goal');
    }
    // Großchancen
    while(myChances.length&&myChances[0].min<=minute){
      const ch=myChances.shift();
      myBigChances++;myShots++;myXG+=randFloat(0.28,0.52);oppSaves++;
      const txt=MY_MISS[rand(0,MY_MISS.length-1)].replace('{s}',ch.scorer);
      addEvent(events,minute,'CH',`<b>${txt}</b>`,'ev-chance');
    }
    while(oppChances.length&&oppChances[0].min<=minute){
      oppChances.shift();
      oppBigChances++;oppShots++;oppXG+=randFloat(0.28,0.52);mySaves++;
      const txt=OPP_MISS[rand(0,OPP_MISS.length-1)];
      addEvent(events,minute,'GCH',txt,'ev-chance');
    }
    updStats();
    syncScoreColors(myScoreEl,oppScoreEl,myScore,oppScore);
    if(minute>=total){
      clearInterval(timer);
      // Snap live xG display to pre-calc values so xG always matches goals (max 0.5 diff)
      myXG=r.myXG;oppXG=r.oppXG;updStats();
      addEvent(events,90,'AZ',`Abpfiff! Endstand ${myScore}:${oppScore}`);
      if(myScore===oppScore){
        runPenaltySequence(myScore,oppScore,events,myScoreEl,oppScoreEl,flashIt,finishMatch);
      }else{
        setTimeout(finishMatch,1100);
      }
    }
  };
  const MATCH_SPEEDS=[{label:'1×',ms:1333},{label:'2×',ms:500},{label:'4×',ms:150}];
  let speedIdx=0;
  let timer=setInterval(tick,MATCH_SPEEDS[0].ms);
  window._matchTimer=()=>timer;
  window._setMatchTimer=(t)=>{timer=t};
  window.toggleMatchSpeed=()=>{
    speedIdx=(speedIdx+1)%MATCH_SPEEDS.length;
    clearInterval(timer);
    timer=setInterval(tick,MATCH_SPEEDS[speedIdx].ms);
    const btn=$('#speedBtn');
    if(btn){btn.textContent=MATCH_SPEEDS[speedIdx].label;btn.classList.toggle('speed-active',speedIdx>0)}
  };
  window.skipToResult=()=>{
    clearInterval(timer);
    const r=state.matchResult;
    const mySc=document.getElementById('myScore');
    const oppSc=document.getElementById('oppScore');
    if(mySc)mySc.textContent=String(r.myGoals);
    if(oppSc)oppSc.textContent=String(r.oppGoals);
    if(r.draw){
      const pen=simulatePenalties();
      state.matchResult.penalties=pen;
      state.matchResult.won=pen.myPens>pen.oppPens;
      state.matchResult.draw=false;
      state.matchResult.penMyGoals=pen.myPens;
      state.matchResult.penOppGoals=pen.oppPens;
    }
    finishMatch();
  };
}
const _BADGE_CLS={TOR:'eb-tor',GEG:'eb-geg',CH:'eb-ch',GCH:'eb-gch',HZ:'eb-hz',AZ:'eb-az',ELF:'eb-elf','PEN+':'eb-pen','PEN-':'eb-miss',SAVED:'eb-hz',KO:'eb-ko'};
function addEvent(c,m,badgeType,html,rowClass=''){
  const isGoal=badgeType==='TOR'||badgeType==='PEN+';
  const isOppGoal=badgeType==='GEG';
  const autoClass=isGoal?'ev-goal':isOppGoal?'ev-opp-goal':'';
  const cls=`event-row${autoClass?' '+autoClass:''}${rowClass?' '+rowClass:''}`;
  const row=el('div',{class:cls});
  row.appendChild(el('div',{class:'event-time'},[`${m}'`]));
  if(isGoal||isOppGoal){
    row.appendChild(el('div',{class:'ev-goal-label'},['TOR!']));
  } else {
    row.appendChild(el('span',{class:'event-badge'},[badgeType]));
  }
  const textEl=el('div',{class:'event-text'});textEl.innerHTML=html;
  row.appendChild(textEl);
  // Keep only latest 14 events
  while(c.children.length>14) c.removeChild(c.firstChild);
  c.appendChild(row);
  requestAnimationFrame(()=>{c.scrollTop=c.scrollHeight;});
  // M-20: Update portrait event strip
  const strip=$('#matchEventStrip');
  if(strip){
    const badge=$('#mesBadge');const time=$('#mesTime');const txt=$('#mesText');
    if(time) time.textContent=`${m}'`;
    if(badge){
      badge.textContent=isGoal?'TOR!':isOppGoal?'GEGEN':badgeType;
      badge.className='mes-badge'+(isGoal?' goal-badge':isOppGoal?' opp-badge':'');
    }
    if(txt) txt.innerHTML=html;
    strip.className='match-event-strip'+(isGoal?' strip-goal':isOppGoal?' strip-opp-goal':'');
    // Haptic on goals
    if(isGoal||isOppGoal) haptic(isGoal?[30,20,30]:[20]);
  }
}
function finishMatch(){
  state.totalMatches++;
  state.matchResult.progressions=progressPlayers();
  const _ps2=state.perkState;
  if(state.matchResult.won){
    state.winsThisLeague++;
    // Streak tracking
    _ps2.serioesStreak=((_ps2.serioesStreak||0)+1);
    _ps2.comebackBuff=false;
    if(hasPerk('serioeser_favorit')&&_ps2.serioesStreak>=3){_ps2.serioesBuff=true;_ps2.serioesStreak=0;}
    if(hasPerk('gluecksstraehne'))_ps2.glückssträhne=(_ps2.glückssträhne||0)+2;
    if(state.winsThisLeague>=WINS_PER_LEAGUE){
      addLeagueTrophy(state.league);
      if(state.league>=LEAGUES.length-1){
        // Run complete — Champion pack (index 6) as reward
        addTrophy();awardRunXP(true);
        const pool=(state.impossibleMode||state.collectionMode)?PACK_CONFIG_IMPOSSIBLE:PACK_CONFIG;
        setState({packCards:generatePackCards(pool.length-1)});

        setState({packLeague:pool.length-1});

        setState({phase:'victory'});render();return;

      }
      // League advanced — award perk
      if(hasPerk('aufsteiger_momentum'))_ps2.aufsteigerGames=2;
      _ps2.routinierLeagues=Math.min((_ps2.routinierLeagues||0)+1,4);
      // Spieler altern nicht mehr beim Ligaaufstieg — junge Spieler bleiben durch das ganze Spiel relevant
      setState({league:state.league+1,winsThisLeague:0});
      const availPerks=PERKS.filter(p=>!state.perks.includes(p.id));
      if(availPerks.length>0){setState({pendingPerkPick:true});}
      showToast('Aufstieg in '+LEAGUES[state.league].name+'!');
    }
    setState({phase:'result-win'});

  } else if(state.matchResult.draw){
    // Draw — run continues, grant +4 tactic edge next match
    setState({drawBuff:true});

    _ps2.serioesStreak=0;_ps2.serioesBuff=false;
    setState({phase:'result-win'});

  } else {
    // Loss — run ends
    _ps2.serioesStreak=0;_ps2.serioesBuff=false;
    awardRunXP(false);
    setState({packCards:generatePackCards(state.league)});

    setState({packLeague:state.league});

    setState({phase:'result-lose'});

  }
  render();
}
function addTrophy(){
  const ps=Object.values(state.team);
  const top=ps.sort((a,b)=>b.rating-a.rating).slice(0,3);
  state.trophies.push({date:new Date().toISOString().slice(0,10),matches:state.totalMatches,topPlayers:top.map(p=>({name:p.name,rating:p.rating,pos:p.pos}))});
  saveTrophies();
}

// ── Ergebnis: Taktik-Panels DOM (Stärken / Schwächen) ─────────
function renderTacticPanels(r){
  const {gamechanger,posHints,negHints,fatigueHint}=extractTacticStats(r);
  const panelPos=gamechanger?posHints.filter(h=>h!==gamechanger):posHints;
  const panelNeg=gamechanger?negHints.filter(h=>h!==gamechanger):negHints;
  const allNeg=[...panelNeg];
  if(fatigueHint)allNeg.push(fatigueHint);
  if(gamechanger)(gamechanger.ok?panelPos:allNeg).unshift(gamechanger);
  function buildPanelRows(arr,isPos){
    if(!arr.length)return[el('div',{class:'res-tactic-empty'},[isPos?'Keine besonderen Stärken.':'Keine erkennbaren Schwächen.'])];
    return arr.map(h=>el('div',{class:'res-tactic-row'},[
      el('div',{class:'res-tactic-pill'},[isPos?'Stärke':'Schwäche']),
      el('div',{class:'res-tactic-text'},[h.txt]),
    ]));
  }
  // Tier 3: generate one concrete experiment suggestion based on top weakness + opponent style
  function buildNextTip(r){
    const t=k=>state.tactics[k]??2;
    const o=k=>state.opponent?.tactics[k]??2;
    const tips=[];
    // What the opponent was doing (Tier 2 context)
    const STIL_NAMES=[
      {name:'Tiki-Taka',match:()=>o('aufbau')<=1&&o('tempo')<=1&&o('pressing')>=3},
      {name:'Gegenpressing',match:()=>o('gegenpressing')>=3&&o('pressing')>=4&&o('tempo')>=3},
      {name:'Konter',match:()=>o('konter')>=3&&o('pressing')<=2&&o('deflinie')<=2},
      {name:'Catenaccio',match:()=>o('deflinie')<=1&&o('pressing')<=1&&o('konter')>=3},
      {name:'Flügelspiel',match:()=>o('breite')>=3&&o('aufbau')>=3},
      {name:'Pressingmaschine',match:()=>o('pressing')>=4&&o('deflinie')>=3},
    ];
    const oppStil=(STIL_NAMES.find(s=>s.match())||{name:'Ausgewogen'}).name;
    // Tier 3: experiment suggestions based on matchup
    if(o('pressing')>=3&&t('aufbau')===2) tips.push(`Gegner presste hoch (${oppStil}). Versuche: Aufbau auf 0 oder 4 — nie neutral gegen hohes Pressing.`);
    if(o('konter')>=3&&o('deflinie')<=2&&t('deflinie')>=3) tips.push(`Gegner konterte aus tiefem Block (${oppStil}). Versuche: Deflinie runter auf 1–2, um Konterräume zu schließen.`);
    if(o('deflinie')>=3&&t('konter')<=2) tips.push(`Gegner spielte mit hoher Kette (${oppStil}). Versuche: Konter auf 3–4 + Tempo auf 3, um den Raum zu nutzen.`);
    if(o('breite')>=3&&t('defform')===2) tips.push(`Gegner spielte breit (${oppStil}). Versuche: Defensivform auf 0–1, damit deine Kette nach außen schiebt.`);
    if(o('pressing')<=1&&o('deflinie')<=1&&t('kreativ')<=2) tips.push(`Gegner stand tief (${oppStil}). Versuche: Kreativität auf 3–4, um den Block mit Einzelaktionen zu öffnen.`);
    if(!tips.length&&o('gegenpressing')>=3) tips.push(`Gegner presste nach Ballverlust sofort nach (${oppStil}). Versuche: Gegenpressing auf 3–4, um den Kampf im Mittelfeld anzunehmen.`);
    if(!tips.length) tips.push(`Versuche im nächsten Spiel einen anderen Spielstil-Schwerpunkt — z.B. mehr Breite oder eine tiefere Abwehrlinie — und beobachte die Reaktion des Gegners.`);
    return tips[0];
  }
  const nextTip=buildNextTip(r);
  const nextTipEl=nextTip?el('div',{class:'res-next-tip',style:{
    background:'rgba(253,224,71,.06)',border:'1px solid rgba(253,224,71,.25)',
    borderRadius:'10px',padding:'10px 14px',marginTop:'6px',
    fontSize:'11.5px',lineHeight:'1.5',color:'rgba(255,255,255,.72)',
    display:'flex',gap:'8px',alignItems:'flex-start',
  }},[
    el('span',{style:{fontSize:'15px',flexShrink:'0'}},['🔬']),
    el('span',{},[nextTip]),
  ]):null;

  return el('div',{class:'res-panels-wrap',style:{display:'flex',flexDirection:'column',gap:'6px'}},[
    el('div',{class:'res-panels'},[
      el('div',{class:'res-panel pos-panel'},[el('div',{class:'res-panel-inner'},[el('div',{class:'res-panel-hdr'},['Stärken']),...buildPanelRows(panelPos,true)])]),
      el('div',{class:'res-panel neg-panel'},[el('div',{class:'res-panel-inner'},[el('div',{class:'res-panel-hdr'},['Schwächen']),...buildPanelRows(allNeg,false)])]),
    ]),
    ...(nextTipEl?[nextTipEl]:[]),
  ]);
}

// ── Result: Action button ─────────────────────────────────────
function buildResultActionBtn(r){
