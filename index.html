<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tactic Roguelike</title>
<style>
:root{
  --bg-0:#10141B;--bg-1:#151B23;--bg-2:#1D232C;--bg-3:#232A35;--bg-4:#2E3542;
  --border:#2E3542;--text:#F0F3F7;--text-dim:#DDE3EC;--text-faint:#C8D2DC;
  --accent:#5EC26A;--accent-2:#4AAD55;--danger:#ef4444;--warn:#f59e0b;--info:#5EC26A;
  --pitch-1:#09090e;--pitch-2:#0c0c13;
  --common-1:#9ca3af;--common-2:#46505F;
  --rare-1:#71a4f4;--rare-2:#1e3a8a;
  --epic-1:#c084fc;--epic-2:#6d28d9;
  --star-1:#fb923c;--star-2:#b45309;
  --legendary-1:#fde047;--legendary-2:#a16207;
  --mythic-1:#ef4444;--mythic-2:#7f1d1d;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg-0);color:var(--text);font-size:14px;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}

.game{display:flex;flex-direction:column;height:100vh}
.header{height:54px;background:rgba(7,11,15,.96);border-bottom:1px solid rgba(255,255,255,.07);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 22px;gap:16px;z-index:10;backdrop-filter:blur(12px)}
.brand{display:flex;align-items:center;gap:11px;text-decoration:none;cursor:pointer;user-select:none}
.brand-logo{width:34px;height:34px;flex-shrink:0}
.brand-wordmark{display:flex;flex-direction:column;line-height:1;gap:1px}
.brand-wordmark-top{font-size:13px;font-weight:900;letter-spacing:2.5px;color:#fff;text-transform:uppercase}
.brand-wordmark-sub{font-size:8px;font-weight:700;letter-spacing:3px;color:rgba(94,194,106,.7);text-transform:uppercase}

.league-banner{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 28px;background:linear-gradient(135deg,var(--bg-3),var(--bg-2));border:1px solid var(--border);border-radius:10px;min-width:280px}
.league-banner.l0{border-color:#78716c;background:linear-gradient(135deg,#3f3f46,#27272a)}
.league-banner.l1{border-color:#16a34a;background:linear-gradient(135deg,#15803d,#14532d)}
.league-banner.l2{border-color:#0891b2;background:linear-gradient(135deg,#0e7490,#155e75)}
.league-banner.l3{border-color:#dc2626;background:linear-gradient(135deg,#991b1b,#7f1d1d)}
.league-banner.l4{border-color:#facc15;background:linear-gradient(135deg,#a16207,#854d0e);box-shadow:0 0 24px rgba(250,204,21,.25)}
.league-banner.l5{border-color:#e879f9;background:linear-gradient(135deg,#7e22ce,#4c1d95);box-shadow:0 0 28px rgba(232,121,249,.3)}
.league-name{font-size:13px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#fff}
.header-mode-badge{font-size:9px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#22d3ee;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.28);border-radius:6px;padding:2px 8px;margin-top:1px}
.league-progress{font-size:11px;color:rgba(255,255,255,.95);display:flex;align-items:center;gap:8px}
.league-pips{display:flex;gap:3px}
.league-pip{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)}
.league-pip.won{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px rgba(94,194,106,.6)}

.toolbar{display:flex;gap:6px;justify-content:flex-end;align-items:center}
.btn-hdr{background:transparent;color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.1);padding:6px 13px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.4px;cursor:pointer;transition:color .14s,border-color .14s,background .14s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;text-transform:uppercase}
.btn-hdr:hover{color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.05)}
.btn-hdr.hdr-danger{color:rgba(239,68,68,.6);border-color:rgba(239,68,68,.2)}
.btn-hdr.hdr-danger:hover{color:#f87171;border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.07)}
.btn-hdr.hdr-icon{padding:6px 9px;min-width:32px;justify-content:center}
.hdr-sep{width:1px;height:20px;background:rgba(255,255,255,.09);margin:0 3px;flex-shrink:0}
.btn{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:8px 15px;border-radius:8px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:background .13s,border-color .13s,opacity .13s;letter-spacing:.2px}
.btn:hover{background:var(--bg-4);border-color:#3A424F}
.btn.primary{background:var(--accent);color:#0d1a10;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-2);border-color:var(--accent-2)}
.btn.danger{color:var(--danger);border-color:rgba(239,68,68,.3)}
.btn.danger:hover{background:rgba(239,68,68,.1)}
.btn.large{padding:11px 24px;font-size:14px;border-radius:9px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.subtle{background:transparent;border-color:transparent}
.btn.subtle:hover{background:var(--bg-3);border-color:var(--border)}

.main{flex:1;position:relative;overflow:hidden}
.phase{position:absolute;inset:0;display:flex;flex-direction:column;padding:14px 18px;overflow:auto}

/* INTRO (legacy center-message unused) */

/* INTRO REDESIGN — B1 Formation Pitch */
.intro-wrap{padding:0;flex-direction:row;background:#070B0F;overflow:hidden}
.intro-left{display:flex;flex-direction:column;justify-content:center;z-index:2;padding:0 0 0 8%;max-width:420px;min-width:280px;flex-shrink:0;gap:0}
.intro-tag{font-size:8px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:rgba(94,194,106,.55);margin-bottom:16px}
.intro-title{font-size:clamp(34px,4.5vw,58px);font-weight:900;letter-spacing:-1.5px;line-height:.94;color:#fff;margin-bottom:16px}
.intro-title em{background:linear-gradient(120deg,#5EC26A,#9be8a8);-webkit-background-clip:text;background-clip:text;color:transparent;font-style:normal}
.intro-sub{font-size:12.5px;color:rgba(255,255,255,.28);line-height:1.75;margin-bottom:34px;max-width:290px}
.intro-btns{display:flex;flex-direction:column;gap:9px;max-width:262px}
/* Collection mode button */
.btn.collection-btn{background:rgba(29,78,216,.22);border-color:rgba(96,165,250,.4);color:#93c5fd}
.btn.collection-btn:hover{background:rgba(29,78,216,.36);border-color:rgba(96,165,250,.7);color:#bfdbfe;box-shadow:0 0 18px rgba(96,165,250,.15)}
.btn.collection-btn.locked{background:rgba(60,60,70,.18);border-color:rgba(140,140,155,.22);color:rgba(180,180,195,.4);cursor:default;pointer-events:none}
.intro-collection-wrap{position:relative;display:block;max-width:262px}
.intro-collection-lock-tip{
  position:absolute;left:0;top:calc(100%+8px);
  background:rgba(8,12,18,.95);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:10px 14px;font-size:11px;
  color:rgba(255,255,255,.65);white-space:nowrap;pointer-events:none;
  z-index:200;opacity:0;transition:opacity .18s;line-height:1.5;
}
.intro-collection-wrap:hover .intro-collection-lock-tip{opacity:1}
.intro-collection-progress{
  font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.4px;
  margin-top:5px;display:flex;align-items:center;gap:7px
}
.intro-collection-bar{
  flex:1;height:3px;background:rgba(255,255,255,.08);
  border-radius:2px;overflow:hidden;max-width:160px
}
.intro-collection-bar-fill{height:100%;background:linear-gradient(90deg,#0891b2,#22d3ee);border-radius:2px;transition:width .4s}
.intro-hints{margin-top:18px;display:flex;flex-direction:column;gap:4px}
.intro-right-wrap{position:absolute;right:0;top:0;bottom:0;width:64%;overflow:hidden;pointer-events:none}
.intro-right{width:100%;height:100%;perspective:1100px;position:relative}
.intro-right svg{position:absolute;top:50%;left:50%;height:132%;width:auto;transform:translate(-50%,-50%) rotateX(10deg) rotateY(-8deg) rotate(-5deg);transform-origin:center center}

/* LINEUP – Dark Spotlight */
.lineup-phase{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;background:#0D1419}
.lineup-topbar{height:58px;background:rgba(7,11,15,.96);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;z-index:30;flex-shrink:0}
.lineup-topbar-left{display:flex;flex-direction:column;gap:2px}
.lineup-topbar-label{font-size:8px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.3px;font-weight:800}
.lineup-topbar-right{display:flex;align-items:center;gap:18px}
.lineup-topbar-stats{display:flex;align-items:center;gap:18px}
.lineup-topbar-center{display:flex;flex-direction:column;align-items:center;gap:2px}
.lineup-stat{text-align:center}
.lineup-stat-label{font-size:8px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;font-weight:800}
.lineup-stat-value{font-size:17px;font-weight:800;color:var(--text);line-height:1.2}
.lineup-stat-value span{font-size:12px;color:var(--text-faint)}
.lineup-stat-value.accent{font-size:30px;font-weight:900;color:#5EC26A;letter-spacing:-1px;line-height:1}
.lineup-divider{width:1px;height:32px;background:var(--border)}
.fmt-drop-wrap{position:relative}
.fmt-drop-btn{display:flex;align-items:center;gap:10px;background:#1D232C;border:1px solid #3A424F;border-radius:9px;padding:8px 15px;cursor:pointer;min-width:150px;user-select:none}
.fmt-drop-val{font-size:15px;font-weight:900;color:#E6E9EE;letter-spacing:.5px;flex:1}
.fmt-drop-arrow{color:#5A6472;font-size:11px;transition:transform .18s;display:inline-block}
.fmt-drop-menu{display:none;position:absolute;top:calc(100% + 5px);left:0;min-width:150px;background:#1D232C;border:1px solid #3A424F;border-radius:9px;overflow:hidden;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.7)}
.fmt-drop-menu.open{display:block}
.fmt-drop-item{padding:10px 15px;font-size:13px;font-weight:700;color:#C8D2DC;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.fmt-drop-item:hover{background:#232A35}
.fmt-drop-item.active{color:#5EC26A}
.lineup-persp-wrap{flex:1;perspective:620px;perspective-origin:50% 8%;overflow:visible;position:relative}
.lineup-pitch-3d{position:absolute;bottom:0;left:10%;right:10%;height:118%;transform:rotateX(36deg);transform-origin:center bottom;border-radius:14px 14px 0 0;border:1.5px solid rgba(94,194,106,.32);background:repeating-linear-gradient(180deg,#183D22 0px,#183D22 50px,#1F4A29 50px,#1F4A29 100px)}
.lineup-players-flat{position:absolute;left:10%;right:10%;top:0;bottom:28px;z-index:10;transform:translateZ(0)}
.lineup-slot{position:absolute;transform:translate(-50%,-50%) translateZ(0);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;user-select:none;touch-action:none;z-index:5;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.lineup-slot-card-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px}
.lineup-slot-shadow{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:106px;height:18px;background:radial-gradient(ellipse at center,rgba(0,0,0,.75) 0%,transparent 72%);z-index:-1;pointer-events:none}
.lineup-slot-name{font-size:14px;font-weight:800;color:#FFFFFF;text-shadow:0 1px 8px rgba(0,0,0,1);white-space:nowrap;pointer-events:none;line-height:1}
.lineup-slot-pos-chip{
  font-size:8px;font-weight:800;letter-spacing:.6px;pointer-events:none;line-height:1;
  padding:3px 9px 3px;border-radius:10px;text-transform:uppercase;
  box-shadow:0 2px 6px rgba(0,0,0,.45);
}
.lineup-slot-pos-chip.pos-main{
  background:rgba(94,194,106,.15);color:#5EC26A;
  border:1px solid rgba(94,194,106,.3);
  text-shadow:0 1px 6px rgba(0,0,0,.7);
}
.lineup-slot-pos-chip.pos-alt{
  background:rgba(250,204,21,.16);color:#facc15;
  border:1px solid rgba(250,204,21,.32);
  text-shadow:0 1px 6px rgba(0,0,0,.7);
}
.lineup-slot-pos-chip.pos-foreign{
  background:rgba(239,68,68,.18);color:#f87171;
  border:1px solid rgba(239,68,68,.38);
  text-shadow:0 1px 6px rgba(0,0,0,.7);
}
/* bigger cards on lineup pitch */
.lineup-phase .slot-token{width:94px;height:124px;border-radius:12px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.lineup-phase .stoken-rating{font-size:37px}
.lineup-phase .stoken-flag{font-size:20px}
.lineup-phase .stoken-strip{width:17px}
.lineup-phase .stoken-strip-pos{font-size:9px}
.lineup-phase .stoken-stage-chip{font-size:7px;padding:2px 6px;margin-top:3px;white-space:nowrap}
.lineup-phase .stoken-main{gap:2px}
/* empty slot indicator */
.lineup-slot.empty .slot-token::after{content:'+';display:flex;flex:1;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:rgba(94,194,106,.7);line-height:1}
.lineup-slot.empty .slot-token::before{content:'';height:5px;width:100%;flex-shrink:0;background:linear-gradient(90deg,rgba(94,194,106,.1),rgba(94,194,106,.4),rgba(94,194,106,.1));background-size:200% 100%;animation:stripeShimmer 2.5s linear infinite}
.lineup-slot.common .slot-token{border-color:#9ca3af!important}
.lineup-slot.common .stoken-strip{background:#9ca3af!important}
.lineup-slot.uncommon .slot-token{border-color:#5EC26A!important}
.lineup-slot.uncommon .stoken-strip{background:#5EC26A!important}
.lineup-slot.rare .slot-token{border-color:#71a4f4!important}
.lineup-slot.rare .stoken-strip{background:#71a4f4!important}
.lineup-slot.rare .stoken-strip-scan{animation:stripScanAnim 2.4s ease-in-out infinite;opacity:1}
.lineup-slot.epic .slot-token{border-color:#c084fc!important;animation:epicTokenPulse 2s ease-in-out infinite;overflow:hidden}
.lineup-slot.epic .stoken-strip{background:#c084fc!important}
.lineup-slot.epic .stoken-strip-scan{animation:stripScanAnim 2s ease-in-out infinite;opacity:1}
.lineup-slot.epic .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(232,121,249,.28) 50%,transparent 65%);background-size:250% 100%;animation:tokenShimmer 2.2s linear infinite;pointer-events:none;z-index:2}
.lineup-slot.legendary .slot-token{border-color:#fde047!important;animation:legendaryTokenPulse 1.7s ease-in-out infinite;overflow:hidden}
.lineup-slot.legendary .stoken-strip{background:#fde047!important}
.lineup-slot.legendary .stoken-strip-scan{animation:stripScanAnim 1.7s ease-in-out infinite;opacity:1}
.lineup-slot.legendary .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.32) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
.lineup-slot.mythic .slot-token{border-color:#ef4444!important;animation:mythicTokenPulse 1.3s ease-in-out infinite;overflow:hidden}
.lineup-slot.mythic .stoken-strip{background:#ef4444!important}
.lineup-slot.mythic .stoken-strip-scan{animation:stripScanAnim 1.4s ease-in-out infinite;opacity:1}
.lineup-slot.mythic .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 28%,rgba(239,68,68,.35) 50%,transparent 72%);background-size:250% 100%;animation:tokenShimmer 1.5s linear infinite;pointer-events:none;z-index:2}
.lineup-slot.empty .slot-token{border-color:rgba(94,194,106,.38)!important;animation:neonIdlePulse 2.5s ease-in-out infinite;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:flex-start!important}
.lineup-slot.dragging{opacity:.7;z-index:50!important}
.lineup-slot.drag-over .slot-token{border-color:var(--legendary-1)!important;transform:scale(1.15)}
/* Replace-pick: hover state shows red highlight = "this player will be swapped out" */
.lineup-slot.replaceable{cursor:pointer}
.lineup-slot.replaceable:hover .slot-token{border-color:#ef4444!important;box-shadow:0 0 18px rgba(239,68,68,.45)!important;transform:scale(1.08)}
.lineup-slot.replaceable:hover .lineup-slot-name{color:#f87171}
/* New player pill in replace-pick topbar */
.replace-new-pill{display:flex;align-items:center;gap:10px;background:rgba(9,13,17,.9);border:1.5px solid var(--pill-border,rgba(94,194,106,.4));border-radius:10px;padding:5px 14px 5px 8px}
.replace-new-pill-swatch{width:6px;height:36px;border-radius:3px;flex-shrink:0}
.replace-new-pill-info{display:flex;flex-direction:column;gap:1px}
.replace-new-pill-name{font-size:13px;font-weight:800;color:#fff;line-height:1.1}
.replace-new-pill-meta{font-size:10px;color:var(--text-dim);font-weight:600}
.replace-new-pill-rating{font-size:22px;font-weight:900;color:#fff;line-height:1;margin-left:8px}
.lineup-bench-dock{height:112px;background:rgba(7,11,15,.96);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:30;flex-shrink:0}
.lineup-bench-tokens{display:flex;gap:18px;align-items:center;justify-content:flex-start;flex:1}
.lineup-main-row{flex:1;min-height:0;overflow:hidden;position:relative}
.lineup-center{display:flex;flex-direction:column;width:100%;height:100%;position:relative;overflow:hidden}
.lineup-bench-panel{position:absolute;right:0;top:0;bottom:0;width:192px;background:rgba(7,11,15,.96);border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 12px 12px;gap:4px;overflow-y:auto;z-index:30}
.lineup-bench-panel-header{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-faint);font-weight:800;text-align:center;width:100%;margin-bottom:2px}
.lineup-bench-panel-count{font-size:11px;color:var(--text-dim);font-weight:700;text-align:center;margin-bottom:8px}
.lineup-bench-panel-slot{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;padding:10px 0}
.lineup-bench-panel-slot+.lineup-bench-panel-slot{border-top:1px solid var(--border)}
.lineup-bench-panel-name{font-size:11px;font-weight:700;color:var(--text);text-align:center;max-width:168px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.lineup-bench-panel .slot-token{width:94px;height:124px;border-radius:12px}
.lineup-bench-panel .stoken-rating{font-size:37px}
.lineup-bench-panel .stoken-flag{font-size:20px}
.lineup-bench-panel .stoken-strip{width:17px}
.lineup-bench-panel .stoken-strip-pos{font-size:9px}
.lineup-bench-panel .stoken-stage-chip{font-size:7px;padding:2px 6px;margin-top:3px}
.lineup-cta-bar{height:68px;background:rgba(7,11,15,.96);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:30}
/* keep old classes for tactics/replace phases */
.pitch-section{display:flex;flex-direction:column;gap:10px;min-height:0}
.pitch-wrap{flex:1;display:grid;place-items:center;min-height:0}
.pitch-frame{position:relative;height:100%;aspect-ratio:7/10;max-height:100%;background:var(--pitch-1);border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.7),inset 0 0 60px rgba(0,0,0,.4);border:1px solid rgba(94,194,106,.12)}
.pitch-frame::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(94,194,106,.12) 0%,rgba(94,194,106,.04) 36%,transparent 68%);pointer-events:none;border-radius:8px;z-index:1}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.players-layer{position:absolute;inset:0}

.slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;user-select:none;z-index:5;touch-action:none}
.slot.dragging{z-index:30;opacity:.85}
/* === SLOT TOKEN: MINI CARD (56×76) === */
.slot-token{width:56px;height:76px;border-radius:8px;background:#0f1623;border:1.5px solid rgba(255,255,255,.2);display:flex;flex-direction:row;overflow:hidden;position:relative;transition:transform .15s,border-color .15s,box-shadow .15s}
.slot.empty .slot-token{width:56px;height:76px;border-radius:8px;border:1.5px solid rgba(94,194,106,.38);background:rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;animation:neonIdlePulse 2.5s ease-in-out infinite}
.slot.empty .slot-token::before{content:'';height:5px;width:100%;flex-shrink:0;background:linear-gradient(90deg,rgba(94,194,106,.15),rgba(94,194,106,.45),rgba(94,194,106,.15));background-size:200% 100%;animation:stripeShimmer 2.5s linear infinite}
.slot.empty .slot-token::after{content:attr(data-pos);display:flex;flex:1;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:rgba(94,194,106,.65);line-height:1}
.slot.empty:hover .slot-token{transform:scale(1.08)}

.slot.filled.legendary .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.32) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
@keyframes epicTokenPulse{0%,100%{box-shadow:0 0 8px rgba(192,132,252,.5),0 2px 8px rgba(0,0,0,.5)}50%{box-shadow:0 0 20px rgba(192,132,252,.85),0 0 36px rgba(192,132,252,.3),0 2px 8px rgba(0,0,0,.5)}}
@keyframes legendaryTokenPulse{0%,100%{box-shadow:0 0 10px rgba(253,224,71,.55),0 2px 8px rgba(0,0,0,.5)}50%{box-shadow:0 0 26px rgba(253,224,71,.9),0 0 48px rgba(253,224,71,.35),0 2px 8px rgba(0,0,0,.5)}}
.slot.filled.mythic .slot-token{border-color:#ef4444;animation:mythicTokenPulse 1.3s ease-in-out infinite;overflow:hidden}
.slot.filled.mythic .stoken-strip{background:#ef4444}
.slot.filled.mythic .stoken-strip-scan{animation:stripScanAnim 1.4s ease-in-out infinite;opacity:1}
.slot.filled.mythic .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 28%,rgba(239,68,68,.35) 50%,transparent 72%);background-size:250% 100%;animation:tokenShimmer 1.5s linear infinite;pointer-events:none;z-index:2}
@keyframes mythicTokenPulse{0%,100%{box-shadow:0 0 12px rgba(239,68,68,.6),0 2px 8px rgba(0,0,0,.5)}50%{box-shadow:0 0 32px rgba(239,68,68,.95),0 0 58px rgba(239,68,68,.4),0 2px 8px rgba(0,0,0,.5)}}
@keyframes tokenShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes stripeShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes neonIdlePulse{0%,100%{box-shadow:0 0 4px rgba(94,194,106,.25)}50%{box-shadow:0 0 12px rgba(94,194,106,.55),0 0 20px rgba(94,194,106,.2)}}
.slot-label{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.slot-pos-mini{position:absolute;top:-5px;left:-7px;background:var(--bg-0);color:var(--text-dim);font-size:8.5px;padding:1px 4px;border-radius:3px;border:1px solid var(--border);font-weight:700}
.slot.drag-over .slot-token{border-color:var(--legendary-1);transform:scale(1.2)}

.side-panel{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.panel-section{display:flex;flex-direction:column;gap:8px}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1.6px;color:var(--text-faint);font-weight:800}
.panel-title.acc{color:var(--accent)}
.bench-list{display:flex;flex-direction:row;gap:8px;justify-content:center}
.bench-token-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;user-select:none;touch-action:none}
.bench-token-wrap.dragging{opacity:.5}
.bench-token-wrap.drag-over .slot-token{border-color:var(--legendary-1);transform:scale(1.12)}
.bench-token-wrap.filled.common .slot-token{border-color:#9ca3af}
.bench-token-wrap.filled.common .stoken-strip{background:#9ca3af}
.bench-token-wrap.filled.uncommon .slot-token{border-color:#5EC26A}
.bench-token-wrap.filled.uncommon .stoken-strip{background:#5EC26A}
.bench-token-wrap.filled.rare .slot-token{border-color:#71a4f4}
.bench-token-wrap.filled.rare .stoken-strip{background:#71a4f4}
.bench-token-wrap.filled.rare .stoken-strip-scan{animation:stripScanAnim 2.4s ease-in-out infinite;opacity:1}
.bench-token-wrap.filled.epic .slot-token{border-color:#c084fc;animation:epicTokenPulse 2s ease-in-out infinite;overflow:hidden}
.bench-token-wrap.filled.epic .stoken-strip{background:#c084fc}
.bench-token-wrap.filled.epic .stoken-strip-scan{animation:stripScanAnim 2s ease-in-out infinite;opacity:1}
.bench-token-wrap.filled.epic .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(232,121,249,.28) 50%,transparent 65%);background-size:250% 100%;animation:tokenShimmer 2.2s linear infinite;pointer-events:none;z-index:2}
.bench-token-wrap.filled.legendary .slot-token{border-color:#fde047;animation:legendaryTokenPulse 1.7s ease-in-out infinite;overflow:hidden}
.bench-token-wrap.filled.legendary .stoken-strip{background:#fde047}
.bench-token-wrap.filled.legendary .stoken-strip-scan{animation:stripScanAnim 1.7s ease-in-out infinite;opacity:1}
.bench-token-wrap.filled.legendary .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.32) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
.bench-token-wrap.filled.mythic .slot-token{border-color:#ef4444;animation:mythicTokenPulse 1.3s ease-in-out infinite;overflow:hidden}
.bench-token-wrap.filled.mythic .stoken-strip{background:#ef4444}
.bench-token-wrap.filled.mythic .stoken-strip-scan{animation:stripScanAnim 1.4s ease-in-out infinite;opacity:1}
.bench-token-wrap.filled.mythic .slot-token::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 28%,rgba(239,68,68,.35) 50%,transparent 72%);background-size:250% 100%;animation:tokenShimmer 1.5s linear infinite;pointer-events:none;z-index:2}
.bench-empty-token{width:56px;height:76px;border-radius:8px;border:1.5px solid rgba(94,194,106,.38);background:rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;animation:neonIdlePulse 2.5s ease-in-out infinite}
.bench-empty-token::before{content:'';height:5px;width:100%;flex-shrink:0;background:linear-gradient(90deg,rgba(94,194,106,.15),rgba(94,194,106,.45),rgba(94,194,106,.15));background-size:200% 100%;animation:stripeShimmer 2.5s linear infinite}
.bench-empty-token::after{content:'?';display:flex;flex:1;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:rgba(94,194,106,.65);line-height:1}
.bench-slot-label{font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

.team-stats{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.team-stats-row{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.team-stats-row:last-child{border:none}
.team-stats-row b{color:var(--text);font-weight:700}

/* DRAFT */
/* Override default .phase clipping so card glows are never cut off */
.draft-phase.phase{padding:0;overflow:visible}
.draft-phase{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:calc(100vh - 54px);
  overflow:visible;
}
/* Center block: heading + cards + (skip) sit as one group, centered in available space */
.draft-center-block{
  flex:1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  overflow:visible;
  width:100%;
  margin-top:-120px;
}
/* Replace-draft has skip button inside the block — padding-top = skip height
   cancels the centering shift exactly, placing cards at the same Y as draft screen */
.draft-center-block.has-skip{
  padding-top:111px;
}
/* Draft banner — heading with spacing above and below toward cards */
.draft-pick-banner{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:20px 24px 68px;width:100%
}
.draft-pick-instruction{
  font-size:clamp(34px,4.2vw,54px);font-weight:900;
  color:#fff;letter-spacing:-2px;text-align:center;
  text-shadow:0 2px 40px rgba(255,255,255,.08)
}
.draft-pick-slot{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(94,194,106,.08);border:1px solid rgba(94,194,106,.3);
  border-radius:10px;padding:6px 20px;font-size:15px;
  font-weight:800;color:#5EC26A;letter-spacing:.6px
}
.draft-pick-slot-dot{
  width:9px;height:9px;border-radius:50%;background:#5EC26A;
  box-shadow:0 0 10px rgba(94,194,106,.9);
  animation:neonIdlePulse 2s ease-in-out infinite
}
.draft-pick-count{font-size:11px;color:var(--text-faint);letter-spacing:.3px}
/* Cards row — sits directly below the heading */
.draft-cards{
  display:flex;gap:24px;flex-wrap:nowrap;
  justify-content:center;align-items:center;
  padding:0 40px;overflow:visible;
}
/* Scrollable draft row when cards exceed viewport */
.draft-cards-scroll{
  overflow-x:auto;overflow-y:visible;
  scrollbar-width:none;-ms-overflow-style:none;
  padding:0 40px 12px;
  -webkit-mask-image:linear-gradient(to right,transparent 0%,black 5%,black 95%,transparent 100%);
  mask-image:linear-gradient(to right,transparent 0%,black 5%,black 95%,transparent 100%);
}
.draft-cards-scroll::-webkit-scrollbar{display:none;}
.draft-cards-scroll .draft-cards{justify-content:flex-start;padding:0;overflow:visible;}
.draft-card-wrap{
  display:flex;flex-direction:column;align-items:center;
  /* zoom:1.32 on the card makes it 222×338 in layout — wrap matches exactly */
  width:222px;height:338px;justify-content:center;
  flex-shrink:0;position:relative;overflow:visible
}
/* zoom renders at full resolution (no GPU upscale blur unlike transform:scale) */
.draft-phase .card{
  zoom:1.32;
}
.draft-card-num{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.15);margin-bottom:6px}
.draft-pick-overlay{display:none}
.draft-pick-label{display:none}
/* Footer panel — sits outside center block, pinned to bottom */
.draft-footer{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;padding:0 24px 12px;width:100%;
}
/* Skip row — directly below cards, inside center block */
.draft-skip-below{
  display:flex;justify-content:center;padding:66px 0 0;width:100%;
}
.btn-draft-skip{
  background:transparent;
  border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.45);
  padding:13px 38px;border-radius:11px;
  font-size:13.5px;font-weight:700;letter-spacing:.4px;
  cursor:pointer;transition:all .15s;font-family:inherit;
  display:inline-flex;align-items:center;gap:8px;
}
.btn-draft-skip:hover{
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.32);
  color:rgba(255,255,255,.75);
}
/* Draft probability inline */
.draft-prob-wrap{
  display:flex;align-items:center;gap:0;margin:0;
  flex-wrap:wrap;justify-content:center;
  padding:4px 16px;
  width:100%
}
.draft-prob-lbl{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-right:8px}
.draft-prob-item{display:inline-flex;align-items:center;gap:2px;margin:2px 5px}
.draft-prob-rar{font-size:8.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;opacity:.9}
.draft-prob-pct{font-size:8.5px;font-weight:600;opacity:.6}
/* Legend */
.dl-item{display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text-faint)}
.dl-sep{color:var(--border);font-size:10px;align-self:center}
.dl-b{font-size:7px;font-weight:800;color:#fff;padding:2px 5px;border-radius:8px;letter-spacing:.3px;white-space:nowrap}
.dl-b.wk{background:#4ade80;color:#052e16}.dl-b.pot{background:#22d3ee;color:#064e5a}.dl-b.old{background:#f59e0b;color:#431407}.dl-b.end{background:#ef4444;color:#fff}
.dl-b.alt{background:#f59e0b;color:#431407}
.draft-legend{
  display:flex;gap:6px;align-items:center;justify-content:center;
  flex-wrap:wrap;margin:0;padding:4px 16px;
  width:100%
}
.dl-section-label{font-size:7.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);padding-right:6px;border-right:1px solid var(--border)}
.dl-item-desc{font-size:9px;color:var(--text-faint)}
/* ── PACK OPENING ─────────────────────────────────────────── */
.pack-phase{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;overflow:auto;gap:0}
.pack-scene-hdr{text-align:center;margin-bottom:22px}
.pack-scene-title{font-size:clamp(24px,3vw,38px);font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:8px}
.pack-scene-sub{font-size:12px;color:rgba(255,255,255,.32);letter-spacing:.3px}
.pack-body{width:204px;height:316px;border-radius:18px;position:relative;cursor:pointer;border:2px solid;display:flex;flex-direction:column;overflow:hidden;transition:transform .22s ease,box-shadow .22s ease;will-change:transform;user-select:none;flex-shrink:0}
.pack-body:hover{transform:translateY(-10px) scale(1.025)}
.pack-tear-strip{height:50px;border-bottom:2px dashed rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(0,0,0,.22);position:relative;overflow:hidden;flex-shrink:0}
.pack-tear-strip::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 7px,transparent 7px,transparent 14px)}
.pack-tear-lbl{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.28);position:relative}
.pack-tear-arrow{animation:packArrow .9s ease-in-out infinite;font-size:13px;opacity:.45;position:relative}
@keyframes packArrow{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.pack-main-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;padding:20px 16px;background:linear-gradient(160deg,rgba(255,255,255,.055) 0%,transparent 60%)}
.pack-league-tag{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.38);padding:3px 11px;border:1px solid rgba(255,255,255,.12);border-radius:20px}
.pack-name-lbl{font-size:18px;font-weight:900;color:#fff;text-align:center;line-height:1.1;text-shadow:0 0 28px rgba(255,255,255,.22)}
.pack-size-lbl{font-size:10px;color:rgba(255,255,255,.42);font-weight:700;letter-spacing:.5px}
.pack-rar-dots{display:flex;gap:5px;justify-content:center;margin-top:2px}
.pack-rar-dot{width:7px;height:7px;border-radius:50%}
.pack-click-hint{font-size:11px;color:rgba(255,255,255,.28);margin-top:10px;letter-spacing:.3px;animation:packHint 2s ease-in-out infinite}
@keyframes packHint{0%,100%{opacity:.28}50%{opacity:.6}}
@keyframes packFlyUp{0%{transform:translateY(0) scale(1);opacity:1;filter:brightness(1)}18%{filter:brightness(1.8)}55%{filter:brightness(3.5)}100%{transform:translateY(-360px) scale(.1) rotate(-22deg);opacity:0;filter:brightness(6)}}
@keyframes packFlyDown{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(120px) rotate(7deg);opacity:0}}
.pack-body.fly-up{animation:packFlyUp .56s cubic-bezier(.4,0,1,1) forwards}
.pack-body.fly-down{animation:packFlyDown .42s cubic-bezier(.4,0,1,1) forwards;animation-delay:.04s}
/* Face-down reveal */
.pack-reveal-scene{display:flex;flex-direction:column;align-items:center;width:100%;min-height:calc(100vh - 54px);justify-content:space-between}
.pack-reveal-hdr{text-align:center;padding:44px 20px 0;width:100%}
.pack-reveal-title{font-size:clamp(26px,3.2vw,42px);font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:10px}
.pack-reveal-sub{font-size:13px;color:rgba(255,255,255,.38);letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:8px}
.pack-reveal-sub-arrow{font-size:18px;animation:revSubBounce .9s ease-in-out infinite}
@keyframes revSubBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.pack-reveal-rows{display:flex;flex-direction:column;align-items:center;gap:20px;padding:32px 32px 64px;flex:1;overflow:visible;width:100%}
.pack-reveal-cards{display:flex;gap:18px;justify-content:center;flex-wrap:nowrap;overflow:visible;align-items:center}
.pack-flip{perspective:900px;cursor:pointer;flex-shrink:0;width:168px;height:256px;overflow:visible;position:relative}
.pack-flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1)}
.pack-flip.flipped .pack-flip-inner{transform:rotateY(180deg)}
.pack-flip:not(.flipped){transition:transform .18s ease}
.pack-flip:not(.flipped):hover{transform:translateY(-8px) scale(1.04)}
.pack-flip-back,.pack-flip-front{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.pack-flip-back{
  background:linear-gradient(158deg,#0f1520 0%,#0a0e18 100%);
  border:1.5px solid rgba(255,255,255,.12);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;gap:0;--lc:rgba(255,255,255,.2)
}
.pack-flip-back-pat{position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.016) 0,rgba(255,255,255,.016) 1px,transparent 1px,transparent 9px)}
.pack-flip-back-shine{position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,.05) 0%,transparent 48%);pointer-events:none}
.pfb-acc{position:absolute;top:0;left:0;right:0;height:4px;background:var(--lc);border-radius:14px 14px 0 0;opacity:.7}
.pfb-logo{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;z-index:1}
.pfb-logo-main{font-size:21px;font-weight:900;letter-spacing:5px;color:rgba(255,255,255,.2);text-transform:uppercase}
.pfb-logo-line{width:36px;height:1px;background:rgba(255,255,255,.1);margin:2px 0}
.pfb-logo-sub{font-size:9px;font-weight:800;letter-spacing:7px;color:rgba(255,255,255,.13);text-transform:uppercase}
.pack-flip-back-cta{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.07);
  border-top:1px solid rgba(255,255,255,.1);
  padding:9px 0;text-align:center;
  font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.55);
  animation:ctaPulse 2s ease-in-out infinite
}
@keyframes ctaPulse{0%,100%{opacity:.55}50%{opacity:1}}
.pack-flip.flipped .pack-flip-back-cta{display:none}
.pack-flip-front{transform:rotateY(180deg);overflow:visible}
.pack-flip[data-rarity=uncommon] .pack-flip-back{border-color:rgba(94,194,106,.38);box-shadow:0 0 20px rgba(94,194,106,.22)}
.pack-flip[data-rarity=rare] .pack-flip-back{border-color:rgba(113,164,244,.48);box-shadow:0 0 28px rgba(113,164,244,.32)}
.pack-flip[data-rarity=epic] .pack-flip-back{border-color:rgba(192,132,252,.58);box-shadow:0 0 38px rgba(192,132,252,.46);animation:bpEpic 2s ease-in-out infinite}
.pack-flip[data-rarity=legendary] .pack-flip-back{border-color:rgba(253,224,71,.68);box-shadow:0 0 50px rgba(253,224,71,.56);animation:bpLeg 1.5s ease-in-out infinite}
.pack-flip[data-rarity=mythic] .pack-flip-back{border-color:rgba(239,68,68,.78);box-shadow:0 0 62px rgba(239,68,68,.66);animation:bpMyt 1.2s ease-in-out infinite}
@keyframes bpEpic{0%,100%{box-shadow:0 0 38px rgba(192,132,252,.46)}50%{box-shadow:0 0 56px rgba(192,132,252,.72)}}
@keyframes bpLeg{0%,100%{box-shadow:0 0 50px rgba(253,224,71,.56)}50%{box-shadow:0 0 72px rgba(253,224,71,.9)}}
@keyframes bpMyt{0%,100%{box-shadow:0 0 62px rgba(239,68,68,.66)}50%{box-shadow:0 0 88px rgba(239,68,68,1)}}
.pack-footer{display:flex;gap:12px;align-items:center;justify-content:center;padding:0 24px 40px;width:100%}

/* ── PACK V2 — TRADING CARD PACK DESIGN ──────────────────────────────────── */
.pack-v2{width:285px;height:442px;border-radius:20px;position:relative;cursor:pointer;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:transform .26s cubic-bezier(.22,1,.36,1),box-shadow .26s ease;will-change:transform;user-select:none;border:2px solid}
.pack-v2:hover{transform:translateY(-18px) scale(1.032)}
.pack-v2:hover .pv2-shine{opacity:.7}
/* Header brand band */
.pv2-header{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px 0 15px;position:relative;overflow:hidden}
.pv2-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.14)}
.pv2-brand{font-size:19px;font-weight:900;letter-spacing:3px;color:#fff;text-transform:uppercase;text-shadow:0 1px 12px rgba(0,0,0,.6);z-index:1}
.pv2-brand-sub{font-size:7px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);text-align:right;line-height:1.55;z-index:1}
.pv2-header-glare{position:absolute;inset:0;background:linear-gradient(105deg,rgba(255,255,255,.09) 0%,transparent 55%);pointer-events:none}
/* Hero zone */
.pv2-hero{height:72px;position:relative;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pv2-hero-stripes{position:absolute;inset:0;background:repeating-linear-gradient(-52deg,rgba(255,255,255,.05) 0px,rgba(255,255,255,.05) 6px,transparent 6px,transparent 18px)}
.pv2-hero-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.06) 50%,transparent 100%);background-size:200% 100%;animation:pv2HeroShimmer 3.5s linear infinite}
@keyframes pv2HeroShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.pv2-hero-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.pv2-hero-league{font-size:11.5px;font-weight:900;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.92);text-shadow:0 1px 10px rgba(0,0,0,.9);padding:4px 16px;border-radius:20px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.14)}
/* Divider bar */
.pv2-bar{height:4px;flex-shrink:0}
/* Body */
.pv2-body{flex:1;display:flex;flex-direction:column;padding:13px 15px 11px;position:relative;overflow:hidden}
.pv2-body-glow{position:absolute;inset:0;pointer-events:none}
.pv2-season{font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;opacity:.85;position:relative;z-index:1}
.pv2-packname{font-size:21px;font-weight:900;color:#fff;letter-spacing:-.3px;line-height:1.08;text-shadow:0 2px 18px rgba(0,0,0,.75);flex:1;display:flex;align-items:center;position:relative;z-index:1}
.pv2-meta{display:flex;align-items:center;justify-content:center;gap:9px;position:relative;z-index:1}
.pv2-count{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5)}
.pv2-rar-dots{display:flex;gap:4px;align-items:center}
.pv2-rar-dot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 5px currentColor}
/* Foil shine overlay */
.pv2-shine{position:absolute;inset:0;pointer-events:none;z-index:8;background:linear-gradient(130deg,transparent 22%,rgba(255,255,255,.04) 38%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.04) 62%,transparent 78%);opacity:.38;transition:opacity .3s ease}
/* Tear strip */
.pv2-tear{height:46px;flex-shrink:0;border-top:2px dashed rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,.4);position:relative;overflow:hidden}
.pv2-tear::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.022) 0,rgba(255,255,255,.022) 6px,transparent 6px,transparent 12px)}
.pv2-tear-txt{font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.32);position:relative}
.pv2-tear-dash{flex:1;height:1px;background:rgba(255,255,255,.16);max-width:28px;position:relative}
/* Fly-out animations for v2 */
.pack-v2.fly-up{animation:packFlyUp .58s cubic-bezier(.4,0,1,1) forwards}
.pack-v2.fly-down{animation:packFlyDown .42s cubic-bezier(.4,0,1,1) forwards;animation-delay:.04s}
/* ── Pack Design 5: Flash ── */
.pv5-top{flex:0 0 266px;background:linear-gradient(170deg,#0d1220,#07090f);position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:20px}
.pv5-top-row{display:flex;justify-content:space-between;align-items:flex-start}
.pv5-brand{display:flex;flex-direction:column}
.pv5-brand-main{font-size:31px;font-weight:900;letter-spacing:1.5px;color:#fff;text-transform:uppercase;line-height:1.05}
.pv5-brand-sub{font-size:31px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;line-height:1.05}
.pv5-sport{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.22);text-transform:uppercase;margin-top:3px}
.pv5-lines{display:flex;flex-direction:column;gap:6px}
.pv5-line1{height:3px;border-radius:1.5px}
.pv5-line2{height:1.5px;border-radius:1px;opacity:.35}
.pv5-bot{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start;padding:15px 20px 58px}
.pv5-bot-pat{position:absolute;inset:0;background:repeating-linear-gradient(-52deg,rgba(0,0,0,.05) 0px,rgba(0,0,0,.05) 4px,transparent 4px,transparent 17px);pointer-events:none}
.pv5-bot-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%);pointer-events:none}
.pv5-name{font-size:25px;font-weight:900;color:rgba(0,0,0,.82);letter-spacing:-.3px;position:relative;z-index:1}
.pv5-meta{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,0,0,.5);margin-top:4px;position:relative;z-index:1}
.pv5-tear{height:56px;border-top:2px dashed rgba(0,0,0,.28);background:rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;position:absolute;bottom:0;left:0;right:0;z-index:2}
.pv5-tear-txt{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(0,0,0,.45)}
/* Scene container */
.pack-scene-inner{display:flex;flex-direction:column;align-items:center;gap:0}
/* ── Halftime Modal ── */
.ht-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;animation:htFadeIn .3s ease}
@keyframes htFadeIn{from{opacity:0}to{opacity:1}}
.ht-modal{background:#0f1520;border:1px solid rgba(255,255,255,.11);border-radius:18px;padding:28px 24px;width:clamp(300px,88vw,460px);animation:htSlideUp .36s cubic-bezier(.22,1,.36,1)}
@keyframes htSlideUp{from{transform:translateY(28px);opacity:0}to{transform:none;opacity:1}}
.ht-badge{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.32);text-align:center;margin-bottom:6px}
.ht-title{font-size:26px;font-weight:900;color:#fff;letter-spacing:-1px;text-align:center;margin-bottom:20px}
.ht-scoreline{display:flex;align-items:center;justify-content:center;gap:24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 24px;margin-bottom:10px}
.ht-team{text-align:center}
.ht-team-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:4px}
.ht-team-sc{font-size:38px;font-weight:900;color:#fff;line-height:1}
.ht-sep{font-size:28px;font-weight:900;color:rgba(255,255,255,.18)}
.ht-xg{display:flex;align-items:center;justify-content:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:22px}
.ht-xg-n{font-size:12px;font-weight:900;color:rgba(255,255,255,.62);padding:0 2px}
.ht-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ht-opt{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.09);border-radius:11px;padding:14px 14px;cursor:pointer;text-align:left;transition:background .14s,border-color .14s,transform .12s;font-family:inherit}
.ht-opt:hover{transform:translateY(-2px)}
.ht-opt-lbl{font-size:13px;font-weight:800;color:#fff;margin-bottom:5px}
.ht-opt-desc{font-size:10px;color:rgba(255,255,255,.38);line-height:1.5;font-weight:500}
.ht-opt.ht-hold:hover{background:rgba(94,194,106,.08);border-color:rgba(94,194,106,.42)}
.ht-opt.ht-press:hover{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.45)}
.ht-opt.ht-def:hover{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.45)}
.ht-opt.ht-risk:hover{background:rgba(250,204,21,.09);border-color:rgba(250,204,21,.42)}
/* ── RANDOM EVENT MODAL ──────────────────────────────────── */
.rev-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.86);display:flex;align-items:center;justify-content:center;padding:16px}
.rev-modal{background:#0d1118;border:1px solid rgba(255,255,255,.1);border-radius:22px;width:100%;max-width:580px;overflow:hidden;display:flex;flex-direction:column;animation:revUp .38s cubic-bezier(.22,1,.36,1)}
@keyframes revUp{from{transform:translateY(36px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.rev-accent{height:3px;flex-shrink:0}
.rev-masthead{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.rev-masthead-brand{font-size:10px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.18)}
.rev-masthead-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.rev-masthead-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.2)}
.rev-masthead-pill{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.rev-body{padding:24px 28px 26px}
.rev-kicker{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.rev-headline{font-size:27px;font-weight:900;font-style:italic;color:#fff;letter-spacing:-.5px;line-height:1.15;margin-bottom:13px}
.rev-lead{font-size:14px;color:rgba(255,255,255,.54);line-height:1.72;margin-bottom:0}
.rev-divider{border:none;border-top:1px dashed rgba(255,255,255,.1);margin:20px 0 18px}
.rev-effect-label{font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px}
.rev-effect-box{display:flex;align-items:flex-start;gap:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:13px 15px;margin-bottom:20px}
.rev-eff-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:16px}
.rev-eff-txt{font-size:13px;font-weight:600;color:rgba(255,255,255,.82);line-height:1.5}
.rev-picker{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;max-height:210px;overflow-y:auto}
.rev-row{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 13px;cursor:pointer;transition:background .12s,border-color .12s}
.rev-row:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15)}
.rev-row.rev-sel{border-color:rgba(129,140,248,.7);background:rgba(129,140,248,.09)}
.rev-row-info{flex:1;min-width:0}
.rev-row-name{font-size:13px;font-weight:700;color:#fff}
.rev-row-sub{font-size:11px;color:rgba(255,255,255,.36);margin-top:2px}
.rev-row-badge{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:4px;flex-shrink:0}
.rev-row-check{width:17px;height:17px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);flex-shrink:0}
.rev-row.rev-sel .rev-row-check{background:rgba(129,140,248,.9);border-color:rgba(129,140,248,.9)}
.rev-binary{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.rev-bin-opt{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:11px;padding:15px 14px;cursor:pointer;transition:background .12s,border-color .12s;text-align:left;font-family:inherit;width:100%}
.rev-bin-opt:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.16)}
.rev-bin-opt.rev-bin-sel{border-color:rgba(129,140,248,.65);background:rgba(129,140,248,.1)}
.rev-bin-lbl{font-size:13px;font-weight:800;color:#fff;display:block;margin-bottom:4px}
.rev-bin-sub{font-size:11px;color:rgba(255,255,255,.38);line-height:1.45}
.rev-transfer-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.rev-actions{display:flex;gap:9px}
.rev-btn{flex:1;padding:14px 16px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;transition:opacity .14s,transform .1s;border:none;font-family:inherit;letter-spacing:.2px}
.rev-btn:active{transform:scale(.975)}
.rev-btn-main{color:#0d1118}
.rev-btn-sec{background:rgba(255,255,255,.06);color:rgba(255,255,255,.58);border:1px solid rgba(255,255,255,.09)}
.rev-btn-sec:hover{background:rgba(255,255,255,.1)}
.rev-btn:disabled{opacity:.26;cursor:not-allowed;transform:none}
/* type accent colors */
.rev-pos .rev-accent,.rev-pos .rev-eff-bar{background:#4ade80}
.rev-pos .rev-kicker{color:#4ade80}
.rev-pos .rev-masthead-pill{background:rgba(74,222,128,.14);color:#4ade80}
.rev-pos .rev-btn-main{background:#4ade80}
.rev-neg .rev-accent,.rev-neg .rev-eff-bar{background:#f87171}
.rev-neg .rev-kicker{color:#f87171}
.rev-neg .rev-masthead-pill{background:rgba(248,113,113,.14);color:#f87171}
.rev-neg .rev-btn-main{background:#f87171}
.rev-choice .rev-accent,.rev-choice .rev-eff-bar{background:#818cf8}
.rev-choice .rev-kicker{color:#818cf8}
.rev-choice .rev-masthead-pill{background:rgba(129,140,248,.14);color:#818cf8}
.rev-choice .rev-btn-main{background:#818cf8}
.rev-risk .rev-accent,.rev-risk .rev-eff-bar{background:#fbbf24}
.rev-risk .rev-kicker{color:#fbbf24}
.rev-risk .rev-masthead-pill{background:rgba(251,191,36,.14);color:#fbbf24}
.rev-risk .rev-btn-main{background:#fbbf24;color:#0d1118}
.rb-common{background:rgba(229,231,235,.1);color:#e5e7eb}
.rb-uncommon{background:rgba(134,239,172,.1);color:#86efac}
.rb-rare{background:rgba(147,197,253,.1);color:#93c5fd}
.rb-epic{background:rgba(216,180,254,.1);color:#d8b4fe}
.rb-legendary{background:rgba(254,240,138,.1);color:#fef08a}
.rb-mythic{background:rgba(252,165,165,.1);color:#fca5a5}
.slot-unavail-overlay{position:absolute;inset:0;border-radius:inherit;background:rgba(248,113,113,.18);border:2px solid rgba(248,113,113,.65);z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.slot-unavail-badge{background:#f87171;color:#0d1118;font-size:8px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap;margin-top:4px}
/* Unavailable warning banner in lineup CTA */
.unavail-banner{display:flex;align-items:center;gap:12px;background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.35);border-radius:12px;padding:11px 16px;max-width:540px;width:100%;margin-bottom:4px;animation:unavailPulse 2s ease-in-out infinite;}
@keyframes unavailPulse{0%,100%{border-color:rgba(248,113,113,.35)}50%{border-color:rgba(248,113,113,.7)}}
.unavail-banner-icon{width:24px;height:24px;border-radius:50%;background:#f87171;color:#0d1118;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.unavail-banner-text{font-size:12px;color:rgba(255,255,255,.75);line-height:1.5;}
.unavail-banner-text strong{color:#f87171;}

/* Walkout */
.walkout-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;overflow:hidden}
.walkout-spot{position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(255,255,255,.055) 0%,transparent 68%);pointer-events:none}
.walkout-pos{font-size:14px;font-weight:900;letter-spacing:3.5px;text-transform:uppercase;padding:9px 30px;border-radius:30px;border:2px solid;opacity:0;transform:translateX(-90px);animation:woIn .5s .12s cubic-bezier(.22,1,.36,1) forwards}
.walkout-flag{font-size:76px;line-height:1;opacity:0;transform:scale(.3);animation:woPop .52s .52s cubic-bezier(.34,1.56,.64,1) forwards;filter:drop-shadow(0 0 22px rgba(255,255,255,.28))}
.walkout-czone{opacity:0;transform:scale(.78) translateY(28px);animation:woCard .6s .9s cubic-bezier(.22,1,.36,1) forwards;overflow:visible}
.walkout-btn{opacity:0;animation:woIn .38s 1.38s ease forwards;margin-top:6px}
@keyframes woIn{to{opacity:1;transform:none}}
@keyframes woCard{to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes woFlash{0%{opacity:.75}100%{opacity:0}}
.walkout-flash{position:fixed;inset:0;z-index:201;background:#fff;pointer-events:none;animation:woFlash .55s ease-out forwards}
/* Collection */
.collection-phase{padding:22px 26px;overflow:auto;gap:0;flex-direction:column}
.col-hdr{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.col-hdr-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}
.col-hdr-stats{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;align-items:center}
.col-stat{font-size:11px;font-weight:700;display:flex;gap:3px}
.col-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.cfil{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.42);border-radius:8px;padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:.4px;cursor:pointer;transition:all .12s;font-family:inherit;text-transform:uppercase;white-space:nowrap}
.cfil.active,.cfil:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28);color:#fff}
.cfil-sep{width:1px;height:20px;background:rgba(255,255,255,.1);margin:0 2px;flex-shrink:0}
.col-empty{text-align:center;padding:70px 20px;color:rgba(255,255,255,.18);font-size:14px;font-weight:600;letter-spacing:.3px}
.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.col-item{position:relative;overflow:hidden;border-radius:10px;cursor:pointer;height:198px;transition:transform .15s}
.col-item:hover{transform:scale(1.04)}
.col-item:hover{z-index:5}
.col-inner-card{position:absolute;top:0;left:0;transform:scale(0.774);transform-origin:top left;pointer-events:none}
.col-inner-card .card{pointer-events:none}
.col-dup-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.8);font-size:8px;font-weight:800;padding:2px 6px;border-radius:12px;pointer-events:none;letter-spacing:.2px;z-index:4}
.col-trade-overlay{position:absolute;bottom:0;left:0;right:0;height:54px;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;z-index:4;border-radius:0 0 10px 10px}
.col-trade-btn{background:rgba(253,224,71,.12);border:1px solid rgba(253,224,71,.5);color:#fde047;font-size:8px;font-weight:800;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:inherit;letter-spacing:.4px;transition:all .14s;white-space:nowrap}
.col-trade-btn:hover{background:rgba(253,224,71,.28);border-color:#fde047;color:#fff}
.col-item-tradeable{box-shadow:0 0 18px rgba(253,224,71,.22),inset 0 0 0 1px rgba(253,224,71,.3)!important}
/* Draft backgrounds per league — stronger, more dramatic */
.draft-phase.lg0{background:radial-gradient(ellipse 90% 60% at 50% 50%,rgba(120,113,108,.06) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(100,100,110,.10),transparent 70%)}
.draft-phase.lg1{background:radial-gradient(ellipse 90% 60% at 50% 50%,rgba(22,163,74,.07) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(22,163,74,.13),transparent 70%)}
.draft-phase.lg2{background:radial-gradient(ellipse 90% 60% at 50% 50%,rgba(8,145,178,.07) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(8,145,178,.14),transparent 70%)}
.draft-phase.lg3{background:radial-gradient(ellipse 90% 60% at 50% 50%,rgba(185,28,28,.08) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(185,28,28,.16),transparent 70%)}
.draft-phase.lg4{background:radial-gradient(ellipse 90% 60% at 50% 50%,rgba(180,130,0,.09) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(200,150,0,.18),transparent 70%)}
.draft-phase.lg5{background:radial-gradient(ellipse 90% 60% at 50% 50%,rgba(160,60,200,.10) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(160,60,200,.20),transparent 70%)}
.draft-phase.imp{background:radial-gradient(ellipse 90% 60% at 50% 50%,rgba(220,38,38,.10) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(220,38,38,.20),transparent 70%)}

/* ── DRAFT CARD: SIDE CHANNEL (Option B) ─────────────────────────────────── */
.card{width:168px;height:256px;border-radius:14px;cursor:pointer;position:relative;transition:transform .22s cubic-bezier(.25,1,.5,1),box-shadow .22s ease;background:#0f1623;overflow:hidden;border:1.5px solid;display:flex;flex-direction:row;will-change:transform}
/* Hover glow per rarity */
.card-hovered.uncommon{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 32px rgba(94,194,106,.5)!important}
.card-hovered.rare{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 48px rgba(113,164,244,.72)!important}
.card-hovered.epic{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 64px rgba(192,132,252,.88)!important}
.card-hovered.legendary{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 82px rgba(253,224,71,1)!important}
.card-hovered.mythic{box-shadow:0 22px 52px rgba(0,0,0,.85),0 0 95px rgba(239,68,68,1)!important}
@keyframes ratingBreath{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
/* Base rarity border + shadow */
.card.common{border-color:#9ca3af;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card.uncommon{border-color:#5EC26A;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card.rare{border-color:#71a4f4;box-shadow:0 8px 28px rgba(0,0,0,.55)}
.card.epic{border-color:#c084fc;box-shadow:0 8px 28px rgba(0,0,0,.55),0 0 22px rgba(192,132,252,.3)}
.card.legendary{border-color:#fde047;box-shadow:0 8px 28px rgba(0,0,0,.55),0 0 30px rgba(253,224,71,.4)}
.card.mythic{border-color:#ef4444;box-shadow:0 8px 28px rgba(0,0,0,.55),0 0 38px rgba(239,68,68,.55)}
/* ─ LEFT STRIP ─ */
.card-strip{flex-shrink:0;width:22px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:12px 0;position:relative;overflow:hidden}
.card.common .card-strip{background:#9ca3af}
.card.uncommon .card-strip{background:#5EC26A}
.card.rare .card-strip{background:#71a4f4}
.card.epic .card-strip{background:#c084fc}
.card.legendary .card-strip{background:#fde047}
.card.mythic .card-strip{background:#ef4444}
.card-strip-scan{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,.38) 50%,transparent 100%);background-size:100% 60%;opacity:0;pointer-events:none}
@keyframes stripScanAnim{0%{background-position:0 -100%}100%{background-position:0 240%}}
.card.rare .card-strip-scan{animation:stripScanAnim 2.4s ease-in-out infinite;opacity:1}
.card.epic .card-strip-scan{animation:stripScanAnim 2s ease-in-out infinite;opacity:1}
.card.legendary .card-strip-scan{animation:stripScanAnim 1.7s ease-in-out infinite;opacity:1}
.card.mythic .card-strip-scan{animation:stripScanAnim 1.4s ease-in-out infinite;opacity:1}
.card-strip-dot{width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,.28)}
.card-strip-pos{font-size:10px;font-weight:900;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);letter-spacing:1.5px;z-index:1;color:rgba(0,0,0,.55)}
/* ─ MAIN CONTENT ─ */
.card-main{flex:1;display:flex;flex-direction:column;padding:10px 9px 10px 8px;position:relative;overflow:hidden;min-width:0}
.card-sc-flag{font-size:20px;line-height:1;margin-bottom:1px}
.card-sc-rating{font-size:72px;font-weight:900;color:#fff;line-height:.95;letter-spacing:-3px}
.card.common .card-sc-rating{text-shadow:0 2px 10px rgba(0,0,0,.7)}
.card.uncommon .card-sc-rating{text-shadow:0 2px 14px rgba(94,194,106,.45)}
.card.rare .card-sc-rating{text-shadow:0 2px 22px rgba(113,164,244,.6)}
.card.epic .card-sc-rating{text-shadow:0 2px 28px rgba(192,132,252,.75)}
.card.legendary .card-sc-rating{text-shadow:0 2px 32px rgba(253,224,71,.85)}
.card.mythic .card-sc-rating{text-shadow:0 0 34px rgba(239,68,68,.95),0 2px 10px rgba(0,0,0,.5)}
.card-hovered.rare .card-sc-rating,.card-hovered.epic .card-sc-rating,.card-hovered.legendary .card-sc-rating,.card-hovered.mythic .card-sc-rating{animation:ratingBreath 2s ease-in-out infinite}
.card-sc-spacer{flex:1}
.card-sc-div{height:1px;background:rgba(255,255,255,.08);margin:0 0 7px}
.card-sc-name{font-size:13.5px;font-weight:800;color:#f0f4f8;line-height:1.2;margin-bottom:3px}
.card-sc-info{font-size:9.5px;color:#8895a7;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.card-stage-chip{font-size:7.5px;font-weight:800;padding:2px 6px;border-radius:10px;letter-spacing:.5px;line-height:1.4;flex-shrink:0}
.card-stage-chip.wk{background:#4ade80;color:#052e16}
.card-stage-chip.pot{background:#22d3ee;color:#064e5a}
.card-stage-chip.alt{background:#f59e0b;color:#431407}
.card-stage-chip.end{background:#ef4444;color:#fff}
.card-sc-stars{font-size:12px;letter-spacing:1.5px;margin-bottom:3px}
.card.common .card-sc-stars{color:#9ca3af}
.card.uncommon .card-sc-stars{color:#5EC26A}
.card.rare .card-sc-stars{color:#71a4f4}
.card.epic .card-sc-stars{color:#c084fc}
.card.legendary .card-sc-stars{color:#fde047}
.card.mythic .card-sc-stars{color:#ef4444}
.card-sc-rar{font-size:7.5px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.38)}
/* Shimmer overlay for rare+ */
.card-sc-shim{position:absolute;inset:0;background:linear-gradient(115deg,transparent 28%,rgba(255,255,255,.09) 50%,transparent 72%);background-size:260% 100%;pointer-events:none;z-index:6;opacity:0}
@keyframes cardShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.card.rare .card-sc-shim{animation:cardShimmer 2.5s linear infinite;opacity:1}
.card.epic .card-sc-shim{animation:cardShimmer 2.1s linear infinite;opacity:1}
.card.legendary .card-sc-shim{animation:cardShimmer 1.8s linear infinite;opacity:1}
.card.mythic .card-sc-shim{animation:cardShimmer 1.5s linear infinite;opacity:1}
/* OOP indicators */
.card-oop-corner{position:absolute;top:0;left:0;font-size:8px;font-weight:700;color:#fff;padding:2px 6px;border-radius:0 0 6px 0;z-index:5;letter-spacing:.3px}
.card-oop-corner.oop-alt{background:rgba(180,83,9,.9)}
.card-oop-corner.oop-foreign{background:rgba(239,68,68,.9)}

/* ── CARD REVEAL ANIMATIONS ────────────────────────────────────────────── */
@keyframes cardFlipIn{
  0%  {opacity:0;transform:rotateY(90deg) scale(.85);}
  60% {opacity:1;transform:rotateY(-8deg) scale(1.04);}
  80% {transform:rotateY(4deg) scale(1.01);}
  100%{transform:rotateY(0deg) scale(1);}
}
@keyframes epicPulse{
  0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 0px rgba(168,85,247,.0);}
  50%    {box-shadow:0 8px 32px rgba(0,0,0,.55),0 0 40px rgba(168,85,247,.75),0 0 80px rgba(168,85,247,.35);}
}
@keyframes legendaryPulse{
  0%,100%{box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 30px rgba(253,224,71,.4);}
  40%    {box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 60px rgba(253,224,71,.9),0 0 120px rgba(253,224,71,.4);}
  70%    {box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 80px rgba(255,180,0,.6);}
}
@keyframes sparkleFloat{
  0%  {transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0;}
}
@keyframes legendaryShimmer{
  0%  {background-position:200% center;}
  100%{background-position:-200% center;}
}

.card-hidden{opacity:0;pointer-events:none;transform:rotateY(90deg) scale(.85);}
.card-reveal-common,.card-reveal-uncommon{animation:cardFlipIn .38s cubic-bezier(.34,1.56,.64,1) forwards;}
.card-reveal-rare{animation:cardFlipIn .45s cubic-bezier(.34,1.56,.64,1) forwards;}
.card-reveal-epic{
  animation:cardFlipIn .52s cubic-bezier(.34,1.56,.64,1) forwards,
            epicPulse 1.6s ease-in-out .5s 3;
}
.card-reveal-legendary{
  animation:cardFlipIn .6s cubic-bezier(.22,1.4,.36,1) forwards,
            legendaryPulse 1.4s ease-in-out .55s 4;
}
.card-reveal-legendary .card-main::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.45) 50%,transparent 80%);
  background-size:200% 100%;
  animation:legendaryShimmer 1.5s linear .6s 3;
  pointer-events:none;
}
@keyframes mythicPulse{0%,100%{box-shadow:0 0 22px rgba(239,68,68,.45),0 8px 28px rgba(0,0,0,.55)}50%{box-shadow:0 0 60px rgba(239,68,68,.85),0 0 100px rgba(239,68,68,.3),0 8px 28px rgba(0,0,0,.55)}}
@keyframes mythicShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.card-reveal-mythic{
  animation:cardFlipIn .5s cubic-bezier(.22,1.4,.36,1) forwards,
            mythicPulse 1.2s ease-in-out .45s 5;
}
.card-reveal-mythic .card-main::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 20%,rgba(239,68,68,.5) 50%,transparent 80%);
  background-size:200% 100%;
  animation:mythicShimmer 1.3s linear .5s 4;
  pointer-events:none;
}

/* Sparkle particle */
.sparkle-particle{
  position:absolute;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:40;
  animation:sparkleFloat var(--sd) ease-out forwards;
}

/* TACTICS */
.tactics-phase{display:flex;flex-direction:column;padding:14px 18px 0;height:100%;overflow:hidden;gap:0}
.tactics-columns{display:grid;grid-template-columns:0.68fr 1.64fr 0.68fr;gap:16px;flex:1;overflow:hidden;align-items:start;min-height:0}
.tactics-cta-bar{height:76px;background:rgba(7,11,15,.96);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:0 -18px}
.tactics-left{display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%;min-height:0}
.tactics-mid{overflow-y:hidden;height:100%;min-height:0}
.tactics-right-card{overflow-y:auto;height:100%;min-height:0}
.team-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:12px;overflow:hidden;min-height:0}
.team-card.opponent{border-color:#7f1d1d}
.team-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--border)}
.team-name{font-size:13px;font-weight:800;letter-spacing:.3px}
.team-name.opp{color:#fca5a5}
.team-rating{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:-0.5px}
.team-rating.opp{color:#fca5a5}
.team-meta{font-size:12.5px;color:var(--text-dim)}
.team-meta b{color:var(--text);font-weight:700}

.mini-pitch{position:relative;background:linear-gradient(to top,#181d28 0%,#11141A 55%,#0e1117 100%);border-radius:6px;aspect-ratio:7/10;align-self:center;flex-shrink:0;width:100%;max-height:240px;overflow:hidden;border:1px solid rgba(255,255,255,.06);box-shadow:0 6px 24px rgba(0,0,0,.55)}
.mini-pitch svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.mini-slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:auto;cursor:grab;user-select:none;touch-action:none;z-index:2}.mini-slot.free-dragging{cursor:grabbing;z-index:30;opacity:.9}
.mini-slot.dragging{cursor:grabbing;z-index:20;opacity:.85}
.mini-slot.drag-over .mini-token{outline:2px solid var(--legendary-1)}
/* mini-token: mini card style for tactics pitch */
.mini-token{width:28px;height:38px;border-radius:5px;background:#0f1623;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.5);flex-shrink:0}
.mini-token.home{border:1.5px solid var(--accent)}
.mini-token.away{border:1.5px solid #f87171}
.mtoken-stripe{height:4px;width:100%;flex-shrink:0}
.mini-token.home .mtoken-stripe{background:var(--accent)}
.mini-token.away .mtoken-stripe{background:#f87171}
/* rarity overrides for home tokens */
.mini-token.home.common{border-color:#9ca3af} .mini-token.home.common .mtoken-stripe{background:#9ca3af}
.mini-token.home.uncommon{border-color:#5EC26A} .mini-token.home.uncommon .mtoken-stripe{background:#5EC26A}
.mini-token.home.rare{border-color:#71a4f4} .mini-token.home.rare .mtoken-stripe{background:#71a4f4}
/* base home token uses accent; rarity overrides take precedence via specificity */
.mini-token.home.epic{border-color:#c084fc;animation:epicTokenPulse 2s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.epic .mtoken-stripe{background:linear-gradient(90deg,#a855f7,#e879f9,#a855f7);background-size:200% 100%;animation:stripeShimmer 2s linear infinite}
.mini-token.home.epic::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(232,121,249,.25) 50%,transparent 65%);background-size:250% 100%;animation:tokenShimmer 2.2s linear infinite;pointer-events:none;z-index:2}
.mini-token.home.legendary{border-color:#fde047;animation:legendaryTokenPulse 1.7s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.legendary .mtoken-stripe{background:linear-gradient(90deg,#f59e0b,#fde047,#fbbf24,#fde047,#f59e0b);background-size:300% 100%;animation:stripeShimmer 1.5s linear infinite}
.mini-token.home.legendary::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.3) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
.mini-token.home.mythic{border-color:#ef4444;animation:mythicTokenPulse 1.3s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.mythic .mtoken-stripe{background:linear-gradient(90deg,#dc2626,#ef4444,#ff6b6b,#ef4444,#dc2626);background-size:300% 100%;animation:stripeShimmer 1.1s linear infinite}
.mini-token.home.mythic::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 28%,rgba(239,68,68,.35) 50%,transparent 72%);background-size:250% 100%;animation:tokenShimmer 1.5s linear infinite;pointer-events:none;z-index:2}
.mtoken-rating{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;line-height:1}
.mini-name{font-size:8.5px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.9);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}


/* Tactic tab navigation */
.tac-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg-3);border-radius:8px;padding:3px;margin-bottom:10px;gap:2px}
.tac-tab{background:transparent;color:var(--text-dim);padding:8px;font-size:11px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:.8px;transition:all .12s;text-align:center}
.tac-tab:hover{color:var(--text);background:var(--bg-4)}
.tac-tab.active.ball{background:var(--accent);color:#0d1a10}
.tac-tab.active.noball{background:var(--accent-2);color:#0d1a10}
.tac-tabs3{display:grid;grid-template-columns:repeat(3,1fr);background:var(--bg-3);border-radius:8px;padding:4px;margin-bottom:12px;gap:3px}
.tac-tab3{background:transparent;color:var(--text-dim);padding:10px 4px;font-size:12px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:.4px;transition:all .12s;text-align:center;white-space:nowrap}
.tac-tab3:hover{color:var(--text);background:var(--bg-4)}
.tac-tab3.active{background:var(--accent);color:#0d1a10}
.tac-phase-group{display:flex;flex-direction:column;gap:14px}
.tac-phase.ball-phase{border-left:none}
.tac-phase.noball-phase{border-left:none}
.tac-row{display:grid;grid-template-columns:155px 1fr minmax(110px,auto);align-items:center;gap:8px;font-size:14px;margin-bottom:13px;white-space:nowrap}

/* Intensitätsleiste */
.intens-wrap{padding:7px 0 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.intens-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.intens-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-faint);font-weight:800}
.intens-val{font-size:13px;font-weight:800;letter-spacing:.3px}
.intens-track{height:8px;background:var(--bg-3);border-radius:4px;overflow:hidden;margin-bottom:5px}
.intens-fill{height:100%;border-radius:4px;transition:width .4s,background .35s}
.intens-hint{font-size:11px;color:var(--text-faint);font-style:italic}

/* Tactic editor */
.tac-editor{flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto;padding-right:0;min-height:0;scrollbar-width:none;-ms-overflow-style:none}
.tac-editor::-webkit-scrollbar{width:0;height:0;display:none}
.tac-phase{background:transparent;border:none;border-radius:0;padding:4px 0}
.tac-phase-title{font-size:12px;text-transform:uppercase;letter-spacing:1.6px;color:var(--text-faint);font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.tac-phase-title::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent)}
.tac-phase.def .tac-phase-title::before{background:var(--accent)}
.tac-phase.att .tac-phase-title::before{background:var(--accent)}
.tac-row{display:grid;grid-template-columns:155px 1fr 110px;align-items:center;gap:8px;font-size:14px;margin-bottom:13px}
.tac-row .label{color:var(--text-dim);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tac-row .value{text-align:right;color:var(--accent);font-weight:700;font-size:12px;white-space:nowrap;overflow:visible}
.tac-row input[type=range]{width:100%;height:6px;background:var(--bg-3);border-radius:3px;appearance:none;outline:none;accent-color:var(--accent)}
.tac-row input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;border:2px solid var(--bg-2);box-shadow:0 0 6px rgba(94,194,106,.4)}
.tac-display{display:grid;grid-template-columns:100px 1fr;gap:5px;font-size:12px;padding:3px 0}
.tac-display .label{color:var(--text-dim);font-weight:500}
.tac-display .value{color:var(--text);font-weight:600}

.mentality-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:var(--bg-3);padding:4px;border-radius:9px}
.mentality-picker button{background:transparent;color:var(--text-dim);padding:10px 2px;font-size:11px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:.2px;white-space:normal;line-height:1.25;text-align:center;transition:color .1s,background .1s}
.mentality-picker button:hover{color:var(--text);background:var(--bg-4)}
.mentality-picker button.active{background:var(--accent);color:#0d1a10}

/* Option A — Leuchtring: dark center, green border, white text */
.pitch-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:900;letter-spacing:.2px;color:#fff;background:#0D1117;border:2px solid #5EC26A;box-shadow:0 0 8px rgba(94,194,106,.45),0 2px 8px rgba(0,0,0,.7);flex-shrink:0;cursor:default}
.pitch-dot.common,.pitch-dot.uncommon,.pitch-dot.rare,.pitch-dot.epic,.pitch-dot.legendary,.pitch-dot.mythic{background:#0D1117;color:#fff;border:2px solid #5EC26A;box-shadow:0 0 8px rgba(94,194,106,.45),0 2px 8px rgba(0,0,0,.7);animation:none}
.pitch-dot.away{background:#0D1117;color:#f87171;border:2px solid #f87171;box-shadow:0 0 8px rgba(248,113,113,.4),0 2px 8px rgba(0,0,0,.7)}
.pitch-dot.empty{background:transparent;border:1.5px dashed rgba(94,194,106,.35);color:rgba(94,194,106,.5);font-size:9px;font-weight:700;box-shadow:none}

.formation-row{display:flex;align-items:center;gap:6px;font-size:11px}
.formation-row select{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:5px;font-weight:700;font-size:11.5px;flex:1}

/* Scouting Card */
.scout-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
.scout-head{display:flex;align-items:center;gap:9px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.scout-icon{width:32px;height:32px;border-radius:8px;background:rgba(94,194,106,.12);border:1px solid rgba(94,194,106,.25);display:grid;place-items:center;flex-shrink:0;color:var(--accent)}
.scout-head .title{font-size:12.5px;font-weight:800}
.scout-head .subtitle{font-size:10.5px;color:var(--text-dim)}
.scout-section{font-size:11.5px;line-height:1.5}
