function generateScoutingReport(opp){
  const t=opp.tactics;
  const oppAvg=opp.avg;
  const myAvg=teamAvg(state.team,state.formation);
  const g=k=>t[k]??2;
  const MIT=[],OHNE=[];

  const passL    =['Sehr kurz','Kurz','Standard','Vertikal','Sehr vertikal'];
  const routeL   =['Flügel','Halbräume außen','Ausgewogen','Halbräume innen','Zentrum'];
  const breiteL  =['Sehr eng','Eng','Standard','Breit','Sehr breit'];
  const tempoL   =['Sehr langsam','Langsam','Standard','Schnell','Sehr schnell'];
  const direktL  =['Sehr indirekt','Indirekt','Standard','Direkt','Sehr direkt'];
  const kreativL =['Sehr eng','Eingeschränkt','Standard','Frei','Sehr frei'];
  const mentL    =['Sehr defensiv','Defensiv','Ausgewogen','Offensiv','Sehr offensiv'];
  const verlustL =['Fallen lassen','Eher tief','Standard','Eher pressen','Gegenpressing'];
  const linienL  =['Sehr tief','Tief','Standard','Hoch','Sehr hoch'];
  const pressL   =['Sehr selten','Selten','Standard','Häufig','Sehr häufig'];
  const deckL    =['Zonendeckung','Eher Zone','Ausgewogen','Eher Mann','Manndeckung'];
  const konterL  =['Ruhig aufbauen','Eher aufbauen','Ausgewogen','Eher kontern','Schnell kontern'];
  const brDefL   =['Sehr kompakt','Kompakt','Standard','Breit','Flügel sichern'];
  const gegFlL   =['Zulassen','Eher zulassen','Ausgewogen','Eher verh.','Verhindern'];

  // --- MIT BALL: alle relevanten Werte, nicht-Standard hervorgehoben ---
  MIT.push({icon:'🗺️',label:'Route',    value:routeL[g('angriffsroute')],  highlight:g('angriffsroute')!==2});
  MIT.push({icon:'📤',label:'Passspiel', value:passL[g('passStyle')],       highlight:g('passStyle')<=1||g('passStyle')>=3});
  MIT.push({icon:'💨',label:'Tempo',    value:tempoL[g('tempo')],           highlight:g('tempo')<=1||g('tempo')>=3});
  MIT.push({icon:'🎯',label:'Direktheit',value:direktL[g('direktheit')],    highlight:g('direktheit')<=1||g('direktheit')>=3});
  MIT.push({icon:'📐',label:'Breite',   value:breiteL[g('breite')],         highlight:g('breite')<=1||g('breite')>=3});
  if(g('kreativFreiheiten')!==2) MIT.push({icon:'🎨',label:'Kreativität',value:kreativL[g('kreativFreiheiten')],highlight:true});
  if(g('flanken')!==2)           MIT.push({icon:'↗️',label:'Flanken',    value:['Sehr selten','Selten','Standard','Häufig','Sehr häufig'][g('flanken')],highlight:g('flanken')>=3||g('flanken')<=1});
  if(g('nachBallverlust')!==2)   MIT.push({icon:'🔁',label:'Nach Verlust',value:verlustL[g('nachBallverlust')],highlight:g('nachBallverlust')<=1||g('nachBallverlust')>=3});
  MIT.push({icon:'🧠',label:'Mentalität',value:mentL[g('mentality')],       highlight:g('mentality')<=1||g('mentality')>=3});

  // --- OHNE BALL: alle relevanten Werte ---
  OHNE.push({icon:'📏',label:'Pressinglinie',   value:linienL[g('pressingLinie')],    highlight:g('pressingLinie')<=1||g('pressingLinie')>=3});
  OHNE.push({icon:'🏰',label:'Defensivlinie',   value:linienL[g('defensivLinie')],    highlight:g('defensivLinie')<=1||g('defensivLinie')>=3});
  OHNE.push({icon:'🔥',label:'Pressing',        value:pressL[g('pressingAusloesung')],highlight:g('pressingAusloesung')<=1||g('pressingAusloesung')>=3});
  OHNE.push({icon:'🧍',label:'Deckung',         value:deckL[g('deckung')],            highlight:g('deckung')<=1||g('deckung')>=3});
  if(g('nachBalleroberung')!==2) OHNE.push({icon:'🏁',label:'Ballgewinn',value:konterL[g('nachBalleroberung')],highlight:g('nachBalleroberung')>=3||g('nachBalleroberung')<=1});
  if(g('defensivBreite')!==2)    OHNE.push({icon:'↔️',label:'Def. Breite',value:brDefL[g('defensivBreite')],highlight:g('defensivBreite')<=1||g('defensivBreite')>=3});
  if(g('gegnerFlanken')!==2)     OHNE.push({icon:'🛡️',label:'Flankenabw.',value:gegFlL[g('gegnerFlanken')],highlight:true});

  let qualText,qualType;
  if(oppAvg>myAvg+5){qualText='Gegner individuell <b>überlegen</b>';qualType='danger'}
  else if(oppAvg<myAvg-5){qualText='Gegner individuell <b>schwächer</b>';qualType='info'}
  else{qualText='Beide Teams auf <b>Augenhöhe</b>';qualType='info'}

  const mentalityL=['Sehr defensiv','Defensiv','Ausgewogen','Offensiv','Sehr offensiv'];
  return{
    mit:MIT,
    ohne:OHNE,
    quality:{text:qualText,type:qualType},
    mentality:mentalityL[g('mentality')],
    formation:opp.formation
  };
}

/* ============================================================
   TACTIC EDGE — Pro Trainer Counter Logic
   ============================================================ */
function calcIntensity(tactics){
  const g=k=>tactics[k]??2;
  // unterstuetzLaeufe: V-Kurve — sowohl Hinterlaufen(0) als auch Vorderlaufen(4) erhöhen Int.
  const laeufeInt=Math.abs(g('unterstuetzLaeufe')-2)*0.7; // max 1.4 bei 0 oder 4
  const raw=
    g('pressingLinie')*1.8+       // größter Treiber
    g('pressingAusloesung')*1.6+  // sehr einflussreich
    g('nachBallverlust')*1.2+     // Gegenpressing sehr kostspielig
    g('tempo')*1.0+
    g('direktheit')*0.6+
    laeufeInt+                    // symmetrisch: Extreme = mehr Int.
    g('dribblings')*0.4+          // leichter Einfluss
    g('defensivLinie')*0.35+      // reduzierter Einfluss (war 0.7)
    g('nachBalleroberung')*0.4;
  // Normalisierung: max = 4*1.8+4*1.6+4*1.2+4*1.0+4*0.6+2*0.7+4*0.4+4*0.35+4*0.4
  const maxRaw=7.2+6.4+4.8+4.0+2.4+1.4+1.6+1.4+1.6; // = 30.8
  return Math.round((raw/maxRaw)*100);
}
function getIntensityLevel(pct){
  if(pct>=80)return{label:'Extrem',color:'#ef4444'};
  if(pct>=65)return{label:'Sehr hoch',color:'#f97316'};
  if(pct>=50)return{label:'Hoch',color:'#f59e0b'};
  if(pct>=35)return{label:'Mittel',color:'#5EC26A'};
  return{label:'Niedrig',color:'#5EC26A'};
}
function tacticEdge(my,opp){
  let s=0;
  const t=k=>my[k]??2;
  const o=k=>opp[k]??2;

  // === Gegen hohe Pressinglinie (mit/ohne Hochpressing) — ZUSAMMENGEFÜHRT ===
  // Früher zwei separate Blöcke → Doppelzählung von tempo/nachBall. Jetzt ein Block.
  if(o('pressingLinie')>=3){
    const hochPress=o('pressingAusloesung')>=3;
    // Tiefenläufe + Konter hinter die Linie
    if(t('nachBalleroberung')>=3)s+=hochPress?4:3;
    if(t('tempo')>=3)            s+=hochPress?3:2;
    if(t('direktheit')>=3)       s+=1;  // reduziert (war +2, asymmetrisch zu AI-Stilen)
    if(t('passAufnahme')>=3)     s+=1;  // reduziert (war +3, asymmetrisch zu AI-Stilen)
    // Passstil nur gegen Hochpressing entscheidend
    if(hochPress){
      if(t('passStyle')>=3)s+=3;   // lange Bälle überspielen Pressing
      if(t('passStyle')<=1)s-=4;   // kurz aufbauen vs Hochpressing = fatal
    }
    // Zu passiv gegen hohe Linie
    if(t('tempo')<=1&&t('nachBalleroberung')<=1)s-=3;
  }
  // === Gegen tiefen Block ===
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('breite')>=3)s+=3;
    if(t('kreativFreiheiten')>=3)s+=3;
    if(t('unterstuetzLaeufe')>=3)s+=2;
    if(t('tempo')<=1)s+=1;
    if(t('tempo')>=4&&t('breite')<=1)s-=3;
    if(t('nachBalleroberung')>=3)s-=2;
  }
  // === Gegen kurzes Aufbauspiel ===
  if(o('passStyle')<=1&&o('tempo')<=1){   // fix: <=1 statt <=2 (Standard ausgeschlossen)
    if(t('pressingAusloesung')>=3&&t('pressingLinie')>=3)s+=4;  // war +5
    if(t('pressingAusloesung')<=1)s-=2;
  }
  // === Gegen direktes / langes Spiel ===
  if(o('passStyle')>=3){
    if(t('defensivLinie')<=1)s+=2;  // fix: nur wirklich tief (war <=2 = Standard)
    if(t('defensivLinie')>=3)s-=2;
  }
  // === Kreativität vs Pressing ===
  if(o('kreativFreiheiten')>=3&&t('pressingAusloesung')>=3)s+=2;
  if(o('kreativFreiheiten')<=1&&t('kreativFreiheiten')>=3)s+=1;
  // === Aufbau-Stil Matchup ===
  if(o('spielaufbau')<=1&&t('pressingAusloesung')>=3&&t('pressingLinie')>=3)s+=3;
  if(t('aufbauStrategie')<=1&&o('nachBallverlust')>=3)s-=2;
  // === Gegen breites Spiel ===
  if(o('spielaufbau')>=3){if(t('spielaufbau')<=1)s+=2;}
  if(o('breite')>=3){if(t('breite')<=1)s+=2;}
  // === Gegen Gegenpressing ===
  if(o('nachBallverlust')>=3){
    if(t('passStyle')>=3)s+=3;          // lange Bälle überspielen Gegenpressing
    // kreativFreiheiten hier neutral — entscheidend ist Spielgeschwindigkeit, nicht Stil
  }
  if(o('nachBallverlust')<=1){
    if(t('nachBalleroberung')>=3)s+=3;
    if(t('tempo')>=3)s+=2;
    if(t('unterstuetzLaeufe')>=3)s+=1;  // Nachrückbewegungen effektiv wenn Gegner nicht zurückpresst
  }
  // === Flankenspiel ===
  if(o('flanken')>=3&&t('gegnerFlanken')<=1)s-=2;
  if(o('flanken')>=3&&t('gegnerFlanken')>=3)s+=2;
  if(t('flanken')>=3&&o('gegnerFlanken')<=1)s+=2;
  // === Mentalität ===
  if(o('mentality')>=3&&t('mentality')<=1)s+=3;
  if(o('mentality')<=1&&t('mentality')>=3)s+=2;
  if(o('mentality')===4&&t('nachBalleroberung')>=3)s+=3;
  // === Dribbling vs Deckung ===
  if(t('dribblings')>=3&&o('deckung')>=3)s-=1;
  if(t('dribblings')>=3&&o('deckung')<=1)s+=2;
  // === Kohärenz ===
  if(Math.abs(t('mentality')-t('pressingAusloesung'))>=3)s-=2;
  if(Math.abs(t('passStyle')-t('tempo'))>=3)s-=1;
  // Pep-Stil: kurzer Aufbau + Hochpressing
  if(t('passStyle')<=1&&t('pressingAusloesung')>=3&&t('pressingLinie')>=3)s+=2;
  // Hohe Linie anfällig für Konter
  if(t('pressingLinie')>=3&&o('nachBalleroberung')>=3)s-=2;
  if(t('pressingLinie')>=3&&t('nachBalleroberung')>=3)s+=1;  // fix: >=3 (war >=2 = Standard)
  // Manndeckung vs kreative Angreifer
  if(t('deckung')>=3&&o('kreativFreiheiten')>=3)s-=2;
  if(t('deckung')>=3&&o('kreativFreiheiten')<=1)s+=1;
  // Manndeckung vs strukturiertes, geduldiges Spiel
  if(t('deckung')>=3&&o('tempo')<=1&&o('direktheit')<=1)s+=1; // klare Laufwege → Mann kann zugeordnet werden

  // === NEUE KORRELATIONEN ===

  // Spielbreite OHNE BALL (defensivBreite) ↔ gegnerische Flanken
  if(o('flanken')>=3){
    if(t('defensivBreite')>=3)s+=2;   // breit sichern = Flanken abdecken
    if(t('defensivBreite')<=1)s-=2;   // zu kompakt = Flanken ungedeckt
  }
  if(o('flanken')<=1&&o('angriffsroute')>=3){
    if(t('defensivBreite')<=1)s+=1;   // kompakt optimal gegen Zentrumsangriff
  }
  // eigene Flanken ↔ gegnerische Defensivbreite
  if(o('defensivBreite')<=1){
    if(t('flanken')>=3)s+=2;          // Flanken ideal wenn Gegner kompakt steht
  }
  if(o('defensivBreite')>=3){
    if(t('flanken')<=1)s+=1;          // wenig Flanken wenn Gegner breit steht
  }

  // Aufbaustrategie ↔ gegnerisches Pressing
  if(o('pressingLinie')>=3&&o('pressingAusloesung')>=3){
    if(t('aufbauStrategie')>=3)s+=3;  // Flügel-Aufbau umgeht Hochpressing
    if(t('aufbauStrategie')<=1)s-=2;  // Zentrum-Aufbau vs Hochpressing gefährlich
  }
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('aufbauStrategie')<=1)s+=2;  // Zentrum optimal gegen tiefen Block
    if(t('aufbauStrategie')>=3)s-=1;
  }

  // Abstöße ↔ gegnerisches Pressing
  if(o('pressingAusloesung')>=3&&o('pressingLinie')>=3){
    if(t('abstöße')>=3)s+=2;          // lange Abstöße überspielen Pressing
    if(t('abstöße')<=1)s-=2;          // kurze Abstöße vs Pressing = gefährlich
  }
  if(o('pressingLinie')<=1){
    if(t('abstöße')<=1)s+=1;          // kurze Abstöße gegen tiefen Block sinnvoll
    if(t('abstöße')>=3)s-=1;
  }

  // Spielaufbau ↔ gegnerische Breite
  if(o('defensivBreite')>=3||o('breite')<=1){
    if(t('spielaufbau')<=1)s+=2;      // Zentrum wenn Gegner defensiv breit steht
  }
  if(o('defensivBreite')<=1){
    if(t('spielaufbau')>=3)s+=2;      // Flügel wenn Gegner kompakt/eng steht → Außenbahnen frei
  }

  // Pass-Aufnahme ↔ Spielstil-Kohärenz
  if(t('nachBalleroberung')>=3&&t('direktheit')>=3){
    if(t('passAufnahme')>=3)s+=2;     // Tiefenläufe bei Konterspiel
  }
  if(t('passStyle')<=1&&t('tempo')<=1){
    if(t('passAufnahme')<=1)s+=1;     // in den Fuß bei Ballbesitz
  }

  // Passrisiko ↔ gegnerisches Pressing
  if(o('pressingLinie')>=3&&o('pressingAusloesung')>=3){
    if(t('passRisiko')>=3)s-=3;       // riskante Pässe gegen Pressing fatal
    if(t('passRisiko')<=1)s+=1;       // sicheres Passspiel gegen Pressing
  }
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('passRisiko')>=3)s+=2;       // hohes Passrisiko gegen tiefen Block = Chancen
  }

  // Dribblings ↔ Pressing / Deckung
  if(o('pressingLinie')<=1&&o('deckung')<=1){
    if(t('dribblings')>=3)s+=3;       // viele Dribblings gegen tiefen Block + Zonendeckung
  }
  if(o('pressingAusloesung')>=3||o('deckung')>=3){
    if(t('dribblings')>=3)s-=2;       // Dribblings gegen Pressing/Manndeckung riskant
    if(t('dribblings')<=1)s+=1;
  }

  // Direktheit ↔ Kontertaktik
  if(t('nachBalleroberung')>=3&&t('pressingLinie')<=1){
    if(t('direktheit')>=3)s+=2;       // direktes Spiel bei Kontertaktik ideal
  }
  if(t('passStyle')<=1&&t('tempo')<=1&&t('direktheit')>=3&&o('pressingLinie')<=1){
    s-=1;                              // direkt unnötig bei geduldiger Taktik vs tiefen Block
  }

  // Kreative Freiheiten ↔ Gegner-Defensivtiefe
  if(o('pressingLinie')<=1&&o('defensivLinie')<=1){
    if(t('kreativFreiheiten')>=3)s+=2;
  }
  if(o('pressingLinie')>=3&&o('pressingAusloesung')>=3){
    if(t('kreativFreiheiten')>=3)s-=2; // kreativität kostet Zeit gegen Pressing
    if(t('kreativFreiheiten')<=1)s+=1;
  }

  // Angriffsroute ↔ Gegner-Abwehrbreite
  if(o('defensivBreite')<=1){
    if(t('angriffsroute')<=1)s+=3;    // Flügel optimal wenn Gegner kompakt
    if(t('angriffsroute')>=3)s-=1;
  }
  if(o('defensivBreite')>=3){
    if(t('angriffsroute')>=3)s+=2;    // Zentrum wenn Gegner breit steht
    if(t('angriffsroute')<=1)s-=1;
  }
  if(t('kreativFreiheiten')>=3&&(t('angriffsroute')===1||t('angriffsroute')===3)){
    s+=1;                              // Kreativität + Halbräume = gute Synergie
  }

  // Fernschüsse ↔ Kontext
  if(o('pressingLinie')<=1&&o('defensivLinie')<=1){
    if(t('fernschuesse')>=3)s+=1;     // tiefer Block + tiefer Gegner → Raum vor Strafraum vorhanden
  }
  if(o('defensivBreite')<=1&&o('defensivLinie')<=1){
    if(t('fernschuesse')>=3)s+=1;     // kompakter tiefer Block → kein Durchkommen, Distanzschüsse sinnvoll
  }
  if(t('passStyle')<=1||t('direktheit')<=1){
    if(t('fernschuesse')>=3)s-=2;     // Fernschüsse passen nicht zu geduldiger Taktik
  }
  if(t('flanken')>=3&&t('fernschuesse')>=3)s-=1; // Flanken + Fernschüsse inkohärent

  // Pressinglinie ↔ gegnerischer Aufbaustil (ergänzend)
  if(o('passStyle')>=3&&o('direktheit')>=3){
    if(t('pressingLinie')>=3)s-=2;    // hohe Linie gegen lange Bälle gefährlich
    if(t('pressingLinie')<=1)s+=2;    // tief gegen Konter/direkt optimal
  }
  if(o('abstöße')<=1&&t('pressingLinie')>=3)s+=1; // Gegner kurze Abstöße → früh pressen lohnt

  // Defensivlinien-Kohärenz (eigene Pressinglinie ↔ Defensivlinie)
  const linienGap=Math.abs(t('pressingLinie')-t('defensivLinie'));
  if(linienGap>=3)s-=3;               // zu großer Abstand zwischen den Linien gefährlich
  if(linienGap<=1&&t('pressingLinie')>=3)s+=1; // kompakte hohe Formation

  // Pressingauslösung ↔ Gegner Aufbaustil (ergänzend)
  if(t('pressingAusloesung')>=3&&o('passStyle')<=1)s+=2;
  if(t('pressingAusloesung')>=3&&o('direktheit')>=4)s-=1;

  // Nach Ballverlust ↔ gegnerischer Spielstil
  if(o('passStyle')>=3&&o('direktheit')>=3){
    if(t('nachBallverlust')<=1)s+=2;  // fallen lassen gegen lange Bälle optimal
    if(t('nachBallverlust')>=4)s-=2;  // gegenpressing gegen Konter sehr gefährlich
  }
  if(o('passStyle')<=1&&o('tempo')<=1){
    if(t('nachBallverlust')>=3)s+=2;  // gegenpressing gegen Ballbesitz ideal
    if(t('nachBallverlust')<=1)s-=1;
  }

  // Nach Balleroberung ↔ Gegner-Defensivtiefe
  if(o('pressingLinie')<=1&&o('defensivLinie')<=1){
    if(t('nachBalleroberung')<=1)s+=2; // ruhig aufbauen wenn Gegner tief steht
  }

  // Gegner-Flanken ↔ gegnerischer Angriffsstil
  if(o('flanken')>=3&&o('breite')>=3){
    if(t('gegnerFlanken')>=3)s+=2;    // Verhindern gegen breiten Flügelangreifer → klarer Vorteil
    if(t('gegnerFlanken')<=1)s-=2;    // Zulassen gegen breiten Flügelangreifer → klarer Nachteil
  }
  if(o('flanken')<=1&&o('angriffsroute')>=3){
    if(t('gegnerFlanken')<=1)s+=1;    // Zulassen sinnvoll wenn Gegner Zentrum fokussiert — keine Flanken zu verhindern
  }

  // Deckung ↔ Gegner-Spielstil
  if(o('passStyle')>=3&&o('flanken')>=3){
    if(t('deckung')<=1)s+=1;          // Zonendeckung optimal gegen lange Bälle/Flanken
    if(t('deckung')>=3)s-=1;          // Manndeckung bei Flanken suboptimal
  }

  return clamp(s,-25,25);
}

/* ============================================================
   FORMATION SPREAD HELPERS
   ============================================================ */
function calcFormationSpread(customPos,formation){
  const slots=FORMATIONS[formation];
  if(!slots||!slots.length)return 65;
  const xs=slots.map(s=>(customPos[s.id]?customPos[s.id].x:s.x));
  const ys=slots.map(s=>(customPos[s.id]?customPos[s.id].y:(100-s.y)));
  const xSpread=Math.max(...xs)-Math.min(...xs);
  const ySpread=Math.max(...ys)-Math.min(...ys);
  return {xSpread,ySpread};
}
function calcSpreadBonus(mySpread,defSpread,tac){
  if(!mySpread||typeof mySpread==='number')return 0;
  let b=0;
  // Compact defense (narrow xSpread) + deep defensive line = bonus
  if(defSpread.xSpread<45&&(tac.defensivLinie??2)<=2)b+=1.5;
  // Very wide attack vs normal defense = more space
  if(mySpread.xSpread>75&&(tac.breite??2)>=3)b+=1;
  // Incoherence: attacking very wide but defending very narrow
  if(mySpread.xSpread>70&&defSpread.xSpread<40)b-=1;
  return clamp(b,-3,3);
}

/* ============================================================
   MATCH ENGINE (Poisson xG)
   ============================================================ */
function calcTeamStrength(team,formation,useRoles=true){
  const weights={GK:1.2,CB:1.0,LB:0.9,RB:0.9,CDM:1.1,CM:1.0,CAM:1.0,LW:0.95,RW:0.95,ST:1.05};
  const slots=FORMATIONS[formation];
  let sum=0,wSum=0;
  for(const slot of slots){
    const p=team[slot.id];if(!p)continue;
    const w=weights[slot.pos]||1.0;
    const penalty=posPenalty(getPosRelation(p.pos,slot.pos));
    sum+=(p.rating-penalty)*w;wSum+=w;
  }
  return wSum?sum/wSum:0;
}
function simulateMatch(){
  const myStr=calcTeamStrength(state.team,state.formation);
  const oppStr=calcTeamStrength(state.opponent.team,state.opponent.formation);
  const ratingDiff=myStr-oppStr;
  const myEdge=tacticEdge(state.tactics,state.opponent.tactics);
  const oppEdge=tacticEdge(state.opponent.tactics,state.tactics);
  const tacticNet=myEdge-oppEdge;

  // Prio: Taktik (1.0 pt) > Stärke (0.95 pt) > Spielerrollen > Glück
  // +20 Taktik wird erst durch 21+ Punkte Ratingvorteil ausgeglichen
  const roleSynergy=calcRoleSynergy(state.team,state.formation,state.roles);
  // Formation spread: wenn Spieler manuell enger gestellt = kompaktere Verteidigung
  const mySpread=calcFormationSpread(state.customPosMit,state.formation);
  const defSpread=calcFormationSpread(state.customPosOhne,state.defFormation);
  const spreadBonus=calcSpreadBonus(mySpread,defSpread,state.tactics);
  const _ebs=state.eventBuff||{};
  const combinedAdv=tacticNet+ratingDiff*0.95+roleSynergy+spreadBonus+(_ebs.tacticEdge||0)+(_ebs.myRatingMod||0)*0.95;
  // Preserve draft-relevant eventBuff fields for generateReplaceCards (called later on CTA click)
  state.eventBuff=(_ebs.extraCards||_ebs.draftRarityBoost||_ebs.draftGuaranteedRare)
    ?{extraCards:_ebs.extraCards,draftRarityBoost:_ebs.draftRarityBoost,draftGuaranteedRare:_ebs.draftGuaranteedRare}
    :null;
  // Perk bonuses
  const _ps=state.perkState;
  const _tp=k=>state.tactics[k]??2;
  let perkEdge=0;
  if(hasPerk('heimstaerke'))perkEdge+=2;
  if(hasPerk('routinier'))perkEdge+=Math.min(_ps.routinierLeagues,4);
  if(hasPerk('teamgeist')){const c85=Object.values(state.team).filter(p=>p&&p.rating>=85).length;perkEdge+=Math.min(c85*0.4,3);}
  if(hasPerk('gegenpressing')&&_tp('nachBallverlust')>=3)perkEdge+=3;
  if(hasPerk('abseitsfalle')&&_tp('defensivLinie')>=3)perkEdge+=3;
  if(hasPerk('konterkonig')&&_tp('nachBalleroberung')>=3)perkEdge+=4;
  if(hasPerk('ballbesitz')&&_tp('passStyle')<=1)perkEdge+=3;
  if(hasPerk('niedrigblock')&&_tp('pressingLinie')<=1&&_tp('pressingAusloesung')<=1)perkEdge+=3;
  if(hasPerk('pressing_monster')&&_tp('pressingAusloesung')>=3&&_tp('pressingLinie')>=3)perkEdge+=2;
  if(hasPerk('fluegelwirbel')){const wc=Object.values(state.team).filter(p=>p&&(p.pos==='LW'||p.pos==='RW')&&p.rating>=85).length;if(wc>=2)perkEdge+=2;}
  if(_ps.aufsteigerGames>0){perkEdge+=3;_ps.aufsteigerGames--;}
  if(_ps.serioesBuff){perkEdge+=4;_ps.serioesBuff=false;}
  if(_ps.comebackBuff){perkEdge+=3;_ps.comebackBuff=false;}
  // Draw buff: +4 edge (base) + optional +2 from Unentschieden-Spezialist perk
  const _wasDrawBuff=state.drawBuff;
  if(_wasDrawBuff){perkEdge+=4+(hasPerk('unentschieden_spezialist')?2:0);state.drawBuff=false;}

  // Luck: nur relevant wenn Spiel sehr ausgeglichen (|adv| < 8)
  const luckScale=Math.max(0,1-Math.abs(combinedAdv)/8);
  const luck=randFloat(-3,3)*luckScale;

  // Intensität & Ermüdungseffekt (nach Minute 60)
  const myIntensity=calcIntensity(state.tactics)+(_ebs.intensityDebuff||0);
  const benchPlayers=state.bench?state.bench.filter(b=>b.player).map(b=>b.player):[];
  const benchAvg=benchPlayers.length>0?benchPlayers.reduce((s,p)=>s+p.rating,0)/benchPlayers.length:60;
  const benchRelief=clamp((benchAvg-58)/30,0,1);  // 0-1: gute Bank reduziert Intensitätskosten
  // Exponentiell: erst ab ~60% spürbar, bei 90%+ deutlich, nie katastrophal
  // Bei 60%: ~3% xG-Verlust | 75%: ~9% | 85%: ~14% | 95%: ~20% | 100%: ~25%
  const fatigueFactor=myIntensity>=55?Math.pow(Math.max(0,myIntensity-55)/45,1.4)*0.25:0;
  const fatigue=clamp(fatigueFactor*(1-benchRelief*0.4),0,0.25);
  // Opponent fatigue
  const oppIntensity=calcIntensity(state.opponent.tactics);
  const oppFatigue=clamp(oppIntensity>=55?Math.pow(Math.max(0,oppIntensity-55)/45,1.4)*0.25:0,0,0.25);

  // xG — skaliert am kombinierten Vorteil (hohe Werte = viele Tore = mehr Spaß)
  const finalAdv=combinedAdv+perkEdge;
  const norm=finalAdv/10;
  let myXG=2.6+norm*1.1+luck*0.25;
  let oppXG=2.6-norm*1.1-luck*0.25;
  if(hasPerk('torrausch'))myXG*=1.05;
  if(hasPerk('eiserne_abwehr'))oppXG*=0.95;
  // Fatigue: reduziert xG direkt (exponentiell, erst ab ~60% spürbar)
  myXG*=(1-fatigue);
  oppXG*=(1-oppFatigue);
  myXG=clamp(myXG,0.5,8.0);
  oppXG=clamp(oppXG,0.5,8.0);
  // Tore via Poisson(xG) → realistische Streuung, xG ist nur Erwartungswert
  const {myGoals,oppGoals}=simulateGoals(myXG,oppXG);
  const draw=myGoals===oppGoals;
  return {won:myGoals>oppGoals,draw,myGoals,oppGoals,myXG,oppXG,ratingDiff,myEdge,oppEdge,tacticNet,luck,myStr,oppStr,combinedAdv,myIntensity,fatigue};
}


/* ============================================================
   PENALTY SHOOTOUT
   ============================================================ */
function simulatePenalties(){
  const myPlayers=Object.values(state.team).filter(Boolean).sort((a,b)=>b.rating-a.rating).slice(0,5);
  const oppPlayers=Object.values(state.opponent.team).filter(Boolean).sort((a,b)=>b.rating-a.rating).slice(0,5);
  const myGK=Object.values(state.team).find(p=>p.pos==='GK');
  const oppGK=Object.values(state.opponent.team).find(p=>p.pos==='GK');
  let myPens=0,oppPens=0;const events=[];
  // Base scoring rate 0.76 (real-world ~76%). GK influence dampened (×0.004 not ×0.007)
  // so even a 100-rated GK saves ~25-40%, not 50%+. Min clamp 0.45 keeps variance fair.
  function penChance(kickerRating,gkRating){
    const diff=kickerRating-gkRating;
    return clamp(0.76+diff*0.004+randFloat(-0.07,0.07),0.45,0.92);
  }
  // Alternating: home shoots, away shoots, home shoots, away shoots ...
  for(let i=0;i<5;i++){
    // Home kick
    const mp=myPlayers[i];
    const gkRopp=oppGK?oppGK.rating:70;
    const scoredM=Math.random()<penChance(mp.rating,gkRopp);
    if(scoredM)myPens++;
    events.push({team:'home',name:shortName(mp.name),scored:scoredM});
    // Away kick
    const op=oppPlayers[i];
    const gkRmy=myGK?myGK.rating:70;
    const scoredO=Math.random()<penChance(op.rating,gkRmy);
    if(scoredO)oppPens++;
    events.push({team:'away',name:shortName(op.name),scored:scoredO});
    // Early finish: remaining kicks can't change outcome
    const remaining=4-i;
    if(myPens>oppPens+remaining||oppPens>myPens+remaining)break;
  }
  // Sudden death if tied after 5 rounds — GK still matters but weakly
  if(myPens===oppPens){
    const myBest=myPlayers[0]?.rating||70;
    const oppBest=oppPlayers[0]?.rating||70;
    const gkAdv=((myGK?.rating||70)-(oppGK?.rating||70))*0.004;
    const myWins=Math.random()<clamp(0.5+(myBest-oppBest)*0.01+gkAdv,0.3,0.7);
    return{myPens:myPens+(myWins?1:0),oppPens:oppPens+(myWins?0:1),events,sudden:true};
  }
  return{myPens,oppPens,events,sudden:false};
}
/* ============================================================
   POTENTIAL / AGING
   ============================================================ */
function progressPlayers(){
  const out=[];
  const all=[];
  for(const sid in state.team)all.push({where:'team',sid,player:state.team[sid]});
  state.bench.forEach((b,i)=>{if(b.player)all.push({where:'bench',sid:i,player:b.player})});
  for(const e of all){
    const p=e.player;if(!p)continue;
    if(p.rarity==='mythic')continue; // Mythic-Karten sind permanent — keine Entwicklung
    const r=Math.random();
    let dir=0;
    // ── Jugend-Entwicklung ────────────────────────────────────────────
    if(p.age<=19){
      if(r<0.15)dir=2;           // 15% → +2
      else if(r<0.90)dir=1;      // 75% → +1  (90% total für +1)
    } else if(p.age<=21){
      if(r<0.05)dir=2;           // 5% → +2
      else if(r<0.70)dir=1;      // 65% → +1  (70% total für +1)
    } else if(p.age<=23){
      if(r<0.30)dir=1;           // 30% → +1
    } else if(p.age<=25){
      if(r<0.10)dir=1;           // 10% → +1
    }
    // ── Alters-Abbau ─────────────────────────────────────────────────
    else if(p.age>35){
      if(r<0.30)dir=-2;          // 30% → -2
      else if(r<0.90)dir=-1;     // 60% → -1  (90% total für -1)
    } else if(p.age>33){
      if(r<0.10)dir=-2;          // 10% → -2
      else if(r<0.70)dir=-1;     // 60% → -1  (70% total für -1)
    } else if(p.age>30){
      if(r<0.20)dir=-1;          // 20% → -1
    }
    if(dir!==0){
      const old=p.rating;
      p.rating=clamp(p.rating+dir,30,99);
      if(p.rating!==old){
        p.rarity=ratingToRarity(p.rating);
        out.push({name:p.name,from:old,to:p.rating,age:p.age,dir});
      }
    }
  }
  return out;
}

function rebuildTeamForFormation(){
  const slots=FORMATIONS[state.formation];
  const oldTeam=state.team;
  const oldLocked=state.lockedSlots;
  const usedIds=new Set();
  const newTeam={};const newLocked=new Set();

  // Pass 0: Slot-ID-Erhalt — Spieler in Slots, die in BEIDEN Formationen existieren,
  //         bleiben dort, sofern ihre Position natürlich/alt für diesen Slot ist.
  //         Verhindert unnötiges Umordnen bei Wechsel hin & zurück sowie Chain-Drift.
  for(const slot of slots){
    if(oldTeam[slot.id]&&isNaturalFor(oldTeam[slot.id].pos,slot.pos)){
      newTeam[slot.id]=oldTeam[slot.id];
      usedIds.add(oldTeam[slot.id].id);
      if(oldLocked.has(slot.id))newLocked.add(slot.id);
    }
  }
  // Nur Spieler, deren alter Slot in der neuen Formation nicht existiert
  const remaining=Object.entries(oldTeam)
    .filter(([,p])=>p&&!usedIds.has(p.id))
    .map(([id,p])=>({p,oldId:id}));
  const lockedById=new Set(remaining.filter(({oldId})=>oldLocked.has(oldId)).map(({p})=>p.id));
  const used2=new Set();

  // Pass 1: exakte Positions-Übereinstimmung für leere neue Slots
  for(const slot of slots){
    if(newTeam[slot.id])continue;
    const m=remaining.find(({p})=>!used2.has(p.id)&&p.pos===slot.pos);
    if(m){newTeam[slot.id]=m.p;used2.add(m.p.id);if(lockedById.has(m.p.id))newLocked.add(slot.id)}
  }
  // Pass 2: natürliche/Alt-Positions-Übereinstimmung
  for(const slot of slots){
    if(newTeam[slot.id])continue;
    const m=remaining.find(({p})=>!used2.has(p.id)&&isNaturalFor(p.pos,slot.pos));
    if(m){newTeam[slot.id]=m.p;used2.add(m.p.id);if(lockedById.has(m.p.id))newLocked.add(slot.id)}
  }
  // Pass 3: verbleibende Spieler in beliebige leere Slots
  for(const slot of slots){
    if(newTeam[slot.id])continue;
    const m=remaining.find(({p})=>!used2.has(p.id));
    if(m){newTeam[slot.id]=m.p;used2.add(m.p.id);if(lockedById.has(m.p.id))newLocked.add(slot.id)}
  }
  state.team=newTeam;state.lockedSlots=newLocked;
}
function compatPos(a,b){if(a===b)return true;const g={CB:['CB'],LB:['LB','RB'],RB:['RB','LB'],CDM:['CDM','CM'],CM:['CM','CDM','CAM'],CAM:['CAM','CM'],LW:['LW','RW'],RW:['RW','LW'],ST:['ST','CAM'],GK:['GK']};return (g[a]||[a]).includes(b)}
function buildDefTeam(defFormation){
  // Map current state.team players to slots of the defensive formation by position
  const defSlots=FORMATIONS[defFormation];
  const players=Object.values(state.team).filter(Boolean);
  const used=new Set();const result={};
  // Pass 1: exact pos
  for(const slot of defSlots){const m=players.find(p=>!used.has(p.name)&&p.pos===slot.pos);if(m){result[slot.id]=m;used.add(m.name);}}
  // Pass 2: natural alt
  for(const slot of defSlots){if(result[slot.id])continue;const m=players.find(p=>!used.has(p.name)&&isNaturalFor(p.pos,slot.pos));if(m){result[slot.id]=m;used.add(m.name);}}
  // Pass 3: any remaining
  for(const slot of defSlots){if(result[slot.id])continue;const m=players.find(p=>!used.has(p.name));if(m){result[slot.id]=m;used.add(m.name);}}
  return result;
}

/* ----- DRAG & DROP SWAP ----- */
function enableSwapDrag(node,key){
  node.draggable=true;
  node.addEventListener('dragstart',e=>{
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',key);
    node.classList.add('dragging');
    node._dragMoved=true;
  });
  node.addEventListener('dragend',()=>{node.classList.remove('dragging');setTimeout(()=>{node._dragMoved=false},50)});
  node.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';node.classList.add('drag-over')});
  node.addEventListener('dragleave',()=>node.classList.remove('drag-over'));
  node.addEventListener('drop',e=>{
    e.preventDefault();node.classList.remove('drag-over');
    const fromKey=e.dataTransfer.getData('text/plain');
    if(fromKey&&fromKey!==key){doSwap(fromKey,key)}
  });
}
function getPlayerAt(key){if(key.startsWith('slot:'))return state.team[key.slice(5)];const i=Number(key.slice(6));return state.bench[i].player}
function setPlayerAt(key,player){if(key.startsWith('slot:')){if(player)state.team[key.slice(5)]=player;else delete state.team[key.slice(5)]}else{state.bench[Number(key.slice(6))].player=player}}
function doSwap(fromKey,toKey){
  const a=getPlayerAt(fromKey),b=getPlayerAt(toKey);
  // Block unavailable player from being moved into a starting XI slot
  const toIsSlot=toKey.startsWith('slot:');
  const fromIsSlot=fromKey.startsWith('slot:');
  if(toIsSlot&&a&&a._unavailable)return;
  if(fromIsSlot&&b&&b._unavailable)return;
  setPlayerAt(fromKey,b);setPlayerAt(toKey,a);
  render();
}

/* ----- DRAFT ----- */
// Build a draft pool from the persistent collection (collection mode)
function buildCollectionDraftPool(slotPos,isBench){
  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>p.name),
    ...state.bench.filter(b=>b.player).map(b=>b.player.name)
  ]);
  // Deduplicate by name, exclude already-placed players
  const seenNames=new Set();
  let pool=state.collection.filter(p=>{
    if(taken.has(p.name)||seenNames.has(p.name))return false;
    seenNames.add(p.name);return true;
  });
  if(!isBench){
    // Prefer exact-position players; fill remaining spots with ALT players only if needed
    const exact=pool.filter(p=>p.pos===slotPos);
    const alt=pool.filter(p=>getPosRelation(p.pos,slotPos)==='alt');
    if(exact.length>=5){
      pool=exact; // enough exact matches — no ALT needed
    } else {
      // Fill up to 5: exact first, then ALT, then rest (foreign only if desperate)
      const needed=5-exact.length;
      pool=[...exact,...alt.slice(0,needed)];
      if(pool.length<3){
        // Fall back to any non-foreign if collection too sparse
        pool=pool.concat(pool.filter(p=>getPosRelation(p.pos,slotPos)!=='foreign').slice(0,3-pool.length));
        if(pool.length<3)pool=[...exact,...alt,...pool.filter(p=>!exact.includes(p)&&!alt.includes(p))];
      }
    }
  }
  // Pick cards by first rolling a rarity (same weights as normal mode),
  // then picking a random card of that rarity — 1:1 identical to normal draft.
  const _rlTbl=(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE)[Math.min(state.league,(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE).length-1)];
  const byRar={};
  pool.forEach(p=>{(byRar[p.rarity]=byRar[p.rarity]||[]).push(p);});
  const picked=new Set();const result=[];
  for(let i=0;i<5;i++){
    // Find which rarities still have unpicked cards
    const avail=Object.keys(byRar).filter(r=>byRar[r].some(p=>!picked.has(p.name)));
    if(!avail.length)break;
    // Roll rarity weighted by league table, normalised over available rarities only
    const totalW=avail.reduce((s,r)=>s+((_rlTbl[r]||{}).weight||0),0);
    if(totalW===0)break;
    let rv=Math.random()*totalW;let chosenRar=avail[avail.length-1];
    for(const r of avail){rv-=((_rlTbl[r]||{}).weight||0);if(rv<=0){chosenRar=r;break;}}
    // Pick random card from that rarity bucket
    const bucket=byRar[chosenRar].filter(p=>!picked.has(p.name));
    const chosen=bucket[Math.floor(Math.random()*bucket.length)];
    picked.add(chosen.name);result.push(chosen);
  }
  return result;
}

function startDraft(target){
  const isBench=!target.startsWith('slot:');
  let slotPos=null;
  if(!isBench){const sid=target.slice(5);slotPos=FORMATIONS[state.formation].find(s=>s.id===sid).pos}
  state.draftCurrent=target;

  // Collection mode: draw from persistent collection
  if(state.collectionMode){
    state.draftCards=buildCollectionDraftPool(slotPos,isBench);
    state.phase='draft';render();return;
  }

  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>p.name),
    ...state.bench.filter(b=>b.player).map(b=>b.player.name)
  ]);
  const shown=new Set();
  state.draftCards=[];
  let attempts=0;
  while(state.draftCards.length<5&&attempts<120){
    attempts++;
    // Bench: each card gets its own random position; slot: fixed slotPos
    const pos=isBench?pickRand(MAIN_POSITIONS):slotPos;
    const p=generatePlayerForPos(pos);
    if(!p)continue;
    // Lineup slots: exact position match ONLY
    if(!isBench&&p.pos!==slotPos)continue;
    if(!taken.has(p.name)&&!shown.has(p.name)){shown.add(p.name);state.draftCards.push(p)}
  }
  // Safety fill — keep exact position filter, prevent infinite loop
  let sfAttempts=0;
  while(state.draftCards.length<5&&sfAttempts<80){
    sfAttempts++;
    const pos=isBench?pickRand(MAIN_POSITIONS):slotPos;
    const p=generatePlayerForPos(pos);
    if(!p)continue;
    if(!isBench&&p.pos!==slotPos)continue;
    state.draftCards.push(p);
  }
  state.phase='draft';render();
}
function spawnSparkles(card,count,colors){
  for(let s=0;s<count;s++){
    const sp=document.createElement('div');
    sp.className='sparkle-particle';
    const angle=Math.random()*2*Math.PI;
    const dist=40+Math.random()*70;
    sp.style.setProperty('--sx',`${Math.cos(angle)*dist}px`);
    sp.style.setProperty('--sy',`${Math.sin(angle)*dist-30}px`);
    sp.style.setProperty('--sd',`${0.5+Math.random()*0.7}s`);
    sp.style.left=`${20+Math.random()*60}%`;
    sp.style.top=`${20+Math.random()*60}%`;
    sp.style.background=colors[Math.floor(Math.random()*colors.length)];
    sp.style.width=sp.style.height=`${4+Math.random()*6}px`;
    sp.style.animationDelay=`${Math.random()*0.2}s`;
    card.appendChild(sp);
    setTimeout(()=>sp.remove(),1400);
  }
}
function buildDraftLegend(){
  const items=[
    ['wk','↑↑ WK','Wunderkind ≤21'],
    ['pot','↑ POT','Talent ≤23'],
    ['alt','↓ ALT','Erfahren 31+'],
    ['end','↓↓ END','Karriereende 34+'],
  ];
  const wrap=el('div',{class:'draft-legend'});
  items.forEach(([cls,chip,desc])=>{
    wrap.appendChild(el('div',{class:'dl-item'},[
      el('span',{class:`dl-b ${cls}`},[chip]),
      el('span',{class:'dl-item-desc'},[desc])
    ]));
  });

}
function buildRarityProbBar(tbl,leagueIdx,impossible,boosted){
  const RAR_COLOR={common:'#9ca3af',uncommon:'#5EC26A',rare:'#71a4f4',epic:'#c084fc',legendary:'#fde047',mythic:'#ef4444'};
  const RAR_SHORT={common:'CMN',uncommon:'UNC',rare:'RARE',epic:'EPIC',legendary:'LEG',mythic:'MYTH'};
  // If boosted (Erzrivale event): apply same weight transform as rollRarityBoosted
  let displayTbl=tbl;
  if(boosted){
    const BOOST=['epic','legendary','mythic'];
    let total=0;const boostedWeights={};
    for(const k in tbl){boostedWeights[k]=BOOST.includes(k)?tbl[k].weight*2.5:tbl[k].weight*0.4;total+=boostedWeights[k];}
    displayTbl={};
    for(const k in tbl)displayTbl[k]={weight:Math.round(boostedWeights[k]/total*1000)/10};
  }
  const lgName=boosted?'Erhöhte Chancen':'Wahrscheinlichkeiten';
  const items=Object.entries(displayTbl).map(([key,r])=>{
    const pct=r.weight<1?r.weight.toFixed(1)+'%':Math.round(r.weight)+'%';
    return el('span',{class:'draft-prob-item'},[
      el('span',{class:'draft-prob-rar',style:{color:RAR_COLOR[key]}},[RAR_SHORT[key]]),
      el('span',{class:'draft-prob-pct',style:{color:RAR_COLOR[key]}},[ ' '+pct])
    ]);
  });
  const labelStyle=boosted?{color:'#c084fc',opacity:'1'}:{};
  return el('div',{class:'draft-prob-wrap'},[
    el('span',{class:'draft-prob-lbl',style:labelStyle},[lgName+'· ']),
    ...items
  ]);
}

function renderDraft(main){
  const isBenchDraft=!state.draftCurrent.startsWith('slot:');
  let posLabel='?';
  if(!isBenchDraft)posLabel=FORMATIONS[state.formation].find(s=>s.id===state.draftCurrent.slice(5)).pos;
  const cardsDiv=el('div',{class:'draft-cards'});
  const slotLabel=isBenchDraft?'Ersatzbank':posLabel;
  const tbl=(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE)[Math.min(state.league,(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE).length-1)];
  const lgClass=state.impossibleMode?'imp':`lg${state.league}`;
  const footer=el('div',{class:'draft-footer'},[
    buildRarityProbBar(tbl,state.league,state.impossibleMode),
    buildDraftLegend()
  ]);
  const _needsScroll=state.draftCards.length>5;
  const _cardsContainer=_needsScroll?el('div',{class:'draft-cards-scroll'},[cardsDiv]):cardsDiv;
  const phase=el('div',{class:`phase draft-phase ${lgClass}`},[
    el('div',{class:'draft-center-block'},[
      el('div',{class:'draft-pick-banner'},[
        el('div',{class:'draft-pick-instruction'},['Wähle einen Spieler']),
        el('div',{class:'draft-pick-slot'},[
          el('div',{class:'draft-pick-slot-dot'}),
          el('span',{},[slotLabel])
        ]),
      ]),
      _cardsContainer,
    ]),
    footer
  ]);
  main.appendChild(phase);
  // ── Karten von links nach rechts einblenden ──────────────────────────
  let cumDelay=200;
  state.draftCards.forEach((p,idx)=>{
    const card=buildCard(p,()=>pickDraftCard(p),isBenchDraft?null:posLabel);
    card.classList.add('card-hidden');
    // Wrap in container with number badge + pick overlay
    const wrap=el('div',{class:'draft-card-wrap'});
    wrap.appendChild(card);
    cardsDiv.appendChild(wrap);
    // Verzögerung zwischen den Karten: legendär am längsten
    const gap=p.rarity==='legendary'?720:p.rarity==='epic'?480:p.rarity==='rare'?300:230;
    setTimeout(()=>{
      playCardRevealSound(p.rarity);
      card.classList.remove('card-hidden');
      card.classList.add(`card-reveal-${p.rarity}`);
      if(p.rarity==='epic'){
        setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
      } else if(p.rarity==='legendary'){
        setTimeout(()=>spawnSparkles(card,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
        setTimeout(()=>spawnSparkles(card,14,['#fde047','#fff','#fbbf24']),600);
      } else if(p.rarity==='mythic'){
        setTimeout(()=>spawnSparkles(card,32,['#ef4444','#ff6b6b','#fff','#dc2626','#fca5a5']),80);
        setTimeout(()=>spawnSparkles(card,18,['#ef4444','#fff','#ff6b6b']),500);
        setTimeout(()=>spawnSparkles(card,14,['#dc2626','#fff','#ef4444']),900);
      }
    },cumDelay);
    cumDelay+=gap;
  });
}
const POS_ICON={GK:'🧤',LV:'🏃',RV:'🏃',IV:'🛡️',CB:'🛡️',LB:'🏃',RB:'🏃',ZDM:'💪',CDM:'💪',ZM:'⚙️',CM:'⚙️',ZOM:'🎯',CAM:'🎯',LM:'⚡',RM:'⚡',LW:'⚡',RW:'⚡',LA:'⚡',RA:'⚡',LF:'🔥',RF:'🔥',ST:'⚽',CF:'⚽'};
const RARITY_STARS={common:'★☆☆☆☆',uncommon:'★★☆☆☆',rare:'★★★☆☆',epic:'★★★★☆',legendary:'★★★★★',mythic:'★★★★★'};
// ── Draft Card Hover — smooth entry lerp, global snap card-to-card ──────────
const CARD_SPARK={common:null,uncommon:'#5EC26A',rare:'#71a4f4',epic:'#c084fc',legendary:'#fde047',mythic:'#ef4444'};
const CARD_PRATE={common:0,uncommon:0.2,rare:0.5,epic:0.9,legendary:1.5,mythic:2.2};
let _hvrCard=null;
function setupCardHover(card,rarity){
  const sparkC=CARD_SPARK[rarity]||null;
  const pRate=CARD_PRATE[rarity]||0;
  let active=false,leaving=false;
  let mx=0.5,my=0.5,t0=0,enterT=0;
  // Snapshot of exact transform state at the moment the mouse leaves
  let leaveT=0,leaveEaseFrom=1,leaveFloatY=0,leaveRy=0,leaveRx=0;
  let raf=null,spkIv=null;
  // zoom:1.32 is applied via CSS for draft cards — the transform base is always 1
  // (zoom renders at native resolution; no scale() needed in the hover transform)
  function bs(){return 1;}

  function tick(now){
    if(!active&&!leaving)return;
    let ease,floatY,ry,rx;
    if(active){
      const sec=(now-t0)/1000;
      const ep=Math.min(1,(now-enterT)/200);
      ease=ep*ep*(3-2*ep);                    // smoothstep entry
      floatY=Math.cos(sec*1.3*Math.PI)*5;
      ry=(mx-0.5)*2*7;                        // horizontal tilt  ±7°
      rx=(0.5-my)*2*5;                        // vertical tilt    ±5°
    } else {
      // Return: lerp every axis from its captured leave value → 0 over 400ms
      // All axes FROZEN at snapshot — purely uniform decay, no jumping
      const lp=Math.min(1,(now-leaveT)/400);
      const lEase=lp*lp*(3-2*lp);
      ease=leaveEaseFrom*(1-lEase);
      floatY=leaveFloatY;
      ry=leaveRy;
      rx=leaveRx;
      if(lp>=1){
        leaving=false;
        card.style.transform='';
        raf=null;
        return;
      }
    }
    // Include base scale in the transform so draft cards don't visually shrink on hover
    card.style.transform=`perspective(900px) translateY(${((-10+floatY)*ease).toFixed(2)}px) rotateX(${(rx*ease).toFixed(2)}deg) rotateY(${(ry*ease).toFixed(2)}deg) scale(${(bs()*(1+0.04*ease)).toFixed(4)})`;
    raf=requestAnimationFrame(tick);
  }

  function spawnSpark(){
    if(!active||!sparkC)return;
    const s=document.createElement('span');
    const sz=1.5+Math.random()*3;
    s.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;background:${sparkC};pointer-events:none;z-index:10;left:${5+Math.random()*90}%;bottom:${4+Math.random()*18}%`;
    card.appendChild(s);
    s.animate([{opacity:1,transform:'translate(0,0) scale(1)'},{opacity:0,transform:`translate(${(Math.random()*52-26).toFixed(1)}px,${-(25+Math.random()*55).toFixed(1)}px) scale(0)`}],
      {duration:600+Math.random()*400,easing:'ease-out',fill:'forwards'}).finished.then(()=>s.remove());
  }

  card.addEventListener('mouseenter',()=>{
    if(_hvrCard&&_hvrCard!==card){
      // The other card's own leave-RAF handles its smooth return — just clear glow
      _hvrCard.classList.remove('card-hovered');
    }
    _hvrCard=card;
    leaving=false; // cancel in-progress leave so re-entering re-drives entry
    active=true;t0=performance.now();enterT=t0;
    card.style.animation='none'; // freeze card-reveal animation; NEVER reset to ''
    card.style.transition='box-shadow .2s ease';
    card.classList.add('card-hovered');
    if(!raf)raf=requestAnimationFrame(tick);
    if(pRate>0)spkIv=setInterval(spawnSpark,Math.max(70,Math.round(180/pRate)));
  });

  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    mx=(e.clientX-r.left)/r.width;my=(e.clientY-r.top)/r.height;
  });

  card.addEventListener('mouseleave',()=>{
    const now=performance.now();
    const sec=(now-t0)/1000;
    const ep=Math.min(1,(now-enterT)/200);
    // Snapshot the exact transform values right now so the return
    // animation starts from precisely where the card is, not from a reset
    leaveEaseFrom=ep*ep*(3-2*ep);
    leaveFloatY=Math.cos(sec*1.3*Math.PI)*5;  // current float height
    leaveRy=(mx-0.5)*2*7;                      // current horizontal tilt
    leaveRx=(0.5-my)*2*5;                      // current vertical tilt
    active=false;leaving=true;leaveT=now;
    card.classList.remove('card-hovered');
    clearInterval(spkIv);spkIv=null;
    // Leave card.style.animation as 'none' — resetting it to '' would restart
    // the card-reveal animation and cause a brief design flash
    card.style.transition='box-shadow .28s ease';
    if(!raf)raf=requestAnimationFrame(tick);
  });
}
function buildCard(p,onClick,slotPos=null){
  const posRel=slotPos?getPosRelation(p.pos,slotPos):'main';
  const displayRating=p.rating-posPenalty(posRel);
  const stars=RARITY_STARS[p.rarity]||'★';
  const stageChip=p.age<=21?el('span',{class:'card-stage-chip wk'},['↑↑ WK']):
                  p.age<=23?el('span',{class:'card-stage-chip pot'},['↑ POT']):
                  p.age>=34?el('span',{class:'card-stage-chip end'},['↓↓ END']):
                  p.age>=31?el('span',{class:'card-stage-chip alt'},['↓ ALT']):null;
  const oopCorner=posRel!=='main'?el('span',{class:`card-oop-corner oop-${posRel}`},[posRel==='alt'?`${p.pos} ALT −2`:`${p.pos} FREMD −7`]):null;
  const card=el('div',{class:`card ${p.rarity}`,onclick:onClick},[
    el('div',{class:'card-strip'},[
      el('div',{class:'card-strip-scan'},[]),
      el('div',{class:'card-strip-dot'},[]),
      el('span',{class:`card-strip-pos pos-${posRel}`},[p.pos]),
      el('div',{class:'card-strip-dot'},[]),
    ]),
    el('div',{class:'card-main'},[
      oopCorner,
      el('span',{class:'card-sc-flag'},[NAT_FLAG[p.nat]||'🏳️']),
      el('div',{class:'card-sc-rating'},[String(displayRating)]),
      el('div',{class:'card-sc-spacer'},[]),
      el('div',{class:'card-sc-div'},[]),
      el('div',{class:'card-sc-name'},[p.name]),
      el('div',{class:'card-sc-info'},[`${p.age} J. · ${p.nat}`,stageChip]),
      el('div',{class:'card-sc-stars'},[stars]),
      el('div',{class:'card-sc-rar'},[RARITIES[p.rarity].name]),
      el('div',{class:'card-sc-shim'},[]),
    ])
  ]);
  setupCardHover(card,p.rarity);
  return card;
}
function pickDraftCard(p){
  if(state.draftCurrent.startsWith('slot:')){const sid=state.draftCurrent.slice(5);state.team[sid]=p;state.lockedSlots.add(sid)}
  else{const i=Number(state.draftCurrent.slice(6));state.bench[i].player=p;state.lockedBench.add(i)}
  state.draftCurrent=null;state.draftCards=[];state.phase='lineup';render();
}

function goToTactics(){
  const blocked=Object.values(state.team).some(p=>p&&p._unavailable);
  if(blocked){showToast('Verletzter oder gesperrter Spieler muss zuerst auf die Bank!');return;}
  state.opponent=generateOpponent();state.phase='tactics';render();
}
function renderTactics(main){
  const myAvg=teamAvg(state.team,state.formation);
  const oppAvg=state.opponent.avg;

  // Custom formation dropdown — matches game design language
  function mkFormDrop(currentFm,onChange){
    const wrap=el('div',{class:'tac-form-drop-wrap'});
    const btn=el('div',{class:'tac-form-drop-btn'},[
      el('span',{class:'tac-form-drop-val'},[currentFm.replace(/-/g,' – ')]),
      el('span',{class:'tac-form-drop-arrow'},['▾'])
    ]);
    const menu=el('div',{class:'tac-form-drop-menu'});
    FORMATION_KEYS.forEach(k=>{
      const item=el('div',{class:`tac-form-drop-item${k===currentFm?' active':''}`},[
        el('span',{},[k.replace(/-/g,' – ')]),
        k===currentFm?el('span',{style:{color:'#5EC26A',fontSize:'12px'}},['✓']):null
      ]);
      item.addEventListener('click',e=>{
        e.stopPropagation();
        menu.classList.remove('open');
        btn.querySelector('.tac-form-drop-arrow').style.transform='';
        onChange(k);
      });
      menu.appendChild(item);
    });
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      menu.classList.toggle('open');
      btn.querySelector('.tac-form-drop-arrow').style.transform=menu.classList.contains('open')?'rotate(180deg)':'';
    });
    document.addEventListener('click',()=>{
      menu.classList.remove('open');
      if(btn.querySelector('.tac-form-drop-arrow'))btn.querySelector('.tac-form-drop-arrow').style.transform='';
    });
    wrap.append(btn,menu);
    return wrap;
  }

  // LEFT COL — both own pitches, custom formation dropdowns
  const mitCard=el('div',{class:'pitch-section-wrap'},[
    el('div',{class:'pitch-label-row'},[
      el('div',{class:'pitch-header-title mit'},['MIT BALL']),
      el('div',{class:'team-rating',style:{fontSize:'14px'}},[myAvg.toFixed(1)])
    ]),
    mkFormDrop(state.formation,v=>{state.formation=v;state.customPosMit={};rebuildTeamForFormation();render()}),
    buildFreePitch(state.formation,state.team,'home','mit',state.customPosMit,(sid,p)=>openRoleModal('slot:'+sid)),
    el('div',{class:'pitch-hint'},['Klicke auf Positionen um Rollen festzulegen'])
  ]);
  const defTeam=buildDefTeam(state.defFormation);
  const ohneCard=el('div',{class:'pitch-section-wrap'},[
    el('div',{class:'pitch-label-row'},[
      el('div',{class:'pitch-header-title ohne'},['OHNE BALL'])
    ]),
    mkFormDrop(state.defFormation,v=>{state.defFormation=v;state.customPosOhne={};render()}),
    buildFreePitch(state.defFormation,defTeam,'home','ohne',{},(sid,p)=>openDefRoleModal(sid,p)),
    el('div',{class:'pitch-hint'},['Klicke auf Positionen um Rollen festzulegen'])
  ]);
  const leftCol=el('div',{class:'tactics-left'},[mitCard,ohneCard]);

  // MIDDLE COL — tactic sliders (no CTA here)
  const tacCard=el('div',{class:'team-card tactics-mid'});
  tacCard.appendChild(el('div',{class:'team-header'},[el('div',{class:'team-name'},['Taktik'])]));
  tacCard.appendChild(buildTacticEditor());

  // RIGHT COL — opponent analysis
  const oppCard=buildOpponentAnalysis(oppAvg);

  // Bottom CTA bar — full-width, centered, big "Zum Spiel" button
  const ctaBar=el('div',{class:'tactics-cta-bar'},[
    el('button',{class:'btn primary btn-cta-main',onclick:startMatch},['Zum Spiel →'])
  ]);

  const phase=el('div',{class:'phase tactics-phase'});
  phase.appendChild(el('div',{class:'tactics-columns'},[leftCol,tacCard,oppCard]));
  phase.appendChild(ctaBar);
  main.appendChild(phase);
}
// Shared SVG markup for all mini-pitch instances — white lines, classic markings
const MINI_PITCH_SVG=`<rect x="2" y="2" width="96" height="136" fill="none" stroke="rgba(255,255,255,.52)" stroke-width=".45"/><line x1="2" y1="70" x2="98" y2="70" stroke="rgba(255,255,255,.48)" stroke-width=".4"/><circle cx="50" cy="70" r="10" fill="none" stroke="rgba(255,255,255,.48)" stroke-width=".4"/><rect x="26" y="2" width="48" height="22" fill="none" stroke="rgba(255,255,255,.42)" stroke-width=".38"/><rect x="26" y="116" width="48" height="22" fill="none" stroke="rgba(255,255,255,.42)" stroke-width=".38"/><path d="M40,24 A12.2,12.2 0 0,0 60,24" fill="none" stroke="rgba(255,255,255,.38)" stroke-width=".36"/><path d="M40,116 A12.2,12.2 0 0,1 60,116" fill="none" stroke="rgba(255,255,255,.38)" stroke-width=".36"/>`;
function buildMiniPitch(formation,team,type,interactive,role){
  // Legacy wrapper — used in lineup phase (no free-drag, swap only)
  const slots=FORMATIONS[formation];
  const frame=el('div',{class:'mini-pitch'});
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 140');svg.setAttribute('preserveAspectRatio','none');
  svg.innerHTML=MINI_PITCH_SVG;
  frame.appendChild(svg);
  for(const slot of slots){
    const p=team[slot.id];
    const rawY2=100-slot.y;
    const posShift2=slot.pos==='GK'?-5:['CB','LB','RB'].includes(slot.pos)?-9:-6;
    const clampedY=Math.min(Math.max(rawY2+posShift2,5),92);
    const dot=el('div',{class:'pitch-dot away'},[slot.pos.slice(0,3)]);
    const node=el('div',{class:'mini-slot',style:{left:`${slot.x}%`,top:`${clampedY}%`,cursor:interactive?'pointer':'default'},dataset:{slotId:slot.id}});
    node.appendChild(dot);
    if(interactive){
      node.addEventListener('click',()=>{if(!node._dragMoved&&p)openRoleModal('slot:'+slot.id)});
      enableSwapDrag(node,'slot:'+slot.id);
    }
    frame.appendChild(node);
  }
  return frame;
}
function buildFreePitch(formation,team,type,pitchKey,customPos,onClickPlayer){
  // Simplified tactics pitch — circle dots only, no drag, no names/ratings
  const slots=FORMATIONS[formation];
  const frame=el('div',{class:'mini-pitch',dataset:{pitchkey:pitchKey}});
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 140');svg.setAttribute('preserveAspectRatio','none');
  svg.innerHTML=MINI_PITCH_SVG;
  frame.appendChild(svg);
  for(const slot of slots){
    const p=team[slot.id];
    // Role code for dot label — use defRoles for ohne pitch
    let code=slot.pos.slice(0,3);
    if(p){
      if(pitchKey==='ohne'){
        const rd=state.defRoles[slot.id];
        const roleName=rd?rd.role:(DEF_ROLES_BY_POS[slot.pos]?.[0]?.[0]||slot.pos);
        code=(DEF_ROLES_BY_POS[slot.pos]||[]).find(r=>r[0]===roleName)?.[1]||slot.pos.slice(0,3);
      } else {
        const rd=state.roles[slot.id];
        const roleName=rd?rd.role:(ROLES_BY_POS[slot.pos]?.[0]?.[0]||slot.pos);
        code=(ROLES_BY_POS[slot.pos]||[]).find(r=>r[0]===roleName)?.[1]||slot.pos.slice(0,3);
      }
    }
    const rar=p?p.rarity:'empty';
    // Clamp y so dots don't overflow pitch edge
    const rawY=100-slot.y;
    const posShift=slot.pos==='GK'?-5:['CB','LB','RB'].includes(slot.pos)?-9:-6;
    const clampedY=Math.min(Math.max(rawY+posShift,5),92);
    const dot=el('div',{class:`pitch-dot ${rar}`},[code]);
    const clickable=(pitchKey==='mit'||pitchKey==='ohne')&&p&&onClickPlayer;
    const node=el('div',{class:'mini-slot',style:{left:`${slot.x}%`,top:`${clampedY}%`,cursor:clickable?'pointer':'default'}});
    node.appendChild(dot);
    if(clickable){
      node.addEventListener('click',()=>onClickPlayer(slot.id,p));
    }
    frame.appendChild(node);
  }
  return frame;
}
function buildTacticEditor(){
  // Subcategory structure for each tab
  const TAC_STRUCTURE={
    aufbau:[
      {label:'Ballzirkulation',keys:['passStyle','tempo','breite']},
      {label:'Spielaufbau',keys:['aufbauStrategie','abstöße','spielaufbau','passAufnahme']},
      {label:'Kreativität',keys:['passRisiko','dribblings']},
    ],
    angriff:[
      {label:'Abschluss',keys:['direktheit','kreativFreiheiten','angriffsroute']},
      {label:'Flanken & Läufe',keys:['unterstuetzLaeufe','flanken','fernschuesse']},
    ],
    defense:[
      {label:'Pressingsystem',keys:['pressingLinie','defensivLinie','pressingAusloesung','defensivBreite']},
      {label:'Reaktion',keys:['nachBallverlust','nachBalleroberung','gegnerFlanken','deckung']},
    ],
  };
  // Flat map of key → [label, opts] from TACTIC_PHASES
  const keyMeta={};
  for(const ph of TACTIC_PHASES){for(const[k,lbl,opts] of ph.params)keyMeta[k]=[lbl,opts];}

  for(const tab of TABS){

    const grp=groups[tab.id];

  actRow.appendChild(el('button',{class:'btn',style:{flex:'1',fontSize:'13px',padding:'10px 14px',fontWeight:'700'},onclick:resetTactics},['Zurücksetzen']));
  wrap.appendChild(actRow);

  // --- Saved Tactics: minimal chip strip at very bottom ---
  if(state.savedTactics&&state.savedTactics.length>0){
    const savedSec=el('div',{class:'tac-phase',style:{marginTop:'6px'}});
    savedSec.appendChild(el('div',{class:'tac-phase-title',style:{fontSize:'10px',marginBottom:'4px'}},['Gespeichert']));

    }
    savedSec.appendChild(strip);
    wrap.appendChild(savedSec);

function getOppKeywords(tactics){
  const g=k=>tactics[k]??2;
  const kws=[];
  // Mentality always first
  const mentShort=['Sehr def.','Defensiv','Ausgewogen','Offensiv','Sehr off.'];
  kws.push({label:mentShort[g('mentality')],type:'neutral'});
  // Pressing
  // Defense (Rot)
  if(g('pressingLinie')>=3)kws.push({label:'Hohes Pressing',type:'warn'});
  else if(g('pressingLinie')<=1)kws.push({label:'Tiefes Stehen',type:'warn'});
  if(g('defensivLinie')>=3)kws.push({label:'Hohe Abwehr',type:'warn'});
  else if(g('defensivLinie')<=1)kws.push({label:'Tiefe Abwehr',type:'warn'});
  if(g('deckung')>=3)kws.push({label:'Manndeckung',type:'warn'});
  if(g('nachBallverlust')>=4)kws.push({label:'Gegenpressing',type:'warn'});
  // Aufbauspiel (Gelb)
  if(g('passStyle')>=3)kws.push({label:'Langer Ball',type:'yellow'});
  else if(g('passStyle')<=1)kws.push({label:'Kurzes Passspiel',type:'yellow'});
  if(g('breite')>=3)kws.push({label:'Breites Spiel',type:'yellow'});
  // Angriff (Grün)
  if(g('nachBalleroberung')>=3)kws.push({label:'Konter',type:'green'});
  if(g('flanken')>=3)kws.push({label:'Viele Flanken',type:'green'});
  if(g('direktheit')>=3)kws.push({label:'Direktes Spiel',type:'green'});
  return kws.slice(0,6);
}
function classifyPlayingStyle(tactics){
  const g=k=>tactics[k]??2;
  if(g('pressingLinie')>=3&&g('pressingAusloesung')>=3)return'Intensiv-Pressing';
  if(g('pressingLinie')<=1&&g('nachBalleroberung')>=3)return'Konter-Fußball';
  if(g('passStyle')>=3&&g('direktheit')>=3)return'Direktes Vertikalspiel';
  if(g('passStyle')<=1&&g('tempo')<=1)return'Kontroll-Fußball';
  if(g('breite')>=3&&g('flanken')>=3)return'Flügelbasiertes Spiel';
  if(g('defensivLinie')<=1&&g('pressingLinie')<=1)return'Tiefer Defensiv-Block';
  if(g('defensivLinie')>=3&&g('nachBallverlust')>=3)return'Gegenpressing-System';
  if(g('direktheit')>=3)return'Direktes Spiel';
  return'Ausgeglichene Taktik';
}
function getOppStrengths(t){
  const g=k=>t[k]??2;const items=[];
  if(g('pressingLinie')>=3&&g('pressingAusloesung')>=3)
    items.push({bold:'Hochpressing',dim:'aggressiv, früh Druck im gegnerischen Aufbau'});
  else if(g('pressingLinie')>=3)
    items.push({bold:'Hohe Pressinglinie',dim:'steht weit oben, wenig Raum im Aufbau'});
  if(g('pressingLinie')<=1&&g('defensivLinie')<=1)
    items.push({bold:'Tiefer Block',dim:'sehr kompakt und schwer zu bespielen'});
  if(g('nachBalleroberung')>=3&&g('tempo')>=3)
    items.push({bold:'Schnelle Konter',dim:'hohes Tempo nach Ballgewinn, sofortige Tiefenläufe'});
  else if(g('nachBalleroberung')>=3)
    items.push({bold:'Konterbereitschaft',dim:'schnelles Umschalten nach Ballgewinn'});
  if(g('nachBallverlust')>=4)
    items.push({bold:'Gegenpressing',dim:'sofortiger Druck nach eigenem Ballverlust'});
  if(g('flanken')>=3&&g('breite')>=3)
    items.push({bold:'Breites Flügelspiel',dim:'viele Flanken von beiden Außenbahnen'});
  else if(g('flanken')>=3)
    items.push({bold:'Flügelangriffe',dim:'viele Hereingaben, Gefahr von außen'});
  if(g('defensivLinie')>=3)
    items.push({bold:'Offside-Falle',dim:'hohe Abwehrlinie, enger Raum hinter der Abwehr'});
  if(g('deckung')>=3)
    items.push({bold:'Manndeckung',dim:'Schlüsselspieler werden eng gedeckt'});
  if(g('direktheit')>=3&&g('tempo')>=3)

  if(g('kreativFreiheiten')>=3)

  if(g('mentality')>=4)

  if(items.length===0)items.push({bold:'Ausgeglichenes Profil',dim:'keine besonderen Stärken erkennbar'});
  return items.slice(0,5);
}
function getOppWeaknesses(t){

  if(g('nachBallverlust')<=1)

  if(g('direktheit')<=1)
    items.push({bold:'Indirekter Spielaufbau',dim:'aufwendiges Passspiel, anfällig bei Anlaufen'});
  if(g('deckung')<=1)

function openRoleModal(key){
  state.selectedSlot=key;

  if(!p)return;
  const roles=ROLES_BY_POS[slot.pos]||[['Standard','STD','sup','Standardrolle']];
  const current=state.roles[sid]||{role:roles[0][0],duty:roles[0][2]};
  let selectedRole=current.role;
  const modal=$('#roleModal');
  modal.innerHTML='';
  function buildItems(){
    return roles.map(r=>{
      const isActive=r[0]===selectedRole;
      const item=el('div',{class:'rmod-item'+(isActive?' active':'')},[
        el('div',{class:'rmod-item-name'},[r[0]+' · '+r[1]]),

// 5 stops at 0%,25%,50%,75%,100% — each [r,g,b,a]
const GRAD_STATES={
  att:   [[0,0,0,.58],[0,0,0,.22],[5,85,32,.32],[5,115,42,.44],[3,145,48,.52]],
  mid:   [[0,0,0,.32],[0,0,0,.08],[0,0,0,0],[0,0,0,.08],[0,0,0,.32]],
  def:   [[165,16,16,.52],[110,10,10,.26],[0,0,0,.12],[0,0,0,.34],[0,0,0,.58]]
};
const GRAD_POS=[0,25,50,75,100];
let _gCur=GRAD_STATES.mid.map(c=>[...c]);
let _gTgt=GRAD_STATES.mid.map(c=>[...c]);
let _gRaf=null,_gLast=0;
function setGradTarget(key){_gTgt=GRAD_STATES[key].map(c=>[...c]);_startGradAnim();}
function _applyGrad(){
  const ov=document.getElementById('fieldOverlay');if(!ov)return;
  const stops=_gCur.map((c,i)=>`rgba(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])},${c[3].toFixed(3)}) ${GRAD_POS[i]}%`);
  ov.style.background=`linear-gradient(to right, ${stops.join(', ')})`;
}
function _gradTick(now){
  const dt=Math.min((now-_gLast)/1000,.05);_gLast=now;
  const spd=1.1;let running=false;
  for(let i=0;i<5;i++)for(let j=0;j<4;j++){
    const d=_gTgt[i][j]-_gCur[i][j];
    if(Math.abs(d)>0.0008){_gCur[i][j]+=d*Math.min(spd*dt,.12);running=true;}
    else _gCur[i][j]=_gTgt[i][j];
  }
  _applyGrad();
  _gRaf=running?requestAnimationFrame(_gradTick):null;
}
function _startGradAnim(){if(_gRaf)return;_gLast=performance.now();_gRaf=requestAnimationFrame(_gradTick);}

  const chevSW=[0,8,10,13][lv];

  const trailPts=[null,null,'52,26 80,42 52,58','50,19 82,42 50,65'][lv];

}
function pickMatchZone(minute,mG,oG,tacNet){
  const upMy=mG.find(g=>g.min>minute&&g.min<=minute+4);
  const upOpp=oG.find(g=>g.min>minute&&g.min<=minute+4);
  if(upMy){_zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:2};}
  if(upOpp){_zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:2};}
  // Streak: while in midfield a 22% bonus keeps the ball there a tick longer
  if(_zoneLast==='mid'&&Math.random()<0.22){
    return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.30?2:1};
  }
  const rv=Math.random();
  // Level 3 is reserved exclusively for actual goals (set directly in the goal handlers).
  // Here we only use level 1 (normal action) and level 2 (strong sustained pressure, rare).
  if(tacNet>=4){
    // Clearly dominant: occasional level-2 attack/def pressure (15% of those actions)
    if(rv<0.25){_zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:Math.random()<0.15?2:1};}
    if(rv<0.84){_zoneLast='mid';return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.18?2:1};}
    _zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:1};
  }else if(tacNet<=-4){
    if(rv<0.25){_zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:Math.random()<0.15?2:1};}
    if(rv<0.84){_zoneLast='mid';return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.18?2:1};}
    _zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:1};
  }else{
    // Balanced: level 2 very rarely (8%)
    if(rv<0.18){_zoneLastDir='my';_zoneLast='att';return{zone:'att',team:'my',level:Math.random()<0.08?2:1};}
    if(rv<0.82){_zoneLast='mid';return{zone:'mid',team:_zoneLastDir,level:Math.random()<0.10?2:1};}
    _zoneLastDir='opp';_zoneLast='def';return{zone:'def',team:'opp',level:Math.random()<0.08?2:1};
  }
}

function applyHalftimeChoice(choice,myG,oppG,usedMins,pickScorer){
  function newMin(){let m,t=0;do{m=rand(47,89);t++;}while(usedMins.has(m)&&t<40);usedMins.add(m);return m;}

  // All 2nd half goals sorted by minute — "next goal" = earliest
  function get2H(){
    return[...myG.filter(g=>g.min>45).map(g=>({...g,side:'my'})),
           ...oppG.filter(g=>g.min>45).map(g=>({...g,side:'opp'}))]
           .sort((a,b)=>a.min-b.min);
  }
  function convertOppToMy(g){
    const i=oppG.findIndex(o=>o.min===g.min);
    if(i>=0){oppG.splice(i,1);myG.push({min:g.min,scorer:pickScorer(state.team)});myG.sort((a,b)=>a.min-b.min);}
  }
  function convertMyToOpp(g){
    const i=myG.findIndex(m=>m.min===g.min);
    if(i>=0){myG.splice(i,1);oppG.push({min:g.min,scorer:pickScorer(state.opponent.team)});oppG.sort((a,b)=>a.min-b.min);}
  }
  function removeOpp(g){const i=oppG.findIndex(o=>o.min===g.min);if(i>=0)oppG.splice(i,1);}
  function removeMy(g){const i=myG.findIndex(m=>m.min===g.min);if(i>=0)myG.splice(i,1);}

  if(choice==='press'){
    // 22%: next 2H opp goal → team goal (or add one if none); 12%: pressing costs a counter
    const next=get2H()[0];
    if(next&&next.side==='opp'&&Math.random()<0.22){convertOppToMy(next);}
    else if(!next&&Math.random()<0.22){myG.push({min:newMin(),scorer:pickScorer(state.team)});myG.sort((a,b)=>a.min-b.min);}
    if(Math.random()<0.12){oppG.push({min:newMin(),scorer:pickScorer(state.opponent.team)});oppG.sort((a,b)=>a.min-b.min);}

  }else if(choice==='def'){
    // 35%: next 2H opp goal removed; 18%: compactness costs an attack (remove own 2H goal)
    const opp2=get2H().find(g=>g.side==='opp');
    if(opp2&&Math.random()<0.35){removeOpp(opp2);}
    const my2=get2H().find(g=>g.side==='my');
    if(my2&&Math.random()<0.18){removeMy(my2);}

  }else if(choice==='risk'){
    // Next 2 combined 2H goals: 40% flip each to other side, else unchanged
    const next2=get2H().slice(0,2);
    next2.forEach(g=>{
      const r=Math.random();
      if(g.side==='opp'&&r<0.40){convertOppToMy(g);}
      else if(g.side==='my'&&r<0.40){convertMyToOpp(g);}
    });
    // If fewer than 2 goals in 2H, wild-card: 40% chance one extra goal either side
    if(next2.length<2&&Math.random()<0.40){
      if(Math.random()<0.5){myG.push({min:newMin(),scorer:pickScorer(state.team)});myG.sort((a,b)=>a.min-b.min);}
      else{oppG.push({min:newMin(),scorer:pickScorer(state.opponent.team)});oppG.sort((a,b)=>a.min-b.min);}
    }
  }
  // hold: no effect
}

    const pool=[];

      const w=SCORER_WEIGHT[p.pos]??1;

  const nMy=rand(0,2),nOpp=rand(0,2);
  for(let i=0;i<nMy;i++){let m;let tries=0;do{m=rand(6,88);tries++;}while(usedMins.has(m)&&tries<20);usedMins.add(m);myChances.push({min:m,scorer:pickScorer(state.team)});}
  for(let i=0;i<nOpp;i++){let m;let tries=0;do{m=rand(6,88);tries++;}while(usedMins.has(m)&&tries<20);usedMins.add(m);oppChances.push({min:m});}
  myChances.sort((a,b)=>a.min-b.min);oppChances.sort((a,b)=>a.min-b.min);
  let minute=0,myScore=0,oppScore=0;
  let myPoss=1,oppPoss=1,myXG=0,oppXG=0,myShots=0,oppShots=0;
  let myBigChances=0,oppBigChances=0;
  let mySaves=0,oppSaves=0;
  let myCorners=0,oppCorners=0;
  let myFouls=0,oppFouls=0;
  let myPasses=0,oppPasses=0;
  let myTackles=0,oppTackles=0;
  function updStats(){

    const s=(id,v)=>{const el=e(id);if(el)el.textContent=v;};
    const sf=(id,v)=>{const el=e(id);if(el)el.style.flex=String(Math.max(v,0.1));};
    s('statPossMy',mp+'%');s('statPossOpp',(100-mp)+'%');
    sf('statPossBar',myPoss);sf('statPossBarOpp',oppPoss);
    s('statXgMy',myXG.toFixed(1));s('statXgOpp',oppXG.toFixed(1));
    sf('statXgBar',myXG+0.1);sf('statXgBarOpp',oppXG+0.1);
    s('statShotMy',String(myShots));s('statShotOpp',String(oppShots));
    sf('statShotBar',myShots+0.5);sf('statShotBarOpp',oppShots+0.5);
    s('statChanceMy',String(myBigChances));s('statChanceOpp',String(oppBigChances));
    sf('statChanceBar',myBigChances+0.3);sf('statChanceBarOpp',oppBigChances+0.3);
    s('statSaveMy',String(mySaves));s('statSaveOpp',String(oppSaves));
    sf('statSaveBar',mySaves+0.3);sf('statSaveBarOpp',oppSaves+0.3);
    s('statCornerMy',String(myCorners));s('statCornerOpp',String(oppCorners));
    sf('statCornerBar',myCorners+0.3);sf('statCornerBarOpp',oppCorners+0.3);
    s('statFoulMy',String(myFouls));s('statFoulOpp',String(oppFouls));
    sf('statFoulBar',myFouls+0.5);sf('statFoulBarOpp',oppFouls+0.5);
    s('statPassMy',String(myPasses));s('statPassOpp',String(oppPasses));
    sf('statPassBar',myPasses+1);sf('statPassBarOpp',oppPasses+1);
    s('statTackleMy',String(myTackles));s('statTackleOpp',String(oppTackles));
    sf('statTackleBar',myTackles+0.3);sf('statTackleBarOpp',oppTackles+0.3);
  }
  const events=$('#matchEvents');
  const myScoreEl=$('#myScore'),oppScoreEl=$('#oppScore'),clockEl=$('#matchClock');
  const flash=$('#eventFlash');
  addEvent(events,0,'KO',`Anpfiff! ${r.tacticNet>=5?'Deine Taktik scheint zu greifen.':r.tacticNet<=-5?'Der Gegner kontrolliert das Spiel.':'Ausgeglichener Beginn.'}`);
  setMatchZone('mid','my',1);
  let htShown=false;
  const flashIt=(cls,text)=>{flash.textContent=text;flash.className=`event-flash ${cls} show`;setTimeout(()=>flash.classList.remove('show'),1400)};
  const tick=()=>{
    minute=Math.min(total,minute+2);
    clockEl.textContent=`${minute}'`;
    if(!htShown&&minute>=45){
      htShown=true;
      clearInterval(timer);
      addEvent(events,45,'HZ','Halbzeit!');
      showHalftimeModal(myScore,oppScore,myXG,oppXG,(choice)=>{
        applyHalftimeChoice(choice,myG,oppG,usedMins,pickScorer);
        const HT_LOG={hold:'Keine Änderung — das Team bleibt konzentriert.',press:'Anweisung: Mehr Pressing und Raumgewinn!',def:'Defensiv stabil — Kompaktheit vor Torgefahr.',risk:'Vollgas! Alles oder nichts in der zweiten Hälfte.'};
        addEvent(events,46,'KO',HT_LOG[choice]);
        timer=setInterval(tick,MATCH_SPEEDS[speedIdx].ms);
        window._matchTimer=()=>timer;
      });
      return;
    }
    // Zone update + possession tracking
    const zv=pickMatchZone(minute,myG,oppG,r.tacticNet);
    setMatchZone(zv.zone,zv.team,zv.level||1);
    if(zv.zone==='att'){
      myPoss+=2;
      myPasses+=rand(4,9);oppPasses+=rand(1,3);
      if(Math.random()<0.28){myShots++;myXG+=randFloat(0.06,0.16);if(Math.random()<0.55)oppSaves++;}
      if(Math.random()<0.12)myCorners++;
      if(Math.random()<0.10){oppFouls++;if(Math.random()<0.25)myCorners++;}
      if(Math.random()<0.15)myTackles+=rand(0,1);oppTackles+=rand(0,1);
    } else if(zv.zone==='def'){
      oppPoss+=2;
      oppPasses+=rand(4,9);myPasses+=rand(1,3);
      if(Math.random()<0.24){oppShots++;oppXG+=randFloat(0.06,0.16);if(Math.random()<0.55)mySaves++;}
      if(Math.random()<0.12)oppCorners++;
      if(Math.random()<0.10){myFouls++;if(Math.random()<0.25)oppCorners++;}
      if(Math.random()<0.15)oppTackles+=rand(0,1);myTackles+=rand(0,1);
    } else {
      myPoss++;oppPoss++;
      myPasses+=rand(2,5);oppPasses+=rand(2,5);
      myTackles+=rand(0,1);oppTackles+=rand(0,1);
      if(Math.random()<0.06)myFouls++;
      if(Math.random()<0.06)oppFouls++;
    }
    // Goals
    while(myG.length&&myG[0].min<=minute){
      myScore++;const sc=myG.shift().scorer;myScoreEl.textContent=String(myScore);
      myShots++;myXG+=1.0;
      playGoalSound();flashIt('goal',`${sc}!`);
      setMatchZone('att','my',3);
      addEvent(events,minute,'TOR',`<b>${sc}</b> — ${myScore}:${oppScore}`,'ev-goal');
    }
    while(oppG.length&&oppG[0].min<=minute){
      oppScore++;const sc=oppG.shift().scorer;oppScoreEl.textContent=String(oppScore);
      oppShots++;oppXG+=1.0;
      playGoalSound();flashIt('opp-goal',sc);
      setMatchZone('def','opp',3);
      addEvent(events,minute,'GEG',`${sc} — ${myScore}:${oppScore}`,'ev-opp-goal');
    }
    // Großchancen
    while(myChances.length&&myChances[0].min<=minute){
      const ch=myChances.shift();
      myBigChances++;myShots++;myXG+=randFloat(0.28,0.52);oppSaves++;
      const txt=MY_MISS[rand(0,MY_MISS.length-1)].replace('{s}',ch.scorer);
      addEvent(events,minute,'CH',`<b>${txt}</b>`,'ev-chance');
    }
    while(oppChances.length&&oppChances[0].min<=minute){
      oppChances.shift();
      oppBigChances++;oppShots++;oppXG+=randFloat(0.28,0.52);mySaves++;
      const txt=OPP_MISS[rand(0,OPP_MISS.length-1)];
      addEvent(events,minute,'GCH',txt,'ev-chance');
    }
    updStats();
    if(myScore>oppScore){myScoreEl.classList.add('winning');oppScoreEl.classList.remove('winning');}
    else if(oppScore>myScore){oppScoreEl.classList.add('winning');myScoreEl.classList.remove('winning');}
    else{myScoreEl.classList.remove('winning');oppScoreEl.classList.remove('winning');}
    if(minute>=total){
      clearInterval(timer);
      // Snap live xG display to pre-calc values so xG always matches goals (max 0.5 diff)
      myXG=r.myXG;oppXG=r.oppXG;updStats();
      addEvent(events,90,'AZ',`Abpfiff! Endstand ${myScore}:${oppScore}`);
      if(myScore===oppScore){
        setTimeout(()=>{
          flashIt('goal','ELFMETER!');
          addEvent(events,90,'ELF','Elfmeterschießen wird entschieden!');
          clearMatchField();
          setTimeout(()=>{
            const pen=simulatePenalties();
            state.matchResult.penalties=pen;
            state.matchResult.won=pen.myPens>pen.oppPens;
            state.matchResult.draw=false;
            state.matchResult.penMyGoals=pen.myPens;
            state.matchResult.penOppGoals=pen.oppPens;
            let penDelay=0;
            let runMyPen=0,runOppPen=0;
            pen.events.forEach(e=>{
              if(e.scored&&e.team==='home')runMyPen++;
              else if(e.scored&&e.team!=='home')runOppPen++;
              const snapMy=myScore+runMyPen,snapOpp=oppScore+runOppPen;
              const isHome=e.team==='home';
              setTimeout(()=>{
                const icon=isHome?(e.scored?'PEN+':'PEN-'):(e.scored?'GEG':'SAVED');
                addEvent(events,120,icon,`${isHome?'Wir':'Gegner'}: ${e.name} — ${e.scored?'Tor!':'Gehalten!'}`);
                if(e.scored){
                  myScoreEl.textContent=String(snapMy);
                  oppScoreEl.textContent=String(snapOpp);
                  if(snapMy>snapOpp){myScoreEl.classList.add('winning');oppScoreEl.classList.remove('winning');}
                  else if(snapOpp>snapMy){oppScoreEl.classList.add('winning');myScoreEl.classList.remove('winning');}
                  else{myScoreEl.classList.remove('winning');oppScoreEl.classList.remove('winning');}
                  flashIt(isHome?'goal':'opp-goal',`${e.name}!`);
                }else{
                  flashIt('','Gehalten!');
                }
              },penDelay);
              penDelay+=3000;
            });
            setTimeout(()=>{
              const penWon=pen.myPens>pen.oppPens;
              flashIt(penWon?'goal':'opp-goal',`${pen.myPens}:${pen.oppPens}`);
              setTimeout(finishMatch,1400);
            },penDelay);
          },1200);
        },900);
      }else{
        setTimeout(finishMatch,1100);
      }
    }
  };
  const MATCH_SPEEDS=[{label:'1×',ms:1333},{label:'2×',ms:500},{label:'4×',ms:150}];
  let speedIdx=0;
  let timer=setInterval(tick,MATCH_SPEEDS[0].ms);
  window._matchTimer=()=>timer;
  window._setMatchTimer=(t)=>{timer=t};
  window.toggleMatchSpeed=()=>{
    speedIdx=(speedIdx+1)%MATCH_SPEEDS.length;

    timer=setInterval(tick,MATCH_SPEEDS[speedIdx].ms);
    const btn=$('#speedBtn');
    if(btn){btn.textContent=MATCH_SPEEDS[speedIdx].label;btn.classList.toggle('speed-active',speedIdx>0)}
  };
  window.skipToResult=()=>{
    clearInterval(timer);
    const r=state.matchResult;
    const mySc=document.getElementById('myScore');
    const oppSc=document.getElementById('oppScore');
    if(mySc)mySc.textContent=String(r.myGoals);
    if(oppSc)oppSc.textContent=String(r.oppGoals);
    if(r.draw){
      const pen=simulatePenalties();
      state.matchResult.penalties=pen;
      state.matchResult.won=pen.myPens>pen.oppPens;
      state.matchResult.draw=false;
      state.matchResult.penMyGoals=pen.myPens;
      state.matchResult.penOppGoals=pen.oppPens;
    }
    finishMatch();
  };
}
const _BADGE_CLS={TOR:'eb-tor',GEG:'eb-geg',CH:'eb-ch',GCH:'eb-gch',HZ:'eb-hz',AZ:'eb-az',ELF:'eb-elf','PEN+':'eb-pen','PEN-':'eb-miss',SAVED:'eb-hz',KO:'eb-ko'};
function addEvent(c,m,badgeType,html,rowClass=''){
  const badgeCls=_BADGE_CLS[badgeType]||'eb-ko';
  const row=el('div',{class:`event-row${rowClass?' '+rowClass:''}`},[
    el('div',{class:'event-time'},[`${m}'`]),
    el('span',{class:`event-badge ${badgeCls}`},[badgeType]),
    (()=>{const d=el('div',{class:'event-text'});d.innerHTML=html;return d})()
  ]);
  c.appendChild(row);
  // scroll parent .match-ticker
  const ticker=c.closest('.match-ticker')||c;
  ticker.scrollTop=ticker.scrollHeight;
}
function finishMatch(){
  state.totalMatches++;
  state.matchResult.progressions=progressPlayers();
  const _ps2=state.perkState;
  if(state.matchResult.won){
    state.winsThisLeague++;
    // Streak tracking
    _ps2.serioesStreak=((_ps2.serioesStreak||0)+1);
    _ps2.comebackBuff=false;
    if(hasPerk('serioeser_favorit')&&_ps2.serioesStreak>=3){_ps2.serioesBuff=true;_ps2.serioesStreak=0;}
    if(hasPerk('gluecksstraehne'))_ps2.glückssträhne=(_ps2.glückssträhne||0)+2;
    if(state.winsThisLeague>=WINS_PER_LEAGUE){
      addLeagueTrophy(state.league);
      if(state.league>=LEAGUES.length-1){
        // Run complete — Champion pack (index 6) as reward
        addTrophy();awardRunXP(true);
        const pool=state.impossibleMode?PACK_CONFIG_IMPOSSIBLE:PACK_CONFIG;
        state.packCards=generatePackCards(pool.length-1);
        state.packLeague=pool.length-1;
        state.phase='victory';render();return;
      }
      // League advanced — award perk
      if(hasPerk('aufsteiger_momentum'))_ps2.aufsteigerGames=2;
      _ps2.routinierLeagues=Math.min((_ps2.routinierLeagues||0)+1,4);
      state.league++;state.winsThisLeague=0;
      const availPerks=PERKS.filter(p=>!state.perks.includes(p.id));
      if(availPerks.length>0){state.pendingPerkPick=true;}
      showToast('Aufstieg in '+LEAGUES[state.league].name+'!');
    }
    state.phase='result-win';
  } else if(state.matchResult.draw){
    // Draw — run continues, grant +4 tactic edge next match
    state.drawBuff=true;
    _ps2.serioesStreak=0;_ps2.serioesBuff=false;
    state.phase='result-win';
  } else {
    // Loss — run ends
    _ps2.serioesStreak=0;_ps2.serioesBuff=false;
    awardRunXP(false);
    state.packCards=generatePackCards(state.league);
    state.packLeague=state.league;
    state.phase='result-lose';
  }
  render();
}
function addTrophy(){
  const ps=Object.values(state.team);
  const top=ps.sort((a,b)=>b.rating-a.rating).slice(0,3);
  state.trophies.push({date:new Date().toISOString().slice(0,10),matches:state.totalMatches,topPlayers:top.map(p=>({name:p.name,rating:p.rating,pos:p.pos}))});
  saveTrophies();
}

    el('div',{class:'rss-sep'},[]),

  ]);

  main.appendChild(el('div',{class:'phase result-phase-v2'},kids));
