.tac-nav-wrap{position:relative;flex-shrink:0;border-radius:100px;overflow:hidden}
.tac-nav-wrap img.bg{display:block;width:100%;height:auto;object-fit:fill}
.tac-nav-btns{position:absolute;top:0;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(3,1fr)}
.tac-nav-btn{position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;transition:color .15s;z-index:1}
.tac-nav-btn.active{color:#0d1a10;z-index:2}
.tac-nav-btn img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;pointer-events:none;z-index:0}
.tac-nav-btn span{position:relative;z-index:1}
.tac-tab-content{display:flex;flex-direction:column;gap:0}
.tac-tab-content.hidden{display:none}
/* Section heading row: green title + right separator line. 5. Reduced top margin */
.tac-sec-head{display:flex;align-items:center;gap:10px;margin-top:10px;margin-bottom:12px;flex-shrink:0}
.tac-sec-title{font-size:12px;font-weight:700;color:#5ec26a;flex-shrink:0}
.tac-sec-sep{flex:1;height:1px;background:rgba(255,255,255,.13);margin-right:14px}
/* Slider row */
.tac-slide-row{display:grid;grid-template-columns:115px 1fr 120px;align-items:center;gap:10px;margin-bottom:18px}
.tac-slide-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Track wrap: flex-centers the SVG track and range input together */
.tac-slide-track-wrap{position:relative;height:16px;display:flex;align-items:center}
.tac-slide-track-wrap img{position:absolute;top:50%;left:0;width:100%;height:8px;transform:translateY(-50%);object-fit:fill;pointer-events:none}
/* 6. Range input inset to match SVG track visual start/end (4.17% inset each side from SVG analysis).
   Thumb center travels from left:4.2% to right:4.2% of the wrap, matching the visual track. */
.tac-slide-track-wrap input[type=range]{position:absolute;z-index:1;top:50%;left:8px;right:8px;width:auto;height:16px;transform:translateY(-50%);margin:0;padding:0;appearance:none;background:transparent;outline:none;cursor:pointer}
/* Thumb: centered on the 8px visual track via margin-top */
.tac-slide-track-wrap input[type=range]::-webkit-slider-runnable-track{height:8px;background:transparent}
.tac-slide-track-wrap input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;background:#5ec26a;border-radius:50%;border:2px solid #081208;box-shadow:0 0 5px rgba(94,194,106,.5);cursor:pointer;margin-top:-3.5px}
.tac-slide-track-wrap input[type=range]::-moz-range-thumb{width:15px;height:15px;background:#5ec26a;border-radius:50%;border:2px solid #081208;box-shadow:0 0 5px rgba(94,194,106,.5);cursor:pointer}
/* Value label: no truncation, right-aligned */
.tac-slide-val{font-size:12px;font-weight:700;color:#5ec26a;text-align:right;white-space:nowrap}
/* 10. Gegneranalyse panel — clean row items, no SVG badge overlaps */
.tac-opp-sec-title{font-size:9.5px;font-weight:700;letter-spacing:1.2px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-top:14px;margin-bottom:7px;flex-shrink:0}
/* Gegneranalyse: rating floats top-right, content starts from top */
.tac-right .tac-panel-inner{position:relative;}
.tac-right .tac-ph + .tac-opp-sec-title{margin-top:7px;}
/* Taktik tab (first top-bar button) active bg — slightly distinct */
.tac-ptabs .tac-ptab:nth-child(1).active{background:#172419;}
.tac-analyse-item{display:flex;flex-direction:column;gap:3px;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:8px;border-left:3px solid rgba(255,255,255,.15);margin-bottom:6px;flex-shrink:0}
.tac-analyse-item.str{border-color:rgba(220,80,80,.8)}
.tac-analyse-item.wk{border-color:rgba(94,194,106,.75)}
.tac-analyse-bold{font-size:12.5px;font-weight:700;color:#fff;line-height:1.3}
.tac-analyse-dim{font-size:10.5px;color:rgba(255,255,255,.5);line-height:1.4}
/* separator line under panel titles */
.tac-sep-line{flex-shrink:0;height:1px;border:none;margin:4px 0 8px;background:linear-gradient(to right,rgba(94,194,106,0) 0%,rgba(94,194,106,.55) 18%,rgba(94,194,106,.55) 82%,rgba(94,194,106,0) 100%)}
.tac-panel.tac-right .tac-sep-line{background:linear-gradient(to right,rgba(124,30,28,0) 0%,rgba(124,30,28,.8) 18%,rgba(124,30,28,.8) 82%,rgba(124,30,28,0) 100%)}
.tac-saved-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;flex-shrink:0}
.tac-load-dropdown{position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:#1a2230;border:1px solid rgba(255,255,255,.15);border-radius:9px;min-width:200px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.6)}
.tac-load-dropdown-item{display:flex;align-items:center;padding:9px 13px;font-size:12px;font-weight:600;color:rgba(255,255,255,.85);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.07);transition:background .12s;gap:8px}
.tac-load-dropdown-item:last-child{border-bottom:none}
.tac-load-dropdown-item:hover{background:rgba(255,255,255,.09)}
.tac-load-dropdown-item .item-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tac-load-dropdown-del{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:rgba(200,90,90,.8);font-size:15px;font-weight:400;line-height:1;transition:background .12s,color .12s}
.tac-load-dropdown-del:hover{background:rgba(220,60,60,.3);color:#ff6b6b}
.team-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:12px;overflow:hidden;min-height:0}
.team-card.opponent{border-color:#7f1d1d}
.team-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--border)}
.team-name{font-size:13px;font-weight:800;letter-spacing:.3px}
.team-name.opp{color:#fca5a5}
.team-rating{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:-0.5px}
.team-rating.opp{color:#fca5a5}
.team-meta{font-size:12.5px;color:var(--text-dim)}
.team-meta b{color:var(--text);font-weight:700}

.mini-pitch{position:relative;background:linear-gradient(to top,#181d28 0%,#11141A 55%,#0e1117 100%);border-radius:6px;aspect-ratio:7/10;align-self:center;flex-shrink:0;width:100%;max-height:240px;overflow:hidden;border:1px solid rgba(255,255,255,.06);box-shadow:0 6px 24px rgba(0,0,0,.55)}
.mini-pitch svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.mini-slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:auto;cursor:grab;user-select:none;touch-action:none;z-index:2}.mini-slot.free-dragging{cursor:grabbing;z-index:30;opacity:.9}
.mini-slot.dragging{cursor:grabbing;z-index:20;opacity:.85}
.mini-slot.drag-over .mini-token{outline:2px solid var(--legendary-1)}
/* mini-token: mini card style for tactics pitch */
.mini-token{width:28px;height:38px;border-radius:5px;background:#0f1623;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.5);flex-shrink:0}
.mini-token.home{border:1.5px solid var(--accent)}
.mini-token.away{border:1.5px solid #f87171}
.mtoken-stripe{height:4px;width:100%;flex-shrink:0}
.mini-token.home .mtoken-stripe{background:var(--accent)}
.mini-token.away .mtoken-stripe{background:#f87171}
/* rarity overrides for home tokens */
.mini-token.home.common{border-color:#9ca3af} .mini-token.home.common .mtoken-stripe{background:#9ca3af}
.mini-token.home.uncommon{border-color:#5EC26A} .mini-token.home.uncommon .mtoken-stripe{background:#5EC26A}
.mini-token.home.rare{border-color:#71a4f4} .mini-token.home.rare .mtoken-stripe{background:#71a4f4}
/* base home token uses accent; rarity overrides take precedence via specificity */
.mini-token.home.epic{border-color:#c084fc;animation:epicTokenPulse 2s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.epic .mtoken-stripe{background:linear-gradient(90deg,#a855f7,#e879f9,#a855f7);background-size:200% 100%;animation:stripeShimmer 2s linear infinite}
.mini-token.home.epic::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(232,121,249,.25) 50%,transparent 65%);background-size:250% 100%;animation:tokenShimmer 2.2s linear infinite;pointer-events:none;z-index:2}
.mini-token.home.legendary{border-color:#fde047;animation:legendaryTokenPulse 1.7s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.legendary .mtoken-stripe{background:linear-gradient(90deg,#f59e0b,#fde047,#fbbf24,#fde047,#f59e0b);background-size:300% 100%;animation:stripeShimmer 1.5s linear infinite}
.mini-token.home.legendary::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(253,224,71,.3) 50%,transparent 70%);background-size:250% 100%;animation:tokenShimmer 1.8s linear infinite;pointer-events:none;z-index:2}
.mini-token.home.mythic{border-color:#ef4444;animation:mythicTokenPulse 1.3s ease-in-out infinite;overflow:hidden;position:relative}
.mini-token.home.mythic .mtoken-stripe{background:linear-gradient(90deg,#dc2626,#ef4444,#ff6b6b,#ef4444,#dc2626);background-size:300% 100%;animation:stripeShimmer 1.1s linear infinite}
.mini-token.home.mythic::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 28%,rgba(239,68,68,.35) 50%,transparent 72%);background-size:250% 100%;animation:tokenShimmer 1.5s linear infinite;pointer-events:none;z-index:2}
.mtoken-rating{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;line-height:1}
.mini-name{font-size:8.5px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.9);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}


/* Tactic tab navigation */
.tac-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg-3);border-radius:8px;padding:3px;margin-bottom:10px;gap:2px}
.tac-tab{background:transparent;color:var(--text-dim);padding:8px;font-size:11px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:.8px;transition:all .12s;text-align:center}
.tac-tab:hover{color:var(--text);background:var(--bg-4)}
.tac-tab.active.ball{background:var(--accent);color:#0d1a10}
.tac-tab.active.noball{background:var(--accent-2);color:#0d1a10}
.tac-tabs3{display:grid;grid-template-columns:repeat(3,1fr);background:var(--bg-3);border-radius:8px;padding:4px;margin-bottom:12px;gap:3px}
.tac-tab3{background:transparent;color:var(--text-dim);padding:10px 4px;font-size:12px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:.4px;transition:all .12s;text-align:center;white-space:nowrap}
.tac-tab3:hover{color:var(--text);background:var(--bg-4)}
.tac-tab3.active{background:var(--accent);color:#0d1a10}
.tac-phase-group{display:flex;flex-direction:column;gap:14px}
.tac-phase.ball-phase{border-left:none}
.tac-phase.noball-phase{border-left:none}
.tac-row{display:grid;grid-template-columns:155px 1fr minmax(110px,auto);align-items:center;gap:8px;font-size:14px;margin-bottom:13px;white-space:nowrap}

/* Intensitätsleiste */
.intens-wrap{padding:7px 0 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.intens-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.intens-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-faint);font-weight:800}
.intens-val{font-size:13px;font-weight:800;letter-spacing:.3px}
.intens-track{height:8px;background:var(--bg-3);border-radius:4px;overflow:hidden;margin-bottom:5px}
.intens-fill{height:100%;border-radius:4px;transition:width .4s,background .35s}
.intens-hint{font-size:11px;color:var(--text-faint);font-style:italic}

/* Tactic editor */
.tac-editor{flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto;padding-right:0;min-height:0;scrollbar-width:none;-ms-overflow-style:none}
.tac-editor::-webkit-scrollbar{width:0;height:0;display:none}
.tac-phase{background:transparent;border:none;border-radius:0;padding:4px 0}
.tac-phase-title{font-size:12px;text-transform:uppercase;letter-spacing:1.6px;color:var(--text-faint);font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.tac-phase-title::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent)}
.tac-phase.def .tac-phase-title::before{background:var(--accent)}
.tac-phase.att .tac-phase-title::before{background:var(--accent)}
.tac-row{display:grid;grid-template-columns:155px 1fr 110px;align-items:center;gap:8px;font-size:14px;margin-bottom:13px}
.tac-row .label{color:var(--text-dim);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tac-row .value{text-align:right;color:var(--accent);font-weight:700;font-size:12px;white-space:nowrap;overflow:visible}
.tac-row input[type=range]{width:100%;height:6px;background:var(--bg-3);border-radius:3px;appearance:none;outline:none;accent-color:var(--accent)}
.tac-row input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;border:2px solid var(--bg-2);box-shadow:0 0 6px rgba(94,194,106,.4)}
.tac-display{display:grid;grid-template-columns:100px 1fr;gap:5px;font-size:12px;padding:3px 0}
.tac-display .label{color:var(--text-dim);font-weight:500}
.tac-display .value{color:var(--text);font-weight:600}

.mentality-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:var(--bg-3);padding:4px;border-radius:9px}
.mentality-picker button{background:transparent;color:var(--text-dim);padding:10px 2px;font-size:11px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:.2px;white-space:normal;line-height:1.25;text-align:center;transition:color .1s,background .1s}
.mentality-picker button:hover{color:var(--text);background:var(--bg-4)}
.mentality-picker button.active{background:var(--accent);color:#0d1a10}

/* Option A — Leuchtring: dark center, green border, white text */
.pitch-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:900;letter-spacing:.2px;color:#fff;background:#0D1117;border:2px solid #5EC26A;box-shadow:0 0 8px rgba(94,194,106,.45),0 2px 8px rgba(0,0,0,.7);flex-shrink:0;cursor:default}
.pitch-dot.common,.pitch-dot.uncommon,.pitch-dot.rare,.pitch-dot.epic,.pitch-dot.legendary,.pitch-dot.mythic{background:#0D1117;color:#fff;border:2px solid #5EC26A;box-shadow:0 0 8px rgba(94,194,106,.45),0 2px 8px rgba(0,0,0,.7);animation:none}
.pitch-dot.away{background:#0D1117;color:#f87171;border:2px solid #f87171;box-shadow:0 0 8px rgba(248,113,113,.4),0 2px 8px rgba(0,0,0,.7)}
.pitch-dot.empty{background:transparent;border:1.5px dashed rgba(94,194,106,.35);color:rgba(94,194,106,.5);font-size:9px;font-weight:700;box-shadow:none}

.formation-row{display:flex;align-items:center;gap:6px;font-size:11px}
.formation-row select{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:5px;font-weight:700;font-size:11.5px;flex:1}

/* Scouting Card */
.scout-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
.scout-head{display:flex;align-items:center;gap:9px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.scout-icon{width:32px;height:32px;border-radius:8px;background:rgba(94,194,106,.12);border:1px solid rgba(94,194,106,.25);display:grid;place-items:center;flex-shrink:0;color:var(--accent)}
.scout-head .title{font-size:12.5px;font-weight:800}
.scout-head .subtitle{font-size:10.5px;color:var(--text-dim)}
.scout-section{font-size:11.5px;line-height:1.5}
.scout-section h5{font-size:9.5px;text-transform:uppercase;letter-spacing:1.6px;color:var(--text-faint);font-weight:800;margin-bottom:6px;margin-top:4px}
.scout-bullet{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)}
.scout-bullet:last-child{border:none}
.scout-bullet .icon{flex-shrink:0;width:16px;text-align:center;font-size:13px}
.scout-bullet .text{flex:1;color:var(--text);line-height:1.4;font-size:11.5px}
.scout-bullet .text b{color:var(--accent)}
.scout-bullet.danger .text b{color:var(--danger)}
.scout-bullet.warn .text b{color:var(--warn)}

/* Opponent analysis 3-tab panel */
.opp-tab-panel{display:flex;flex-direction:column;gap:8px;margin-top:6px;flex:1;min-height:0;overflow-y:auto}
.opp-tab-panel .mini-pitch{flex:0 1 auto;height:calc((100vh - 220px) / 2);max-height:calc((100vh - 220px) / 2);min-height:80px;width:100%;aspect-ratio:unset;align-self:stretch}
/* Saved tactics compact strip */
.saved-tac-strip{display:flex;flex-wrap:wrap;gap:6px;padding:6px 0;margin-top:2px}
.saved-tac-chip{display:flex;align-items:center;gap:5px;background:var(--bg-2);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;transition:border-color .13s,background .13s}
.saved-tac-chip:hover{border-color:var(--accent);background:var(--bg-3)}
.saved-tac-chip .chip-name{color:var(--text);font-weight:600;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.saved-tac-chip .chip-form{color:var(--text-faint);font-size:10px}
.saved-tac-chip .chip-del{color:var(--text-faint);font-size:11px;line-height:1;padding:0 2px;border-radius:3px}
.saved-tac-chip .chip-del:hover{color:var(--danger)}

/* Role editor when slot selected */
/* Role modal — modern card design */
.role-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:50}
.role-modal.show{display:flex}
.rmod-box{background:#0D1419;border:1px solid #232D3A;border-radius:14px;width:90%;max-width:360px;overflow:hidden;box-shadow:0 28px 72px rgba(0,0,0,.85)}
.rmod-head{padding:16px 18px 14px;border-bottom:1px solid rgba(255,255,255,.055)}
.rmod-pos-badge{display:inline-flex;align-items:center;padding:2px 9px;background:rgba(94,194,106,.1);border:1px solid rgba(94,194,106,.28);border-radius:5px;font-size:9.5px;font-weight:800;color:#5EC26A;letter-spacing:.9px;text-transform:uppercase;margin-bottom:7px}
.rmod-player{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.rmod-meta{font-size:10.5px;color:#6F7785;margin-top:3px}
.rmod-list{padding:8px 10px;display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto;scrollbar-width:none}
.rmod-list::-webkit-scrollbar{display:none}
.rmod-item{padding:9px 12px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:background .12s,border-color .12s}
.rmod-item:hover{background:rgba(255,255,255,.04)}
.rmod-item.active{background:rgba(94,194,106,.07);border-color:rgba(94,194,106,.32)}
.rmod-item-name{font-size:12.5px;font-weight:700;color:#C9D0D8;margin-bottom:2px}
.rmod-item.active .rmod-item-name{color:#5EC26A}
.rmod-item-desc{font-size:10.5px;color:#46505F;line-height:1.35}
.rmod-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.055);display:flex;gap:8px;justify-content:flex-end}

/* Match phase — full-screen layout */
/* ═══ MATCH SCREEN ═══ */
.match-phase{position:absolute;inset:0;display:flex;flex-direction:column;padding:18px 18px 12% 18px;gap:0;box-sizing:border-box;overflow:hidden}
/* Controls: top-right absolute, same position as Weiter on other screens */
.match-ctrl-wrap{position:absolute;top:16px;right:18px;z-index:20;display:flex;align-items:center;gap:8px}
.speed-btn{font-size:12px;font-weight:800;padding:7px 16px;border-radius:20px;letter-spacing:.5px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s}
.speed-btn:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}
.speed-btn.speed-active{background:#5EC26A;color:#071a09;border-color:transparent;box-shadow:0 0 10px rgba(94,194,106,.4)}
.skip-btn{font-size:12px;font-weight:700;padding:7px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s}
.skip-btn:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}
/* Score row — floating, no background */
.match-score-row{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.match-score-block{text-align:center;min-width:160px}
.match-score-label{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:2px;font-family:'Inter',sans-serif}
.match-score-num{font-size:108px;font-weight:900;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
.match-score-num.winning{color:#5ec269}
.match-score-num.losing{color:#da4140}
.match-score-sep{display:flex;flex-direction:column;align-items:center;padding:0 22px}
.match-score-colon{font-size:70px;font-weight:900;color:rgba(255,255,255,.15);line-height:1}
.match-clock{font-size:20px;font-weight:800;color:rgba(250,250,250,.6);letter-spacing:1px;font-variant-numeric:tabular-nums;font-family:'Inter',sans-serif;margin-bottom:8px}
/* Three-column layout */
.match-columns{flex:1;min-height:0;display:flex;align-items:stretch;font-family:'Inter',sans-serif;margin-top:48px;position:relative}
/* Ticker panel — absolute so field layout is unaffected */
.match-ticker{position:absolute;left:3%;top:-5%;bottom:-5%;width:292px;display:flex;flex-direction:column;border-radius:14px;background:#151620;border:1.5px solid #3b434d;overflow:hidden;z-index:2}
.match-ticker-inner{padding:16px 12px 12px;display:flex;flex-direction:column;flex:1;min-height:0;box-sizing:border-box}
.match-ticker-hdr{font-size:14px;font-weight:700;color:#fafafa;margin-bottom:10px;flex-shrink:0;padding-bottom:8px;border-bottom:1px solid rgba(139,139,139,.25);font-family:'Inter',sans-serif}
.match-ticker-events{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;scrollbar-width:none}
.match-ticker-events::-webkit-scrollbar{display:none}
/* Field — stays exactly as-is, centred in the padded field-wrap */
.match-field-wrap{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;padding:0 306px}
.match-field{position:relative;height:100%;width:auto;aspect-ratio:600/389;max-width:100%;background:#151821;border-radius:10px;overflow:hidden;border:1.5px solid rgba(255,255,255,.07);box-shadow:0 8px 32px rgba(0,0,0,.55)}
.match-field>svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
/* Stats panel — absolute on right */
.match-stats-side{position:absolute;right:3%;top:-5%;bottom:-5%;width:292px;display:flex;flex-direction:column;border-radius:14px;background:#151620;border:1.5px solid #3b434d;overflow:hidden;z-index:2}
.match-stats-inner{padding:16px 14px 12px;display:flex;flex-direction:column;flex:1;min-height:0;box-sizing:border-box;font-family:'Inter',sans-serif}
.stats-panel-hdr{font-size:14px;font-weight:700;color:#fafafa;margin-bottom:8px;flex-shrink:0;padding-bottom:8px;border-bottom:1px solid rgba(139,139,139,.25);text-align:left;font-family:'Inter',sans-serif}
.stat-row{display:flex;flex-direction:column;gap:3px;padding:1px 0;flex:1}
.stat-row:last-child{border-bottom:none}
.stat-nums{display:flex;justify-content:space-between;align-items:center}
.stat-num-my{font-size:18px;font-weight:800;color:#fafafa;min-width:36px}
.stat-num-opp{font-size:18px;font-weight:800;color:#fafafa;min-width:36px;text-align:right}
.stat-name{font-size:12px;font-weight:600;color:#fafafa;text-align:center;flex:1}
.stat-bar-wrap{height:9px;border-radius:5px;overflow:hidden;display:flex;background:rgba(139,139,139,.2)}
.stat-bar-my{height:100%;background:#5ec269;transition:flex .75s ease;min-width:3px}
.stat-bar-opp{height:100%;background:#6c5fff;transition:flex .75s ease;min-width:3px}
.stat-row.poss-row .stat-bar-wrap{height:11px;border-radius:6px}
.poss-badge-my{background:#5ec269;color:#151620;font-size:13px;font-weight:800;padding:4px 13px;border-radius:16px}
.poss-badge-opp{background:#6c5fff;color:#fafafa;font-size:13px;font-weight:800;padding:4px 13px;border-radius:16px}
.btn.impossible-btn{background:rgba(127,29,29,.25);border-color:rgba(239,68,68,.45);color:#f87171}
.btn.impossible-btn:hover{background:rgba(127,29,29,.45);border-color:rgba(239,68,68,.75);color:#fca5a5}
/* Field overlay — above SVG (z-index:3) so gradient is visible over pitch lines */
.field-overlay{position:absolute;inset:0;z-index:4;pointer-events:none;border-radius:7px}
/* ── Arrow: single seamless stream keyframe — dashoffset travels from +len to -len,
      invisible at both ends so the loop reset is undetectable ── */
@keyframes aFlow{
  from{stroke-dashoffset:var(--dl);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  to{stroke-dashoffset:calc(var(--dl)*-1);opacity:0}
}
/* ── Arrow: chevron continuously slides through, fades at edges ── */
@keyframes aChvFlow{
  0%{transform:translateX(-22px);opacity:0}
  14%{opacity:1}
  86%{opacity:1}
  100%{transform:translateX(22px);opacity:0}
}
/* ── Arrow positioning ── */
.field-arrow{position:absolute;top:50%;transform:translate(-50%,-52%);opacity:0;transition:opacity 0.35s ease;pointer-events:none;z-index:8;line-height:0}
.fa-def{left:16.67%}
.fa-mid{left:50%}
.fa-att{left:83.33%}
.field-arrow.visible{opacity:1}
.field-label{position:absolute;top:calc(50% + 42px);transform:translateX(-50%);font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;opacity:0;transition:opacity .3s ease;pointer-events:none;z-index:8;white-space:nowrap;text-shadow:0 1px 5px rgba(0,0,0,.95),0 0 10px rgba(0,0,0,.85),0 2px 8px rgba(0,0,0,.9)}
.field-label.visible{opacity:1}
/* Event flash */
.event-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#fafafa;font-size:18px;font-weight:900;padding:10px 24px;border-radius:8px;border:2px solid #5ec269;letter-spacing:2px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
.event-flash.show{opacity:1}
.event-flash.goal{border-color:#5ec269;background:#102412;box-shadow:0 0 30px rgba(94,194,106,.35)}
.event-flash.opp-goal{border-color:#da4140;background:#382122}
/* Ticker rows */
/* ── Event rows ── */
.event-row{display:flex;align-items:center;border-radius:8px;padding:7px 10px;min-height:34px;font-family:'Inter',sans-serif;gap:8px;box-sizing:border-box}
/* Neutral rows — all identical */
.event-row:not(.ev-goal):not(.ev-opp-goal){background:rgba(255,255,255,.04)}
/* Goal rows */
.event-row.ev-goal{background:linear-gradient(90deg,#102412 0%,rgba(16,36,18,.5) 100%);border-left:3px solid #5ec269;min-height:42px;padding:9px 10px 9px 8px}
.event-row.ev-opp-goal{background:linear-gradient(90deg,#382122 0%,rgba(56,33,34,.5) 100%);border-left:3px solid #da4140;min-height:42px;padding:9px 10px 9px 8px}
/* Time */
.event-time{font-weight:700;color:rgba(250,250,250,.4);flex-shrink:0;font-variant-numeric:tabular-nums;font-size:11px;min-width:26px}
.event-row.ev-goal .event-time,.event-row.ev-opp-goal .event-time{font-size:12px;font-weight:800;color:#fafafa}
/* Goal label badge */
.ev-goal-label{font-size:11px;font-weight:900;letter-spacing:.5px;flex-shrink:0;padding:3px 9px;border-radius:5px;line-height:1}
.event-row.ev-goal .ev-goal-label{background:rgba(94,194,105,.15);color:#7ee489}
.event-row.ev-opp-goal .ev-goal-label{background:rgba(218,65,64,.18);color:#ef5857}
/* Neutral badge */
.event-badge{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;letter-spacing:.5px;padding:2px 7px;border-radius:5px;flex-shrink:0;height:20px;background:rgba(139,139,139,.15);color:rgba(250,250,250,.55)}
/* Event text */
.event-text{flex:1;line-height:1.3;font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:rgba(250,250,250,.55)}
.event-text b{color:#fafafa;font-weight:700}
.event-row.ev-goal .event-text{font-size:13px;font-weight:700;color:#7ee489}
.event-row.ev-opp-goal .event-text{font-size:13px;font-weight:700;color:#ef5857}
.event-row.ev-goal .event-text b{color:#7ee489}
.event-row.ev-opp-goal .event-text b{color:#ef5857}

/* Result phase */
.result-phase{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;text-align:center}
.result-banner{font-size:40px;font-weight:900;letter-spacing:4px;text-transform:uppercase;padding:14px 44px;border-radius:12px}
.result-banner.win{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0d1a10;box-shadow:0 0 40px rgba(94,194,106,.3)}
.result-banner.lose{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff}
.result-banner.victory{background:linear-gradient(135deg,#facc15,#d97706);color:#0b0f14;box-shadow:0 0 60px rgba(250,204,21,.5)}
.result-score{font-size:54px;font-weight:900;letter-spacing:4px}
.result-details{font-size:12.5px;color:var(--text-dim);max-width:560px;line-height:1.6}
.result-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;width:100%;max-width:560px}
.result-stat{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center}
.result-stat-label{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);font-weight:800;margin-bottom:4px}
.result-stat-value{font-size:18px;font-weight:800;color:var(--text)}
.result-progressions{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:10px 16px;width:100%;flex-shrink:0}
.result-progressions h4{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);margin-bottom:9px;font-weight:800}
.prog-chips{display:flex;flex-wrap:wrap;gap:7px}
.prog-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:13px}
.prog-chip-name{color:var(--text-dim)}
.prog-chip-val{color:var(--text)}
.tactic-feedback{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:left;width:100%;max-width:440px}
.tf-title{font-size:9.5px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}
.tf-row{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.tf-row:last-child{border-bottom:none}
.tf-icon{flex-shrink:0;font-size:13px;line-height:1.5;margin-top:1px}
.tf-text{font-size:12.5px;line-height:1.45;color:var(--text)}
.tf-ok .tf-text{color:#5EC26A}
.tf-warn .tf-text{color:#fcd34d}
.tf-neutral .tf-text{color:var(--text-dim)}
.tf-text-wrap{display:flex;flex-direction:column;gap:2px;flex:1}
.tf-tip{font-size:11px;color:var(--text-faint);font-style:italic;margin-top:1px}
.tf-gamechanger{background:rgba(94,194,106,.07);border:1px solid rgba(94,194,106,.18);border-radius:7px;padding:8px 11px;margin:3px 0 2px}
.tf-gc-label{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.tf-gc-text{font-size:12.5px;line-height:1.45;font-weight:600}
.tf-gc-text.pos{color:#5EC26A}
.tf-gc-text.neg{color:#fcd34d}
.prog-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px dashed var(--border)}
.prog-row:last-child{border:none}
.prog-row b.up{color:var(--accent)}
.prog-row b.down{color:var(--danger)}
/* ── Unified main CTA button (bottom-center, leads to next screen) ── */
.btn-cta-main{padding:16px 52px!important;font-size:16px!important;font-weight:900!important;letter-spacing:.5px!important;border-radius:11px!important}

/* ── Result Phase V3 ─────────────────────────────────────────── */
.result-phase-v2{display:flex;flex-direction:column;padding:8px 24px 16px;gap:10px;box-sizing:border-box;overflow-y:auto;font-family:'Inter',sans-serif;position:relative}
.res-action-btn-wrap{position:absolute;top:10px;right:16px;z-index:5;}
/* Score section */
.res-score-section{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:4px}
.res-score-main-row{display:flex;align-items:center;justify-content:center;gap:10px}
.res-score-outcome{border-radius:20px;padding:8px 20px;display:flex;align-items:center;gap:0}
.res-score-outcome.win{}
.res-score-outcome.loss{}
.res-score-outcome.draw{}
.res-scorers{display:flex;flex-direction:column;gap:3px;width:130px}
.res-scorers.left{align-items:flex-end;text-align:right}
.res-scorers.right{align-items:flex-start}
.res-scorer{font-size:11px;font-weight:500;color:rgba(250,250,250,.55);white-space:nowrap;font-family:'Inter',sans-serif}
/* Rating badges */
.res-ratings-row{display:flex;justify-content:space-between;align-items:center;width:100%;flex-shrink:0}
.res-rating-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:rgba(250,250,250,.45);font-family:'Inter',sans-serif}
.res-rlbl{color:rgba(250,250,250,.6);font-size:10px;font-weight:600;font-family:'Inter',sans-serif;white-space:nowrap}
.res-rating-val{display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;padding:2px 8px;border-radius:8px;min-width:34px;font-family:'Inter',sans-serif;letter-spacing:-.3px}
.res-rating-val.my-avg{background:#151821;color:#4AB055;border:1.5px solid #4AB055}
.res-rating-val.opp-avg{background:#151821;color:#ef4444;border:1.5px solid #ef4444}
/* Stats strip */
.res-stats-strip{background:#151620;border:1.5px solid #3b434d;border-radius:12px;display:flex;align-items:stretch;flex-shrink:0;overflow:hidden}
.res-stat-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;gap:3px}
.res-stat-val{font-size:36px;font-weight:900;color:#fafafa;line-height:1;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}
.res-stat-val.pos{color:#5ec269}
.res-stat-val.neg{color:#da4140}
.res-stat-lbl{font-size:11px;font-weight:600;color:#5ec269;font-family:'Inter',sans-serif}
.res-stat-lbl.neutral-lbl{color:rgba(250,250,250,.55)}
.res-stat-sep{width:1.5px;background:rgba(139,139,139,.25);flex-shrink:0;margin:10px 0}
/* Tactic panels */
.res-panels{display:flex;gap:14px;flex-shrink:0;min-height:80px;max-height:200px}
.res-panel{flex:1;background:#151620;border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.res-panel.pos-panel{border:1.5px solid #5ec269}
.res-panel.neg-panel{border:1.5px solid #da4140}
.res-panel-inner{padding:12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.res-panel-hdr{font-size:13px;font-weight:700;color:#fafafa;flex-shrink:0;font-family:'Inter',sans-serif;margin-bottom:2px}
.res-tactic-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px;min-height:38px;flex-shrink:0}
.res-tactic-pill{font-size:10px;font-weight:800;padding:4px 10px;border-radius:6px;flex-shrink:0;white-space:nowrap;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:.4px}
.res-panel.pos-panel .res-tactic-pill{background:rgba(94,194,105,.15);color:#5ec269}
.res-panel.neg-panel .res-tactic-pill{background:rgba(218,65,64,.15);color:#da4140}
.res-tactic-text{font-size:12px;color:rgba(250,250,250,.62);line-height:1.35;flex:1;font-family:'Inter',sans-serif}
.res-tactic-empty{font-size:12px;color:rgba(250,250,250,.38);font-style:italic;padding:4px 0;font-family:'Inter',sans-serif}
/* Progressions */
.res-prog-bar{background:#151620;border:1.5px solid #3b434d;border-radius:12px;padding:12px 16px;flex-shrink:0}
.res-prog-bar.prog-pos{border-color:rgba(94,194,105,.55)}
.res-prog-bar.prog-neg{border-color:rgba(218,65,64,.55)}
.res-prog-label{font-size:11px;font-weight:700;color:rgba(250,250,250,.4);margin-bottom:8px;font-family:'Inter',sans-serif}
.res-prog-chips{display:flex;flex-wrap:wrap;gap:8px}
.res-prog-chip{display:flex;align-items:center;gap:6px;border-radius:8px;padding:6px 14px}
.res-prog-chip.prog-up{background:rgba(94,194,105,.1);border:1px solid rgba(94,194,105,.4)}
.res-prog-chip.prog-down{background:rgba(218,65,64,.1);border:1px solid rgba(218,65,64,.4)}
.res-prog-chip-name{font-size:13px;font-weight:600;color:#fafafa;font-family:'Inter',sans-serif}
.res-prog-chip-arr{font-size:12px;color:rgba(250,250,250,.3)}
.res-prog-chip-to{font-size:13px;font-weight:800;font-family:'Inter',sans-serif}
/* Bottom notes */
.res-bottom-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.res-lose-info{text-align:center;font-size:12px;color:rgba(250,250,250,.4);font-family:'Inter',sans-serif}

/* Replace-pick layout */
.replace-bench-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s}
.replace-pick-main{display:flex;flex-direction:row;flex:1;min-height:0;overflow:hidden}
/* card panel overlaid absolutely so the pitch keeps identical dimensions to the lineup screen */
.replace-card-panel{position:absolute;left:0;top:0;bottom:0;width:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 14px;background:rgba(9,13,17,.88);border-right:1px solid #3A424F;z-index:20}
.replace-card-panel-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1.6px;color:var(--text-faint);font-weight:800}
.replace-card-panel .card{cursor:default;pointer-events:none}
/* Replace-pick: new player card — fixed right panel, mirrors bench on left */
.rp-new-card-col{position:absolute;right:0;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:25;padding:16px 10px 56px;background:transparent;border-left:none;}
.rp-new-card-col .card{zoom:0.68;cursor:default}
.rp-new-card-col .card-stage-chip{font-size:7px;padding:1px 4px;border-radius:5px;}
.rp-new-card-col .card-age-nat{font-size:6px;}
.rp-new-card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.35)}
.rp-zuruck-btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 32px;border-radius:999px;border:1.5px solid #4F5E72;background:#151821;color:#4F5E72;font-size:15px;font-weight:900;letter-spacing:.3px;cursor:pointer;white-space:nowrap;user-select:none;flex-shrink:0;font-family:inherit;transition:all .14s;touch-action:manipulation}
.rp-zuruck-btn:hover{border-color:#6b7a8d;color:#6b7a8d;background:#1a2130}
/* Age badges on mini-cards — pinned top-right corner of token */
/* stoken-stage-chip styles sind im slot-token block oben definiert */
/* old grid kept for replace-draft */
.replace-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;width:100%;max-width:1100px}
.team-slot-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:border-color .13s,transform .13s}
.team-slot-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.team-slot-card.common{border-left:3px solid var(--common-1)}
.team-slot-card.uncommon{border-left:3px solid #5EC26A}
.team-slot-card.rare{border-left:3px solid var(--rare-1)}
.team-slot-card.epic{border-left:3px solid var(--epic-1)}
.team-slot-card.star{border-left:3px solid var(--star-1)}
.team-slot-card.legendary{border-left:3px solid var(--legendary-1)}
.team-slot-card .pos-label{font-size:9.5px;color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.team-slot-card .player-line{display:flex;justify-content:space-between;align-items:center}
.team-slot-card .player-name{font-size:12.5px;font-weight:700}
.team-slot-card .player-rating{font-size:17px;font-weight:900;color:var(--accent)}
.team-slot-card .player-meta{font-size:10.5px;color:var(--text-faint)}

/* Trophy Collection */
.trophy-phase{display:flex;flex-direction:column;align-items:center;padding:24px 16px;gap:20px;overflow-y:auto}
.trophy-shelf{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:8px 0}
.trophy-card{width:128px;min-height:168px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border:1.5px solid;position:relative;padding:14px 10px;transition:transform .18s,box-shadow .18s;cursor:default}
.trophy-card.locked{background:rgba(15,22,45,.7);border-color:rgba(55,70,100,.4)}
.trophy-card.l0{background:linear-gradient(145deg,#3f3f46,#27272a);border-color:#78716c}
.trophy-card.l1{background:linear-gradient(145deg,#15803d,#14532d);border-color:#16a34a}
.trophy-card.l2{background:linear-gradient(145deg,#0e7490,#155e75);border-color:#0891b2}
.trophy-card.l2{background:linear-gradient(145deg,#7e22ce,#4c1d95);border-color:#e879f9;box-shadow:0 0 26px rgba(232,121,249,.25)}
.trophy-card.l4{background:linear-gradient(145deg,#a16207,#854d0e);border-color:#facc15;box-shadow:0 0 22px rgba(250,204,21,.18)}
.trophy-card.l4{background:linear-gradient(145deg,#991b1b,#7f1d1d);border-color:#dc2626}
.trophy-card:not(.locked):hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,.5)}
.trophy-icon{font-size:46px;line-height:1;display:block;margin-bottom:2px}
.trophy-card.locked .trophy-icon{filter:grayscale(1) brightness(0.25) sepia(1) hue-rotate(200deg)}
.trophy-card-name{font-size:9px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.92);text-align:center;line-height:1.3}
.trophy-card.locked .trophy-card-name{color:rgba(100,130,180,.3)}
.trophy-count{font-size:22px;font-weight:900;color:#fff;line-height:1;margin-top:2px}
.trophy-card.locked .trophy-count{font-size:13px;color:rgba(100,130,180,.25)}
.trophy-count-sub{font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.78)}
.trophy-card.locked .trophy-count-sub{color:rgba(100,130,180,.2)}
/* CL snapshots below */
.trophy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;width:100%;max-width:860px}

.hint{font-size:11px;color:var(--text-faint);text-align:center}
/* Shared screen action footer — always at bottom, right-aligned */
.screen-footer{flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:10px 0 0;border-top:1px solid var(--border);margin-top:auto}
.screen-footer-center{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 0 0;border-top:1px solid var(--border);margin-top:auto}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-3);color:var(--text);padding:10px 18px;border-radius:9px;font-size:12px;font-weight:600;border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,.5);opacity:0;transition:all .25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3A424F}

/* Pitch header: label row + centered form selector */
.pitch-label-row{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;margin-bottom:3px}
.pitch-form-center{display:flex;justify-content:center;flex-shrink:0;margin-bottom:5px}
.pitch-form-center .pitch-form-sel{max-width:120px;text-align:center}

/* Subcategory titles inside tac-editor */
.tac-subcat{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--subcat-color,var(--accent));font-weight:700;margin:12px 0 5px 1px;display:flex;align-items:center;gap:5px;opacity:.9}
.tac-subcat:first-child{margin-top:2px}
.tac-subcat::after{content:'';flex:1;height:1px;background:var(--subcat-color,rgba(94,194,106,.4));opacity:.3;margin-left:4px}

/* Co-trainer / Analyst report in Spielweise tab */
.ctr-report{display:flex;flex-direction:column;gap:10px}
.ctr-style-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;background:rgba(94,194,106,.1);border:1px solid rgba(94,194,106,.22);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.3px;align-self:flex-start}
.ctr-section{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-faint);font-weight:700;margin:2px 0 7px;display:flex;align-items:center;gap:6px}
.ctr-section::after{content:'';flex:1;height:1px;background:var(--border)}
.ctr-bar-row{display:grid;grid-template-columns:82px 1fr 48px;align-items:center;gap:7px;font-size:11px;margin-bottom:4px}
.ctr-bar-row .bar-label{color:var(--text-dim);font-weight:500}
.ctr-bar-row .bar-val{font-size:11px;font-weight:700;color:var(--text);text-align:right}
.ctr-bar-track{height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden}
.ctr-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
.ctr-bar-fill.high{background:#f87171}
.ctr-bar-fill.mid{background:#fbbf24}
.ctr-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ctr-col-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:700;margin-bottom:5px}
.ctr-kv{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.ctr-kv .ck{color:var(--text-dim)}
.ctr-kv .cv{color:var(--text);font-weight:600;font-size:10.5px;text-align:right;max-width:90px}

/* Spielweise Option C — Stärken & Schwächen */
.sw-list{display:flex;flex-direction:column;gap:5px}
.sw-item{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;padding:7px 10px;border-radius:8px;line-height:1.4}
.sw-item.threat{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.1)}
.sw-item.weak{background:rgba(94,194,106,.06);border:1px solid rgba(94,194,106,.1)}
.sw-dot{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;margin-top:.5px}
.sw-dot.r{background:rgba(239,68,68,.2);color:#fca5a5}
.sw-dot.g{background:rgba(94,194,106,.18);color:#5EC26A}
.sw-bold{font-weight:700;color:var(--text)}
.sw-dim{color:var(--text-dim);font-size:12px}

/* Opponent keyword badges */
.opp-keywords{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 8px}
.opp-kw{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:700;letter-spacing:.2px}
.opp-kw.warn{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.opp-kw.info{background:rgba(94,194,106,.08);color:var(--accent);border:1px solid rgba(94,194,106,.18)}
.opp-kw.green{background:rgba(94,194,106,.09);color:#5EC26A;border:1px solid rgba(94,194,106,.18)}
.opp-kw.neutral{background:var(--bg-2);color:var(--text-dim);border:1px solid var(--border)}
.opp-kw.yellow{background:rgba(251,191,36,.1);color:#fcd34d;border:1px solid rgba(251,191,36,.25)}

/* ── Free-pitch layout ── */
.pitch-section-wrap{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:6px;overflow:hidden;min-height:0;flex:1}
.pitch-section-wrap .mini-pitch{flex:1;min-height:0;max-height:none;aspect-ratio:unset;align-self:stretch;width:100%}
.pitch-header{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-shrink:0}
.pitch-header-title{font-size:13px;font-weight:800;letter-spacing:.6px;white-space:nowrap}
.pitch-header-title.mit{color:var(--accent)}
.pitch-header-title.ohne{color:var(--accent-2)}
.pitch-form-sel{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:3px 6px;border-radius:5px;font-size:11px;font-weight:700;flex:1;max-width:90px;cursor:pointer}
.pitch-hint{font-size:11px;color:var(--text-faint);text-align:center;padding:3px 0;flex-shrink:0}

/* Tactic left-panel nav: standalone ptab-style buttons */
.tac-nav-ptabs{display:flex;flex-direction:row;gap:6px;flex-shrink:0;margin-bottom:10px;}
.tac-nav-ptabs .tac-ptab{flex:1;}

/* M-22: Portrait tactic tab bar — hidden on desktop */
.tac-ptabs{display:none;flex-direction:row;gap:6px;padding:6px 14px 0;flex-shrink:0;}
.tac-ptab{
  flex:1;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:800;
  letter-spacing:.3px;border:1.5px solid #4F5E72;
  background:#151821;color:#4F5E72;
  cursor:pointer;touch-action:manipulation;transition:all .14s;
}
.tac-ptab.active{
  background:#151821;border-color:#4AB055;color:#4AB055;
}

/* Custom formation dropdown for tactics left panel */
.tac-form-drop-wrap{position:relative;width:100%}
.tac-form-drop-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:8px 13px;cursor:pointer;user-select:none;font-size:14px;font-weight:900;color:var(--text);letter-spacing:.5px;transition:background .13s,border-color .13s}
.tac-form-drop-btn:hover{background:var(--bg-3);border-color:#3A424F}
.tac-form-drop-arrow{color:#5A6472;font-size:12px;transition:transform .18s;display:inline-block;flex-shrink:0}
.tac-form-drop-menu{display:none;position:absolute;top:calc(100% + 5px);left:0;right:0;background:#1D232C;border:1px solid #3A424F;border-radius:9px;overflow:hidden;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.7)}
.tac-form-drop-menu.open{display:block}
.tac-form-drop-item{padding:10px 14px;font-size:13px;font-weight:700;color:var(--text-dim);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.tac-form-drop-item:hover{background:#232A35;color:var(--text)}
.tac-form-drop-item.active{color:var(--accent)}

/* ── Role chips on pitch tokens ── */
.mini-role-badge{font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.18);color:var(--text);letter-spacing:.3px;margin-top:2px;white-space:nowrap;backdrop-filter:blur(2px);cursor:pointer;line-height:1.3}
.mini-empty-badge{font-size:8px;color:var(--text-faint);margin-top:1px}
.mini-role-badge.duty-def{border-color:rgba(94,194,106,.6);color:var(--accent)}
.mini-role-badge.duty-sup{border-color:rgba(251,191,36,.6);color:#fcd34d}
.mini-role-badge.duty-att{border-color:rgba(248,113,113,.6);color:#fca5a5}

/* ── Role chips on lineup slots ── */
.slot-role-chip{font-size:7.5px;font-weight:800;padding:1px 4px;border-radius:3px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);color:var(--text);letter-spacing:.2px;margin-top:1px;white-space:nowrap}
.slot-role-chip.duty-def{border-color:rgba(94,194,106,.6);color:var(--accent)}
.slot-role-chip.duty-sup{border-color:rgba(251,191,36,.6);color:#fcd34d}
.slot-role-chip.duty-att{border-color:rgba(248,113,113,.6);color:#fca5a5}

/* ── Scout card overhaul ── */
.scout-section-title{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--border)}
.scout-row{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.04)}
.scout-row.highlight{background:rgba(239,68,68,.08);border-radius:4px;padding:3px 5px;margin:-1px -2px}
.scout-row-icon{font-size:12px;width:16px;text-align:center;flex-shrink:0}
.scout-row-label{color:var(--text-faint);font-size:10px;min-width:54px;flex-shrink:0}
.scout-row-value{color:var(--text);font-size:11px;font-weight:500}
.scout-quality{font-size:11px;padding:5px 7px;border-radius:5px;font-weight:600}
.scout-quality.danger{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.scout-quality.info{background:rgba(94,194,106,.08);color:var(--accent);border:1px solid rgba(94,194,106,.2)}

/* ── Saved tactics list ── */
.saved-tac-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.saved-tac-name{flex:1;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saved-tac-form{color:var(--text-faint);font-size:10px;min-width:32px}

/* ── Amber Pill Buttons: Feedback, Rangliste, Trophäen (aus SVG: #ffbd58 / bg #2f220d) ── */
.btn-hdr.hdr-bug,.btn-hdr.hdr-amber{color:#ffbd58;border-color:rgba(255,189,88,.55);background:#2f220d;border-radius:999px}
.btn-hdr.hdr-bug:hover,.btn-hdr.hdr-amber:hover{color:#ffd07a;border-color:#ffbd58;background:#3d2c0f}
/* ── Sammlung Pill Button (aus SVG: #6797df / bg #1a2738) ── */
.btn-hdr.hdr-sammlung{color:#6797df;border-color:rgba(103,151,223,.5);background:#1a2738;border-radius:999px}
.btn-hdr.hdr-sammlung:hover{color:#8ab3e8;border-color:#6797df;background:#1e2f45}
.btn-hdr.hdr-reward{color:#fde047;border-color:rgba(253,224,71,.5);background:rgba(253,224,71,.1);border-radius:999px;animation:reward-pulse 2s ease-in-out infinite;}
.btn-hdr.hdr-reward:hover{color:#fef08a;border-color:#fde047;background:rgba(253,224,71,.2);}
@keyframes reward-pulse{0%,100%{box-shadow:0 0 0 0 rgba(253,224,71,.4)}50%{box-shadow:0 0 0 6px rgba(253,224,71,0)}}

/* ── Bug Report Modal ── */
.bug-modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s ease
}
.bug-modal-backdrop.open{opacity:1;pointer-events:auto}
.bug-modal{
  background:#161B22;border:1px solid rgba(255,255,255,.1);border-radius:16px;
  width:min(480px,92vw);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.7);
  position:relative;transform:translateY(12px);transition:transform .22s ease
}
.bug-modal-backdrop.open .bug-modal{transform:translateY(0)}
.bug-modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07)
}
.bug-modal-title{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:800;color:#fff;letter-spacing:.2px}
.bug-modal-close{
  background:none;border:none;color:rgba(255,255,255,.35);font-size:16px;
  cursor:pointer;padding:2px 6px;border-radius:5px;transition:color .14s,background .14s;
  line-height:1;font-family:inherit
}
.bug-modal-close:hover{color:#fff;background:rgba(255,255,255,.08)}
.bug-modal-body{padding:18px 20px 0}
.bug-type-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.bug-type-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5);font-size:11px;font-weight:700;padding:6px 13px;
  border-radius:8px;cursor:pointer;transition:all .14s;font-family:inherit;letter-spacing:.2px
}
.bug-type-btn.active{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.4);color:#fbbf24}
.bug-type-btn:hover:not(.active){background:rgba(255,255,255,.08);color:rgba(255,255,255,.75)}
.bug-textarea{
  width:100%;min-height:120px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  color:#fff;font-size:13px;font-family:inherit;padding:12px 14px;
  resize:vertical;outline:none;transition:border-color .15s;box-sizing:border-box;line-height:1.55
}
.bug-textarea:focus{border-color:rgba(245,158,11,.4)}
.bug-textarea::placeholder{color:rgba(255,255,255,.22)}
.bug-meta{
  margin-top:10px;font-size:10px;color:rgba(255,255,255,.25);
  letter-spacing:.3px;padding:7px 10px;background:rgba(255,255,255,.03);
  border-radius:7px;line-height:1.7
}
.bug-modal-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 18px;margin-top:14px
}
.bug-footer-hint{font-size:10px;color:rgba(255,255,255,.22);letter-spacing:.2px}
.bug-send-btn{
  background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.4);
  color:#fbbf24;font-size:12px;font-weight:800;padding:9px 22px;
  border-radius:9px;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:.3px
}
.bug-send-btn:hover{background:rgba(245,158,11,.3);border-color:rgba(245,158,11,.7);color:#fde68a}
.bug-send-btn:disabled{opacity:.4;cursor:default}
.bug-success{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;text-align:center;gap:10px
}
.bug-success.show{display:flex}
.bug-success-icon{font-size:40px;color:#4ade80;line-height:1}
.bug-success-text{font-size:17px;font-weight:800;color:#fff}
.bug-success-sub{font-size:12px;color:rgba(255,255,255,.38)}

/* ══════════════════════════════════════════════════════════════
   PERK PICKER — card-style, mirrors draft screen
══════════════════════════════════════════════════════════════ */
/* Perk card face — same outer shape as .card */
.perk-card-face{
  width:168px;height:268px;border-radius:14px;position:relative;overflow:hidden;
  cursor:pointer;user-select:none;
  transition:transform .22s cubic-bezier(.22,.68,0,1.4),box-shadow .22s;
  background:#13161c;
  box-shadow:0 6px 32px rgba(0,0,0,.65);
  display:flex;flex-direction:column;
}
.perk-card-face:hover{transform:translateY(-10px) scale(1.04);}
.perk-card-face:hover .perk-card-choose{opacity:1;transform:translateY(0);}
/* Top colour strip */
.perk-card-strip{
  height:6px;width:100%;flex-shrink:0;
  position:relative;overflow:hidden;
}
.perk-card-strip::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.25) 50%,transparent 100%);
  animation:perkStripShimmer 2.4s ease-in-out infinite;
}
@keyframes perkStripShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
/* Cat badge + stars row */
.perk-card-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 11px 0;
}
.perk-cat-badge{
  font-size:7px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;color:#0d1118;
}
.perk-card-stars{font-size:9px;letter-spacing:1px;opacity:.5;}
/* Main content area */
.perk-card-body{
  flex:1;display:flex;flex-direction:column;
  padding:7px 11px 11px;gap:0;
  min-height:0;
}
.perk-card-icon{
  font-size:22px;font-weight:900;line-height:1;
  color:rgba(255,255,255,.06);
  letter-spacing:-2px;text-align:right;
  margin-bottom:4px;font-style:italic;text-transform:uppercase;
}
.perk-card-name{
  font-size:15px;font-weight:900;color:#fff;
  letter-spacing:-.4px;line-height:1.15;margin-bottom:6px;
}
.perk-card-sep{
  height:1px;background:rgba(255,255,255,.07);margin:0 0 6px;flex-shrink:0;
}
.perk-card-desc{
  font-size:8.5px;color:rgba(255,255,255,.38);line-height:1.55;
  flex:1;overflow:hidden;margin-bottom:8px;
}
/* Auswirkung — dominant bottom block */
.perk-card-eff-block{
  flex-shrink:0;
  border-radius:9px;overflow:hidden;
  border:0;
  background:rgba(255,255,255,.04);
}
.perk-card-eff-lbl{
  font-size:7px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  padding:6px 10px 3px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.perk-card-eff-val{
  font-size:11.5px;font-weight:900;line-height:1.35;
  padding:7px 10px 9px;
  letter-spacing:-.2px;
}
/* "Auswählen" hover text */
.perk-card-choose{
  position:absolute;bottom:0;left:0;right:0;
  text-align:center;padding:8px 0 9px;
  font-size:8px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  opacity:0;transform:translateY(4px);transition:opacity .18s,transform .18s;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);
}
/* ── Unified perk card style — no rarity implied by colour ── */
.perk-card-strip{background:rgba(255,255,255,.18);}
.perk-cat-badge{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}
.perk-card-choose{color:#fff;}
.perk-card-eff-lbl{color:rgba(255,255,255,.4);}
.perk-card-eff-val{color:#fff;}
.perk-card-eff-block{background:rgba(255,255,255,.06);outline:1.5px solid rgba(255,255,255,.12);}
/* Perk card league coloring */
.perk-card-face.perk-lg0 .perk-card-strip{background:#16a34a;}
.perk-card-face.perk-lg0{box-shadow:0 6px 32px rgba(0,0,0,.65),0 0 18px rgba(22,163,74,.35);}
.perk-card-face.perk-lg1 .perk-card-strip{background:#0891b2;}
.perk-card-face.perk-lg1{box-shadow:0 6px 32px rgba(0,0,0,.65),0 0 18px rgba(8,145,178,.35);}
.perk-card-face.perk-lg2 .perk-card-strip{background:#a855f7;}
.perk-card-face.perk-lg2{box-shadow:0 6px 32px rgba(0,0,0,.65),0 0 18px rgba(168,85,247,.4);}
.perk-card-face.perk-lg3 .perk-card-strip{background:#ca8a04;}
.perk-card-face.perk-lg3{box-shadow:0 6px 32px rgba(0,0,0,.65),0 0 18px rgba(202,138,4,.35);}
.perk-card-face.perk-lg4 .perk-card-strip{background:#dc2626;}
.perk-card-face.perk-lg4{box-shadow:0 6px 32px rgba(0,0,0,.65),0 0 18px rgba(220,38,38,.35);}
.perk-card-face.perk-imp .perk-card-strip{background:#ef4444;}
.perk-card-face.perk-imp{box-shadow:0 6px 32px rgba(0,0,0,.65),0 0 18px rgba(239,68,68,.4);}
/* Wrap — bigger zoom for perk cards */
.perk-card-wrap{
  display:flex;flex-direction:column;align-items:center;
  width:278px;height:428px;justify-content:center;
  flex-shrink:0;position:relative;overflow:visible;
}
.perk-card-wrap .perk-card-face{zoom:1.65;}
/* Current perks bar */
.perk-current-perks{display:flex;flex-direction:column;align-items:center;gap:8px;}
.perk-current-label{font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.2);}
.perk-current-list{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.perk-current-chip{font-size:10px;font-weight:700;color:rgba(255,255,255,.55);padding:3px 10px;border-radius:20px;border:1px solid;background:rgba(255,255,255,.04);}
/* Result CTA glow when perk pending */
.btn-cta-main.perk-glow{box-shadow:0 0 18px rgba(94,194,106,.35),0 0 40px rgba(94,194,106,.12);}
/* Tauschbörse swap button */
.tausch-card-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.tausch-swap-btn{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:4px 12px;cursor:pointer;transition:background .15s,color .15s;}
.tausch-swap-btn:hover{background:rgba(255,255,255,.13);color:#fff;}
/* ── Level System ──────────────────────────────────────────────────────────── */
.intro-lvl-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px;max-width:262px;}
.intro-lvl-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(253,224,71,.12);border:1.5px solid rgba(253,224,71,.35);border-radius:9px;padding:4px 11px;flex-shrink:0;}
.intro-lvl-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:rgba(253,224,71,.6);text-transform:uppercase;}
.intro-lvl-num{font-size:18px;font-weight:900;color:#fde047;line-height:1;}
.intro-xp-col{flex:1;display:flex;flex-direction:column;gap:4px;}
.intro-xp-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.intro-xp-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#fde047);border-radius:2px;transition:width .7s ease .1s;}
.intro-xp-text{font-size:9px;color:rgba(255,255,255,.32);letter-spacing:.3px;}
.result-xp-strip{display:flex;align-items:center;gap:10px;background:rgba(253,224,71,.07);border:1.5px solid rgba(253,224,71,.2);border-radius:12px;padding:9px 14px;max-width:540px;width:100%;margin:4px auto;}
.result-xp-badge{font-size:13px;font-weight:900;color:#fde047;white-space:nowrap;letter-spacing:.3px;flex-shrink:0;}
.result-xp-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.result-xp-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#fde047);border-radius:3px;width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1) .2s;}
.result-xp-level{font-size:10px;font-weight:700;color:rgba(255,255,255,.38);white-space:nowrap;flex-shrink:0;}
.result-lvlup-chip{background:rgba(253,224,71,.18);border:1.5px solid rgba(253,224,71,.55);border-radius:8px;padding:2px 10px;font-size:11px;font-weight:900;color:#fde047;white-space:nowrap;animation:lvlupPulse 1.4s ease-in-out infinite;}
@keyframes lvlupPulse{0%,100%{box-shadow:0 0 0 0 rgba(253,224,71,0)}50%{box-shadow:0 0 14px 4px rgba(253,224,71,.22)}}
.lvlup-phase{display:flex;flex-direction:column;align-items:center;padding:28px 16px 24px;gap:0;background:radial-gradient(ellipse at 50% 20%,rgba(253,224,71,.07) 0%,transparent 65%);}
.lvlup-header{text-align:center;margin-bottom:14px;}
.lvlup-pre{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(251,191,36,.65);margin-bottom:2px;}
.lvlup-num{font-size:96px;font-weight:900;color:#fde047;line-height:.9;letter-spacing:-5px;text-shadow:0 0 70px rgba(253,224,71,.4);animation:lvlupPop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes lvlupPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.lvlup-sub{font-size:11px;color:rgba(255,255,255,.38);margin-top:8px;letter-spacing:.4px;}
.lvlup-pack-chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:10px 0 14px;}
.lvlup-pack-chip{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;border-radius:8px;padding:4px 11px;border:1.5px solid;}
.lvlup-cards-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:6px;align-self:center;}
.btn.reward-btn{background:rgba(253,224,71,.13);border-color:rgba(253,224,71,.45);color:#fde047;animation:lvlupPulse 1.8s ease-in-out infinite;}
.btn.reward-btn:hover{background:rgba(253,224,71,.22);border-color:rgba(253,224,71,.7);}
/* Ranking */
.ranking-phase{display:flex;flex-direction:column;padding:20px 16px;gap:0;max-width:600px;margin:0 auto;width:100%;}
.ranking-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:4px;}
.ranking-sub{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:16px;}
.ranking-name-row{display:flex;gap:8px;margin-bottom:16px;}
.ranking-name-input{flex:1;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.14);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;color:#fff;outline:none;}
.ranking-name-input:focus{border-color:rgba(253,224,71,.5);}
.ranking-name-save{background:rgba(253,224,71,.15);border:1.5px solid rgba(253,224,71,.4);border-radius:10px;padding:9px 16px;font-size:11px;font-weight:800;color:#fde047;cursor:pointer;letter-spacing:.5px;}
.ranking-name-save:hover{background:rgba(253,224,71,.25);}
.ranking-table{display:flex;flex-direction:column;gap:4px;}
.ranking-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:9px 14px;}
.ranking-row.me{background:rgba(253,224,71,.09);border-color:rgba(253,224,71,.3);}
.ranking-row.top1{background:rgba(253,224,71,.13);border-color:rgba(253,224,71,.45);}
.ranking-row.top2{background:rgba(148,163,184,.08);border-color:rgba(148,163,184,.25);}
.ranking-row.top3{background:rgba(180,83,9,.1);border-color:rgba(180,83,9,.35);}
.rank-pos{font-size:13px;font-weight:900;color:rgba(255,255,255,.35);width:28px;text-align:center;flex-shrink:0;}
.rank-pos.gold{color:#fde047;} .rank-pos.silver{color:#94a3b8;} .rank-pos.bronze{color:#b45309;}
.rank-name{flex:1;font-size:13px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rank-lvl{font-size:13px;font-weight:900;color:#fde047;flex-shrink:0;}
.rank-xp{font-size:10px;color:rgba(255,255,255,.35);flex-shrink:0;}
.ranking-loading{text-align:center;padding:32px;font-size:12px;color:rgba(255,255,255,.3);}
.ranking-no-name{background:rgba(253,224,71,.06);border:1.5px solid rgba(253,224,71,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:rgba(253,224,71,.7);margin-bottom:12px;}
/* Perk cards row — wider gap for bigger cards */
.perk-cards-row{gap:32px;}


/* Draw buff notice in result screen */
.draw-buff-note{display:flex;align-items:center;gap:10px;margin:0 auto 4px;
  background:rgba(253,224,71,.08);border:1.5px solid rgba(253,224,71,.3);
  border-radius:10px;padding:9px 16px;font-size:12px;font-weight:700;
  color:rgba(253,224,71,.9);max-width:420px;width:calc(100% - 32px);}
.draw-buff-icon{font-size:16px;flex-shrink:0;}

/* ── Rotate overlay — only on touch portrait ── */
@media screen and (orientation:portrait) and (pointer:coarse){
  /* Portrait-Block entfernt — Rotate-Overlay wird nie mehr angezeigt.
     Portrait-Layouts folgen in späteren Tasks (M-04 bis M-12). */
}
.rotate-overlay{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:#070B0F;
  flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
  -webkit-user-select:none;user-select:none;
}
.rotate-icon{
  animation:rotatePulse 2.4s ease-in-out infinite;
}
@keyframes rotatePulse{
  0%,100%{transform:rotate(0deg);opacity:1;}
  35%{transform:rotate(-90deg);opacity:1;}
  55%{transform:rotate(-90deg);opacity:.7;}
  70%{transform:rotate(0deg);opacity:1;}
}
.rotate-text{
  font-size:15px;font-weight:800;color:rgba(255,255,255,.7);
  letter-spacing:.5px;text-align:center;line-height:1.5;
}
.rotate-sub{
  font-size:11px;color:rgba(255,255,255,.3);text-align:center;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOBILE BOTTOM NAVIGATION
   Nur auf Touch-Geräten sichtbar (pointer:coarse).
   ═══════════════════════════════════════════════════════════════════════════ */
.mobile-nav{
  display:none; /* Desktop: nie sichtbar */
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(52px + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(13,17,26,.96);
  border-top:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  align-items:stretch;
}
.mnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.38);transition:color .15s;
  padding:0;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.mnav-btn.active{color:#5ec269;}
.mnav-btn:active{color:rgba(255,255,255,.7);}
.mnav-icon{width:20px;height:20px;flex-shrink:0;}
.mnav-label{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
/* Wenn Nav sichtbar: .game bekommt .has-mobile-nav → Screens kriegen Abstand */
.has-mobile-nav .phase{
  padding-bottom:calc(52px + max(4px,env(safe-area-inset-bottom))) !important;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOBILE LANDSCAPE LAYOUT
   Guard: touch device (pointer:coarse) + landscape + max-width 1024px
   Desktop/laptop (pointer:fine) is NEVER affected by any rule below.
   ═══════════════════════════════════════════════════════════════════════════ */
@media screen and (max-width:1024px) and (orientation:landscape) and (pointer:coarse){

  /* ── Viewport ── */
  html,body{overflow:hidden;height:100%;width:100%;overscroll-behavior:none;}
  .phase{overscroll-behavior:none;}
  .mobile-nav{display:none !important;}

  /* ── Safe-Area-Insets (iPhone Notch / Home-Indicator / Camera) ── */
  .phase{
    padding-bottom:max(8px,env(safe-area-inset-bottom));
    padding-left:max(10px,env(safe-area-inset-left));
    padding-right:max(10px,env(safe-area-inset-right));
  }
  /* Absolute phases: offset left/right instead of padding */
  .lup-phase{left:env(safe-area-inset-left,0px)!important;right:env(safe-area-inset-right,0px)!important;}
  .lineup-cta-bar,.tactics-cta-bar,.draft-footer{padding-bottom:max(0px,env(safe-area-inset-bottom));}

  /* ── Header ── */
  /* Taller header moves separator line lower + pushes all game content down */
  .header{height:46px;padding-top:max(0px,env(safe-area-inset-top));padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right));gap:8px;}
  .brand-logo{width:26px;height:26px;}
  .brand-wordmark-top{font-size:11px;letter-spacing:1.5px;}
  .brand-wordmark-sub{font-size:7px;letter-spacing:1.8px;}
  .league-banner{width:fit-content;min-width:0;padding:3px 20px;border-radius:999px;gap:1px;white-space:nowrap;}
  .league-name{font-size:10px;letter-spacing:1.5px;}
  .league-progress{font-size:9px;gap:4px;}
  .league-pip{width:7px;height:7px;}
  .btn-hdr{font-size:10px;padding:4px 9px;}

  /* ── Global buttons ── */
  /* CTA main: override !important from desktop */
  .btn-cta-main{padding:9px 22px!important;font-size:13px!important;border-radius:9px!important;}
  .btn.large{padding:8px 16px;font-size:12px;border-radius:8px;}
  .btn{font-size:11px;padding:6px 12px;}

  /* ── Level/XP Banner — kompakt für 40px Header ── */
  #introLevelBanner{gap:8px;}
  #hdrLvlNum{font-size:16px!important;}
  #hdrXpText{font-size:8px!important;}
  #introLevelBanner>div:first-child{padding:2px 8px;border-radius:6px;gap:3px;}
  #introLevelBanner .xp-track,
  [id="introLevelBanner"] [style*="height:8px"]{height:5px!important;width:clamp(70px,13vw,140px)!important;}

  /* ── Intro screen ── */
  .intro-left{padding:6px 8px 4px 4%;justify-content:flex-start;flex:0 0 52%;max-width:none;min-width:0;}
  .intro-tag{font-size:6.5px;letter-spacing:3px;margin-bottom:5px;}
  .intro-title{font-size:clamp(34px,9.5svh,50px);line-height:.88;letter-spacing:-.04em;margin-bottom:6px;}
  .intro-sub{font-size:8.5px;line-height:1.4;margin-bottom:8px;max-width:none;}
  .intro-btns{gap:5px;}

  /* Start-Button */
  .intro-btn-start{min-height:0;width:clamp(60px,10svh,90px);padding:10px 8px;gap:6px;border-radius:8px;}
  .intro-btn-start-label{font-size:clamp(12px,3svh,17px);}
  .intro-btn-start-play svg{width:clamp(28px,5svh,40px);height:clamp(28px,5svh,40px);}
  .intro-mode-name{font-size:clamp(10px,2.8svh,14px);}

  /* Mode-Buttons — min-height 44px für Touch */
  .intro-mode-col{gap:4px;flex:0 0 auto;width:fit-content;}
  .intro-btn-mode{padding:0 9px;border-radius:7px;min-height:44px;width:100%;}
  .intro-mode-name{font-size:clamp(9px,2.5svh,11.5px);}
  .intro-mode-sub{font-size:clamp(7px,1.8svh,9px);margin-top:2px;}
  .intro-mode-lock,.intro-mode-arrow{width:16px;height:16px;margin-left:5px;}
  .intro-mode-lock svg,.intro-mode-arrow svg{width:11px;height:13px;}
  .intro-col-progress{display:none;}
  .intro-right-wrap{width:48%;}
  .intro-right svg{height:97%;transform:translate(-50%,-68%) rotateX(6deg) rotateY(-6deg) rotate(-4deg);}

  /* ── Result screen ── */
  .result-phase-v2{padding:2px max(12px,env(safe-area-inset-right)) max(6px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));gap:2px;}
  .res-action-btn-wrap{top:4px;right:max(12px,env(safe-area-inset-right));}
  .res-score-section{gap:0px;}
  .res-score-outcome{padding:3px 14px;}
  .res-score-main-row{gap:8px;}
  .result-phase-v2 .match-score-num{font-size:clamp(44px,12svh,72px);}
  .res-scorers{width:80px;}
  .res-scorer{font-size:10px;}
  .res-stat-val{font-size:clamp(20px,5.5svh,28px);}
  .res-stat-lbl{font-size:9px;}
  .res-prog-bar{display:none;}
  .res-stats-strip{margin-top:14px;}
  .res-panels{display:flex;max-height:108px;gap:8px;flex-shrink:0;margin-top:8px;}
  .res-panel-inner{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;}
  .res-rating-badge{font-size:8px;gap:3px;color:rgba(250,250,250,.75);}
  .res-rlbl{font-size:8px;color:rgba(250,250,250,.75);}
  .res-rating-val{font-size:11px;padding:1px 6px;min-width:28px;}
  .result-xp-strip{padding:5px 10px;margin:2px auto;}
  .result-xp-badge{font-size:11px;}
  .result-lvlup-chip{font-size:10px;}

  /* ── Random Event modal ── */
  .rev-modal{max-height:calc(100svh - 24px);overflow:hidden;}
  .rev-body{overflow-y:auto;flex:1;min-height:0;padding:12px 16px 14px;}
  .rev-masthead{padding:8px 16px;}
  .rev-headline{font-size:17px;margin-bottom:7px;}
  .rev-lead{font-size:11px;line-height:1.5;}
  .rev-divider{margin:10px 0 9px;}
  .rev-effect-box{padding:8px 10px;margin-bottom:12px;}
  .rev-picker{max-height:100px;}
  .rev-btn{padding:10px 14px;}
  .rev-binary{gap:6px;margin-bottom:12px;}
  .rev-bin-opt{padding:10px 12px;}

  /* ── Draft screen ── */
  /* flex:none on center-block so footer (prob+legend) stays on screen instead of being pushed below viewport */
  .draft-phase.phase{padding:0;contain:style;justify-content:center;}
  .draft-center-block{position:relative;padding:0;gap:4px;margin-top:22px;justify-content:flex-start;flex:none;}
  .replace-draft-phase{justify-content:flex-start!important;padding-top:8px!important;}
  .replace-draft-phase .draft-center-block{margin-top:0!important;}
  .draft-center-block.has-skip{padding-top:0;padding-bottom:0;}
  /* Banner: column — title then position chip below */
  .draft-pick-banner{flex-direction:column;align-items:center;gap:5px;padding:0 12px 10px;width:100%;}
  .draft-pick-instruction{display:block;font-size:18px;font-weight:900;letter-spacing:-0.5px;}
  .draft-pick-slot{font-size:8px;gap:3px;padding:2px 8px;border-radius:7px;}
  .draft-pick-slot-dot{width:6px;height:6px;}
  .draft-footer{padding:2px max(12px,env(safe-area-inset-right)) max(4px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));gap:1px;margin-top:22px;}
  .draft-prob-wrap{gap:2px;padding:2px max(12px,env(safe-area-inset-right)) 1px max(12px,env(safe-area-inset-left));margin-top:0;}
  .draft-prob-pills{gap:5px;}
  /* Cards: smaller zoom so all UI fits in landscape height */
  .draft-card-wrap{width:222px;height:330px;zoom:clamp(0.38,calc((100svh - 150px) / 330px),0.48);}
  .draft-cards{gap:18px;padding:0 max(12px,env(safe-area-inset-right)) 0 max(12px,env(safe-area-inset-left));}
  .draft-cards-scroll{padding:4px max(12px,env(safe-area-inset-right)) 0 max(12px,env(safe-area-inset-left));clip-path:inset(-9999px 0);}
  .draft-cards-scroll .draft-cards{will-change:auto;}
  .draft-skip-below{padding-top:6px;margin-top:0;}
  .btn-draft-skip{font-size:9px;padding:4px 10px;}
  .draft-card-wrap .card-chip-row{right:16px;}
  .draft-card-wrap .card-stage-chip{font-size:8px;padding:1px 5px;border-radius:5px;}
  .draft-legend{gap:4px;padding:1px 8px;margin-top:0;}
  .dl-item{font-size:6px;gap:2px;}
  .dl-b{font-size:5.5px;padding:1px 4px;border-radius:4px;}
  .dl-item-desc{font-size:6px;}
  .draft-prob-pill{font-size:6px;padding:1px 6px;border-width:0.5px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
  .draft-prob-rar-pct{font-size:5.5px;line-height:1;}
  .draft-prob-item{gap:2px;}
  .draft-prob-pills{gap:5px;}
  .draft-prob-lbl{font-size:5.5px;margin-bottom:1px;}

  /* ── Tactics screen ── */
  .tactics-phase{padding:5px 8px 0;}
  .tactics-columns{gap:7px;}
  .tactics-cta-bar{height:44px;margin:0 -8px;}
  .team-card{padding:7px;gap:5px;border-radius:8px;}
  .team-header{padding-bottom:4px;}
  .team-name{font-size:11px;}
  .team-rating{font-size:15px;}
  .team-meta{font-size:10px;}
  .mini-pitch{max-height:clamp(130px,33svh,180px);}
  .mini-token{width:20px;height:27px;border-radius:3px;}
  .mtoken-strip{height:4px;}
  .mtoken-rating{font-size:9px;}
  .tac-tabs{margin-bottom:5px;}
  .tac-tab{padding:4px;font-size:9px;}
  .tac-tabs3{margin-bottom:6px;padding:3px;gap:2px;}
  .tac-phase-title{font-size:9px;margin-bottom:4px;}
  .tac-phase-group{gap:7px;}
  .tac-row{grid-template-columns:100px 1fr minmax(75px,auto);font-size:11px;margin-bottom:6px;gap:4px;}
  .tac-row .label{font-size:11px;}
  .tac-row .value{font-size:10px;}
  .tac-row input[type=range]{height:4px;}
  .tac-row input[type=range]::-webkit-slider-thumb{width:13px;height:13px;}
  .intens-wrap{padding:3px 0 6px;}
  .intens-lbl{font-size:9px;}
  .intens-val{font-size:10px;}
  .intens-track{height:5px;margin-bottom:2px;}
  .intens-hint{font-size:9px;}
  .tactics-mid{overflow-y:auto;}
  .saved-tac-strip{display:none;}

  /* ── New Tactics screen (landscape) ── */
  .tactics-phase-new{
    padding:0 max(12px,env(safe-area-inset-right)) max(6px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));
    gap:0;
  }
  /* Top row: hint text left + weiter button right */
  .tac-top-row{display:flex;align-items:center;padding:4px 0 0;gap:8px;flex-shrink:0;}
  .tac-sub-hint{
    flex:1;font-size:9px;font-weight:600;
