// ── Result: XP strip ─────────────────────────────────────────
function buildResultXpStrip(){
  const xpGained=state.xpGainedThisRun||0;
  if(!xpGained)return null;
  const fill=el('div',{class:'result-xp-fill'});
  const leveled=state.levelUpsThisRun&&state.levelUpsThisRun.length>0;
  const lvl=state.playerLevel,xpNow=state.playerXP,xpNeed=xpToNextLevel(lvl);
  const strip=el('div',{class:'result-xp-strip'},[
    el('span',{class:'result-xp-badge'},[`+${xpGained} XP`]),
    el('div',{class:'result-xp-bar'},[fill]),

  ]);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{fill.style.width=Math.round(xpNow/xpNeed*100)+'%';}));
  return strip;
}

function renderResultV2(main){
  if(state.postMatchRestore){
    if(state.postMatchRestore.player)delete state.postMatchRestore.player._unavailable;
    setState({postMatchRestore:null});

  }
  const r=state.matchResult;
  const won=r.won,draw=r.draw;
  const scoreSection=buildResultScoreSection(r,teamAvg(state.team,state.formation),state.opponent?.avg??0);
  const statsStrip=buildResultStatsStrip(r);
  const panels=renderTacticPanels(r);
  const actionBtn=buildResultActionBtn(r);
  const progBar=buildResultProgBar(r);
  const xpStrip=buildResultXpStrip();

  const bottomKids=[];
  if(draw)bottomKids.push(el('div',{class:'draw-buff-note'},[el('span',{class:'draw-buff-icon'},['⚡']),el('span',{},['+4 Taktik Edge im nächsten Spiel'+(hasPerk('unentschieden_spezialist')?' +2 (Unentschieden-Spezialist)':'')] )]));
  if(!won&&!draw)bottomKids.push(el('div',{class:'res-lose-info'},[`Run beendet: ${state.totalMatches} Spiele · ${LEAGUES[state.league].name}`]));

  const kids=[scoreSection,el('div',{class:'res-action-btn-wrap'},[actionBtn]),statsStrip,panels];
  if(progBar)kids.push(progBar);
  if(xpStrip&&(won||draw))kids.push(xpStrip);
  if(bottomKids.length)kids.push(el('div',{class:'res-bottom-wrap'},bottomKids));
  main.appendChild(el('div',{class:'phase result-phase-v2'},kids));
}
// Generates specific narrative hints for konter-chains that were active in this match.
// Returns hint objects with score 7-8, always ranked above generic hints (max score 6).
function detectMatchTriggers(t,o,r){
  const h=[];
  // Pressing/Linie konter-chains
  if(t('deflinie')>=4&&o('tempo')>=3&&o('konter')>=3)
    h.push({score:8,ok:false,txt:'Deine extreme Abwehrlinie wurde durch schnelle Konter wiederholt hinterlaufen.'});
  if(t('pressing')>=4&&o('aufbau')<=1&&o('tempo')<=1)
    h.push({score:8,ok:true, txt:'Totalpressing hat den langsamen Aufbau des Gegners vollständig zerstört.'});
  if(t('pressing')>=4&&o('konter')>=3&&o('tempo')>=3)
    h.push({score:7,ok:false,txt:'Volles Pressing ließ dem Konter des Gegners immer wieder freie Räume hinter der Abwehr.'});
  if(t('pressing')<=1&&t('deflinie')<=1&&o('mentality')>=4&&o('tempo')>=4)
    h.push({score:7,ok:true, txt:'Der tiefe Block hat den ultra-aggressiven Angriff des Gegners ins Leere laufen lassen.'});
  // Aufbau/Konter konter-chains
  if(t('konter')>=3&&t('pressing')<=1&&o('pressing')>=3)
    h.push({score:8,ok:true, txt:'Das Konterkonzept hat die Räume hinter dem Hochpressing des Gegners konsequent genutzt.'});
  if(t('aufbau')>=3&&t('tempo')>=3&&o('pressing')>=3)
    h.push({score:7,ok:true, txt:'Direktes Spiel hat das Pressing des Gegners wiederholt überbrückt.'});
  if(t('aufbau')<=1&&t('tempo')<=1&&o('pressing')>=4)
    h.push({score:8,ok:false,txt:'Langsamer Kurzpassaufbau gegen ultra-aggressives Pressing — der Ball ging ständig verloren.'});
  // Transition konter-chains
  if(t('konter')>=3&&t('tempo')>=3&&o('deflinie')>=3&&o('pressing')>=4)
    h.push({score:8,ok:true, txt:'Schnelle Konter haben die offene Rückseite des gegnerischen Hochpressings mehrfach ausgenutzt.'});
  if(t('aufbau')<=1&&t('tempo')<=1&&o('konter')>=3&&o('tempo')>=3)
    h.push({score:7,ok:false,txt:'Das langsame Spiel hat dem Gegner immer wieder ideale Kontermomente geboten.'});
  if(t('gegenpressing')>=4&&o('aufbau')<=1)
    h.push({score:7,ok:true, txt:'Gegenpressing hat den kurzen Aufbau des Gegners nach eigenem Ballverlust sofort zerstört.'});
  // Breite konter-chains
  if(t('breite')>=3&&o('defform')>=3)
    h.push({score:7,ok:true, txt:'Breites Spiel hat die eng stehende Abwehr des Gegners immer wieder auseinandergezogen.'});
  if(t('breite')>=3&&o('defform')<=1)
    h.push({score:7,ok:false,txt:'Breites Spiel gegen eine ohnehin breite Abwehr — die Flanken wurden gut zugestellt.'});
  // Kohärenz
  if(o('mentality')>=4&&t('pressing')<=1)
    h.push({score:7,ok:true, txt:'Der ultra-offensive Gegner hat sich am kompakten Tiefblock die Zähne ausgebissen.'});
  if(t('konter')>=3&&t('tempo')>=3&&t('pressing')<=1)
    h.push({score:7,ok:true, txt:'Kohärentes Kontersystem hat auf beiden Seiten des Spiels Wirkung gezeigt.'});
  // Phase-based hints: player quality vs. opponent quality by phase
  if(r&&r.myPhase&&r.oppPhase){
    const atkDiff=r.myPhase.attack-r.oppPhase.def;
    const defDiff=r.myPhase.def-r.oppPhase.attack;
    if(atkDiff>=15)h.push({score:7,ok:true, txt:'Deine Stürmer haben die gegnerische Abwehr in diesem Spiel klar überfordert.'});
    else if(atkDiff<=-15)h.push({score:7,ok:false,txt:'Deine Angreifer hatten gegen die starke Abwehr des Gegners kaum Durchsetzungsvermögen.'});
    if(defDiff>=15)h.push({score:7,ok:true, txt:'Deine Abwehr hat dem Angriff des Gegners kaum Raum gelassen.'});
    else if(defDiff<=-15)h.push({score:7,ok:false,txt:'Die starken Stürmer des Gegners haben deine Abwehr konstant unter Druck gesetzt.'});
  }
  return h;
}
function extractTacticStats(r){
  const t=k=>state.tactics[k]??2;
  const o=k=>state.opponent.tactics[k]??2;
  const hints=[...detectMatchTriggers(t,o,r)];// Trigger hints first (score 7-8), generic below

  // ── GEGEN HOCHPRESSING ────────────────────────────────────────────────
  if(o('pressing')>=3){
    if(t('aufbau')>=3)
      hints.push({score:5,ok:true, txt:'Dein direktes Spiel hat sich gegen das hohe Pressing bewährt.'});
    else if(t('aufbau')<=1)
      hints.push({score:6,ok:false,txt:'Kurzer Aufbau gegen das starke Pressing des Gegners — der Ball kam immer wieder verloren.'});
    else
      hints.push({score:3,ok:false,txt:'Das Pressing des Gegners hat deinen Spielaufbau immer wieder gestört.'});
    if(t('tempo')>=3)
      hints.push({score:2,ok:true, txt:'Das hohe Tempo hat geholfen, trotz des Pressings Räume zu finden.'});
    if(t('konter')>=3)
      hints.push({score:3,ok:true, txt:'Die Konterbereitschaft nach Ballgewinn war gegen das aggressive Pressing wertvoll.'});
  }

  // ── GEGEN TIEFEN BLOCK ────────────────────────────────────────────────
  if(o('pressing')<=1&&o('deflinie')<=1){
    if(t('breite')>=3&&t('kreativ')>=3)
      hints.push({score:4,ok:true, txt:'Breites und kreatives Spiel hat den kompakten Block des Gegners aufgebrochen.'});
    else if(t('breite')<=1&&t('tempo')>=4)
      hints.push({score:4,ok:false,txt:'Der tiefe Block des Gegners war schwer zu knacken — Geschwindigkeit allein hat nicht gereicht.'});
    else if(t('breite')<=1)
      hints.push({score:3,ok:false,txt:'Der Gegner stand tief — das enge Spiel hat ihm kaum Probleme bereitet.'});
    if(t('konter')>=3)
      hints.push({score:2,ok:false,txt:'Gegen einen tief stehenden Gegner haben Konter kaum Räume geboten.'});
  }

  // ── GEGEN KURZES AUFBAUSPIEL ──────────────────────────────────────────
  if(o('aufbau')<=1&&o('tempo')<=1){
    if(t('pressing')>=3&&t('gegenpressing')>=3)
      hints.push({score:5,ok:true, txt:'Das Hochpressing hat den kurzen Aufbau des Gegners wiederholt unter Druck gesetzt.'});
    else if(t('pressing')<=1)
      hints.push({score:4,ok:false,txt:'Der Gegner baute kurz und sicher auf — sein Spielrhythmus wurde nicht gestört.'});
  }

  // ── GEGEN LANGES DIREKTSPIEL ──────────────────────────────────────────
  if(o('aufbau')>=3){
    if(t('deflinie')<=1)
      hints.push({score:3,ok:true, txt:'Die tiefe Abwehrlinie hat dem direkten Spiel des Gegners keinen Raum gelassen.'});
    else if(t('deflinie')>=3)
      hints.push({score:4,ok:false,txt:'Die hohe Linie war anfällig gegen das direkte Spiel des Gegners.'});
  }

  // ── GEGEN HOHE ABWEHRLINIE ────────────────────────────────────────────
  if(o('deflinie')>=3){
    if(t('tempo')>=3||t('konter')>=3)
      hints.push({score:4,ok:true, txt:'Schnelles Spiel hat die Räume hinter der hohen Linie des Gegners genutzt.'});
    else if(t('tempo')<=1&&t('konter')<=1)
      hints.push({score:5,ok:false,txt:'Der Raum hinter der hohen Linie des Gegners blieb ungenutzt.'});
  }

  // ── KREATIVITÄT vs PRESSING/DECKUNG ──────────────────────────────────
  if(t('kreativ')>=3){
    if(o('pressing')>=3)
      hints.push({score:4,ok:false,txt:'Das kreative Spiel war unter dem hohen Pressing des Gegners schwer umzusetzen.'});
    else if(o('pressing')<=1)
      hints.push({score:4,ok:true, txt:'Das kreative Spiel hat gegen den passiven Gegner viel Raum und Zeit gefunden.'});
    if(o('deckung')>=3)
      hints.push({score:4,ok:false,txt:'Die Manndeckung des Gegners hat das kreative Spiel konsequent begleitet und neutralisiert.'});
  }
  // Eigenes Pressing neutralisiert Kreativität des Gegners
  if(t('pressing')>=3&&o('kreativ')>=3)
    hints.push({score:3,ok:true, txt:'Das aggressive Anlaufen hat dem kreativen Spiel des Gegners kaum Platz gelassen.'});

  // ── GEGNERISCHES GEGENPRESSING ────────────────────────────────────────
  if(o('gegenpressing')>=3){
    if(t('aufbau')>=3)
      hints.push({score:3,ok:true, txt:'Das direkte Spiel hat das Gegenpressing des Gegners gut umgangen.'});
    else if(t('kreativ')<=1)
      hints.push({score:3,ok:false,txt:'Das sofortige Gegenpressing nach Ballverlust hat immer wieder Probleme bereitet.'});
  }

  // ── GEGNER LÄSST KONTER ZU ────────────────────────────────────────────
  if(o('gegenpressing')<=1){
    if(t('konter')>=3&&t('tempo')>=3)
      hints.push({score:4,ok:true, txt:'Die schnellen Konter haben die fehlende Ballabsicherung des Gegners ausgenutzt.'});
    else if(t('konter')<=1)
      hints.push({score:3,ok:false,txt:'Nach Ballgewinn ließ der Gegner Räume offen — die wurden nicht genutzt.'});
  }

  // ── BREITE vs DEFENSIVFORMATION ──────────────────────────────────────
  // (Angriffsperspektive: wie player.breite gegen opp.defform abschneidet)
  if(o('defform')>=3&&t('breite')<=1)
    hints.push({score:3,ok:true, txt:'Zentrales Spiel hat die Lücken in der engen Mittelfeldstaffelung des Gegners gefunden.'});
  if(o('defform')>=3&&t('breite')>=3)
    hints.push({score:4,ok:true, txt:'Breites Spiel hat die eng stehende Defensive des Gegners auseinandergezogen.'});
  if(o('defform')<=1&&t('breite')>=3)
    hints.push({score:3,ok:false,txt:'Die Flankenangriffe sind an der breiten Abwehrstaffelung des Gegners verpufft.'});
  if(o('defform')<=1&&t('breite')<=1)
    hints.push({score:2,ok:false,txt:'Schmales Angriffsspiel gegen eine breite Defensive — das Zentrum war überfüllt.'});

  // ── MENTALITÄT ────────────────────────────────────────────────────────
  if(o('mentality')>=3&&t('mentality')<=1)
    hints.push({score:4,ok:false,txt:'Die offensiven Vorstöße des Gegners haben viel Raum erzeugt — der defensivere Ansatz hat das nicht ausgenutzt.'});
  if(o('mentality')<=1&&t('mentality')>=3)
    hints.push({score:3,ok:true, txt:'Der offensive Ansatz hat den passiven Gegner unter Druck gesetzt.'});
  if(o('mentality')>=4&&t('konter')>=3)
    hints.push({score:4,ok:true, txt:'Der sehr offensive Gegner hat Räume hinterlassen — die Konterbereitschaft hat das ausgenutzt.'});
  if(t('mentality')>=4&&!r.won)
    hints.push({score:4,ok:false,txt:'Der sehr offensive Ansatz hat die defensive Stabilität gekostet.'});

  // ── DECKUNG vs KREATIVITÄT ────────────────────────────────────────────
  if(o('kreativ')>=3){
    if(t('deckung')>=3)
      hints.push({score:4,ok:true, txt:'Die Manndeckung hat dem kreativen Spiel des Gegners kaum Raum gelassen.'});
    else if(t('deckung')<=1)
      hints.push({score:4,ok:false,txt:'Das kreative Spiel des Gegners hat in der Raumdeckung immer wieder Lücken gefunden.'});
    else
      hints.push({score:2,ok:false,txt:'Das unvorhersehbare Spiel des Gegners hat die neutrale Deckung vor Probleme gestellt.'});
  }
  // ── DECKUNG vs FLÜGELSPIEL ────────────────────────────────────────────
  if(t('deckung')>=3&&o('breite')>=3)
    hints.push({score:4,ok:false,txt:'Manndeckung gegen breites Spiel — die Außenspieler des Gegners haben die Eins-gegen-Eins-Situationen gesucht und meist gewonnen.'});

  // ── DEFENSIVFORMATION vs ANGRIFFSBREITE ──────────────────────────────
  if(o('breite')>=3){
    if(t('defform')>=3)
      hints.push({score:5,ok:false,txt:'Die kompakte Formation war gegen das breite Spiel des Gegners anfällig — die Außenbahnen blieben schwach besetzt.'});
    else if(t('defform')<=1)
      hints.push({score:4,ok:true, txt:'Die breite Defensivaufstellung hat die Flankenangriffe des Gegners gut abgedeckt.'});
    else
      hints.push({score:2,ok:false,txt:'Das breite Angriffsspiel des Gegners hat die Formation immer wieder auf die Probe gestellt.'});
  }
  if(t('defform')<=1&&o('breite')<=1)
    hints.push({score:3,ok:false,txt:'Die breite Defensivformation hat dem zentralen Angriffsspiel des Gegners Raum im Inneren gelassen.'});
  if(t('defform')>=3&&o('breite')<=1)
    hints.push({score:3,ok:true, txt:'Die enge Formation hat das zentrale Spiel des Gegners gut zugestellt.'});

  // ── GEGENPRESSING neutral vs KONTER/AUFBAU ───────────────────────────
  if(t('gegenpressing')===2){
    if(o('konter')>=4)
      hints.push({score:5,ok:false,txt:'Nach Ballverlust schaltete der Gegner sofort um — fehlendes Gegenpressing hat freie Räume gelassen.'});
    else if(o('konter')>=3)
      hints.push({score:3,ok:false,txt:'Das Konterspiel des Gegners nach Ballverlusten hat ohne sofortigen Gegendruck immer wieder Gefahr erzeugt.'});
    if(o('aufbau')<=1)
      hints.push({score:3,ok:false,txt:'Der Gegner baute kurz auf — sofortiger Ballverlustdruck hätte ihn stark unter Stress gesetzt.'});
  }

  // ── KONTER neutral vs HOHE ABWEHRLINIE ───────────────────────────────
  if(t('konter')===2){
    if(o('deflinie')>=4)
      hints.push({score:5,ok:false,txt:'Der Gegner stand mit sehr hoher Linie — der freie Raum dahinter blieb komplett ungenutzt.'});
    else if(o('deflinie')>=3&&!(t('tempo')>=3))
      hints.push({score:3,ok:false,txt:'Hinter der hohen Linie des Gegners war Raum vorhanden — das blieb ohne taktische Antwort.'});
  }

  // ── INNERE KOHÄRENZ ───────────────────────────────────────────────────
  if(Math.abs(t('mentality')-t('pressing'))>=3)
    hints.push({score:3,ok:false,txt:'Mentalität und Pressing-Intensität haben sich gegenseitig widersprochen.'});
  const linienGap=t('pressing')-t('deflinie');
  if(t('pressing')>=3&&t('deflinie')<=1)
    hints.push({score:4,ok:false,txt:'Hohes Anlaufen mit tiefer Linie — das hat gefährliche Räume im Mittelfeld geöffnet.'});
  else if(linienGap>=3)
    hints.push({score:3,ok:false,txt:'Großer Abstand zwischen Anlaufen und Abwehrlinie — das Team hatte keine kompakte Staffelung.'});
  if(t('deflinie')>=3&&t('pressing')<=1)
    hints.push({score:4,ok:false,txt:'Hohe Abwehrlinie ohne Pressing — das hat dem Gegner viel Zeit und Raum vor der Kette gelassen.'});
  else if(linienGap<=-3)
    hints.push({score:2,ok:false,txt:'Abwehrlinie deutlich höher als Pressing-Intensität — eine taktisch widersprüchliche Kombination.'});
  if(t('aufbau')>=3&&t('tempo')<=1)
    hints.push({score:3,ok:false,txt:'Direktes Spiel mit niedrigem Tempo — die Spielanlage hat sich selbst ausgebremst.'});
  if(t('deckung')>=3&&t('defform')<=1)
    hints.push({score:3,ok:false,txt:'Manndeckung in breiter Formation — die Deckung wurde immer wieder aus ihrer Position gezogen.'});

  // ── EIGENE HOHE LINIE vs GEGNERISCHES KONTERN ─────────────────────────
  if(t('deflinie')>=3&&o('konter')>=3)
    hints.push({score:3,ok:false,txt:'Die hohe Abwehrlinie war gegen das Konterspiel des Gegners anfällig.'});

  // ── KADER vs TAKTIK ───────────────────────────────────────────────────
  if(r.ratingDiff<=-5&&r.won)
    hints.push({score:5,ok:true, txt:'Trotz klarem Kader-Nachteil gewonnen — die Taktik hat den Unterschied gemacht.'});
  if(r.ratingDiff>=5&&!r.won)
    hints.push({score:5,ok:false,txt:'Mit stärkerem Kader verloren — taktische Schwächen haben den Vorteil zunichte gemacht.'});

  // ── Split into pos/neg ────────────────────────────────────────────────
  const posHints=hints.filter(h=>h.ok===true).sort((a,b)=>b.score-a.score);
  const negHints=hints.filter(h=>h.ok===false).sort((a,b)=>b.score-a.score);

  // Gamechanger = highest-ranked hint overall
  const allRanked=[...posHints,...negHints].sort((a,b)=>b.score-a.score);
  const gamechanger=allRanked.length>0?allRanked[0]:null;

  // Fatigue hint
  let fatigueHint=null;
  if(r.fatigue>0.08){
    const txt=r.fatigue>0.18
      ?'Die Spielintensität war zu hoch für 90 Minuten — die Leistung hat deutlich nachgelassen.'
      :r.fatigue>0.12
      ?'Die hohe Intensität hat in der zweiten Hälfte ihren Preis gefordert.'
      :'Leichte Ermüdung durch die Spielintensität — die Leistung hat zum Ende hin etwas nachgelassen.';
    fatigueHint={ok:false,score:3,txt};
  }

  return {gamechanger,posHints,negHints,fatigueHint};
}

/* ----- REPLACE DRAFT ----- */

function generateReplaceCards(){
  if(state.collectionMode){
    // Collection mode: pick cards weighted by current league rarity table
    const _ebdCol=state.eventBuff||{};
    const useBoostCol=!!_ebdCol.draftRarityBoost||hasPerk('glueckspilz');
    const pool=state.collectionMode?(()=>{
      const taken=new Set([...Object.values(state.team).filter(Boolean).map(p=>resolvePlayerName(p.name)),...state.bench.filter(b=>b.player).map(b=>resolvePlayerName(b.player.name))]);
      const seen=new Set();
      return state.collection.map(p=>({...p,name:resolvePlayerName(p.name)})).filter(p=>{if(taken.has(p.name)||seen.has(p.name))return false;seen.add(p.name);return true;});
    })():[];
    // Roll rarity first (same as normal mode), then pick a card of that rarity — 1:1 identical.
    const _rlTblCol=(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE)[Math.min(state.league,(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE).length-1)];
    const byRarCol={};
    pool.forEach(p=>{(byRarCol[p.rarity]=byRarCol[p.rarity]||[]).push(p);});
    const picked=new Set();const result=[];
    const targetCount=5+(_ebdCol.extraCards||0)+(hasPerk('talentspaeher')?1:0)+(state.permanentExtraCards||0);
    for(let i=0;i<targetCount;i++){
      const avail=Object.keys(byRarCol).filter(r=>byRarCol[r].some(p=>!picked.has(p.name)));
      if(!avail.length)break;
      // Compute weights; apply ×1.5 boost to epic/legendary/mythic if boost active
      const totalW=avail.reduce((s,r)=>{
        let w=((_rlTblCol[r]||{}).weight)||0;
        if(useBoostCol&&(r==='epic'||r==='legendary'||r==='mythic'))w*=1.5;
        return s+w;
      },0);
      if(totalW===0)break;
      let rv=Math.random()*totalW;let chosenRar=avail[avail.length-1];
      for(const r of avail){
        let w=((_rlTblCol[r]||{}).weight)||0;
        if(useBoostCol&&(r==='epic'||r==='legendary'||r==='mythic'))w*=1.5;
        rv-=w;if(rv<=0){chosenRar=r;break;}
      }
      const bucket=byRarCol[chosenRar].filter(p=>!picked.has(p.name));
      const chosen=bucket[Math.floor(Math.random()*bucket.length)];
      picked.add(chosen.name);result.push(chosen);
    }
    setState({draftCards:result});

    // Apply guaranteed legendary (Goldener Griff perk)
    if(state.perkState.goldenerGriffActive){
      const ggPool=pool.filter(p=>p.rarity==='legendary'&&!picked.has(p.name));
      if(ggPool.length){const gg=ggPool[Math.floor(Math.random()*ggPool.length)];state.draftCards.unshift(gg);}
      state.perkState.goldenerGriffActive=false;
    }
    // Apply guaranteed Rare+ (transfer event)
    if(_ebdCol.draftGuaranteedRare){
      const rarPool=pool.filter(p=>['rare','epic','legendary'].includes(p.rarity)&&!state.draftCards.includes(p));
      if(rarPool.length){const gr=rarPool[Math.floor(Math.random()*rarPool.length)];state.draftCards.unshift(gr);}
    }
    setState({eventBuff:null});

    state.perkState.tauschUsed=0;
    return;
  }
  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>p.name),
    ...state.bench.filter(b=>b.player).map(b=>b.player.name)
  ]);
  const shown=new Set();setState({draftCards:[]});
  const _ebd=state.eventBuff||{};
  const targetCount=5+(_ebd.extraCards||0)+(hasPerk('talentspaeher')?1:0)+(state.permanentExtraCards||0);
  const useBoost=!!_ebd.draftRarityBoost||hasPerk('glueckspilz');
  const glückspilzOnly=hasPerk('glueckspilz')&&!_ebd.draftRarityBoost;
  let attempts=0;
  while(state.draftCards.length<targetCount&&attempts<120){
    attempts++;
    const rarity=useBoost?(glückspilzOnly?rollRarityGlueckspilz():rollRarityBoosted()):rollRarity();
    const p=generatePlayerForPos(pickRand(MAIN_POSITIONS),rarity);
    if(p&&!taken.has(p.name)&&!shown.has(p.name)){shown.add(p.name);state.draftCards.push(p)}
  }
  while(state.draftCards.length<targetCount){
    const p=generatePlayerForPos(pickRand(MAIN_POSITIONS));
    if(p)state.draftCards.push(p);else break;
  }
  // Goldener Griff perk: guaranteed legendary in next draft (one-time)
  if(state.perkState.goldenerGriffActive){
    const gg=generatePlayerForPos(pickRand(MAIN_POSITIONS),'legendary');
    if(gg)state.draftCards.unshift(gg);
    state.perkState.goldenerGriffActive=false;
  }
  // Guaranteed Rare+ card (transfer event)
  if(_ebd.draftGuaranteedRare){
    const rarities=['rare','epic','legendary'];
    const gr=generatePlayerForPos(pickRand(MAIN_POSITIONS),rarities[Math.floor(Math.random()*rarities.length)]);
    if(gr)state.draftCards.unshift(gr);
  }
  // Consume eventBuff draft fields — cleared here so they don't carry over to next draft
  setState({eventBuff:null});

  // Reset Tauschbörse swap uses
  state.perkState.tauschUsed=0;
}
function renderReplaceDraft(main){
  const cardsDiv=el('div',{class:'draft-cards'});
  const tbl=(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE)[Math.min(state.league,(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE).length-1)];
  const lgClass=state.impossibleMode?'imp':`lg${state.league}`;
  const isBoosted=!!(state.eventBuff&&state.eventBuff.draftRarityBoost)||hasPerk('glueckspilz');
  const footer=el('div',{class:'draft-footer'},[
    buildRarityProbBar(tbl,state.league,state.impossibleMode,isBoosted),
    buildDraftLegend()
  ]);
  // Tauschbörse: build swap-enabled cards
  const buildTauschCard=(p,idx)=>{
    const hasTausch=hasPerk('tauschboerse')&&state.perkState.tauschUsed<2;
    const cardEl=buildCard(p,()=>{setState({replaceCard:p,phase:'replace-pick'});render()});
    if(!hasTausch)return cardEl;
    const swapsLeft=2-state.perkState.tauschUsed;
    const wrap=el('div',{class:'tausch-card-wrap'},[
      cardEl,
      el('button',{class:'tausch-swap-btn',onclick:(e)=>{
        e.stopPropagation();
        state.perkState.tauschUsed=(state.perkState.tauschUsed||0)+1;
        const taken=new Set([...Object.values(state.team).filter(Boolean).map(q=>q.name),...state.bench.filter(b=>b.player).map(b=>b.player.name),...state.draftCards.filter((_,i)=>i!==idx).map(q=>q.name)]);
        let newCard=null;let att=0;
        while(!newCard&&att<30){att++;const r=hasPerk('glueckspilz')?rollRarityGlueckspilz():rollRarity();const c=generatePlayerForPos(pickRand(MAIN_POSITIONS),r);if(c&&!taken.has(c.name))newCard=c;}
        if(newCard){
          state.draftCards[idx]=newCard;
          const outerWrap=e.currentTarget.closest('.draft-card-wrap');
          const newInner=buildTauschCard(newCard,idx);
          newInner.classList.add('card-hidden');
          outerWrap.innerHTML='';
          outerWrap.appendChild(newInner);
          playCardRevealSound(newCard.rarity);
          requestAnimationFrame(()=>{
            newInner.classList.remove('card-hidden');
            newInner.classList.add('card-reveal-'+newCard.rarity);
            if(newCard.rarity==='epic')setTimeout(()=>spawnSparkles(newInner,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
            else if(newCard.rarity==='legendary')setTimeout(()=>spawnSparkles(newInner,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
          });
          const remaining=2-state.perkState.tauschUsed;
          document.querySelectorAll('.tausch-swap-btn').forEach(btn=>{
            if(remaining<=0){btn.remove();}
            else{btn.textContent='↺ Tauschen ('+remaining+')';}
          });
        }
      }},[swapsLeft===1?'↺ Tauschen (1)':'↺ Tauschen'])
    ]);
    return wrap;
  };
  const needsScroll=state.draftCards.length>5;
  const cardsContainer=needsScroll?el('div',{class:'draft-cards-scroll'},[cardsDiv]):cardsDiv;
  // Skip button — top right, pill-btn-weiter style
  const weiterBtn=el('button',{class:'rp-zuruck-btn',style:{position:'absolute',top:'16px',right:'20px',zIndex:'10'},onclick:()=>{setState({draftCards:[]});proceedToNextLineup();}},['Ohne Karte weiter']);
  const phase=el('div',{class:`phase draft-phase replace-draft-phase ${lgClass}`},[
    weiterBtn,
    el('div',{class:'draft-center-block'},[
      el('div',{class:'draft-pick-banner'},[
        el('div',{class:'draft-pick-instruction'},['Wähle einen Spieler']),
        el('div',{class:'draft-pick-slot'},[
          el('div',{class:'draft-pick-slot-dot'}),
          el('span',{},['Belohnung · '+LEAGUES[Math.min(state.league,LEAGUES.length-1)].name])
        ]),
      ]),
      cardsContainer,
    ]),
    footer,
  ]);
  main.appendChild(phase);
  if(needsScroll)requestAnimationFrame(()=>setupDraftScroll(cardsContainer,cardsDiv));
  let cumDelay=200;
  state.draftCards.forEach((p,_ti)=>{
    const card=hasPerk('tauschboerse')?buildTauschCard(p,_ti):buildCard(p,()=>{setState({replaceCard:p,phase:'replace-pick'});render()});
    card.classList.add('card-hidden');
    const wrap=el('div',{class:'draft-card-wrap'});
    wrap.appendChild(card);
    cardsDiv.appendChild(wrap);
    const gap=p.rarity==='legendary'?720:p.rarity==='epic'?480:p.rarity==='rare'?300:230;
    setTimeout(()=>{
      playCardRevealSound(p.rarity);
      card.classList.remove('card-hidden');
      card.classList.add(`card-reveal-${p.rarity}`);
      if(p.rarity==='epic'){
        setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
      } else if(p.rarity==='legendary'){
        setTimeout(()=>spawnSparkles(card,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
        setTimeout(()=>spawnSparkles(card,14,['#fde047','#fff','#fbbf24']),600);
      } else if(p.rarity==='mythic'){
        setTimeout(()=>spawnSparkles(card,32,['#ef4444','#ff6b6b','#fff','#dc2626','#fca5a5']),80);
        setTimeout(()=>spawnSparkles(card,18,['#ef4444','#fff','#ff6b6b']),500);
        setTimeout(()=>spawnSparkles(card,14,['#dc2626','#fff','#ef4444']),900);
      }
    },cumDelay);
    cumDelay+=gap;
  });
}

function buildPackClosedView(phase,cfg,li,onOpen){
  phase.innerHTML='';
  const PACK_SVG=['Pack%20landesliga.svg','Pack-Regionalliga.svg','Pack-Bundesliga.svg','Pack-Champions.svg','Pack-Super.svg','Pack-Super.svg'];
  const svgSrc=`assets/Packdesigns/${PACK_SVG[Math.min(li,PACK_SVG.length-1)]}`;
  const pack=el('div',{class:'pack-v2',style:{boxShadow:`0 0 60px ${cfg.glow},0 24px 50px rgba(0,0,0,.65)`,background:'transparent'}},[
    el('img',{src:svgSrc,draggable:'false',alt:cfg.name,style:{position:'absolute',inset:'0',width:'100%',height:'100%',display:'block',objectFit:'fill',borderRadius:'inherit',pointerEvents:'none',userSelect:'none',outline:'none',border:'none'}}),
  ]);
  let _dragStart=null,_packDone=false;
  pack.style.touchAction='none';
  pack.addEventListener('pointerdown',e=>{if(_packDone)return;pack.setPointerCapture(e.pointerId);_dragStart={x:e.clientX,y:e.clientY};});
  pack.addEventListener('pointermove',e=>{
    if(!_dragStart||_packDone)return;
    if(Math.abs(e.clientX-_dragStart.x)>60&&Math.abs(e.clientY-_dragStart.y)<80){_packDone=true;_dragStart=null;onOpen(pack);}
  });
  pack.addEventListener('pointerup',e=>{
    if(_packDone){_dragStart=null;return;}
    if(_dragStart&&Math.abs(e.clientX-_dragStart.x)<20&&Math.abs(e.clientY-_dragStart.y)<40){_packDone=true;onOpen(pack);}
    _dragStart=null;
  });
  pack.addEventListener('pointercancel',()=>{_dragStart=null;});
  phase.appendChild(el('div',{class:'pack-scene-hdr'},[el('div',{class:'pack-scene-title'},['Dein Pack']),el('div',{class:'pack-scene-sub'},['Klicken oder horizontal ziehen'])]));
  phase.appendChild(pack);
}

function buildFlipCardGrid(container,cards,{origin,weiterOnClick,sammlungPhase,onFlip,onAllFlipped,removePackBg}){
  let flippedCount=0;
  const cardsRow=el('div',{class:'pack-reveal-cards'});
  const needsScroll=cards.length>5;
  const cardsContainer=needsScroll?el('div',{class:'draft-cards-scroll'},[cardsRow]):cardsRow;
  if(needsScroll){cardsRow.style.width='max-content';cardsRow.style.justifyContent='flex-start';cardsRow.style.padding='0';}
  const weiterWrap=el('div',{class:'pack-reveal-weiter'});
  const _svgBtn=el('button',{class:'pill-btn-weiter'},['Weiter →']);
  _svgBtn.addEventListener('click',weiterOnClick);
  weiterWrap.appendChild(_svgBtn);
  const collOrigin=sammlungPhase||state.phase;
  const sammlungBtn=el('div',{class:'pack-reveal-sammlung'},[
    el('button',{class:'btn',style:{fontSize:'12px',padding:'7px 18px',borderRadius:'999px'},onclick:()=>{setState({_collOrigin:collOrigin,phase:'collection'});render();}},['Sammlung →']),
  ]);
  cards.forEach(p=>{
    const flipWrap=el('div',{class:'pack-flip'});
    flipWrap.dataset.rarity=p.rarity;
    const flipInner=el('div',{class:'pack-flip-inner'});
    const _rar=p.rarity.charAt(0).toUpperCase()+p.rarity.slice(1);
    const back=el('div',{class:'pack-flip-back'},[el('img',{src:`assets/Packopening/Card-R%C3%BCckseite-${_rar}.svg`,draggable:'false',style:{position:'absolute',inset:'0',width:'100%',height:'100%',display:'block',objectFit:'fill',borderRadius:'inherit',pointerEvents:'none',userSelect:'none',outline:'none',border:'none'}})]);
    const front=el('div',{class:'pack-flip-front'});
    const card=buildCard(p,()=>{},null);
    front.appendChild(card);
    flipInner.appendChild(back);flipInner.appendChild(front);flipWrap.appendChild(flipInner);
    const doFlip=()=>{
      if(flipWrap.classList.contains('flipped'))return;
      flipWrap.classList.add('flipped');
      flippedCount++;
      if(onFlip)onFlip(p,card);
      else if(p.rarity==='epic')setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),380);
      if(flippedCount===cards.length){
        if(onAllFlipped)onAllFlipped();

      }
    };

const RARITY_NEXT={common:'uncommon',uncommon:'rare',rare:'epic',epic:'legendary',legendary:'mythic'};
function animateTradeUp(wrapEl,toRarity,onDone){
  const RC={common:'#9ca3af',uncommon:'#5EC26A',rare:'#71a4f4',epic:'#c084fc',legendary:'#fde047',mythic:'#ef4444'};
  const color=RC[toRarity]||'#fff';
  const rect=wrapEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  // Burst the card
  wrapEl.style.animation='tradeCardBurst .55s ease-out forwards';
  wrapEl.style.pointerEvents='none';
  // Overlay for rings + glow flash
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none';
  for(let i=0;i<3;i++){
    const ring=document.createElement('div');
    ring.style.cssText=`position:absolute;left:${cx}px;top:${cy}px;width:110px;height:110px;border-radius:50%;border:2px solid ${color};opacity:0;animation:tradeRingOut .65s ease-out ${i*.13}s forwards`;
    ov.appendChild(ring);
  }
  const flash=document.createElement('div');
  flash.style.cssText=`position:absolute;left:${cx}px;top:${cy}px;width:88px;height:126px;border-radius:12px;background:${color};box-shadow:0 0 50px 24px ${color}99;opacity:0;animation:tradeFlashIn .85s ease-out .08s forwards`;
  ov.appendChild(flash);
  document.body.appendChild(ov);
  setTimeout(()=>{ov.remove();onDone();},880);
}
function tradeUp(name,rarity){
  const next=RARITY_NEXT[rarity];
  if(!next)return;
  let removed=0;
  state.collection=state.collection.filter(p=>{
    if(p.name===name&&removed<10){removed++;return false;}
    return true;
  });
  const newP=generatePlayerForPos(pickRand(MAIN_POSITIONS),next);
  if(newP)state.collection.push(newP);
  saveCollection();
  showToast('10× '+rarity.toUpperCase()+' → 1× '+next.toUpperCase()+' erhalten!');
}

const _COL_RC={common:'#9ca3af',uncommon:'#5EC26A',rare:'#71a4f4',epic:'#c084fc',legendary:'#fde047',mythic:'#ef4444'};
const _COL_RORD={mythic:0,legendary:1,epic:2,rare:3,uncommon:4,common:5};

// ── Collection: card grid (pure DOM, no state side-effects) ───
function buildCollectionGrid(items,onTrade){
  const grid=el('div',{class:'col-grid'});
  if(!items.length){grid.appendChild(el('div',{class:'col-empty'},['Noch keine Karten gesammelt. Öffne Packs nach jedem Spiel!']));return grid;}
  items.forEach(p=>{
    const canTrade=p.count>=10&&RARITY_NEXT[p.rarity];
    const inner=el('div',{class:'col-inner-card'});inner.appendChild(buildCard(p,()=>{},null));
    const wrap=el('div',{class:'col-item'+(canTrade?' col-item-tradeable':'')});
    wrap.appendChild(inner);
    if(p.count>1){
      const badge=el('div',{class:'col-dup-badge'},['×'+p.count]);
      if(p.count>=10){badge.style.color='#fde047';badge.style.borderColor='rgba(253,224,71,.4)';}
      wrap.appendChild(badge);
    }
    if(canTrade){
      const next=RARITY_NEXT[p.rarity];
      wrap.appendChild(el('div',{class:'col-trade-overlay'},[
        el('button',{class:'col-trade-btn',onclick:(e)=>{e.stopPropagation();animateTradeUp(wrap,next,()=>onTrade(p));}},['10× → '+next.toUpperCase()+' ↑'])
      ]));
    }
    wrap.title=p.name+' · '+p.rarity.toUpperCase()+' · '+p.rating+(p.count>1?' (×'+p.count+')':'');
    grid.appendChild(wrap);
  });
  return grid;
}

function renderCollection(main){
  let fRar='all',sortBy='rating';
  const phase=el('div',{class:'phase collection-phase'});
  main.appendChild(phase);

  function build(){
    phase.innerHTML='';
    const col=state.collection||[];
    const byName={};
    col.forEach(p=>{if(!byName[p.name])byName[p.name]={...p,count:0};byName[p.name].count++;});
    let items=Object.values(byName);
    if(fRar!=='all')items=items.filter(p=>p.rarity===fRar);
    if(sortBy==='rating')items.sort((a,b)=>b.rating-a.rating);
    else if(sortBy==='rarity')items.sort((a,b)=>(_COL_RORD[a.rarity]??5)-(_COL_RORD[b.rarity]??5));
    else if(sortBy==='dupes')items.sort((a,b)=>b.count-a.count||b.rating-a.rating);
    else items.sort((a,b)=>a.pos.localeCompare(b.pos));

    const tradeReady=col.filter((p,_,arr)=>arr.filter(x=>x.name===p.name).length>=10&&RARITY_NEXT[p.rarity]).length>0;
    const RARS=['all','common','uncommon','rare','epic','legendary','mythic'];
    const filRow=el('div',{class:'col-filters'},[
      ...RARS.map(r=>{const active=fRar===r;const btn=el('button',{class:'cfil'+(active?' active':''),onclick:()=>{fRar=r;build();}},[r==='all'?'Alle':r.toUpperCase()]);if(r!=='all'&&active){btn.style.borderColor=_COL_RC[r];btn.style.color=_COL_RC[r];}return btn;}),
      el('div',{class:'cfil-sep'}),
      ...['rating','rarity','dupes','pos'].map(s=>el('button',{class:'cfil'+(sortBy===s?' active':''),onclick:()=>{sortBy=s;build();}},[s==='rating'?'Rating':s==='rarity'?'Rarity':s==='dupes'?'Duplikate':'Position'])),
    ]);

    phase.appendChild(buildCollectionHeader(col,byName,tradeReady));
    phase.appendChild(filRow);
    phase.appendChild(el('div',{class:'col-trade-hint',style:{fontSize:'10px',color:'rgba(255,255,255,.22)',marginBottom:'10px',letterSpacing:'.2px'}},['10 Duplikate einer Karte → 1× nächste Seltenheitsstufe']));
    phase.appendChild(buildCollectionGrid(items,p=>{tradeUp(p.name,p.rarity);build();}));
  }
  build();
}
function stokenAgeBadge(p){

  if(p.age>=34)return el('span',{class:'stoken-stage-chip end'},['END']);

function doReplace(target){

      el('div',{class:'perk-card-strip'}),
      el('div',{class:'perk-card-top'},[
        el('span',{class:'perk-cat-badge'},[CAT_LABEL[perk.cat]||perk.cat]),
        el('span',{class:'perk-card-stars'},[CAT_STARS[perk.cat]||'★★★']),
      ]),
      el('div',{class:'perk-card-body'},[
        el('div',{class:'perk-card-icon'},[perk.name.slice(0,3).toUpperCase()]),
        el('div',{class:'perk-card-name'},[perk.name]),
        el('div',{class:'perk-card-sep'}),
        el('div',{class:'perk-card-desc'},[perk.desc]),
        el('div',{class:'perk-card-eff-block'},[
          el('div',{class:'perk-card-eff-lbl'},['Auswirkung']),
          el('div',{class:'perk-card-eff-val'},[perk.eff]),
        ]),
      ]),
      el('div',{class:'perk-card-choose'},['Auswählen']),
    ]);
    wrap.appendChild(face);
    return wrap;
  }

  function pickPerk(perk){
    state.perks.push(perk.id);
    if(perk.id==='goldener_griff')state.perkState.goldenerGriffActive=true;
    setState({pendingPerkPick:false});

    setState({_perkChoices:null});

    maybeShowRandomEvent(()=>{generateReplaceCards();setState({phase:'replace-draft'});render();});
  }

  const leagueName=LEAGUES[state.league]?.name||('Liga '+state.league);
  const lgClass=state.impossibleMode?'imp':`lg${Math.min(state.league,4)}`;
  const perkLgClass=state.impossibleMode?'perk-imp':`perk-lg${Math.min(state.league,4)}`;

  const currentPerksEl=state.perks.length>0?el('div',{class:'perk-current-perks'},[
    el('div',{class:'perk-current-label'},['Aktive Boni']),
    el('div',{class:'perk-current-list'},[
      ...state.perks.map(id=>{
        const p=PERKS.find(x=>x.id===id);
        const col={passiv:'#71a4f4',taktik:'#5EC26A',draft:'#fde047',event:'#c084fc',liga:'#fb923c'}[p?.cat]||'#555';
        return p?el('span',{class:'perk-current-chip',style:{borderColor:col}},[p.name]):null;
      }).filter(Boolean)
    ])
  ]):null;

  const phase=el('div',{class:`phase draft-phase perk-pick-phase ${lgClass}`},[
    el('div',{class:'draft-center-block'},[
      el('div',{class:'draft-pick-banner'},[
        el('div',{class:'draft-pick-instruction'},['Aufstiegs Bonus']),
        el('div',{class:'draft-pick-slot'},[
          el('div',{class:'draft-pick-slot-dot'}),
          el('span',{},[leagueName]),
        ]),
      ]),
      el('div',{class:'draft-cards perk-cards-row'},[
        ...choices.map(p=>buildPerkCard(p))
      ]),
    ]),
    el('div',{class:'draft-footer'},[
      ...(currentPerksEl?[currentPerksEl]:[]),
    ]),
  ]);
  main.appendChild(phase);
}

let _musicOn=false;
function toggleMusic(){

  const btn=$('#btnMusic');
  if(btn)btn.style.opacity=_musicOn?'1':'0.4';

/* ── Web Audio helpers ─────────────────────────────────── */
let _audioCtx=null;
function _getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==='closed')
    _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}
function _tone(ctx,freq,startT,dur,vol=0.18,type='sine',attack=0.012,release=0.07){
  const osc=ctx.createOscillator(),g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);
  osc.type=type;osc.frequency.value=freq;
  g.gain.setValueAtTime(0,startT);
  g.gain.linearRampToValueAtTime(vol,startT+attack);
  g.gain.setValueAtTime(vol,startT+dur-release);
  g.gain.exponentialRampToValueAtTime(0.001,startT+dur);
  osc.start(startT);osc.stop(startT+dur+0.04);
}
function _noise(ctx,startT,dur,vol=0.06){
  const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*dur),ctx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1);
  const src=ctx.createBufferSource(),g=ctx.createGain();
  src.buffer=buf;src.connect(g);g.connect(ctx.destination);
  g.gain.setValueAtTime(0,startT);
  g.gain.linearRampToValueAtTime(vol,startT+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,startT+dur);
  src.start(startT);src.stop(startT+dur+0.02);
}

function playCardRevealSound(rarity='common'){
  if(!_musicOn)return;
  try{
    const ctx=_getAudioCtx();
    const t=ctx.currentTime+0.02;
    // Ascending arpeggio — more notes & louder for rarer cards
    const cfg={
      common:    {notes:[523,659],       vol:0.10,step:0.08,type:'sine'},
      uncommon:  {notes:[523,659,784],   vol:0.13,step:0.07,type:'sine'},
      rare:      {notes:[440,554,659,880],vol:0.16,step:0.065,type:'sine'},
      epic:      {notes:[392,523,659,784,1047],vol:0.18,step:0.06,type:'triangle'},
      legendary: {notes:[330,440,554,659,880,1109],vol:0.20,step:0.055,type:'triangle'},
      mythic:    {notes:[262,330,415,523,659,830,1047],vol:0.22,step:0.05,type:'sawtooth'},
    }[rarity]||{notes:[523,659],vol:0.10,step:0.08,type:'sine'};
    cfg.notes.forEach((f,i)=>_tone(ctx,f,t+i*cfg.step,0.28,cfg.vol,cfg.type,0.01,0.12));
    _noise(ctx,t,0.12,0.04);
  }catch(e){}
}

function playGoalSound(){
  if(!_musicOn)return;
  try{
    const ctx=_getAudioCtx();
    const t=ctx.currentTime+0.02;
    // Short fanfare: C4-E4-G4-C5 with brief pause, then sustained chord
    [[262,0],[330,0.11],[392,0.22],[523,0.33],[523,0.50],[659,0.50],[784,0.50]]
      .forEach(([f,dt])=>_tone(ctx,f,t+dt,dt<0.4?0.22:0.55,0.14,'square',0.015,0.12));
    _noise(ctx,t,0.08,0.08);
  }catch(e){}
}

function playPackOpenSound(){
  if(!_musicOn)return;
  try{
    const ctx=_getAudioCtx();
    const t=ctx.currentTime+0.02;
    // Rising whoosh
    const osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(120,t);
    osc.frequency.exponentialRampToValueAtTime(800,t+0.3);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.12,t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    osc.start(t);osc.stop(t+0.45);
    _noise(ctx,t,0.35,0.07);
  }catch(e){}
}

const _NAV_HIDDEN_PHASES=new Set(['match','pack-opening','replace-draft','replace-pick','perk-pick','level-up','victory']);

function updateMobileNav(){
  const nav=$('#mobileNav');
  const game=document.querySelector('.game');
  if(!nav||!game)return;
  const isTouch=window.matchMedia('(pointer:coarse)').matches;
  const hidden=!isTouch||_NAV_HIDDEN_PHASES.has(state.phase);
  // '' = CSS-Regel greift (display:flex auf touch, display:none auf desktop)
  // 'none' = explizit versteckt für immersive Phasen auch auf Touch
  nav.style.display=hidden?'none':'';
  game.classList.toggle('has-mobile-nav',!hidden);
  // Aktiven Tab hervorheben
  ['#mnavTrophy','#mnavCollection','#mnavRanking'].forEach(id=>$(id)?.classList.remove('active'));
  if(state.phase==='trophies')$('#mnavTrophy')?.classList.add('active');
  else if(state.phase==='collection')$('#mnavCollection')?.classList.add('active');
  else if(state.phase==='ranking')$('#mnavRanking')?.classList.add('active');
}

   BUG REPORT / FEEDBACK MODAL

   ➜ Setup (one-time):
     1. Visit https://web3forms.com
     2. Enter admin.tacticrogue@gmail.com and click "Create Access Key"
     3. Paste the key below as WEB3FORMS_KEY
   ══════════════════════════════════════════════════════════════════ */
const WEB3FORMS_KEY = 'a9610cba-e005-4b39-a260-078c6c9f90e9';

(function initBugModal(){
  const backdrop = document.getElementById('bugModalBackdrop');
  const closeBtn = document.getElementById('bugModalClose');
  const sendBtn  = document.getElementById('bugSendBtn');
  const textarea = document.getElementById('bugText');
  const metaDiv  = document.getElementById('bugMeta');
  const hintEl   = document.getElementById('bugSendHint');
  const success  = document.getElementById('bugSuccess');
  const modalBody= document.querySelector('.bug-modal-body');
  const modalFoot= document.querySelector('.bug-modal-footer');
  let selectedType = 'bug';

  function openBugModal(){
    // Refresh meta info
    const league = LEAGUES[Math.min(state.league, LEAGUES.length-1)]?.name || '-';
    metaDiv.innerHTML = `Liga: <b>${league}</b> &nbsp;·&nbsp; Phase: <b>${state.phase}</b>`;
    // Reset state
    textarea.value = '';
    success.classList.remove('show');
    modalBody.style.display = '';
    modalFoot.style.display = '';
    hintEl.textContent = WEB3FORMS_KEY === 'YOUR_ACCESS_KEY_HERE'
      ? '⚠ Kein Access Key — öffnet E-Mail-Client'
      : '';
    backdrop.classList.add('open');
    setTimeout(()=>textarea.focus(), 200);
  }
  window.closeBugModal = function(){backdrop.classList.remove('open');};

  // Type buttons
  document.querySelectorAll('.bug-type-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.bug-type-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedType = btn.dataset.type;
    });
  });

  // Send
  sendBtn.addEventListener('click', async ()=>{
    const msg = textarea.value.trim();
    if(!msg){textarea.focus();textarea.style.borderColor='rgba(239,68,68,.5)';setTimeout(()=>textarea.style.borderColor='',1200);return;}
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sende…';
    const league = LEAGUES[Math.min(state.league, LEAGUES.length-1)]?.name || '-';
    const typeLabel = {bug:'🐛 Bug',verbesserung:'💡 Verbesserung',sonstiges:'✉️ Sonstiges'}[selectedType] || selectedType;
    const subject = `[Tactic Roguelike Beta] ${typeLabel}`;

    try{
      if(WEB3FORMS_KEY !== 'YOUR_ACCESS_KEY_HERE'){
        const res = await fetch('https://api.web3forms.com/submit',{
          method:'POST',
          headers:{'Content-Type':'application/json','Accept':'application/json'},
          body: JSON.stringify({
            access_key: WEB3FORMS_KEY,
            subject,
            from_name: 'Tactic Roguelike Beta',
            message: msg,
            bug_type: typeLabel,
            liga: league,
            phase: state.phase,
            timestamp: new Date().toLocaleString('de-DE')
          })
        });
        const data = await res.json();
        if(!data.success) throw new Error(data.message||'Fehler');
      } else {
        // Fallback: open email client
        const body = `Typ: ${typeLabel}\n\nBeschreibung:\n${msg}\n\nLiga: ${league}\nPhase: ${state.phase}\nZeit: ${new Date().toLocaleString('de-DE')}`;
        window.open(`mailto:admin.tacticrogue@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
      }
      // Show success
      modalBody.style.display = 'none';
      modalFoot.style.display = 'none';
      success.classList.add('show');
      setTimeout(closeBugModal, 2800);
    } catch(err){
      sendBtn.disabled = false;
      sendBtn.textContent = 'Absenden →';
      hintEl.textContent = '✗ Fehler: ' + (err.message || 'Bitte nochmal versuchen');
      hintEl.style.color = '#f87171';
    }
  });

  backdrop.addEventListener('click', e=>{if(e.target===backdrop)closeBugModal();});
  closeBtn.addEventListener('click', closeBugModal);
})();
