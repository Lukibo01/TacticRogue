function doSwap(fromKey,toKey){
  const a=getPlayerAt(fromKey),b=getPlayerAt(toKey);
  setPlayerAt(fromKey,b);setPlayerAt(toKey,a);
  render();
}

/* ----- DRAFT ----- */
function startDraft(target){
  const isBench=!target.startsWith('slot:');
  let slotPos=null;
  if(!isBench){const sid=target.slice(5);slotPos=FORMATIONS[state.formation].find(s=>s.id===sid).pos}
  state.draftCurrent=target;
  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>p.name),
    ...state.bench.filter(b=>b.player).map(b=>b.player.name)
  ]);
  const shown=new Set();
  state.draftCards=[];
  let attempts=0;
  while(state.draftCards.length<5&&attempts<120){
    attempts++;
    // Bench: each card gets its own random position; slot: fixed slotPos
    const pos=isBench?pickRand(MAIN_POSITIONS):slotPos;
    const p=generatePlayerForPos(pos);
    if(!p)continue;
    // Lineup slots: exact position match ONLY
    if(!isBench&&p.pos!==slotPos)continue;
    if(!taken.has(p.name)&&!shown.has(p.name)){shown.add(p.name);state.draftCards.push(p)}
  }
  // Safety fill — keep exact position filter, prevent infinite loop
  let sfAttempts=0;
  while(state.draftCards.length<5&&sfAttempts<80){
    sfAttempts++;
    const pos=isBench?pickRand(MAIN_POSITIONS):slotPos;
    const p=generatePlayerForPos(pos);
    if(!p)continue;
    if(!isBench&&p.pos!==slotPos)continue;
    state.draftCards.push(p);
  }
  state.phase='draft';render();
}

    s.animate([{opacity:1,transform:'translate(0,0) scale(1)'},{opacity:0,transform:`translate(${(Math.random()*52-26).toFixed(1)}px,${-(25+Math.random()*55).toFixed(1)}px) scale(0)`}],
      {duration:600+Math.random()*400,easing:'ease-out',fill:'forwards'}).finished.then(()=>s.remove());
  }
  card.addEventListener('mouseenter',()=>{
    active=true;t0=performance.now();
    // card-reveal-* benutzt fill:forwards → hält transform fest und überschreibt style.transform
    // animation:none hebt diesen Lock auf, damit rAF die Kontrolle übernehmen kann
    card.style.animation='none';
    card.classList.add('card-hovered');
    card.style.transition='box-shadow .3s ease';
    raf=requestAnimationFrame(tick);
    if(pRate>0)spkIv=setInterval(spawnSpark,Math.max(70,Math.round(180/pRate)));
  });
  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    mx=(e.clientX-r.left)/r.width;my=(e.clientY-r.top)/r.height;
  });
  card.addEventListener('mouseleave',()=>{
    active=false;card.classList.remove('card-hovered');
    cancelAnimationFrame(raf);clearInterval(spkIv);
    card.style.animation='';
    card.style.transition='transform .35s cubic-bezier(.34,1.2,.64,1),box-shadow .35s ease';
    card.style.transform='';
    mx=0.5;my=0.5;
  });
}

function buildFreePitch(formation,team,type,pitchKey,customPos,onClickPlayer){
  // Simplified tactics pitch — circle dots only, no drag, no names/ratings
  const slots=FORMATIONS[formation];
  const frame=el('div',{class:'mini-pitch',dataset:{pitchkey:pitchKey}});

  svg.innerHTML=`<rect x="2" y="2" width="96" height="136" fill="none" stroke="rgba(148,200,255,.5)" stroke-width=".4"/><line x1="2" y1="70" x2="98" y2="70" stroke="rgba(148,200,255,.4)" stroke-width=".3"/><circle cx="50" cy="70" r="9" fill="none" stroke="rgba(148,200,255,.4)" stroke-width=".3"/><rect x="22" y="120" width="56" height="18" fill="none" stroke="rgba(148,200,255,.35)" stroke-width=".3"/><rect x="22" y="2" width="56" height="18" fill="none" stroke="rgba(148,200,255,.35)" stroke-width=".3"/>`;
  frame.appendChild(svg);
  for(const slot of slots){
    const p=team[slot.id];
    // Role code for dot label — use defRoles for ohne pitch
    let code=slot.pos.slice(0,3);
    if(p){
      if(pitchKey==='ohne'){
        const rd=state.defRoles[slot.id];
        const roleName=rd?rd.role:(DEF_ROLES_BY_POS[slot.pos]?.[0]?.[0]||slot.pos);
        code=(DEF_ROLES_BY_POS[slot.pos]||[]).find(r=>r[0]===roleName)?.[1]||slot.pos.slice(0,3);
      } else {
        const rd=state.roles[slot.id];
        const roleName=rd?rd.role:(ROLES_BY_POS[slot.pos]?.[0]?.[0]||slot.pos);
        code=(ROLES_BY_POS[slot.pos]||[]).find(r=>r[0]===roleName)?.[1]||slot.pos.slice(0,3);
      }
    }
    const rar=p?p.rarity:'empty';
    // Clamp y so dots don't overflow pitch edge
    const rawY=100-slot.y;
    const posShift=slot.pos==='GK'?-5:['CB','LB','RB'].includes(slot.pos)?-9:-6;
    const clampedY=Math.min(Math.max(rawY+posShift,5),92);
    const dot=el('div',{class:`pitch-dot ${rar}`},[code]);
    const clickable=(pitchKey==='mit'||pitchKey==='ohne')&&p&&onClickPlayer;
    const node=el('div',{class:'mini-slot',style:{left:`${slot.x}%`,top:`${clampedY}%`,cursor:clickable?'pointer':'default'}});
    node.appendChild(dot);
    if(clickable){
      node.addEventListener('click',()=>onClickPlayer(slot.id,p));
    }
    frame.appendChild(node);
  }
  return frame;
}
function buildTacticEditor(){
  // Subcategory structure for each tab
  const TAC_STRUCTURE={
    aufbau:[
      {label:'Ballzirkulation',keys:['passStyle','tempo','breite']},
      {label:'Spielaufbau',keys:['aufbauStrategie','abstöße','spielaufbau','passAufnahme']},
      {label:'Kreativität',keys:['passRisiko','dribblings']},
    ],
    angriff:[
      {label:'Abschluss',keys:['direktheit','kreativFreiheiten','angriffsroute']},
      {label:'Flanken & Läufe',keys:['unterstuetzLaeufe','flanken','fernschuesse']},
    ],
    defense:[
      {label:'Pressingsystem',keys:['pressingLinie','defensivLinie','pressingAusloesung','defensivBreite']},
      {label:'Reaktion',keys:['nachBallverlust','nachBalleroberung','gegnerFlanken','deckung']},
    ],
  };
  // Flat map of key → [label, opts] from TACTIC_PHASES
  const keyMeta={};
  for(const ph of TACTIC_PHASES){for(const[k,lbl,opts] of ph.params)keyMeta[k]=[lbl,opts];}

  const TABS=[{id:'aufbau',label:'Aufbauspiel'},{id:'angriff',label:'Angriff'},{id:'defense',label:'Abwehr'}];
  if(!state._tacTab||!TABS.find(t=>t.id===state._tacTab))state._tacTab='aufbau';
  const wrap=el('div',{class:'tac-editor'});

  // --- Intensitätsleiste ---
  function buildIntensBar(){
    const pct=calcIntensity(state.tactics);
    const lvl=getIntensityLevel(pct);
    const warn=pct>=65?'⚠ Leistungsabfall nach Minute 60 möglich':'Spieler halten Leistung bis Abpfiff';
    return el('div',{class:'intens-wrap'},[
      el('div',{class:'intens-header'},[
        el('span',{class:'intens-lbl'},['Intensität']),
        el('span',{class:'intens-val',style:{color:lvl.color}},[`${lvl.label} · ${pct}%`])
      ]),
      el('div',{class:'intens-track'},[el('div',{class:'intens-fill',style:{width:`${pct}%`,background:lvl.color}})]),
      el('div',{class:'intens-hint'},[warn])
    ]);
  }
  function updateIntensBar(container){
    const old=container.querySelector('.intens-wrap');
    if(old){const neu=buildIntensBar();container.insertBefore(neu,old);old.remove();}
  }
  const intensEl=buildIntensBar();
  wrap.appendChild(intensEl);

  // --- Mentalität ---
  const mPhase=el('div',{class:'tac-phase'},[
    el('div',{class:'tac-phase-title'},['Mentalität']),
    (()=>{const m=el('div',{class:'mentality-picker'});TACTIC_LABELS_MENTALITY.forEach((t,i)=>{const b=el('button',{class:state.tactics.mentality===i?'active':''},[t]);b.addEventListener('click',()=>{state.tactics.mentality=i;m.querySelectorAll('button').forEach((x,j)=>x.classList.toggle('active',j===i));updateIntensBar(wrap)});m.appendChild(b)});return m})()
  ]);
  wrap.appendChild(mPhase);

  // --- 3-Tab Navigation ---
  const tabNav=el('div',{class:'tac-tabs3'});
  const groups={};
  TABS.forEach(tab=>{
    const btn=el('button',{class:`tac-tab3 ${state._tacTab===tab.id?'active':''}`,dataset:{tabid:tab.id}},[tab.label]);
    const grp=el('div',{class:'tac-phase-group',style:{display:state._tacTab===tab.id?'flex':'none',flexDirection:'column',gap:'0'}});
    groups[tab.id]=grp;
    btn.addEventListener('click',()=>{
      state._tacTab=tab.id;
      tabNav.querySelectorAll('.tac-tab3').forEach(b=>b.classList.toggle('active',b.dataset.tabid===tab.id));
      Object.entries(groups).forEach(([id,g])=>{g.style.display=id===tab.id?'flex':'none'});
    });
    tabNav.appendChild(btn);
  });
  wrap.appendChild(tabNav);

  // --- Render sliders with subcategories ---
  for(const tab of TABS){
    const colorCls=tab.id==='defense'?'noball-phase':'ball-phase';
    const grp=groups[tab.id];
    for(const sub of (TAC_STRUCTURE[tab.id]||[])){
      grp.appendChild(el('div',{class:'tac-subcat'},[sub.label]));
      const subDiv=el('div',{class:`tac-phase ${colorCls}`,style:{marginBottom:'4px'}});
      for(const key of sub.keys){
        const meta=keyMeta[key];if(!meta)continue;
        const[label,opts]=meta;
        const row=el('div',{class:'tac-row'});
        row.appendChild(el('div',{class:'label'},[label]));
        const val=Number(state.tactics[key]??2);
        const inp=el('input',{type:'range',min:'0',max:String(opts.length-1),value:String(val)});
        const valEl=el('div',{class:'value'},[opts[val]]);
        inp.addEventListener('input',()=>{state.tactics[key]=Number(inp.value);valEl.textContent=opts[Number(inp.value)];updateIntensBar(wrap)});
        row.appendChild(inp);row.appendChild(valEl);
        subDiv.appendChild(row);
      }
      grp.appendChild(subDiv);
    }
  }
  Object.values(groups).forEach(g=>wrap.appendChild(g));

  // --- Save / Reset ---
  const actRow=el('div',{class:'tac-actions',style:{display:'flex',gap:'6px',marginTop:'10px',flexWrap:'wrap'}});
  actRow.appendChild(el('button',{class:'btn',style:{flex:'1',fontSize:'12px'},onclick:saveCurrentTactics},['Taktik speichern']));
  actRow.appendChild(el('button',{class:'btn',style:{flex:'1',fontSize:'12px'},onclick:resetTactics},['Zurücksetzen']));
  wrap.appendChild(actRow);

  // --- Saved Tactics: minimal chip strip at very bottom ---
  if(state.savedTactics&&state.savedTactics.length>0){
    const savedSec=el('div',{class:'tac-phase',style:{marginTop:'6px'}});
    savedSec.appendChild(el('div',{class:'tac-phase-title',style:{fontSize:'10px',marginBottom:'4px'}},['Gespeichert']));
    const strip=el('div',{class:'saved-tac-strip'});
    for(let idx=0;idx<state.savedTactics.length;idx++){
      const s=state.savedTactics[idx];
      const chip=el('div',{class:'saved-tac-chip'});
      chip.appendChild(el('span',{class:'chip-name'},[s.name]));
      chip.appendChild(el('span',{class:'chip-form'},[s.formation||'']));
      chip.appendChild(el('button',{class:'chip-del',onclick:(e)=>{e.stopPropagation();deleteSavedTactic(idx)}},['✕']));
      chip.addEventListener('click',()=>loadSavedTactic(idx));
      strip.appendChild(chip);
    }
    savedSec.appendChild(strip);
    wrap.appendChild(savedSec);
  }

  return wrap;
}

function getOppKeywords(tactics){
  const g=k=>tactics[k]??2;
  const kws=[];
  // Mentality always first
  const mentShort=['Sehr def.','Defensiv','Ausgewogen','Offensiv','Sehr off.'];
  kws.push({label:mentShort[g('mentality')],type:'neutral'});
  // Pressing
  // Defense (Rot)
  if(g('pressingLinie')>=3)kws.push({label:'Hohes Pressing',type:'warn'});
  else if(g('pressingLinie')<=1)kws.push({label:'Tiefes Stehen',type:'warn'});
  if(g('defensivLinie')>=3)kws.push({label:'Hohe Abwehr',type:'warn'});
  else if(g('defensivLinie')<=1)kws.push({label:'Tiefe Abwehr',type:'warn'});
  if(g('deckung')>=3)kws.push({label:'Manndeckung',type:'warn'});
  if(g('nachBallverlust')>=4)kws.push({label:'Gegenpressing',type:'warn'});
  // Aufbauspiel (Gelb)
  if(g('passStyle')>=3)kws.push({label:'Langer Ball',type:'yellow'});
  else if(g('passStyle')<=1)kws.push({label:'Kurzes Passspiel',type:'yellow'});
  if(g('breite')>=3)kws.push({label:'Breites Spiel',type:'yellow'});
  // Angriff (Grün)
  if(g('nachBalleroberung')>=3)kws.push({label:'Konter',type:'green'});
  if(g('flanken')>=3)kws.push({label:'Viele Flanken',type:'green'});
  if(g('direktheit')>=3)kws.push({label:'Direktes Spiel',type:'green'});
  return kws.slice(0,6);
}
function classifyPlayingStyle(tactics){
  const g=k=>tactics[k]??2;
  if(g('pressingLinie')>=3&&g('pressingAusloesung')>=3)return'Intensiv-Pressing';
  if(g('pressingLinie')<=1&&g('nachBalleroberung')>=3)return'Konter-Fußball';
  if(g('passStyle')>=3&&g('direktheit')>=3)return'Direktes Vertikalspiel';
  if(g('passStyle')<=1&&g('tempo')<=1)return'Kontroll-Fußball';
  if(g('breite')>=3&&g('flanken')>=3)return'Flügelbasiertes Spiel';
  if(g('defensivLinie')<=1&&g('pressingLinie')<=1)return'Tiefer Defensiv-Block';
  if(g('defensivLinie')>=3&&g('nachBallverlust')>=3)return'Gegenpressing-System';
  if(g('direktheit')>=3)return'Direktes Spiel';
  return'Ausgeglichene Taktik';
}

  if(g('flanken')>=3&&g('breite')>=3)

  if(g('deckung')>=3)

let _zoneLastDir='my';
function setMatchZone(zone,team){
  ['fzDef','fzMid','fzAtt'].forEach(id=>{
    const e=document.getElementById(id);
    if(!e)return;
    e.classList.remove('zone-my','zone-opp','zone-mid-active');
  });
  const zMap={def:'fzDef',mid:'fzMid',att:'fzAtt'};
  const active=document.getElementById(zMap[zone]);
  if(active){
    if(team==='my')active.classList.add('zone-my');
    else if(team==='opp')active.classList.add('zone-opp');
    else active.classList.add('zone-mid-active');
  }
  ['arrowDef','arrowMid','arrowAtt'].forEach(id=>{
    const e=document.getElementById(id);
    if(!e)return;
    e.classList.remove('visible');
    e.style.animation='';
  });
  const aMap={def:'arrowDef',mid:'arrowMid',att:'arrowAtt'};
  const arrow=document.getElementById(aMap[zone]);
  if(!arrow)return;
  if(zone==='att'){arrow.textContent='▶▶';arrow.style.color='#4ade80';}
  else if(zone==='def'){arrow.textContent='◀◀';arrow.style.color='#ef4444';}
  else{arrow.textContent=team==='my'?'▶':'◀';arrow.style.color='rgba(230,235,245,.82)';}
  arrow.classList.add('visible');
}
function pickMatchZone(minute,mG,oG,tacNet){
  const upMy=mG.find(g=>g.min>minute&&g.min<=minute+4);
  const upOpp=oG.find(g=>g.min>minute&&g.min<=minute+4);
  if(upMy){_zoneLastDir='my';return{zone:'att',team:'my'};}
  if(upOpp){_zoneLastDir='opp';return{zone:'def',team:'opp'};}
  const rv=Math.random();
  if(tacNet>=4){
    if(rv<0.38){_zoneLastDir='my';return{zone:'att',team:'my'};}
    if(rv<0.72)return{zone:'mid',team:_zoneLastDir};
    _zoneLastDir='opp';return{zone:'def',team:'opp'};
  }else if(tacNet<=-4){
    if(rv<0.38){_zoneLastDir='opp';return{zone:'def',team:'opp'};}
    if(rv<0.72)return{zone:'mid',team:_zoneLastDir};
    _zoneLastDir='my';return{zone:'att',team:'my'};
  }else{
    if(rv<0.3){_zoneLastDir='my';return{zone:'att',team:'my'};}
    if(rv<0.6)return{zone:'mid',team:_zoneLastDir};
    _zoneLastDir='opp';return{zone:'def',team:'opp'};
  }
}
function runMatchAnimation(){
  _zoneLastDir='my';
  const r=state.matchResult;
  const total=90;
  const SCORER_WEIGHT={ST:9,LA:6,RA:6,LF:7,RF:7,CF:8,ZOM:5,LM:4,RM:4,ZM:3,ZDM:2,IV:1,LV:1,RV:1,GK:0};
  function pickScorer(teamObj){
    const pool=[];
    Object.values(teamObj).filter(Boolean).forEach(p=>{
      const w=SCORER_WEIGHT[p.pos]??1;
      for(let i=0;i<w;i++)pool.push(p.name.split(' ').pop());
    });
    return pool.length?pool[rand(0,pool.length-1)]:'Unbekannt';
  }
  const myG=[],oppG=[];
  for(let i=0;i<r.myGoals;i++)myG.push({min:rand(4,89),scorer:pickScorer(state.team)});
  for(let i=0;i<r.oppGoals;i++)oppG.push({min:rand(4,89),scorer:pickScorer(state.opponent.team)});
  myG.sort((a,b)=>a.min-b.min);oppG.sort((a,b)=>a.min-b.min);
  // ── Großchancen (verpasste) ──────────────────────────────────────────
  const MY_MISS=['Lattenschuss — {s} trifft das Aluminium!','Torhüter pariert brilliant gegen {s}!','{s} schießt Eins-gegen-Eins knapp vorbei!','Kopfball von {s} über das Tor!'];
  const OPP_MISS=['Großchance des Gegners — Keeper rettet in letzter Sekunde!','Schuss ans Lattenkreuz — Glück gehabt!','Gegner-Großchance knapp vergeben!','Kopfball über das Tor — nochmal Glück!'];
  const usedMins=new Set([...[...myG,...oppG].map(g=>g.min),0,45,90]);
  const myChances=[],oppChances=[];
  const nMy=rand(0,2),nOpp=rand(0,2);
  for(let i=0;i<nMy;i++){let m;let tries=0;do{m=rand(6,88);tries++;}while(usedMins.has(m)&&tries<20);usedMins.add(m);myChances.push({min:m,scorer:pickScorer(state.team)});}
  for(let i=0;i<nOpp;i++){let m;let tries=0;do{m=rand(6,88);tries++;}while(usedMins.has(m)&&tries<20);usedMins.add(m);oppChances.push({min:m});}
  myChances.sort((a,b)=>a.min-b.min);oppChances.sort((a,b)=>a.min-b.min);
  let minute=0,myScore=0,oppScore=0;
  const events=$('#matchEvents');
  const myScoreEl=$('#myScore'),oppScoreEl=$('#oppScore'),clockEl=$('#matchClock');
  const flash=$('#eventFlash');
  addEvent(events,0,'⚽',`Anpfiff! ${r.tacticNet>=5?'Deine Taktik scheint zu greifen.':r.tacticNet<=-5?'Der Gegner kontrolliert das Spiel.':'Ausgeglichener Beginn.'}`);
  setMatchZone('mid','my');
  let htShown=false;
  const flashIt=(cls,text)=>{flash.textContent=text;flash.className=`event-flash ${cls} show`;setTimeout(()=>flash.classList.remove('show'),1400)};
  const tick=()=>{
    minute=Math.min(total,minute+2);
    clockEl.textContent=`${minute}'`;
    if(minute===45&&!htShown){htShown=true;addEvent(events,45,'🟡','Halbzeit!');}
    // Zone update
    const zv=pickMatchZone(minute,myG,oppG,r.tacticNet);
    setMatchZone(zv.zone,zv.team);
    // Goals
    while(myG.length&&myG[0].min<=minute){
      myScore++;const sc=myG.shift().scorer;myScoreEl.textContent=String(myScore);
      playGoalSound();flashIt('goal',`⚽ ${sc}!`);
      setMatchZone('att','my');
      addEvent(events,minute,'⚽',`<b>TOR! ${sc}</b> (${myScore}:${oppScore})`);
    }
    while(oppG.length&&oppG[0].min<=minute){
      oppScore++;const sc=oppG.shift().scorer;oppScoreEl.textContent=String(oppScore);
      playGoalSound();flashIt('opp-goal',`😱 ${sc}`);
      setMatchZone('def','opp');
      addEvent(events,minute,'😱',`Gegentor — ${sc} (${myScore}:${oppScore})`);
    }
    // Großchancen
    while(myChances.length&&myChances[0].min<=minute){
      const ch=myChances.shift();
      const txt=MY_MISS[rand(0,MY_MISS.length-1)].replace('{s}',ch.scorer);
      addEvent(events,minute,'🎯',`<b>${txt}</b>`,'ev-chance');
    }
    while(oppChances.length&&oppChances[0].min<=minute){
      oppChances.shift();
      const txt=OPP_MISS[rand(0,OPP_MISS.length-1)];
      addEvent(events,minute,'⚠️',txt,'ev-chance');
    }
    if(myScore>oppScore){myScoreEl.classList.add('winning');oppScoreEl.classList.remove('winning');}
    else if(oppScore>myScore){oppScoreEl.classList.add('winning');myScoreEl.classList.remove('winning');}
    else{myScoreEl.classList.remove('winning');oppScoreEl.classList.remove('winning');}
    if(minute>=total){
      clearInterval(timer);
      addEvent(events,90,'🏁',`Abpfiff! Endstand ${myScore}:${oppScore}`);
      if(myScore===oppScore){
        setTimeout(()=>{
          flashIt('goal','ELFMETER!');
          addEvent(events,90,'⚽','Elfmeterschießen wird entschieden!');
          setTimeout(()=>{
            const pen=simulatePenalties();
            state.matchResult.penalties=pen;
            state.matchResult.won=pen.myPens>pen.oppPens;
            state.matchResult.draw=false;
            state.matchResult.penMyGoals=pen.myPens;
            state.matchResult.penOppGoals=pen.oppPens;
            pen.events.forEach(e=>{
              const icon=e.team==='home'?(e.scored?'✅':'❌'):(e.scored?'😱':'🛡️');
              addEvent(events,120,icon,`${e.team==='home'?'Wir':'Gegner'}: ${e.name} — ${e.scored?'Tor!':'Gehalten!'}`);
            });
            const penWon=pen.myPens>pen.oppPens;
            flashIt(penWon?'goal':'opp-goal',penWon?`${pen.myPens}:${pen.oppPens} 🏆`:`${pen.myPens}:${pen.oppPens} ❌`);
            setTimeout(finishMatch,1400);
          },1200);
        },900);
      }else{
        setTimeout(finishMatch,1100);
      }
    }
  };
  const timer=setInterval(tick,555);
}
function addEvent(c,m,i,html,rowClass=''){
  const row=el('div',{class:`event-row${rowClass?' '+rowClass:''}`},[
    el('div',{class:'event-time'},[`${m}'`]),
    el('div',{class:'event-icon'},[i]),
    (()=>{const d=el('div',{class:'event-text'});d.innerHTML=html;return d})()
  ]);
  c.appendChild(row);c.scrollTop=c.scrollHeight;
}
function finishMatch(){
  state.totalMatches++;
  state.matchResult.progressions=progressPlayers();
  if(state.matchResult.won){
    state.winsThisLeague++;
    // total wins = state.totalMatches won so far. Track cumulative wins:
    if(state.winsThisLeague>=WINS_PER_LEAGUE){
      addLeagueTrophy(state.league);
      if(state.league>=LEAGUES.length-1){
        // CL won!
        addTrophy();
        state.phase='victory';render();return;
      }
      state.league++;state.winsThisLeague=0;
      showToast('Aufstieg in '+LEAGUES[state.league].name+'!');
    }
    state.phase='result-win';
  } else {
    state.phase='result-lose';
  }
  render();
}
function addTrophy(){
  const ps=Object.values(state.team);
  const top=ps.sort((a,b)=>b.rating-a.rating).slice(0,3);
  state.trophies.push({date:new Date().toISOString().slice(0,10),matches:state.totalMatches,topPlayers:top.map(p=>({name:p.name,rating:p.rating,pos:p.pos}))});
  saveTrophies();
}

function buildTacticFeedback(r){
  const t=k=>state.tactics[k]??2;
  const o=k=>state.opponent.tactics[k]??2;
  const hints=[];// {score, ok, txt, tip?}

  // ── GEGEN HOCHPRESSING ────────────────────────────────────────────────
  if(o('pressingAusloesung')>=3&&o('pressingLinie')>=3){
    if(t('passStyle')>=3)
      hints.push({score:5,ok:true, txt:'Gegner presste hoch → lange Bälle haben das Pressing erfolgreich überspielt.'});
    else if(t('passStyle')<=1)
      hints.push({score:6,ok:false,txt:'Gegner presste hoch, du hast kurz aufgebaut — das war der teuerste Fehler.',tip:'→ Merke: Gegen Hochpressing lange Bälle oder hohes Tempo spielen.'});
    else
      hints.push({score:3,ok:false,txt:'Gegner presste hoch → vertikaleres Passspiel oder mehr Tempo hätte den Druck gebrochen.',tip:'→ Merke: Passspiel auf Lang stellen gegen aggressiven Pressingspieler.'});
    if(t('tempo')>=3&&t('passStyle')>=2)
      hints.push({score:2,ok:true, txt:'Hohes Tempo hat geholfen, trotz des gegnerischen Pressings Räume zu finden.'});
    if(t('nachBalleroberung')>=3)
      hints.push({score:3,ok:true, txt:'Schnelles Umschalten nach Ballgewinn war gegen das aggressive Pressing goldrichtig.'});
  }

  // ── GEGEN TIEFEN BLOCK ────────────────────────────────────────────────
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('breite')>=3&&t('kreativFreiheiten')>=3)
      hints.push({score:4,ok:true, txt:'Breites Spiel + kreative Freiheiten haben den tiefen Block des Gegners geknackt.'});
    else if(t('breite')<=1&&t('tempo')>=4)
      hints.push({score:4,ok:false,txt:'Gegen einen tiefen Block hilft Breite mehr als reine Schnelligkeit.',tip:'→ Merke: Breites Spiel + Kreativfreiheiten erzwingen Lücken im Block.'});
    else if(t('breite')<=1)
      hints.push({score:3,ok:false,txt:'Gegner stand tief — breiteres Aufbauspiel hätte den Block geöffnet.',tip:'→ Merke: Breite zwingt einen tiefen Block zur Entscheidung, wo er nachrückt.'});
    if(t('nachBalleroberung')>=3)
      hints.push({score:2,ok:false,txt:'Schnelles Kontern macht gegen einen tiefen Block wenig Sinn — ruhigeres Aufbauspiel wäre besser.'});
  }

  // ── GEGEN KURZES AUFBAUSPIEL ──────────────────────────────────────────
  if(o('passStyle')<=1&&o('tempo')<=1){
    if(t('pressingAusloesung')>=3&&t('pressingLinie')>=3)
      hints.push({score:5,ok:true, txt:'Hochpressing auf den kurzen Aufbau des Gegners war perfekt — so entstehen Fehler.'});
    else if(t('pressingAusloesung')<=1)
      hints.push({score:4,ok:false,txt:'Gegner baute kurz auf, du hast nicht gepresst — Hochpressing hätte Fehler erzwungen.',tip:'→ Merke: Kurzes Aufbauspiel = ideales Ziel für aggressives Pressing.'});
    else
      hints.push({score:2,ok:false,txt:'Gegen kurzes Aufbauspiel lohnt sich aggressiveres Pressing — Pressinglinie höher ziehen.'});
  }

  // ── GEGEN LANGES DIREKTSPIEL ──────────────────────────────────────────
  if(o('passStyle')>=3){
    if(t('defensivLinie')<=1)
      hints.push({score:3,ok:true, txt:'Tiefe Defensivlinie gegen das lange Spiel des Gegners war clever — kein Platz hinter der Abwehr.'});
    else if(t('defensivLinie')>=3)
      hints.push({score:4,ok:false,txt:'Gegner spielte lange Bälle, deine Linie stand hoch — das hat Raum hinter der Abwehr geöffnet.',tip:'→ Merke: Gegen direktes Spiel die Defensivlinie senken.'});
  }

  // ── GEGEN HOHE PRESSINGLINIE ──────────────────────────────────────────
  if(o('pressingLinie')>=3){
    if(t('tempo')>=3||t('nachBalleroberung')>=3)
      hints.push({score:4,ok:true, txt:'Schnelles Umschalten oder hohes Tempo hinter die hohe Linie des Gegners — genau die richtige Antwort.'});
    else if(t('tempo')<=1&&t('nachBalleroberung')<=1)
      hints.push({score:5,ok:false,txt:'Gegner stand mit hoher Linie — zu langsam gespielt, der Raum dahinter blieb ungenutzt.',tip:'→ Merke: Hohe Gegner-Linie = Platz dahinter. Tempo oder Konterbereitschaft erhöhen.'});
  }

  // ── GEGNERISCHES GEGENPRESSING ────────────────────────────────────────
  if(o('nachBallverlust')>=3){
    if(t('passStyle')>=3)
      hints.push({score:3,ok:true, txt:'Lange Bälle haben das Gegenpressing des Gegners gut umgangen.'});
    else if(t('kreativFreiheiten')<=1)
      hints.push({score:3,ok:false,txt:'Gegner presste sofort nach Ballverlust — mehr Kreativfreiheiten helfen, den ersten Druck zu überspielen.'});
  }

  // ── GEGNER LÄSST KONTER ZU (passiv nach Ballverlust) ─────────────────
  if(o('nachBallverlust')<=1){
    if(t('nachBalleroberung')>=3&&t('tempo')>=3)
      hints.push({score:4,ok:true, txt:'Schnelle Konter gegen einen passiven Gegner — perfekt ausgenutzt.'});
    else if(t('nachBalleroberung')<=1)
      hints.push({score:3,ok:false,txt:'Gegner ließ nach Ballverlust Räume offen — Konterstrategie hätte das bestraft.',tip:'→ Merke: Passiver Gegner nach Ballverlust = Konter-Chance. Nach Balleroberung erhöhen.'});
  }

  // ── FLANKENSPIEL ──────────────────────────────────────────────────────
  if(o('flanken')>=3&&t('gegnerFlanken')<=1)
    hints.push({score:4,ok:false,txt:'Gegner flankte viel, du hast es kaum verteidigt — die Flanken waren zu offen.',tip:'→ Merke: Gegen flankenstarke Teams die Flankengegenwehr hochsetzen.'});
  if(o('flanken')>=3&&t('gegnerFlanken')>=3)
    hints.push({score:3,ok:true, txt:'Gegnerisches Flankenspiel gut abgefangen durch hohe Flankengegenwehr.'});
  if(t('flanken')>=3&&o('gegnerFlanken')<=1)
    hints.push({score:3,ok:true, txt:'Eigenes Flankenspiel traf auf schwache Gegenwehr — die Flanken wurden nicht erwartet.'});
  if(t('flanken')>=3&&o('gegnerFlanken')>=3)
    hints.push({score:3,ok:false,txt:'Flanken waren der falsche Weg — Gegner hatte starke Flankengegenwehr.',tip:'→ Merke: Gegen hohe Flankengegenwehr zentrales Spiel oder Dribblings wählen.'});

  // ── MENTALITÄT ────────────────────────────────────────────────────────
  if(o('mentality')>=3&&t('mentality')<=1)
    hints.push({score:4,ok:false,txt:'Zu defensiv gegen offensiven Gegner — mehr Gegendruck hätte Räume zurückerobert.',tip:'→ Merke: Mut zahlt sich aus wenn der Gegner offensiv und riskant agiert.'});
  if(o('mentality')<=1&&t('mentality')>=3)
    hints.push({score:3,ok:true, txt:'Offensiver Ansatz gegen defensiven Gegner hat Druck erzeugt — richtige Wahl.'});
  if(o('mentality')===4&&t('nachBalleroberung')>=3)
    hints.push({score:4,ok:true, txt:'Sehr offensiver Gegner — Konterbereitschaft war gold wert, weil er Räume hinterließ.'});
  if(t('mentality')>=4&&!r.won)
    hints.push({score:4,ok:false,txt:'Zu offensiv gespielt und trotzdem verloren — Kompaktheit hätte mehr Stabilität gegeben.',tip:'→ Merke: Hohe Mentalität kostet defensive Struktur. Balance finden.'});

  // ── KOHÄRENZ ─────────────────────────────────────────────────────────
  if(Math.abs(t('mentality')-t('pressingAusloesung'))>=3)
    hints.push({score:3,ok:false,txt:'Mentalität und Pressing-Intensität passen nicht zusammen — entweder beides aggressiv oder beides defensiv.',tip:'→ Merke: Mentalität und Pressingauslösung sollten sich nicht widersprechen.'});
  if(Math.abs(t('passStyle')-t('tempo'))>=3)
    hints.push({score:2,ok:false,txt:'Passspiel und Tempo passen nicht zusammen — vertikales Spiel braucht auch hohes Tempo.'});

  // ── DRIBBLING vs DECKUNG ──────────────────────────────────────────────
  if(t('dribblings')>=3&&o('deckung')>=3)
    hints.push({score:2,ok:false,txt:'Dribblings gegen Manndeckung funktionieren schlecht — direktes Kurzpassspiel wäre besser.',tip:'→ Merke: Gegen Manndeckung Pässe statt Dribblings bevorzugen.'});
  if(t('dribblings')>=3&&o('deckung')<=1)
    hints.push({score:2,ok:true, txt:'Dribblings gegen Raumdeckung haben Lücken geöffnet — gut erkannt.'});

  // ── DEFENSIVE BREITE vs FLANKEN ───────────────────────────────────────
  if(o('flanken')>=3&&t('defensivBreite')<=1)
    hints.push({score:4,ok:false,txt:'Gegner flankte viel, deine Abwehr stand zu kompakt — breitere Verteidigung war nötig.',tip:'→ Merke: Gegen Flankenteams Verteidigungsbreite auf "Breit" oder "Flügel sichern" stellen.'});
  if(o('flanken')>=3&&t('defensivBreite')>=3)
    hints.push({score:3,ok:true, txt:'Breite Verteidigung hat das Flankenspiel des Gegners gut abgedeckt.'});
  if(t('breite')>=3&&o('defensivBreite')<=1)
    hints.push({score:3,ok:true, txt:'Eigenes Breitspiel gegen kompakte Abwehr hat Räume geöffnet — gut ausgenutzt.'});

  // ── LINIEN-LÜCKE (pressingLinie vs defensivLinie) ─────────────────────
  const linienGap=t('pressingLinie')-t('defensivLinie');
  if(linienGap>=3)
    hints.push({score:3,ok:false,txt:'Große Lücke zwischen Pressing- und Defensivlinie — das erzeugt gefährliche Räume im Mittelfeld.',tip:'→ Merke: Pressing- und Defensivlinie nah beieinanderhalten für ein kompaktes Team.'});
  else if(linienGap<=-3)
    hints.push({score:2,ok:false,txt:'Defensivlinie höher als Pressinglinie — ungewöhnliche Kombination, die Gegner ausnutzen können.'});

  // ── KADER vs TAKTIK ───────────────────────────────────────────────────
  if(r.ratingDiff<=-5&&r.won)
    hints.push({score:5,ok:true, txt:'Klarer Kader-Nachteil taktisch kompensiert — die Einstellungen haben den Unterschied gemacht.'});
  if(r.ratingDiff>=5&&!r.won)
    hints.push({score:5,ok:false,txt:'Kader-Vorteil nicht genutzt — taktische Fehler haben den Sieg gekostet.',tip:'→ Merke: Mit stärkerem Kader reicht oft eine solide, risikoarme Taktik.'});

  // ── Gesamturteil ──────────────────────────────────────────────────────
  let summaryTxt, summaryOk;
  if(r.tacticNet>=6){summaryTxt='Taktik perfekt auf den Gegner zugeschnitten — klarer taktischer Vorteil.';summaryOk=true;}
  else if(r.tacticNet>=3){summaryTxt='Taktisch leicht überlegen — die Grundausrichtung stimmte.';summaryOk=true;}
  else if(r.tacticNet<=-6){summaryTxt='Taktik hat klar Punkte gekostet — Gegner hat deinen Stil ausgenutzt.';summaryOk=false;}
  else if(r.tacticNet<=-3){summaryTxt='Taktisch unterlegen — die Einstellungen haben nicht gepasst.';summaryOk=false;}
  else{summaryTxt='Taktisch ausgeglichenes Spiel — kein klarer Vorteil auf einer Seite.';summaryOk=null;}

  // ── Hints aufteilen ───────────────────────────────────────────────────
  const posHints=hints.filter(h=>h.ok===true).sort((a,b)=>b.score-a.score);
  const negHints=hints.filter(h=>h.ok===false).sort((a,b)=>b.score-a.score);
  const neutHints=hints.filter(h=>h.ok===null).sort((a,b)=>b.score-a.score);

  // Hauptliste aufbauen: je nach Ergebnis fokussiert, aber immer auch Gegenseite
  let mainHints, extraNeg, extraPos;
  if(r.tacticNet<=-3){
    // Schlecht: negative dominieren, positive weglassen
    mainHints=negHints;
    extraNeg=[];extraPos=[];
  } else if(r.tacticNet>=3){
    // Gut: positive dominieren, aber immer 1-2 negative anhängen (falls vorhanden)
    mainHints=posHints;
    extraNeg=negHints.slice(0,2); // bis zu 2 Negativpunkte
    extraPos=[];
  } else {
    // Ausgeglichen: alle anzeigen
    mainHints=[...posHints,...negHints,...neutHints].sort((a,b)=>b.score-a.score);
    extraNeg=[];extraPos=[];
  }

  // Gamechanger = höchster Hinweis aus der Hauptliste
  const gamechanger=mainHints.length>0?mainHints[0]:null;
  // Detail = bis zu 3 weitere aus Hauptliste, dann extra Negative angehängt
  const detail=[...mainHints.slice(1,4),...extraNeg];

  // ── Perfekt-Flag: kein einziger Negativpunkt generiert ────────────────
  const truly_perfect = r.tacticNet>=3 && negHints.length===0;

  // ── DOM aufbauen ──────────────────────────────────────────────────────
  const rows=[];

  // Summary
  rows.push(el('div',{class:`tf-row ${summaryOk===true?'tf-ok':summaryOk===false?'tf-warn':'tf-neutral'}`},[
    el('span',{class:'tf-icon'},[summaryOk===true?'✅':summaryOk===false?'💡':'—']),
    el('span',{class:'tf-text'},[summaryTxt])
  ]));

  // Gamechanger block
  if(gamechanger){
    const gcKids=[
      el('div',{class:'tf-gc-label'},[el('span',{},['⚡']),el('span',{},['Gamechanger'])]),
      el('div',{class:`tf-gc-text ${gamechanger.ok===true?'pos':'neg'}`},[gamechanger.txt])
    ];
    if(gamechanger.tip) gcKids.push(el('div',{class:'tf-tip'},[gamechanger.tip]));
    rows.push(el('div',{class:'tf-gamechanger'},gcKids));
  }

  // Detail hints (mit optionalem Tipp)
  detail.forEach(h=>{
    const textKids=[el('span',{class:'tf-text'},[h.txt])];
    if(h.tip) textKids.push(el('div',{class:'tf-tip'},[h.tip]));
    rows.push(el('div',{class:`tf-row ${h.ok===true?'tf-ok':h.ok===false?'tf-warn':'tf-neutral'}`},[
      el('span',{class:'tf-icon'},[h.ok===true?'✅':h.ok===false?'💡':'—']),
      el('div',{class:'tf-text-wrap'},textKids)
    ]));
  });

  // Intensitäts-Ermüdung
  if(r.fatigue>0.08){
    const fp=Math.round(r.fatigue*100);
    const fatigueTxt=r.fatigue>0.18
      ?`Extremes Pressing hat dich ${fp}% Effizienz gekostet — die Intensität war zu hoch für 90 Minuten.`
      :r.fatigue>0.12
      ?`Hohe Intensität hat die Effizienz um ${fp}% gesenkt — eine stärkere Bank hätte das abgefedert.`
      :`Leichte Ermüdung durch Intensität spürbar (−${fp}%) — Bank-Qualität kann das reduzieren.`;
    rows.push(el('div',{class:'tf-row tf-warn'},[
      el('span',{class:'tf-icon'},['🔋']),
      el('span',{class:'tf-text'},[fatigueTxt])
    ]));
  }

  // Perfekt-Meldung oder Fallback
  if(!gamechanger&&!detail.length){
    if(truly_perfect)
      rows.push(el('div',{class:'tf-row tf-ok'},[
        el('span',{class:'tf-icon'},['🌟']),
        el('span',{class:'tf-text'},['Taktisch makellos — keine Schwächen erkennbar. Perfekte Einstellungen für diesen Gegner.'])
      ]));
    else
      rows.push(el('div',{class:'tf-row tf-neutral'},[
        el('span',{class:'tf-icon'},['—']),
        el('span',{class:'tf-text'},['Keine auffälligen taktischen Stärken oder Schwächen in diesem Spiel.'])
      ]));
  } else if(truly_perfect){
    // Hints vorhanden, aber alle positiv — Perfekt-Zusatz anhängen
    rows.push(el('div',{class:'tf-row tf-ok'},[
      el('span',{class:'tf-icon'},['🌟']),
      el('span',{class:'tf-text'},['Keine taktischen Schwächen — alles hat gepasst.'])
    ]));
  }

  return el('div',{class:'tactic-feedback'},[
    el('div',{class:'tf-title'},['📋 Taktik-Analyse']),
    ...rows
  ]);
}
function buildProgressions(progs){
  return el('div',{class:'result-progressions'},[
    el('h4',{},[`Entwicklungen (${progs.length})`]),
    ...progs.map(p=>el('div',{class:'prog-row'},[el('span',{},[`${p.name} (${p.age} J.)`]),el('span',{},[`${p.from} → `,el('b',{class:p.dir>0?'up':'down'},[String(p.to)]),p.dir>0?' ▲':' ▼'])]))
  ]);
}

/* ----- REPLACE DRAFT ----- */

function rollPostMatchRarity(){
  const l=state.league;
  // Per league: legendary +1%, epic +5%, uncommon decreases
  const legW=1+l,epicW=5+l*5,rareW=25,uncW=Math.max(69-l*6,20);
  const total=uncW+rareW+epicW+legW;
  const r=Math.random()*total;
  let a=0;
  if((a+=uncW)>r)return'uncommon';
  if((a+=rareW)>r)return'rare';
  if((a+=epicW)>r)return'epic';
  return'legendary';
}
function generateReplaceCards(){
  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>p.name),
    ...state.bench.filter(b=>b.player).map(b=>b.player.name)
  ]);
  const shown=new Set();state.draftCards=[];
  let attempts=0;
  while(state.draftCards.length<5&&attempts<80){
    attempts++;
    const p=generatePlayerForPos(pickRand(MAIN_POSITIONS),rollPostMatchRarity());
    if(p&&!taken.has(p.name)&&!shown.has(p.name)){shown.add(p.name);state.draftCards.push(p)}
  }
  while(state.draftCards.length<5){
    const p=generatePlayerForPos(pickRand(MAIN_POSITIONS));
    if(p)state.draftCards.push(p);else break;
  }
}
function renderReplaceDraft(main){
  const cardsDiv=el('div',{class:'draft-cards'});
  main.appendChild(el('div',{class:'phase replace-phase'},[
    el('div',{class:'draft-title'},[el('h2',{},['Belohnung: Neue Karte wählen']),el('p',{},['Wähle eine Karte — Chancen steigen mit der Liga! Liga '+LEAGUES[state.league].name])]),
    buildDraftLegend(),
    cardsDiv,
    el('button',{class:'btn',style:{marginTop:'10px'},onclick:()=>{state.draftCards=[];proceedToNextLineup()}},['↷ Überspringen']),
  ]));
  let cumDelay=200;
  state.draftCards.forEach(p=>{
    const card=buildCard(p,()=>{state.replaceCard=p;state.phase='replace-pick';render()});
    card.classList.add('card-hidden');
    cardsDiv.appendChild(card);
    const gap=p.rarity==='legendary'?720:p.rarity==='epic'?480:p.rarity==='rare'?300:230;
    setTimeout(()=>{
      playCardRevealSound(p.rarity);
      card.classList.remove('card-hidden');
      card.classList.add(`card-reveal-${p.rarity}`);
      if(p.rarity==='epic'){
        setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
      } else if(p.rarity==='legendary'){
        setTimeout(()=>spawnSparkles(card,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
        setTimeout(()=>spawnSparkles(card,14,['#fde047','#fff','#fbbf24']),600);
      }
    },cumDelay);
    cumDelay+=gap;
  });
}
function renderReplacePick(main){
  const card=state.replaceCard;const slots=FORMATIONS[state.formation];
  main.appendChild(el('div',{class:'phase replace-phase'},[
    el('div',{class:'draft-title'},[el('h2',{},['Spieler ersetzen']),el('p',{},['Welcher Spieler soll ersetzt werden?'])]),
    el('div',{style:{maxWidth:'220px',margin:'0 auto'}},[buildCard(card,()=>{})]),
    el('div',{style:{fontSize:'13px',color:'var(--text-dim)',textAlign:'center'}},['↓ Spieler im Team wählen']),
    el('div',{class:'replace-team-grid'},[
      ...slots.map(slot=>{const p=state.team[slot.id];if(!p)return null;return el('div',{class:`team-slot-card ${p.rarity}`,onclick:()=>doReplace('slot:'+slot.id)},[el('div',{class:'pos-label'},[slot.pos+' · Lineup']),el('div',{class:'player-line'},[el('div',{class:'player-name'},[p.name]),el('div',{class:'player-rating'},[String(p.rating)])]),el('div',{class:'player-meta'},[`${p.pos} · ${p.age} J. · ${p.nat}`])])}).filter(Boolean),
      ...state.bench.map((b,i)=>{if(!b.player)return null;const p=b.player;return el('div',{class:`team-slot-card ${p.rarity}`,onclick:()=>doReplace('bench:'+i)},[el('div',{class:'pos-label'},[b.pos+' · Bank']),el('div',{class:'player-line'},[el('div',{class:'player-name'},[p.name]),el('div',{class:'player-rating'},[String(p.rating)])]),el('div',{class:'player-meta'},[`${p.pos} · ${p.age} J. · ${p.nat}`])])}).filter(Boolean)
    ]),
    el('button',{class:'btn',onclick:()=>{state.phase='replace-draft';render()}},['← Zurück'])
  ]));
}
function doReplace(target){
  if(target.startsWith('slot:'))state.team[target.slice(5)]=state.replaceCard;
  else state.bench[Number(target.slice(6))].player=state.replaceCard;
  state.replaceCard=null;state.draftCards=[];proceedToNextLineup();
}
function proceedToNextLineup(){state.phase='lineup';render()}

/* ----- VICTORY / TROPHIES ----- */
function renderVictory(main){
  main.appendChild(el('div',{class:'phase result-phase'},[
    el('div',{class:'result-banner victory'},['🏆 SIEG! 🏆']),
    el('div',{style:{fontSize:'17px',color:'var(--text-dim)',maxWidth:'520px',textAlign:'center'}},['Champions League gewonnen — dein Team wurde in der Trophäenhalle verewigt.']),
    el('div',{class:'result-details'},[`Gesamtspiele: ${state.totalMatches} · Ø-Team-Bewertung: ${teamAvg(state.team,state.formation).toFixed(1)}`]),
    el('div',{style:{display:'flex',gap:'10px'}},[
      el('button',{class:'btn primary large',onclick:startNewGame},['Neuer Lauf →']),
      el('button',{class:'btn large',onclick:()=>{state.phase='trophies';render()}},['🏆 Trophäen anzeigen']),
    ])
  ]));
}
function renderTrophies(main){
  const TROPHY_ICONS=['⚽','🥈','🏅','🎖️','🏆'];
  const total=Object.values(state.leagueTrophies).reduce((a,b)=>a+b,0);
  const cards=LEAGUES.map((lg,i)=>{
    const count=state.leagueTrophies[lg.key]||0;
    const earned=count>0;
    return el('div',{class:`trophy-card ${earned?lg.key:'locked'}`},[
      el('span',{class:'trophy-icon'},[TROPHY_ICONS[i]]),
      el('div',{class:'trophy-card-name'},[lg.name]),
      earned
        ? el('div',{class:'trophy-count'},[`×${count}`])
        : el('div',{class:'trophy-count'},['—']),
      earned
        ? el('div',{class:'trophy-count-sub'},['gewonnen'])
        : el('div',{class:'trophy-count-sub'},['gesperrt']),
    ]);
  });
  main.appendChild(el('div',{class:'phase trophy-phase'},[
    el('h2',{style:{fontSize:'22px',fontWeight:'900',letterSpacing:'1.5px'}},['🏆 Trophäenhalle']),
    el('div',{class:'hint'},[total===0?'Noch keine Trophäen — gewinne deine erste Liga!':`${total} Pokal${total!==1?'e':''} gesammelt`]),
    el('div',{class:'trophy-shelf'},cards),
    el('button',{class:'btn primary',style:{marginTop:'8px'},onclick:()=>{state.phase=state.totalMatches===0?'intro':'lineup';render()}},['← Zurück'])
  ]));
}

/* ----- GLOBAL ----- */
$('#btnRestart').addEventListener('click',()=>{if(state.phase==='intro')return;if(confirm('Aktuellen Lauf wirklich abbrechen?'))startNewGame()});
$('#btnNextMatch').addEventListener('click',()=>{if(state.phase==='tactics')startMatch()});
$('#btnMusic').addEventListener('click',toggleMusic);
$('#btnTrophy').addEventListener('click',()=>{state.phase='trophies';render()});
$('#roleModal').addEventListener('click',e=>{if(e.target.id==='roleModal')closeRoleModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if($('#roleModal').classList.contains('show'))closeRoleModal()}});

state.phase='intro';render();
</script>
</body>
</html>
