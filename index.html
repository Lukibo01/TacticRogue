function buildTacticData(r){
  const t=k=>state.tactics[k]??2;
  const o=k=>state.opponent.tactics[k]??2;
  const hints=[];// {score, ok, txt, tip?}

  // ── GEGEN HOCHPRESSING ────────────────────────────────────────────────
  if(o('pressingAusloesung')>=3&&o('pressingLinie')>=3){
    if(t('passStyle')>=3)
      hints.push({score:5,ok:true, txt:'Gegner presste hoch → lange Bälle haben das Pressing erfolgreich überspielt.'});
    else if(t('passStyle')<=1)
      hints.push({score:6,ok:false,txt:'Gegner presste hoch, du hast kurz aufgebaut — das war der teuerste Fehler.',tip:'→ Merke: Gegen Hochpressing lange Bälle oder hohes Tempo spielen.'});
    else
      hints.push({score:3,ok:false,txt:'Gegner presste hoch → vertikaleres Passspiel oder mehr Tempo hätte den Druck gebrochen.',tip:'→ Merke: Passspiel auf Lang stellen gegen aggressiven Pressingspieler.'});
    if(t('tempo')>=3&&t('passStyle')>=2)
      hints.push({score:2,ok:true, txt:'Hohes Tempo hat geholfen, trotz des gegnerischen Pressings Räume zu finden.'});
    if(t('nachBalleroberung')>=3)
      hints.push({score:3,ok:true, txt:'Schnelles Umschalten nach Ballgewinn war gegen das aggressive Pressing goldrichtig.'});
  }

  // ── GEGEN TIEFEN BLOCK ────────────────────────────────────────────────
  if(o('pressingLinie')<=1&&o('pressingAusloesung')<=1){
    if(t('breite')>=3&&t('kreativFreiheiten')>=3)
      hints.push({score:4,ok:true, txt:'Breites Spiel + kreative Freiheiten haben den tiefen Block des Gegners geknackt.'});
    else if(t('breite')<=1&&t('tempo')>=4)
      hints.push({score:4,ok:false,txt:'Gegen einen tiefen Block hilft Breite mehr als reine Schnelligkeit.',tip:'→ Merke: Breites Spiel + Kreativfreiheiten erzwingen Lücken im Block.'});
    else if(t('breite')<=1)
      hints.push({score:3,ok:false,txt:'Gegner stand tief — breiteres Aufbauspiel hätte den Block geöffnet.',tip:'→ Merke: Breite zwingt einen tiefen Block zur Entscheidung, wo er nachrückt.'});
    if(t('nachBalleroberung')>=3)
      hints.push({score:2,ok:false,txt:'Schnelles Kontern macht gegen einen tiefen Block wenig Sinn — ruhigeres Aufbauspiel wäre besser.'});
  }

  // ── GEGEN KURZES AUFBAUSPIEL ──────────────────────────────────────────
  if(o('passStyle')<=1&&o('tempo')<=1){
    if(t('pressingAusloesung')>=3&&t('pressingLinie')>=3)
      hints.push({score:5,ok:true, txt:'Hochpressing auf den kurzen Aufbau des Gegners war perfekt — so entstehen Fehler.'});
    else if(t('pressingAusloesung')<=1)
      hints.push({score:4,ok:false,txt:'Gegner baute kurz auf, du hast nicht gepresst — Hochpressing hätte Fehler erzwungen.',tip:'→ Merke: Kurzes Aufbauspiel = ideales Ziel für aggressives Pressing.'});
    else
      hints.push({score:2,ok:false,txt:'Gegen kurzes Aufbauspiel lohnt sich aggressiveres Pressing — Pressinglinie höher ziehen.'});
  }

  // ── GEGEN LANGES DIREKTSPIEL ──────────────────────────────────────────
  if(o('passStyle')>=3){
    if(t('defensivLinie')<=1)
      hints.push({score:3,ok:true, txt:'Tiefe Defensivlinie gegen das lange Spiel des Gegners war clever — kein Platz hinter der Abwehr.'});
    else if(t('defensivLinie')>=3)
      hints.push({score:4,ok:false,txt:'Gegner spielte lange Bälle, deine Linie stand hoch — das hat Raum hinter der Abwehr geöffnet.',tip:'→ Merke: Gegen direktes Spiel die Defensivlinie senken.'});
  }

  // ── GEGEN HOHE PRESSINGLINIE (ohne volles Hochpressing — sonst Dopplung) ───
  if(o('pressingLinie')>=3&&o('pressingAusloesung')<3){
    if(t('tempo')>=3||t('nachBalleroberung')>=3)
      hints.push({score:4,ok:true, txt:'Schnelles Umschalten oder hohes Tempo hinter die hohe Linie des Gegners — genau die richtige Antwort.'});
    else if(t('tempo')<=1&&t('nachBalleroberung')<=1)
      hints.push({score:5,ok:false,txt:'Gegner stand mit hoher Linie — zu langsam gespielt, der Raum dahinter blieb ungenutzt.',tip:'→ Merke: Hohe Gegner-Linie = Platz dahinter. Tempo oder Konterbereitschaft erhöhen.'});
  }

  // ── GEGNERISCHES GEGENPRESSING ────────────────────────────────────────
  if(o('nachBallverlust')>=3){
    if(t('passStyle')>=3)
      hints.push({score:3,ok:true, txt:'Lange Bälle haben das Gegenpressing des Gegners gut umgangen.'});
    else if(t('kreativFreiheiten')<=1)
      hints.push({score:3,ok:false,txt:'Gegner presste sofort nach Ballverlust — mehr Kreativfreiheiten helfen, den ersten Druck zu überspielen.'});
  }

  // ── GEGNER LÄSST KONTER ZU (passiv nach Ballverlust) ─────────────────
  if(o('nachBallverlust')<=1){
    if(t('nachBalleroberung')>=3&&t('tempo')>=3)
      hints.push({score:4,ok:true, txt:'Schnelle Konter gegen einen passiven Gegner — perfekt ausgenutzt.'});
    else if(t('nachBalleroberung')<=1)
      hints.push({score:3,ok:false,txt:'Gegner ließ nach Ballverlust Räume offen — Konterstrategie hätte das bestraft.',tip:'→ Merke: Passiver Gegner nach Ballverlust = Konter-Chance. Nach Balleroberung erhöhen.'});
  }

  // ── FLANKENSPIEL ──────────────────────────────────────────────────────
  if(o('flanken')>=3&&t('gegnerFlanken')<=1)
    hints.push({score:4,ok:false,txt:'Gegner flankte viel, du hast es kaum verteidigt — die Flanken waren zu offen.',tip:'→ Merke: Gegen flankenstarke Teams die Flankengegenwehr hochsetzen.'});
  if(o('flanken')>=3&&t('gegnerFlanken')>=3)
    hints.push({score:3,ok:true, txt:'Gegnerisches Flankenspiel gut abgefangen durch hohe Flankengegenwehr.'});
  if(t('flanken')>=3&&o('gegnerFlanken')<=1)
    hints.push({score:3,ok:true, txt:'Eigenes Flankenspiel traf auf schwache Gegenwehr — die Flanken wurden nicht erwartet.'});
  if(t('flanken')>=3&&o('gegnerFlanken')>=3)
    hints.push({score:3,ok:false,txt:'Flanken waren der falsche Weg — Gegner hatte starke Flankengegenwehr.',tip:'→ Merke: Gegen hohe Flankengegenwehr zentrales Spiel oder Dribblings wählen.'});

  // ── MENTALITÄT ────────────────────────────────────────────────────────
  if(o('mentality')>=3&&t('mentality')<=1)
    hints.push({score:4,ok:false,txt:'Zu defensiv gegen offensiven Gegner — mehr Gegendruck hätte Räume zurückerobert.',tip:'→ Merke: Mut zahlt sich aus wenn der Gegner offensiv und riskant agiert.'});
  if(o('mentality')<=1&&t('mentality')>=3)
    hints.push({score:3,ok:true, txt:'Offensiver Ansatz gegen defensiven Gegner hat Druck erzeugt — richtige Wahl.'});
  if(o('mentality')===4&&t('nachBalleroberung')>=3)
    hints.push({score:4,ok:true, txt:'Sehr offensiver Gegner — Konterbereitschaft war gold wert, weil er Räume hinterließ.'});
  if(t('mentality')>=4&&!r.won)
    hints.push({score:4,ok:false,txt:'Zu offensiv gespielt und trotzdem verloren — Kompaktheit hätte mehr Stabilität gegeben.',tip:'→ Merke: Hohe Mentalität kostet defensive Struktur. Balance finden.'});

  // ── KOHÄRENZ ─────────────────────────────────────────────────────────
  if(Math.abs(t('mentality')-t('pressingAusloesung'))>=3)
    hints.push({score:3,ok:false,txt:'Mentalität und Pressing-Intensität passen nicht zusammen — entweder beides aggressiv oder beides defensiv.',tip:'→ Merke: Mentalität und Pressingauslösung sollten sich nicht widersprechen.'});
  if(Math.abs(t('passStyle')-t('tempo'))>=3)
    hints.push({score:2,ok:false,txt:'Passspiel und Tempo passen nicht zusammen — vertikales Spiel braucht auch hohes Tempo.'});

  // ── DRIBBLING vs DECKUNG ──────────────────────────────────────────────
  if(t('dribblings')>=3&&o('deckung')>=3)
    hints.push({score:2,ok:false,txt:'Dribblings gegen Manndeckung funktionieren schlecht — direktes Kurzpassspiel wäre besser.',tip:'→ Merke: Gegen Manndeckung Pässe statt Dribblings bevorzugen.'});
  if(t('dribblings')>=3&&o('deckung')<=1)
    hints.push({score:2,ok:true, txt:'Dribblings gegen Raumdeckung haben Lücken geöffnet — gut erkannt.'});

  // ── DEFENSIVE BREITE vs FLANKEN ───────────────────────────────────────
  if(o('flanken')>=3&&t('defensivBreite')<=1)
    hints.push({score:4,ok:false,txt:'Gegner flankte viel, deine Abwehr stand zu kompakt — breitere Verteidigung war nötig.',tip:'→ Merke: Gegen Flankenteams Verteidigungsbreite auf "Breit" oder "Flügel sichern" stellen.'});
  if(o('flanken')>=3&&t('defensivBreite')>=3)
    hints.push({score:3,ok:true, txt:'Breite Verteidigung hat das Flankenspiel des Gegners gut abgedeckt.'});
  if(t('breite')>=3&&o('defensivBreite')<=1)
    hints.push({score:3,ok:true, txt:'Eigenes Breitspiel gegen kompakte Abwehr hat Räume geöffnet — gut ausgenutzt.'});

  // ── LINIEN-LÜCKE (pressingLinie vs defensivLinie) ─────────────────────
  const linienGap=t('pressingLinie')-t('defensivLinie');
  if(linienGap>=3)
    hints.push({score:3,ok:false,txt:'Große Lücke zwischen Pressing- und Defensivlinie — das erzeugt gefährliche Räume im Mittelfeld.',tip:'→ Merke: Pressing- und Defensivlinie nah beieinanderhalten für ein kompaktes Team.'});
  else if(linienGap<=-3)
    hints.push({score:2,ok:false,txt:'Defensivlinie höher als Pressinglinie — ungewöhnliche Kombination, die Gegner ausnutzen können.'});

  // ── EIGENE HOHE LINIE vs GEGNERISCHES KONTERN ─────────────────────────
  if(t('pressingLinie')>=3&&o('nachBalleroberung')>=3)
    hints.push({score:3,ok:false,txt:'Deine hohe Pressinglinie war anfällig — Gegner hat schnell umgeschaltet und den Raum dahinter genutzt.',tip:'→ Merke: Hohe Linie + gegnerischer Konter = riskante Kombination. Pressinglinie senken oder Konterabsicherung erhöhen.'});

  // ── AUFBAUSTRATEGIE vs GEGENPRESSING ──────────────────────────────────
  if(t('aufbauStrategie')<=1&&o('nachBallverlust')>=3)
    hints.push({score:2,ok:false,txt:'Zentrumsfokussierter Aufbau gegen aggressives Gegenpressing — Ballverluste waren vorprogrammiert.',tip:'→ Merke: Gegen Gegenpressing Flügel-Aufbau oder lange Bälle bevorzugen.'});

  // ── KURZE ABST͟Ö͟ẞ͟E vs HOCHPRESSING ────────────────────────────────────
  if(o('pressingAusloesung')>=3&&o('pressingLinie')>=3&&t('abstöße')<=1)
    hints.push({score:2,ok:false,txt:'Kurze Abstöße gegen Hochpressing haben dem Gegner einfache Ballgewinne geschenkt.',tip:'→ Merke: Gegen Hochpressing lange Abstöße spielen.'});

  // ── KURZE PASS-AUFNAHME vs DIREKTSPIEL ────────────────────────────────
  if(t('passStyle')>=3&&t('passAufnahme')<=1)
    hints.push({score:2,ok:false,txt:'Lange Bälle, aber Spieler suchen den Ball in den Fuß — das passt nicht zusammen.',tip:'→ Merke: Direktes Spiel braucht tiefe Läufe statt Ballaufnahme in den Fuß.'});

  // ── KADER vs TAKTIK ───────────────────────────────────────────────────
  if(r.ratingDiff<=-5&&r.won)
    hints.push({score:5,ok:true, txt:'Klarer Kader-Nachteil taktisch kompensiert — die Einstellungen haben den Unterschied gemacht.'});
  if(r.ratingDiff>=5&&!r.won)
    hints.push({score:5,ok:false,txt:'Kader-Vorteil nicht genutzt — taktische Fehler haben den Sieg gekostet.',tip:'→ Merke: Mit stärkerem Kader reicht oft eine solide, risikoarme Taktik.'});

  // ── Split into pos/neg ────────────────────────────────────────────────
  const posHints=hints.filter(h=>h.ok===true).sort((a,b)=>b.score-a.score);
  const negHints=hints.filter(h=>h.ok===false).sort((a,b)=>b.score-a.score);

  // Gamechanger = highest-ranked hint overall
  const allRanked=[...posHints,...negHints].sort((a,b)=>b.score-a.score);
  const gamechanger=allRanked.length>0?allRanked[0]:null;

  // Fatigue hint
  let fatigueHint=null;
  if(r.fatigue>0.08){
    const fp=Math.round(r.fatigue*100);
    const txt=r.fatigue>0.18
      ?`Extremes Pressing hat ${fp}% Effizienz gekostet — die Intensität war zu hoch für 90 Minuten.`
      :r.fatigue>0.12
      ?`Hohe Intensität hat die Effizienz um ${fp}% gesenkt — eine stärkere Bank hätte das abgefedert.`
      :`Leichte Ermüdung durch Intensität spürbar (−${fp}%) — Bank-Qualität kann das reduzieren.`;
    fatigueHint={ok:false,score:3,txt};
  }

  return {gamechanger,posHints,negHints,fatigueHint};
}

/* ----- REPLACE DRAFT ----- */

function generateReplaceCards(){
  if(state.collectionMode){
    // Collection mode: pick cards weighted by current league rarity table
    const _ebdCol=state.eventBuff||{};
    const useBoostCol=!!_ebdCol.draftRarityBoost||hasPerk('glueckspilz');
    const pool=state.collectionMode?(()=>{
      const taken=new Set([...Object.values(state.team).filter(Boolean).map(p=>p.name),...state.bench.filter(b=>b.player).map(b=>b.player.name)]);
      const seen=new Set();
      return state.collection.filter(p=>{if(taken.has(p.name)||seen.has(p.name))return false;seen.add(p.name);return true;});
    })():[];
    // Roll rarity first (same as normal mode), then pick a card of that rarity — 1:1 identical.
    const _rlTblCol=(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE)[Math.min(state.league,(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE).length-1)];
    const byRarCol={};
    pool.forEach(p=>{(byRarCol[p.rarity]=byRarCol[p.rarity]||[]).push(p);});
    const picked=new Set();const result=[];
    const targetCount=5+(_ebdCol.extraCards||0)+(hasPerk('talentspaeher')?1:0)+(state.permanentExtraCards||0);
    for(let i=0;i<targetCount;i++){
      const avail=Object.keys(byRarCol).filter(r=>byRarCol[r].some(p=>!picked.has(p.name)));
      if(!avail.length)break;
      // Compute weights; apply ×1.5 boost to epic/legendary/mythic if boost active
      const totalW=avail.reduce((s,r)=>{
        let w=((_rlTblCol[r]||{}).weight)||0;
        if(useBoostCol&&(r==='epic'||r==='legendary'||r==='mythic'))w*=1.5;
        return s+w;
      },0);
      if(totalW===0)break;
      let rv=Math.random()*totalW;let chosenRar=avail[avail.length-1];
      for(const r of avail){
        let w=((_rlTblCol[r]||{}).weight)||0;
        if(useBoostCol&&(r==='epic'||r==='legendary'||r==='mythic'))w*=1.5;
        rv-=w;if(rv<=0){chosenRar=r;break;}
      }
      const bucket=byRarCol[chosenRar].filter(p=>!picked.has(p.name));
      const chosen=bucket[Math.floor(Math.random()*bucket.length)];
      picked.add(chosen.name);result.push(chosen);
    }
    state.draftCards=result;
    // Apply guaranteed legendary (Goldener Griff perk)
    if(state.perkState.goldenerGriffActive){
      const ggPool=pool.filter(p=>p.rarity==='legendary'&&!picked.has(p.name));
      if(ggPool.length){const gg=ggPool[Math.floor(Math.random()*ggPool.length)];state.draftCards.unshift(gg);}
      state.perkState.goldenerGriffActive=false;
    }
    // Apply guaranteed Rare+ (transfer event)
    if(_ebdCol.draftGuaranteedRare){
      const rarPool=pool.filter(p=>['rare','epic','legendary'].includes(p.rarity)&&!state.draftCards.includes(p));
      if(rarPool.length){const gr=rarPool[Math.floor(Math.random()*rarPool.length)];state.draftCards.unshift(gr);}
    }
    state.eventBuff=null;
    state.perkState.tauschUsed=0;
    return;
  }
  const taken=new Set([
    ...Object.values(state.team).filter(Boolean).map(p=>p.name),
    ...state.bench.filter(b=>b.player).map(b=>b.player.name)
  ]);
  const shown=new Set();state.draftCards=[];
  const _ebd=state.eventBuff||{};
  const targetCount=5+(_ebd.extraCards||0)+(hasPerk('talentspaeher')?1:0)+(state.permanentExtraCards||0);
  const useBoost=!!_ebd.draftRarityBoost||hasPerk('glueckspilz');
  const glückspilzOnly=hasPerk('glueckspilz')&&!_ebd.draftRarityBoost;
  let attempts=0;
  while(state.draftCards.length<targetCount&&attempts<120){
    attempts++;
    const rarity=useBoost?(glückspilzOnly?rollRarityGlueckspilz():rollRarityBoosted()):rollRarity();
    const p=generatePlayerForPos(pickRand(MAIN_POSITIONS),rarity);
    if(p&&!taken.has(p.name)&&!shown.has(p.name)){shown.add(p.name);state.draftCards.push(p)}
  }
  while(state.draftCards.length<targetCount){
    const p=generatePlayerForPos(pickRand(MAIN_POSITIONS));
    if(p)state.draftCards.push(p);else break;
  }
  // Goldener Griff perk: guaranteed legendary in next draft (one-time)
  if(state.perkState.goldenerGriffActive){
    const gg=generatePlayerForPos(pickRand(MAIN_POSITIONS),'legendary');
    if(gg)state.draftCards.unshift(gg);
    state.perkState.goldenerGriffActive=false;
  }
  // Guaranteed Rare+ card (transfer event)
  if(_ebd.draftGuaranteedRare){
    const rarities=['rare','epic','legendary'];
    const gr=generatePlayerForPos(pickRand(MAIN_POSITIONS),rarities[Math.floor(Math.random()*rarities.length)]);
    if(gr)state.draftCards.unshift(gr);
  }
  // Consume eventBuff draft fields — cleared here so they don't carry over to next draft
  state.eventBuff=null;
  // Reset Tauschbörse swap uses
  state.perkState.tauschUsed=0;
}
function renderReplaceDraft(main){
  const cardsDiv=el('div',{class:'draft-cards'});
  const tbl=(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE)[Math.min(state.league,(state.impossibleMode?RARITIES_BY_LEAGUE_IMPOSSIBLE:RARITIES_BY_LEAGUE).length-1)];
  const lgClass=state.impossibleMode?'imp':`lg${state.league}`;
  const isBoosted=!!(state.eventBuff&&state.eventBuff.draftRarityBoost)||hasPerk('glueckspilz');
  const footer=el('div',{class:'draft-footer'},[
    buildRarityProbBar(tbl,state.league,state.impossibleMode,isBoosted),
    buildDraftLegend()
  ]);
  // Tauschbörse: build swap-enabled cards
  const buildTauschCard=(p,idx)=>{
    const hasTausch=hasPerk('tauschboerse')&&state.perkState.tauschUsed<2;
    const cardEl=buildCard(p,()=>{state.replaceCard=p;state.phase='replace-pick';render()});
    if(!hasTausch)return cardEl;
    const swapsLeft=2-state.perkState.tauschUsed;
    const wrap=el('div',{class:'tausch-card-wrap'},[
      cardEl,
      el('button',{class:'tausch-swap-btn',onclick:(e)=>{
        e.stopPropagation();
        state.perkState.tauschUsed=(state.perkState.tauschUsed||0)+1;
        // Exclude the card being replaced from taken pool
        const taken=new Set([...Object.values(state.team).filter(Boolean).map(q=>q.name),...state.bench.filter(b=>b.player).map(b=>b.player.name),...state.draftCards.filter((_,i)=>i!==idx).map(q=>q.name)]);
        let newCard=null;let att=0;
        while(!newCard&&att<30){att++;const r=hasPerk('glueckspilz')?rollRarityGlueckspilz():rollRarity();const c=generatePlayerForPos(pickRand(MAIN_POSITIONS),r);if(c&&!taken.has(c.name))newCard=c;}
        if(newCard){
          state.draftCards[idx]=newCard;
          // Targeted DOM replacement — only animate the swapped card, others stay static
          const outerWrap=e.currentTarget.closest('.draft-card-wrap');
          const newInner=buildTauschCard(newCard,idx);
          newInner.classList.add('card-hidden');
          outerWrap.innerHTML='';
          outerWrap.appendChild(newInner);
          playCardRevealSound(newCard.rarity);
          requestAnimationFrame(()=>{
            newInner.classList.remove('card-hidden');
            newInner.classList.add('card-reveal-'+newCard.rarity);
            if(newCard.rarity==='epic')setTimeout(()=>spawnSparkles(newInner,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
            else if(newCard.rarity==='legendary')setTimeout(()=>spawnSparkles(newInner,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
          });
          // Update or remove swap buttons on all other cards
          const remaining=2-state.perkState.tauschUsed;
          document.querySelectorAll('.tausch-swap-btn').forEach(btn=>{
            if(remaining<=0){btn.remove();}
            else{btn.textContent='↺ Tauschen ('+remaining+')';}
          });
        }
      }},[swapsLeft===1?'↺ Tauschen (1)':'↺ Tauschen'])
    ]);
    return wrap;
  };
  const skipBtn=el('div',{class:'draft-skip-below'},[
    el('button',{class:'btn-draft-skip',onclick:()=>{state.draftCards=[];proceedToNextLineup()}},[
      '↷ Ohne neue Karte weiterspielen'
    ])
  ]);
  const needsScroll=state.draftCards.length>5;
  const cardsContainer=needsScroll?el('div',{class:'draft-cards-scroll'},[cardsDiv]):cardsDiv;
  const phase=el('div',{class:`phase draft-phase ${lgClass}`},[
    el('div',{class:'draft-center-block has-skip'},[
      el('div',{class:'draft-pick-banner'},[
        el('div',{class:'draft-pick-instruction'},['Wähle einen Spieler']),
        el('div',{class:'draft-pick-slot'},[
          el('div',{class:'draft-pick-slot-dot'}),
          el('span',{},['Belohnung · '+LEAGUES[Math.min(state.league,LEAGUES.length-1)].name])
        ]),
      ]),
      cardsContainer,
      skipBtn,
    ]),
    footer,
  ]);
  main.appendChild(phase);
  let cumDelay=200;
  state.draftCards.forEach((p,_ti)=>{
    const card=hasPerk('tauschboerse')?buildTauschCard(p,_ti):buildCard(p,()=>{state.replaceCard=p;state.phase='replace-pick';render()});
    card.classList.add('card-hidden');
    const wrap=el('div',{class:'draft-card-wrap'});
    wrap.appendChild(card);
    cardsDiv.appendChild(wrap);
    const gap=p.rarity==='legendary'?720:p.rarity==='epic'?480:p.rarity==='rare'?300:230;
    setTimeout(()=>{
      playCardRevealSound(p.rarity);
      card.classList.remove('card-hidden');
      card.classList.add(`card-reveal-${p.rarity}`);
      if(p.rarity==='epic'){
        setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
      } else if(p.rarity==='legendary'){
        setTimeout(()=>spawnSparkles(card,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
        setTimeout(()=>spawnSparkles(card,14,['#fde047','#fff','#fbbf24']),600);
      } else if(p.rarity==='mythic'){
        setTimeout(()=>spawnSparkles(card,32,['#ef4444','#ff6b6b','#fff','#dc2626','#fca5a5']),80);
        setTimeout(()=>spawnSparkles(card,18,['#ef4444','#fff','#ff6b6b']),500);
        setTimeout(()=>spawnSparkles(card,14,['#dc2626','#fff','#ef4444']),900);
      }
    },cumDelay);
    cumDelay+=gap;
  });
}

function renderPackOpening(main){
  // Pack already collected → skip straight to next screen
  if(!state.packCards||state.packCards.length===0){afterPackDone();return;}
  const li=state.packLeague||0;
  const pool=state.impossibleMode?PACK_CONFIG_IMPOSSIBLE:PACK_CONFIG;
  const cfg=pool[Math.min(li,pool.length-1)];
  const cards=state.packCards||[];
  const RC={common:'#9ca3af',uncommon:'#5EC26A',rare:'#71a4f4',epic:'#c084fc',legendary:'#fde047',mythic:'#ef4444'};
  const phase=el('div',{class:'phase pack-phase'});
  main.appendChild(phase);

  function showClosed(){
    phase.innerHTML='';
    const lgName=LEAGUES[Math.min(li,LEAGUES.length-1)].name;
    const c=cfg.color;
    // Rarity dots: nur Raritäten mit Chance ≥ 2%
    const rarDots=Object.entries(cfg.w).filter(([k,v])=>v>=2).map(([k])=>
      el('div',{class:'pv2-rar-dot',style:{background:RC[k]||'#fff',color:RC[k]||'#fff'}}));
    // Hex → RGB helper für Transparenzen
    function hexAlpha(hex,a){
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }
    const cA=(a)=>hexAlpha(c,a);

    const pack=el('div',{class:'pack-v2',style:{
      borderColor:cA(.5),
      boxShadow:`0 0 70px ${cfg.glow},0 28px 60px rgba(0,0,0,.7)`,
      background:'transparent'
    }},[
      // ── Dark Top Section ──
      el('div',{class:'pv5-top'},[
        el('div',{class:'pv5-top-row'},[
          el('div',{class:'pv5-brand'},[
            el('div',{class:'pv5-brand-main'},['TACTIC']),
            el('div',{class:'pv5-brand-sub',style:{color:c}},['ROGUE']),
          ]),
          el('div',{class:'pv5-sport'},['FUSSBALL']),
        ]),
        el('div',{class:'pv5-lines'},[
          el('div',{class:'pv5-line1',style:{background:c}}),
          el('div',{class:'pv5-line2',style:{background:c}}),
        ]),
      ]),
      // ── Color Bottom Section ──
      el('div',{class:'pv5-bot',style:{background:c}},[
        el('div',{class:'pv5-bot-pat'}),
        el('div',{class:'pv5-bot-shine'}),
        el('div',{class:'pv5-name'},[cfg.name]),
        el('div',{class:'pv5-meta'},['Saison 2026 · '+cfg.size+' Karten']),
      ]),
      // ── Tear Strip ──
      el('div',{class:'pv5-tear'},[
        el('span',{class:'pv5-tear-txt'},['Öffnen']),
      ]),
      // ── Foil Shine ──
      el('div',{class:'pv2-shine'}),
    ]);
    // Click OR horizontal drag-to-open (works from beside the pack)
    let _dragStart=null,_packDone=false;
    phase.addEventListener('pointerdown',e=>{if(_packDone)return;_dragStart={x:e.clientX,y:e.clientY};});
    phase.addEventListener('pointermove',e=>{
      if(!_dragStart||_packDone)return;
      const dx=Math.abs(e.clientX-_dragStart.x),dy=Math.abs(e.clientY-_dragStart.y);
      if(dx>72&&dy<70){_packDone=true;_dragStart=null;openPack(pack);}
    });
    phase.addEventListener('pointerup',e=>{
      if(_packDone){_dragStart=null;return;}
      if(_dragStart&&Math.abs(e.clientX-_dragStart.x)<14){
        const pr=pack.getBoundingClientRect();
        if(e.clientX>=pr.left-20&&e.clientX<=pr.right+20&&e.clientY>=pr.top-10&&e.clientY<=pr.bottom+10){
          _packDone=true;openPack(pack);
        }
      }
      _dragStart=null;
    });
    phase.addEventListener('pointercancel',()=>{_dragStart=null;});
    const hdr=el('div',{class:'pack-scene-hdr'},[
      el('div',{class:'pack-scene-title'},['Dein Pack']),
      el('div',{class:'pack-scene-sub'},['Klicken oder horizontal ziehen'])
    ]);
    phase.appendChild(hdr);
    phase.appendChild(pack);
  }

  function openPack(pack){
    const pr=pack.getBoundingClientRect();
    state._packOpenPos={cx:Math.round(pr.left+pr.width/2),cy:Math.round(pr.top+pr.height/2)};
    pack.style.pointerEvents='none';
    pack.classList.add('fly-up');
    // Flash color = highest rarity in pack
    const RORDER=['common','uncommon','rare','epic','legendary','mythic'];
    const FCOL={common:'#e5e7eb',uncommon:'#86efac',rare:'#93c5fd',epic:'#d8b4fe',legendary:'#fef08a',mythic:'#fca5a5'};
    const topRarity=cards.reduce((best,p)=>RORDER.indexOf(p.rarity)>RORDER.indexOf(best)?p.rarity:best,'common');
    // Header fades out immediately so there's no hard cut later
    const scHdr=phase.querySelector('.pack-scene-hdr');
    if(scHdr){scHdr.style.transition='opacity .18s ease';scHdr.style.opacity='0';}
    const fl=document.createElement('div');
    // Flash max 0.75 — always semi-transparent so pack fly-up bleeds through
    fl.style.cssText=`position:fixed;inset:0;background:${FCOL[topRarity]||'#fff'};opacity:0;pointer-events:none;z-index:9998;transition:opacity .28s ease`;
    document.body.appendChild(fl);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{fl.style.opacity='0.75';}));
    // Reveal overlaid at t=150ms — overlaps pack fly-up, no DOM hard-cut
    setTimeout(showReveal,150);
    // Flash fades from t=320ms — cards emerge through the dissolving light
    setTimeout(()=>{fl.style.transition='opacity .58s ease';fl.style.opacity='0';setTimeout(()=>fl.remove(),620);},320);
  }

  function showReveal(){
    let flippedCount=0;
    // Scene as absolute overlay — cross-fades in over still-running pack animation
    const scene=el('div',{class:'pack-reveal-scene',style:{position:'absolute',inset:'0',zIndex:'2',background:'var(--bg-0)',opacity:'0',transition:'opacity .22s ease'}});
    const revHdr=el('div',{class:'pack-reveal-hdr'},[
      el('div',{class:'pack-reveal-title'},['Karten aufdecken']),
      el('div',{class:'pack-reveal-sub'},[
        el('span',{},['Klicke auf eine Karte um sie aufzudecken'])
      ])
    ]);
    const rowsWrap=el('div',{class:'pack-reveal-rows'});
    const footerEl=el('div',{class:'pack-footer',style:{opacity:'0',pointerEvents:'none',transition:'opacity .4s ease'}});

    // Split cards into rows of max 5
    const COLS=5;
    const chunks=[];
    for(let c=0;c<cards.length;c+=COLS)chunks.push(cards.slice(c,c+COLS));

    let globalIdx=0;
    chunks.forEach(chunk=>{
      const cardsRow=el('div',{class:'pack-reveal-cards'});
      chunk.forEach(p=>{
        const i=globalIdx++;
        const flipWrap=el('div',{class:'pack-flip'});
        flipWrap.dataset.rarity=p.rarity;
        const flipInner=el('div',{class:'pack-flip-inner'});
        const back=el('div',{class:'pack-flip-back'},[
          el('div',{class:'pack-flip-back-pat'}),
          el('div',{class:'pack-flip-back-shine'}),
          el('div',{class:'pfb-logo'},[
            el('div',{class:'pfb-logo-main'},['TACTIC']),
            el('div',{class:'pfb-logo-line'}),
            el('div',{class:'pfb-logo-sub'},['ROGUE'])
          ]),
          el('div',{class:'pack-flip-back-cta'},['Aufdecken'])
        ]);
        const front=el('div',{class:'pack-flip-front'});
        const card=buildCard(p,()=>{},null);
        front.appendChild(card);
        flipInner.appendChild(back);
        flipInner.appendChild(front);
        flipWrap.appendChild(flipInner);

        const doFlip=()=>{
          if(flipWrap.classList.contains('flipped'))return;
          flipWrap.classList.add('flipped');
          flippedCount++;
          if(p.rarity==='epic')setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),380);
          if(flippedCount===cards.length){
            addToCollection(cards);
            state.packCards=[];  // prevent re-farming on return from collection
            footerEl.style.opacity='1';footerEl.style.pointerEvents='';
            revHdr.style.transition='opacity .3s ease';revHdr.style.opacity='0';
          }
        };

        flipWrap.addEventListener('click',()=>{
          if(flipWrap.classList.contains('flipped'))return;
          if(p.rarity==='legendary'||p.rarity==='mythic'){
            showWalkout(p,doFlip);
          }else{
            doFlip();
          }
        });

        cardsRow.appendChild(flipWrap);
      });
      rowsWrap.appendChild(cardsRow);
    });

    footerEl.appendChild(el('button',{class:'btn',onclick:()=>{state._collOrigin=state.phase;state.phase='collection';render()}},['Sammlung →']));
    footerEl.appendChild(el('button',{class:'btn primary large',onclick:afterPackDone},['Weiter →']));
    scene.appendChild(revHdr);
    scene.appendChild(rowsWrap);
    scene.appendChild(footerEl);
    phase.appendChild(scene);
    // Cross-fade scene in over whatever is below — no hard DOM cut
    requestAnimationFrame(()=>requestAnimationFrame(()=>{scene.style.opacity='1';}));
    // Immediately hide cards + header before FLIP rAF — prevents flash
    revHdr.style.opacity='0';
    phase.querySelectorAll('.pack-flip').forEach(fw=>{fw.style.opacity='0';});
    // Remove old pack elements once the scene covers them
    setTimeout(()=>{phase.querySelectorAll('.pack-v2,.pack-scene-hdr').forEach(e=>e.remove());},350);
    // Fade header in after cards begin appearing
    setTimeout(()=>{revHdr.style.transition='opacity .38s ease';revHdr.style.opacity='1';},420);

    // FLIP: cards fly from pack position to their grid positions
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      const pos=state._packOpenPos||{cx:Math.round(window.innerWidth/2),cy:Math.round(window.innerHeight*.42)};
      phase.querySelectorAll('.pack-flip').forEach((fw,i)=>{
        const r=fw.getBoundingClientRect();
        const dx=pos.cx-Math.round(r.left+r.width/2);
        const dy=pos.cy-Math.round(r.top+r.height/2);
        const rot=(Math.random()-.5)*55;
        fw.style.transform=`translate(${dx}px,${dy}px) scale(.07) rotate(${rot}deg)`;
        fw.style.opacity='0';fw.style.willChange='transform,opacity';
        setTimeout(()=>{
          const dur=(.46+i*.026).toFixed(3);
          const del=(i*.068).toFixed(3);
          fw.style.transition=`transform ${dur}s cubic-bezier(.22,.8,.28,1),opacity .2s ease ${del}s`;
          fw.style.transform='translate(0,0) scale(1) rotate(0deg)';
          fw.style.opacity='1';
        },i*68+220);
      });
    });});
  }

  showClosed();
}

/* ── PLAYER COLLECTION ───────────────────────────────────── */
const RARITY_NEXT={common:'uncommon',uncommon:'rare',rare:'epic',epic:'legendary',legendary:'mythic'};
function tradeUp(name,rarity){
  const next=RARITY_NEXT[rarity];
  if(!next)return;
  let removed=0;
  state.collection=state.collection.filter(p=>{
    if(p.name===name&&removed<10){removed++;return false;}
    return true;
  });
  const newP=generatePlayerForPos(pickRand(MAIN_POSITIONS),next);
  if(newP)state.collection.push(newP);
  saveCollection();
  showToast('10× '+rarity.toUpperCase()+' → 1× '+next.toUpperCase()+' erhalten!');
}

function renderCollection(main){
  const RC={common:'#9ca3af',uncommon:'#5EC26A',rare:'#71a4f4',epic:'#c084fc',legendary:'#fde047',mythic:'#ef4444'};
  const RORD={mythic:0,legendary:1,epic:2,rare:3,uncommon:4,common:5};
  let fRar='all',sortBy='rating';
  const phase=el('div',{class:'phase collection-phase'});
  main.appendChild(phase);

  function build(){
    phase.innerHTML='';
    const col=state.collection||[];

    // Group into unique cards with counts
    const byName={};
    col.forEach(p=>{
      if(!byName[p.name])byName[p.name]={...p,count:0};
      byName[p.name].count++;
    });
    let items=Object.values(byName);
    if(fRar!=='all')items=items.filter(p=>p.rarity===fRar);
    if(sortBy==='rating')items.sort((a,b)=>b.rating-a.rating);
    else if(sortBy==='rarity')items.sort((a,b)=>(RORD[a.rarity]??5)-(RORD[b.rarity]??5));
    else if(sortBy==='dupes')items.sort((a,b)=>b.count-a.count||b.rating-a.rating);
    else items.sort((a,b)=>a.pos.localeCompare(b.pos));

    // stats (by total cards in collection, not unique)
    const rarCounts={};col.forEach(p=>{rarCounts[p.rarity]=(rarCounts[p.rarity]||0)+1});
    const tradeReady=col.filter((p,_,arr)=>arr.filter(x=>x.name===p.name).length>=10&&RARITY_NEXT[p.rarity]).length>0;
    const statEls=Object.entries(rarCounts)
      .sort((a,b)=>(RORD[a[0]]??5)-(RORD[b[0]]??5))
      .map(([r,n])=>el('span',{class:'col-stat'},[
        el('span',{style:{color:RC[r],fontWeight:'800'}},[r.slice(0,3).toUpperCase()]),
        el('span',{style:{color:'rgba(255,255,255,.35)'}},['×'+n])
      ]));

    const hdr=el('div',{class:'col-hdr'},[
      el('button',{class:'btn subtle',onclick:()=>{state.phase=state._collOrigin||'intro';render()}},['← Zurück']),
      el('span',{class:'col-hdr-title'},['Sammlung']),
      el('div',{class:'col-hdr-stats'},[
        el('span',{style:{fontSize:'12px',color:'rgba(255,255,255,.35)',fontWeight:'700'}},[col.length+' Karten · '+Object.keys(byName).length+' Unique']),
        ...statEls,
        tradeReady?el('span',{style:{fontSize:'10px',color:'#fde047',fontWeight:'800',letterSpacing:'.3px',marginLeft:'4px'}},['⇅ Tausch verfügbar']):null
      ].filter(Boolean))
    ]);

    const RARS=['all','common','uncommon','rare','epic','legendary','mythic'];
    const filRow=el('div',{class:'col-filters'},[
      ...RARS.map(r=>{
        const active=fRar===r;
        const btn=el('button',{class:'cfil'+(active?' active':''),onclick:()=>{fRar=r;build()}},
          [r==='all'?'Alle':r.toUpperCase()]);
        if(r!=='all'&&active)btn.style.borderColor=RC[r];
        if(r!=='all'&&active)btn.style.color=RC[r];
        return btn;
      }),
      el('div',{class:'cfil-sep'}),
      ...['rating','rarity','dupes','pos'].map(s=>
        el('button',{class:'cfil'+(sortBy===s?' active':''),onclick:()=>{sortBy=s;build()}},
          [s==='rating'?'Rating':s==='rarity'?'Rarity':s==='dupes'?'Duplikate':'Position']))
    ]);

    const tradeHint=el('div',{class:'col-trade-hint',style:{
      fontSize:'10px',color:'rgba(255,255,255,.22)',marginBottom:'10px',letterSpacing:'.2px'
    }},['10 Duplikate einer Karte → 1× nächste Seltenheitsstufe']);

    const grid=el('div',{class:'col-grid'});
    if(!items.length){
      grid.appendChild(el('div',{class:'col-empty'},['Noch keine Karten gesammelt. Öffne Packs nach jedem Spiel!']));
    }else{
      items.forEach(p=>{
        const canTrade=p.count>=10&&RARITY_NEXT[p.rarity];
        const card=buildCard(p,()=>{},null);
        const inner=el('div',{class:'col-inner-card'});
        inner.appendChild(card);
        const wrap=el('div',{class:'col-item'+(canTrade?' col-item-tradeable':'')});
        wrap.appendChild(inner);

        // Duplicate count badge (top-right)
        if(p.count>1){
          const badge=el('div',{class:'col-dup-badge'},['×'+p.count]);
          if(p.count>=10)badge.style.color='#fde047';
          if(p.count>=10)badge.style.borderColor='rgba(253,224,71,.4)';
          wrap.appendChild(badge);
        }

        // Trade overlay at bottom (only when count >= 10 and not mythic)
        if(canTrade){
          const next=RARITY_NEXT[p.rarity];
          const overlay=el('div',{class:'col-trade-overlay'},[
            el('button',{class:'col-trade-btn',onclick:(e)=>{
              e.stopPropagation();
              tradeUp(p.name,p.rarity);
              build();
            }},['10× → '+next.toUpperCase()+' ↑'])
          ]);
          wrap.appendChild(overlay);
        }

        wrap.title=p.name+' · '+p.rarity.toUpperCase()+' · '+p.rating+(p.count>1?' (×'+p.count+')':'');
        grid.appendChild(wrap);
      });
    }

    phase.appendChild(hdr);
    phase.appendChild(filRow);
    phase.appendChild(tradeHint);
    phase.appendChild(grid);
  }
  build();
}

  if(p.age<=23)return el('span',{class:'stoken-stage-chip pot'},['↑ POT']);
  if(p.age>=34)return el('span',{class:'stoken-stage-chip end'},['↓↓ END']);
  if(p.age>=31)return el('span',{class:'stoken-stage-chip alt'},['↓ ALT']);
  return null;
}

        ]);
      }
      const p=b.player;
      const slotEl=el('div',{class:`lineup-slot ${p.rarity} replaceable`,style:{position:'relative',transform:'none'}},[
        el('div',{class:'lineup-slot-card-wrap'},[
          el('div',{class:'lineup-slot-shadow'},[]),
          buildSlotToken(p,'main')
        ])
      ]);
      slotEl.addEventListener('click',()=>doReplace('bench:'+i));
      return el('div',{class:'lineup-bench-panel-slot'},[
        slotEl,
        el('span',{class:'lineup-bench-panel-name'},[shortName(p.name)])
      ]);
    })
  ]);
  mainRow.appendChild(benchPanel);
  phase.appendChild(mainRow);

  // ── CTA BAR: gray "← Zurück" — pixel-identical position to "Taktikphase →" in lineup ──
  const ctaBar=el('div',{class:'lineup-cta-bar'},[
    el('button',{
      class:'btn',
      onclick:()=>{state.phase='replace-draft';render();},
      style:{padding:'14px 42px',fontSize:'15px',fontWeight:'700',letterSpacing:'.4px',color:'rgba(255,255,255,.4)',borderColor:'rgba(255,255,255,.12)',background:'rgba(255,255,255,.04)'}
    },['← Zurück'])
  ]);
  phase.appendChild(ctaBar);

  main.appendChild(phase);
}
function doReplace(target){
  if(target.startsWith('slot:'))state.team[target.slice(5)]=state.replaceCard;
  else state.bench[Number(target.slice(6))].player=state.replaceCard;
  state.replaceCard=null;state.draftCards=[];proceedToNextLineup();
}

/* ============================================================
   RANKING SCREEN
   ============================================================ */
function renderRanking(main){
  const myId=getPlayerId();
  const myName=getPlayerName();
  const phase=el('div',{class:'phase ranking-phase'});

  // Header + back
  const backBtn=el('button',{class:'btn',style:{marginBottom:'14px',alignSelf:'flex-start'},onclick:()=>{state.phase='intro';render();}},'← Zurück');
  const title=el('div',{class:'ranking-title'},['🏆 Weltrangliste']);
  const sub=el('div',{class:'ranking-sub'},['Top 100 · Sortiert nach Level']);
  phase.append(backBtn,title,sub);

  // Player name input
  const nameInput=el('input',{class:'ranking-name-input',type:'text',placeholder:'Dein Name im Ranking...',maxlength:20});
  nameInput.value=myName;
  const saveBtn=el('button',{class:'ranking-name-save',onclick:async()=>{
    const n=nameInput.value.trim();
    if(!n)return;
    setPlayerName(n);saveBtn.textContent='✓ Gespeichert';
    await fbSubmitScore();
    setTimeout(()=>saveBtn.textContent='Speichern',1500);
    loadAndRender();
  }},'Speichern');
  phase.appendChild(el('div',{class:'ranking-name-row'},[nameInput,saveBtn]));

  if(!myName) phase.appendChild(el('div',{class:'ranking-no-name'},['Gib einen Namen ein um im Ranking zu erscheinen.']));

  // Table container
  const tableEl=el('div',{class:'ranking-table'});
  tableEl.innerHTML='<div class="ranking-loading">Lade Rangliste...</div>';
  phase.appendChild(tableEl);
  main.appendChild(phase);

  async function loadAndRender(){
    tableEl.innerHTML='<div class="ranking-loading">Lade Rangliste...</div>';
    const {ok,err,rows}=await fbLoadRanking();
    tableEl.innerHTML='';
    if(!ok){
      tableEl.innerHTML=`<div class="ranking-loading" style="color:#f87171;">⚠ ${err}<br><span style="font-size:10px;opacity:.6">Gehe zu Firebase → Realtime Database → Rules und setze ".read":true auf rankings-Ebene</span></div>`;
      return;
    }
    if(!rows.length){tableEl.innerHTML='<div class="ranking-loading">Noch keine Einträge — spiele eine Runde und speichere deinen Namen.</div>';return;}
    rows.forEach((r,i)=>{
      const pos=i+1;
      const isMe=r.id===myId;
      const cls='ranking-row'+(isMe?' me':'')+(pos===1?' top1':pos===2?' top2':pos===3?' top3':'');
      const posClass=pos===1?'rank-pos gold':pos===2?'rank-pos silver':pos===3?'rank-pos bronze':'rank-pos';
      const medal=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':String(pos);
      const row=el('div',{class:cls},[
        el('span',{class:posClass},[medal]),
        el('span',{class:'rank-name'},[r.name+(isMe?' (Du)':'')]),
        el('span',{class:'rank-lvl'},['Lv. '+r.level]),
        el('span',{class:'rank-xp'},[r.xp+' XP']),
      ]);
      tableEl.appendChild(row);
    });
  }
  loadAndRender();
}

/* ============================================================
   LEVEL UP SCREEN
   ============================================================ */
function renderLevelUp(main){
  if(!state.pendingLevelRewards||!state.pendingLevelRewards.length){
    state.phase='intro';render();return;
  }
  // Combine all pending rewards
  const allCards=state.pendingLevelRewards.flatMap(u=>u.cards);
  const allPacks=state.pendingLevelRewards.flatMap(u=>u.packs);
  const topLevel=state.pendingLevelRewards[state.pendingLevelRewards.length-1].level;
  const multiLvl=state.pendingLevelRewards.length>1;

  const cardsDiv=el('div',{class:'draft-cards'});
  const packChips=allPacks.map(p=>el('span',{class:'lvlup-pack-chip',style:{color:p.color,borderColor:p.color+'66'}},[p.label+' · '+p.size+' Karten']));
  const continueBtn=el('button',{class:'btn primary btn-cta-main',style:{marginTop:'20px'},onclick:()=>{
    addToCollection(allCards);
    state.pendingLevelRewards=[];
    savePendingRewards();
    state.phase='intro';render();
  }},['Zur Sammlung hinzufügen →']);

  const startLvl=state.pendingLevelRewards[0].level;
  const header=el('div',{class:'lvlup-header'},[
    el('div',{class:'lvlup-pre'},[multiLvl?'MEHRFACH LEVEL UP!':'LEVEL UP']),
    el('div',{class:'lvlup-num'},[String(topLevel)]),
    el('div',{class:'lvlup-sub'},[multiLvl?`Level ${startLvl-1} → ${topLevel}`:`Level ${topLevel-1} → ${topLevel} erreicht`]),
  ]);
  const lvlCardsContainer=allCards.length>5?el('div',{class:'draft-cards-scroll'},[cardsDiv]):cardsDiv;
  const phase=el('div',{class:'phase lvlup-phase'},[
    header,
    el('div',{class:'lvlup-pack-chips'},packChips),
    el('div',{class:'lvlup-cards-label'},['Belohnungen']),
    lvlCardsContainer,
    continueBtn,
  ]);
  main.appendChild(phase);

  let cumDelay=300;
  allCards.forEach(p=>{
    const card=buildCard(p,null);
    card.classList.add('card-hidden');card.style.cursor='default';
    const wrap=el('div',{class:'draft-card-wrap'});
    wrap.appendChild(card);cardsDiv.appendChild(wrap);
    const gap=p.rarity==='legendary'?720:p.rarity==='epic'?480:p.rarity==='mythic'?900:p.rarity==='rare'?300:230;
    setTimeout(()=>{
      playCardRevealSound(p.rarity);
      card.classList.remove('card-hidden');card.classList.add(`card-reveal-${p.rarity}`);
      if(p.rarity==='epic')setTimeout(()=>spawnSparkles(card,14,['#a855f7','#e879f9','#fff','#c084fc']),120);
      else if(p.rarity==='legendary')setTimeout(()=>spawnSparkles(card,26,['#fde047','#fbbf24','#fff','#f59e0b','#ffd700']),100);
      else if(p.rarity==='mythic'){setTimeout(()=>spawnSparkles(card,32,['#ef4444','#ff6b6b','#fff','#dc2626']),80);}
    },cumDelay);
    cumDelay+=gap;
  });
}

/* ============================================================
   PERK PICKER — Aufstiegs Bonus
   ============================================================ */
function renderPerkPick(main){
  const CAT_LABEL={passiv:'Passiv',taktik:'Taktisch',draft:'Draft',event:'Ereignis',liga:'Momentum'};
  const CAT_STARS={passiv:'★★★',taktik:'⬡⬡⬡',draft:'◆◆◆',event:'✦✦✦',liga:'▲▲▲'};

  // Stable choices per pick session
  if(!state._perkChoices||state._perkChoices.length===0){
    const pool=PERKS.filter(p=>!state.perks.includes(p.id));
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    state._perkChoices=pool.slice(0,3);
  }
  const choices=state._perkChoices;

  function buildPerkCard(perk){
    const wrap=el('div',{class:'draft-card-wrap perk-card-wrap'});
    const face=el('div',{class:`perk-card-face perk-theme-${perk.cat} ${perkLgClass}`,onclick:()=>pickPerk(perk)},[
      el('div',{class:'perk-card-strip'}),
      el('div',{class:'perk-card-top'},[
        el('span',{class:'perk-cat-badge'},[CAT_LABEL[perk.cat]||perk.cat]),
        el('span',{class:'perk-card-stars'},[CAT_STARS[perk.cat]||'★★★']),
      ]),
      el('div',{class:'perk-card-body'},[
        el('div',{class:'perk-card-icon'},[perk.name.slice(0,3).toUpperCase()]),
        el('div',{class:'perk-card-name'},[perk.name]),
        el('div',{class:'perk-card-sep'}),
        el('div',{class:'perk-card-desc'},[perk.desc]),
        el('div',{class:'perk-card-eff-block'},[
          el('div',{class:'perk-card-eff-lbl'},['Auswirkung']),
          el('div',{class:'perk-card-eff-val'},[perk.eff]),
        ]),
      ]),
      el('div',{class:'perk-card-choose'},['Auswählen']),
    ]);
    wrap.appendChild(face);
    return wrap;
  }

  function pickPerk(perk){
    state.perks.push(perk.id);
    if(perk.id==='goldener_griff')state.perkState.goldenerGriffActive=true;
    state.pendingPerkPick=false;
    state._perkChoices=null;
    maybeShowRandomEvent(()=>{generateReplaceCards();state.phase='replace-draft';render();});
  }

  const leagueName=LEAGUES[state.league]?.name||('Liga '+state.league);
  const lgClass=state.impossibleMode?'imp':`lg${Math.min(state.league,5)}`;
  const perkLgClass=state.impossibleMode?'perk-imp':`perk-lg${Math.min(state.league,5)}`;

  const currentPerksEl=state.perks.length>0?el('div',{class:'perk-current-perks'},[
    el('div',{class:'perk-current-label'},['Aktive Boni']),
    el('div',{class:'perk-current-list'},[
      ...state.perks.map(id=>{
        const p=PERKS.find(x=>x.id===id);
        const col={passiv:'#71a4f4',taktik:'#5EC26A',draft:'#fde047',event:'#c084fc',liga:'#fb923c'}[p?.cat]||'#555';
        return p?el('span',{class:'perk-current-chip',style:{borderColor:col}},[p.name]):null;
      }).filter(Boolean)
    ])
  ]):null;

  const phase=el('div',{class:`phase draft-phase ${lgClass}`},[
    el('div',{class:'draft-center-block'},[
      el('div',{class:'draft-pick-banner'},[
        el('div',{class:'draft-pick-instruction'},['Aufstiegs Bonus']),
        el('div',{class:'draft-pick-slot'},[
          el('div',{class:'draft-pick-slot-dot'}),
          el('span',{},[leagueName]),
        ]),
      ]),
      el('div',{class:'draft-cards perk-cards-row'},[
        ...choices.map(p=>buildPerkCard(p))
      ]),
    ]),
    el('div',{class:'draft-footer'},[
      ...(currentPerksEl?[currentPerksEl]:[]),
    ]),
  ]);
  main.appendChild(phase);
}
function proceedToNextLineup(){state.phase='lineup';render()}

function renderTrophies(main){
  const TROPHY_ICONS=['⚽','🥈','🏅','🎖️','🏆','💰'];
  const total=Object.values(state.leagueTrophies).reduce((a,b)=>a+b,0);
  const cards=LEAGUES.map((lg,i)=>{
    const count=state.leagueTrophies[lg.key]||0;
    const earned=count>0;
    return el('div',{class:`trophy-card ${earned?lg.key:'locked'}`},[
      el('span',{class:'trophy-icon'},[TROPHY_ICONS[i]]),
      el('div',{class:'trophy-card-name'},[lg.name]),
      earned
        ? el('div',{class:'trophy-count'},[`×${count}`])
        : el('div',{class:'trophy-count'},['—']),
      earned
        ? el('div',{class:'trophy-count-sub'},['gewonnen'])
        : el('div',{class:'trophy-count-sub'},['gesperrt']),
    ]);
  });
  main.appendChild(el('div',{class:'phase trophy-phase'},[
    el('h2',{style:{fontSize:'22px',fontWeight:'900',letterSpacing:'1.5px'}},['Trophäenhalle']),
    el('div',{class:'hint'},[total===0?'Noch keine Trophäen — gewinne deine erste Liga!':`${total} Pokal${total!==1?'e':''} gesammelt`]),
    el('div',{class:'trophy-shelf'},cards),
    el('button',{class:'btn primary',style:{marginTop:'8px'},onclick:()=>{if(state._trophyOrigin==='victory'){state._trophyOrigin=null;startNewGame();}else{state.phase=state.totalMatches===0?'intro':'lineup';render();}}},['← Zurück'])
  ]));
}

/* ══════════════════════════════════════════════════════════════════
   BUG REPORT / FEEDBACK MODAL
   Sends via Web3Forms (free, no backend needed).
   ➜ Setup (one-time):
     1. Visit https://web3forms.com
     2. Enter admin.tacticrogue@gmail.com and click "Create Access Key"
     3. Paste the key below as WEB3FORMS_KEY
   ══════════════════════════════════════════════════════════════════ */
const WEB3FORMS_KEY = 'a9610cba-e005-4b39-a260-078c6c9f90e9';

(function initBugModal(){
  const backdrop = document.getElementById('bugModalBackdrop');
  const closeBtn = document.getElementById('bugModalClose');
  const sendBtn  = document.getElementById('bugSendBtn');
  const textarea = document.getElementById('bugText');
  const metaDiv  = document.getElementById('bugMeta');
  const hintEl   = document.getElementById('bugSendHint');
  const success  = document.getElementById('bugSuccess');
  const modalBody= document.querySelector('.bug-modal-body');
  const modalFoot= document.querySelector('.bug-modal-footer');
  let selectedType = 'bug';

  function openBugModal(){
    // Refresh meta info
    const league = LEAGUES[Math.min(state.league, LEAGUES.length-1)]?.name || '-';
    metaDiv.innerHTML = `Liga: <b>${league}</b> &nbsp;·&nbsp; Phase: <b>${state.phase}</b>`;
    // Reset state
    textarea.value = '';
    success.classList.remove('show');
    modalBody.style.display = '';
    modalFoot.style.display = '';
    hintEl.textContent = WEB3FORMS_KEY === 'YOUR_ACCESS_KEY_HERE'
      ? '⚠ Kein Access Key — öffnet E-Mail-Client'
      : '';
    backdrop.classList.add('open');
    setTimeout(()=>textarea.focus(), 200);
  }
  window.closeBugModal = function(){backdrop.classList.remove('open');};

  // Type buttons
  document.querySelectorAll('.bug-type-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.bug-type-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedType = btn.dataset.type;
    });
  });

  // Send
  sendBtn.addEventListener('click', async ()=>{
    const msg = textarea.value.trim();
    if(!msg){textarea.focus();textarea.style.borderColor='rgba(239,68,68,.5)';setTimeout(()=>textarea.style.borderColor='',1200);return;}
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sende…';
    const league = LEAGUES[Math.min(state.league, LEAGUES.length-1)]?.name || '-';
    const typeLabel = {bug:'🐛 Bug',verbesserung:'💡 Verbesserung',sonstiges:'✉️ Sonstiges'}[selectedType] || selectedType;
    const subject = `[Tactic Roguelike Beta] ${typeLabel}`;

    try{
      if(WEB3FORMS_KEY !== 'YOUR_ACCESS_KEY_HERE'){
        const res = await fetch('https://api.web3forms.com/submit',{
          method:'POST',
          headers:{'Content-Type':'application/json','Accept':'application/json'},
          body: JSON.stringify({
            access_key: WEB3FORMS_KEY,
            subject,
            from_name: 'Tactic Roguelike Beta',
            message: msg,
            bug_type: typeLabel,
            liga: league,
            phase: state.phase,
            timestamp: new Date().toLocaleString('de-DE')
          })
        });
        const data = await res.json();
        if(!data.success) throw new Error(data.message||'Fehler');
      } else {
        // Fallback: open email client
        const body = `Typ: ${typeLabel}\n\nBeschreibung:\n${msg}\n\nLiga: ${league}\nPhase: ${state.phase}\nZeit: ${new Date().toLocaleString('de-DE')}`;
        window.open(`mailto:admin.tacticrogue@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
      }
      // Show success
      modalBody.style.display = 'none';
      modalFoot.style.display = 'none';
      success.classList.add('show');
      setTimeout(closeBugModal, 2800);
    } catch(err){
      sendBtn.disabled = false;
      sendBtn.textContent = 'Absenden →';
      hintEl.textContent = '✗ Fehler: ' + (err.message || 'Bitte nochmal versuchen');
      hintEl.style.color = '#f87171';
    }
  });

  $('#btnBugReport').addEventListener('click', openBugModal);
  backdrop.addEventListener('click', e=>{if(e.target===backdrop)closeBugModal();});
  closeBtn.addEventListener('click', closeBugModal);
})();

state.phase='intro';render();
